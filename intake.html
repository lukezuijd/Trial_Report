<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Client Intake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>

    <!-- CRUCIALE FIX VOOR HET OPSLAAN VAN PDF -->
    <style>
        @media print {
            body, html, #root { 
                background-color: white !important; 
                overflow: visible !important; 
                height: auto !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; break-before: page; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            
            /* Dwing de grijze rand en padding van de hoofdcontainer naar wit/0 */
            .bg-slate-600 {
                background-color: white !important;
                padding: 0 !important;
            }

            #print-content { 
                position: relative !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                width: 100% !important; 
                max-width: 100% !important; 
            }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Loading Intake Form... Please ensure 'style.css' and 'config.js' are in the same folder.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Building2, PackagePlus, Trash2, Plus, ChevronUp, ChevronDown, 
          Upload, Image as ImageIcon, CheckCircle, Target, AlertCircle,
          Globe, AlertTriangle, Truck, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, Thermometer, Clock, ChevronRight, ArrowDown, ArrowUp, 
          Beaker, Save, FolderOpen, FileText, Printer, Edit3, Camera, X, Mail, Send, Activity, UserPlus, Package, FileArchive
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          }
        };

        const PACKAGING_TYPES = globalConfig.PACKAGING_TYPES || ['Punnets', 'Pillow Bag', 'Box/ Crate', 'Bin crate', 'Pallet'];
        const TRANSPORT_MODES = globalConfig.TRANSPORT_MODES || ['Air Freight', 'Sea Freight', 'Road Transport', 'Storage'];

        const DEFAULT_CRITERIA = globalConfig.DEFAULT_CRITERIA || [
          'General Quality', 'Taste', 'Visual Appearance', 'Color',
          'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation',
          'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'
        ];

        // --- TRANSLATIONS (Strictly English) ---
        const T = {
          en: {
            title: "Client Intake Form", subtitle: "Test Request Preparation",
            introTitle: "Welcome to PerfoTec!",
            introText: "Please fill in the details. Click 'Save (.json)' to save progress. Click 'View Summary' to review and print/save as PDF.",
            load: "Load (.json)", save: "Save (.json)", preview: "View Summary", print: "Print / Save PDF", back: "Back to edit",
            sec1Title: "1. Company & Contact Details",
            companyName: "Company Name", street: "Street", houseNumber: "Number", zipCode: "Zip / Postal", city: "City", country: "Country", website: "Website",
            contactName: "Contact Name", role: "Job Title", email: "Email", phoneDirect: "Phone (Direct)", phoneWork: "Phone (Work)", addContactBtn: "Add Contact Person",
            unitSystem: "Unit System", metric: "Metric", imperial: "Imperial",
            logoUpload: "Company Logo", clickUpload: "Click to upload",
            sec2Title: "2. Product(s) for Testing", prodDetails: "Details", delProd: "Remove Product",
            secATitle: "A. Product & Packaging", prodName: "Product Name", prodType: "Variety / Type", origin: "Origin", prodPhoto: "Photo", processingType: "State of product",
            whole: "Whole", processed: "Processed / Fresh-cut",
            maturity: "Maturity stage", treatment: "Post-harvest treatment",
            packType: "Packaging Type", material: "Current Material",
            dimens: "Dimensions (Internal)", len: "Length", wid: "Width", widSeal: "Seal Width", hei: "Height",
            weight: "Net Weight",
            qualityCrit: "Quality criteria", qualityCritDesc: "Select the aspects to evaluate:",
            secBTitle: "B. Challenge & Objectives", challenge: "Current Challenge", goal: "Target Goal",
            secCTitle: "C. Current Supply Chain", transportMode: "Transport & Storage", transportModeErr: "Transport mode",
            airFreight: "Air", seaFreight: "Sea", roadTransport: "Road", storage: "Storage",
            step: "Step", phase: "Phase (Activity)", temp: "Temperature", to: "To", days: "Time (Days)", action: "Action",
            actNone: "- None -", actPack: "Pack", actUnpack: "Unpack", addStep: "Add Step", addProd: "Add another product",
            validationErr: "Not all mandatory fields have been filled in:", reqField: "is required", reqProd: "Product",
            printTitle: "Intake Summary",
            successTitle: "Almost done!",
            successStep1: "Your email program has just been opened (addressed to luke.zuijderwijk@perfotec.com).",
            successStep2: "The request file (JSON data) has just been downloaded to your 'Downloads' folder.",
            successStep3: "IMPORTANT: Please attach the downloaded file to the opened email and click send! You can also use the 'Print to PDF' function to save the summary.",
            fallbackMailText: "Did the email not open automatically?",
            fallbackMailBtn: "Open Email Manually",
            closeBtn: "I understand, close", submitBtn: "Finish & Send",
            removeStep: "Remove Step"
          }
        };

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Distribution Center', tempStart: '4', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('distribution')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('shop')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        // --- HELPER CLASSES ---
        const inputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- MATH CONVERSION HELPER ---
        const convertValue = (val, type, isBulk, toImperial) => {
            if (!val || isNaN(val)) return val;
            const v = parseFloat(val);
            let res = v;
            
            if (type === 'length') {
                if (isBulk) res = toImperial ? v / 2.54 : v * 2.54; // cm <-> inch
                else res = toImperial ? v / 25.4 : v * 25.4; // mm <-> inch
            } else if (type === 'weight') {
                if (isBulk) res = toImperial ? v * 2.20462 : v / 2.20462; // kg <-> lbs
                else res = toImperial ? v * 0.00220462 : v / 0.00220462; // g <-> lbs
            } else if (type === 'temp') {
                res = toImperial ? (v * 9/5) + 32 : (v - 32) * 5/9; // C <-> F
            }
            
            return Number(res.toFixed(2)).toString(); // Strips trailing zeros cleanly
        };

        // --- COMPONENT: PRODUCT SUPPLY CHAIN FLOW (Visualizer for PDF) ---
        const ProductSupplyChainFlow = ({ chain, unitSystem, t }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;
          const isMetric = unitSystem === 'metric';
          const tempUnit = isMetric ? '°C' : '°F';

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden print:overflow-visible">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative min-h-[5.5rem]">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] flex items-center justify-center leading-tight w-full break-words px-0.5">{step.stage || '-'}</div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, tempUnit)}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap w-full text-center">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">{t.actPack}</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">{t.actUnpack}</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        // --- COMPONENT: PRINT VIEW ---
        const PrintPreview = ({ clientInfo, products, unitSystem, t, onBack }) => {
          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading break-after-avoid";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          const isMetric = unitSystem === 'metric';

          const handlePdfExport = () => { window.print(); };

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title><style>body { font-family: 'Arial', sans-serif; } .page-break { page-break-before: always; } table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #007C27; color: white; } img { max-width: 100%; height: auto; }</style></head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = `Intake_${clientInfo.companyName || 'Client'}.doc`;
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          return (
             <div className="min-h-screen bg-slate-600 p-0 sm:p-8 overflow-y-auto print:overflow-visible print:h-auto print:min-h-0 print:block font-sans print:p-0 print:bg-white no-print-bg">
                <div className="fixed top-6 right-6 flex gap-4 no-print z-50">
                    <button onClick={onBack} className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-slate-900 transition"><Edit3 size={18}/> {t.back}</button>
                    <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition"><FileArchive size={20} /> Download Word</button>
                    <button onClick={handlePdfExport} className="bg-green-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-green-700 transition"><Printer size={18}/> {t.print}</button>
                </div>

                <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0 text-slate-800">
                   
                   {/* HEADER */}
                   <div className="flex justify-between items-center border-b-4 pb-6 mb-10" style={{ borderColor: BRAND.colors.green }}>
                     <div>
                        {clientInfo.logo ? (
                          <img src={clientInfo.logo} className="h-16 object-contain" crossOrigin="anonymous" />
                        ) : (
                          <img src={BRAND.logos.default} className="h-16 object-contain" crossOrigin="anonymous" />
                        )}
                     </div>
                     <div className="text-right">
                       <h1 className="text-4xl font-bold uppercase brand-heading" style={{ color: BRAND.colors.blue }}>{t.printTitle}</h1>
                       <p className="text-sm font-bold text-slate-500 mt-1">{new Date().toLocaleDateString()}</p>
                     </div>
                   </div>

                   {/* CLIENT INFO */}
                   <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-10 break-inside-avoid text-sm">
                      <h2 className="font-bold text-xl mb-5 border-b border-slate-200 pb-3 text-slate-800 uppercase tracking-wide brand-heading">{t.sec1Title}</h2>
                      <div className="grid grid-cols-2 gap-y-6 gap-x-8">
                         <div>
                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">{t.companyName}</p>
                            <p className="font-bold text-slate-800 text-lg">{clientInfo.companyName || '-'}</p>
                            {clientInfo.website && <p className="text-blue-600 font-medium mt-1 text-xs">{clientInfo.website}</p>}
                         </div>
                         <div>
                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Address</p>
                            <p className="text-slate-700 text-base">{clientInfo.street} {clientInfo.houseNumber}</p>
                            <p className="text-slate-700 text-base">{clientInfo.zipCode} {clientInfo.city}, {clientInfo.country}</p>
                         </div>
                      </div>
                      
                      {clientInfo.contacts && clientInfo.contacts.length > 0 && (
                          <div className="mt-8">
                             <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">Contacts</p>
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {clientInfo.contacts.map((contact, i) => (
                                    <div key={i} className="bg-white p-4 border border-slate-200 rounded-xl">
                                        <p className="font-bold text-slate-800 text-base">{contact.name || '-'} {contact.role && <span className="font-normal text-slate-500 text-sm ml-1">({contact.role})</span>}</p>
                                        <div className="mt-2 space-y-1">
                                            {contact.email && <p className="text-slate-600 text-sm flex items-center gap-2"><Mail size={14}/> {contact.email}</p>}
                                            {contact.phoneDirect && <p className="text-slate-600 text-sm flex items-center gap-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> {contact.phoneDirect} (Direct)</p>}
                                            {contact.phoneWork && <p className="text-slate-600 text-sm flex items-center gap-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg> {contact.phoneWork} (Work)</p>}
                                        </div>
                                    </div>
                                ))}
                             </div>
                          </div>
                      )}
                   </div>

                   {/* PRODUCTS */}
                   <div className="space-y-12">
                     {products.map((prod, idx) => {
                       const isLargeBulk = prod.packagingType === 'Bin crate' || prod.packagingType === 'Pallet';
                       const dimUnit = isLargeBulk ? (isMetric ? 'cm' : 'inch') : (isMetric ? 'mm' : 'inch');
                       const weightUnit = isLargeBulk ? (isMetric ? 'kg' : 'lbs') : (isMetric ? 'g' : 'lbs');

                       return (
                         <div key={prod.id} className="border border-slate-200 rounded-2xl p-8 mb-8 break-inside-avoid bg-white">
                            <div className="flex justify-between items-start border-b-2 border-slate-100 pb-5 mb-8">
                               <div className="pr-4">
                                  <h2 className="text-4xl font-bold brand-heading" style={{ color: BRAND.colors.green }}>{prod.name || 'Unnamed Product'}</h2>
                                  <p className="text-slate-500 uppercase tracking-widest text-sm font-bold mt-2 bg-slate-100 inline-block px-3 py-1 rounded">{prod.processingType === 'Whole' ? t.whole : t.processed}</p>
                               </div>
                               
                               <div style={{ width: '80mm', height: '80mm' }} className="border border-slate-200 rounded-xl flex items-center justify-center bg-white p-2 shadow-sm shrink-0 overflow-hidden">
                                  {prod.photo ? (
                                     <img src={prod.photo} className="max-w-full h-auto max-h-[80mm] object-contain p-2 rounded" crossOrigin="anonymous" />
                                  ) : (
                                     <div className="flex flex-col items-center text-slate-300">
                                        <ImageIcon size={32} className="mb-2 opacity-50"/> 
                                        <span className="text-xs italic font-medium">No Photo</span>
                                     </div>
                                  )}
                               </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                               <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                  <h4 className="font-bold text-lg mb-4" style={{color: BRAND.colors.blue}}>Specifications</h4>
                                  <div className="grid grid-cols-[140px_1fr] gap-y-2 text-sm">
                                     <div className="font-bold text-slate-500">Variety :</div> <div>{prod.type || '-'}</div>
                                     <div className="font-bold text-slate-500">Origin :</div> <div>{prod.origin || '-'}</div>
                                     <div className="font-bold text-slate-500">Maturity :</div> <div>{prod.maturityStage || '-'}</div>
                                     <div className="font-bold text-slate-500">Treatment :</div> <div>{prod.postHarvestTreatment || '-'}</div>
                                     <div className="font-bold text-slate-500 mt-2 pt-2 border-t">Packaging :</div> <div className="mt-2 pt-2 border-t">{prod.packagingType || '-'} ({prod.material || '-'})</div>
                                     <div className="font-bold text-slate-500">Dimensions :</div> <div>{prod.length || '-'} x {prod.width || '-'} {prod.packagingType !== 'Pillow Bag' && `x ${prod.height || '-'}`} {dimUnit}</div>
                                     <div className="font-bold text-slate-500">Net Weight :</div> <div className="font-bold">{prod.weight || '-'} {weightUnit}</div>
                                  </div>
                               </div>
                               
                               <div className="flex flex-col gap-6">
                                  <div className="bg-orange-50 p-6 rounded-2xl border border-orange-100 flex-1">
                                     <h4 className="font-bold text-lg mb-2 text-orange-800 flex items-center gap-2"><AlertCircle size={18}/> {t.challenge}</h4>
                                     <div className="whitespace-pre-wrap text-sm text-slate-700">{prod.currentChallenge || '-'}</div>
                                  </div>
                                  <div className="bg-green-50 p-6 rounded-2xl border border-green-100 flex-1">
                                     <h4 className="font-bold text-lg mb-2 text-green-800 flex items-center gap-2"><CheckCircle size={18}/> {t.goal}</h4>
                                     <div className="whitespace-pre-wrap text-sm text-slate-700">{prod.targetGoal || '-'}</div>
                                  </div>
                               </div>
                            </div>

                            <div className="break-inside-avoid bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8">
                               <h4 className="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><Truck size={20} className="text-indigo-600"/> Supply Chain ({prod.transportMode || 'None'})</h4>
                               <ProductSupplyChainFlow chain={prod.supplyChain} unitSystem={unitSystem} t={t} />
                            </div>

                            {prod.qualityCriteria && prod.qualityCriteria.length > 0 && (
                                <div className="break-inside-avoid bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                   <h4 className="font-bold text-lg mb-4 text-slate-800">Desired Quality Criteria</h4>
                                   <ul className="list-disc pl-6 grid grid-cols-2 gap-2 text-sm text-slate-700">
                                     {prod.qualityCriteria.map((c, i) => <li key={i}>{c}</li>)}
                                   </ul>
                                </div>
                            )}
                         </div>
                       )
                     })}
                   </div>
                </div>
             </div>
          );
        };

        // --- MAIN APPLICATION (EDITOR) ---
        const App = () => {
          // Language strictly set to English for this file.
          const lang = 'en';
          const t = T[lang];

          const [clientInfo, setClientInfo] = useState({
            companyName: '', street: '', houseNumber: '', zipCode: '', city: '', country: '', website: '',
            contacts: [{ id: 1, name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }],
            logo: null
          });

          const [unitSystem, setUnitSystem] = useState('metric'); // 'metric' or 'imperial'

          const initialProduct = {
            id: Date.now(), name: '', type: '', origin: '', processingType: 'Whole',
            maturityStage: '', postHarvestTreatment: '', weight: '',
            packagingType: 'Punnets', material: '', length: '', width: '', height: '',
            qualityCriteria: [], currentChallenge: '', targetGoal: '',
            transportMode: '', supplyChain: JSON.parse(JSON.stringify(DEFAULT_SUPPLY_CHAIN)), photo: null
          };

          const [products, setProducts] = useState([initialProduct]);
          const [newCriteria, setNewCriteria] = useState('');
          const [errors, setErrors] = useState([]);
          const [isSuccessModalOpen, setIsSuccessModalOpen] = useState(false);
          const [mailUrl, setMailUrl] = useState('');
          const [isPreview, setIsPreview] = useState(false);
          const fileInputRef = useRef(null);

          // --- HANDLERS UNIT TOGGLE ---
          const handleUnitToggle = (newSystem) => {
              if (newSystem === unitSystem) return;
              const toImperial = newSystem === 'imperial';
              
              setProducts(prevProds => prevProds.map(p => {
                  const isBulk = p.packagingType === 'Bin crate' || p.packagingType === 'Pallet';
                  
                  // Convert dimensions
                  const newLen = convertValue(p.length, 'length', isBulk, toImperial);
                  const newWid = convertValue(p.width, 'length', isBulk, toImperial);
                  const newHei = convertValue(p.height, 'length', isBulk, toImperial);
                  const newWgt = convertValue(p.weight, 'weight', isBulk, toImperial);

                  // Convert Supply Chain Temps
                  const newChain = p.supplyChain.map(step => ({
                      ...step,
                      tempStart: convertValue(step.tempStart, 'temp', false, toImperial),
                      tempEnd: convertValue(step.tempEnd, 'temp', false, toImperial)
                  }));

                  return {
                      ...p,
                      length: newLen,
                      width: newWid,
                      height: newHei,
                      weight: newWgt,
                      supplyChain: newChain
                  };
              }));
              
              setUnitSystem(newSystem);
          };

          // --- HANDLERS CLIENT INFO ---
          const handleClientChange = (field, value) => {
            setClientInfo(prev => ({ ...prev, [field]: value }));
            if (errors.length > 0) setErrors([]); 
          };

          const handleContactChange = (id, field, value) => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: prev.contacts.map(c => c.id === id ? { ...c, [field]: value } : c)
             }));
             if (errors.length > 0) setErrors([]); 
          };

          const addContact = () => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: [...prev.contacts, { id: Date.now(), name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }]
             }));
          };

          const removeContact = (id) => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: prev.contacts.filter(c => c.id !== id)
             }));
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => handleClientChange('logo', reader.result);
              reader.readAsDataURL(file);
            }
          };

          // --- HANDLERS PRODUCTS ---
          const addProduct = () => {
            const newId = Date.now() + Math.random(); 
            setProducts([...products, { ...initialProduct, id: newId }]);
          };

          const removeProduct = (id) => {
            if (products.length > 1) {
                const newProds = products.filter(p => p.id !== id);
                setProducts(newProds);
            }
          };

          const handleProductChange = (id, field, value) => {
            setProducts(prev => prev.map(p => {
              if (p.id === id) {
                const updatedProduct = { ...p, [field]: value };
                
                // Smart Supply Chain Logic for Packaging Action
                if (field === 'packagingType') {
                  const bulkTypes = ['Box/ Crate', 'Bin crate', 'Pallet'];
                  const isBulk = bulkTypes.includes(value);
                  
                  updatedProduct.supplyChain = updatedProduct.supplyChain.map(step => {
                    const stageLower = step.stage.toLowerCase();
                    let newAction = step.action;
                    if (newAction === 'unpack') newAction = 'none';

                    if (stageLower.includes('packing') || stageLower.includes('verpak') || stageLower.includes('empaca')) {
                       newAction = 'pack';
                    } else if (stageLower.includes('distribution') || stageLower.includes('dc') || stageLower.includes('distribu')) {
                       if (isBulk) newAction = 'unpack';
                    } else if (stageLower.includes('consumer') || stageLower.includes('consum')) {
                       if (!isBulk) newAction = 'unpack';
                    }
                    return { ...step, action: newAction };
                  });
                }
                return updatedProduct;
              }
              return p;
            }));
            
            if (errors.length > 0) setErrors([]);
          };

          const toggleCriteria = (productId, crit) => {
             setProducts(prev => prev.map(p => {
                if (p.id === productId) {
                   const exists = p.qualityCriteria.includes(crit);
                   const newCriteria = exists ? p.qualityCriteria.filter(c => c !== crit) : [...p.qualityCriteria, crit];
                   return { ...p, qualityCriteria: newCriteria };
                }
                return p;
             }));
          };

          const addNewCriteriaField = (productId) => { 
              if(newCriteria) { 
                  toggleCriteria(productId, newCriteria); 
                  setNewCriteria(''); 
              }
          };

          const handleProductPhotoUpload = (e, id) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => handleProductChange(id, 'photo', reader.result);
              reader.readAsDataURL(file);
            }
          };

          // --- HANDLERS SUPPLY CHAIN ---
          const addChainStep = (productId) => {
            setProducts(prev => prev.map(p => p.id === productId ? { ...p, supplyChain: [...p.supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }] } : p));
          };
          const updateChainStep = (productId, index, field, value) => {
            setProducts(prev => prev.map(p => {
              if (p.id === productId) {
                const newChain = [...p.supplyChain]; newChain[index][field] = value; return { ...p, supplyChain: newChain };
              }
              return p;
            }));
            if (errors.length > 0) setErrors([]);
          };
          const removeChainStep = (productId, index) => {
            setProducts(prev => prev.map(p => p.id === productId ? { ...p, supplyChain: p.supplyChain.filter((_, i) => i !== index) } : p));
          };
          const moveChainStep = (productId, index, direction) => {
            setProducts(prev => prev.map(p => {
              if (p.id === productId) {
                const newChain = [...p.supplyChain];
                if (direction === 'up' && index > 0) { [newChain[index], newChain[index - 1]] = [newChain[index - 1], newChain[index]]; }
                else if (direction === 'down' && index < newChain.length - 1) { [newChain[index], newChain[index + 1]] = [newChain[index + 1], newChain[index]]; }
                return { ...p, supplyChain: newChain };
              }
              return p;
            }));
          };

          // --- VALIDATION & EXPORT ---
          const validateForm = () => {
            let newErrors = [];
            
            // Only Company Name and at least one Contact Person are mandatory now for address/company section
            if (!clientInfo.companyName.trim()) newErrors.push(`${t.companyName} ${t.reqField}`);
            
            clientInfo.contacts.forEach((c, idx) => {
               const cPrefix = clientInfo.contacts.length > 1 ? `Contact ${idx + 1}: ` : '';
               if (!c.name.trim()) newErrors.push(`${cPrefix}${t.contactName} ${t.reqField}`);
               if (!c.email.trim()) newErrors.push(`${cPrefix}${t.email} ${t.reqField}`);
            });

            products.forEach((p, idx) => {
              const prefix = `${t.reqProd} ${idx + 1} (${p.name || '?'}): `;
              if (!p.name.trim()) newErrors.push(`${prefix}${t.prodName} ${t.reqField}`);
              if (!p.material.trim()) newErrors.push(`${prefix}${t.material} ${t.reqField}`);
              if (!p.length.toString().trim()) newErrors.push(`${prefix}${t.len} ${t.reqField}`);
              if (!p.width.toString().trim()) newErrors.push(`${prefix}${p.packagingType === 'Pillow Bag' ? t.widSeal : t.wid} ${t.reqField}`);
              if (p.packagingType !== 'Pillow Bag' && !p.height.toString().trim()) newErrors.push(`${prefix}${t.hei} ${t.reqField}`);
              if (!p.weight.toString().trim()) newErrors.push(`${prefix}${t.weight} ${t.reqField}`);
              if (!p.currentChallenge.trim()) newErrors.push(`${prefix}${t.challenge} ${t.reqField}`);
              if (!p.targetGoal.trim()) newErrors.push(`${prefix}${t.goal} ${t.reqField}`);
              if (!p.transportMode) newErrors.push(`${prefix}${t.transportModeErr} ${t.reqField}`);

              p.supplyChain.forEach((step, sIdx) => {
                 if (!step.stage.trim()) newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.phase} ${t.reqField}`);
                 if (step.tempStart === '') newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.temp} ${t.reqField}`);
                 if (step.daysStart === '') newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.days} ${t.reqField}`);
              });
            });

            setErrors(newErrors);
            return newErrors.length === 0;
          };

          const handleExportJSON = () => {
            const exportData = {
              isPerfoTecIntake: true,
              exportDate: new Date().toISOString(),
              language: lang,
              unitSystem: unitSystem,
              client: clientInfo,
              products: products
            };

            // Automatically Generate Filename: Intake Form_[Company Name]_[ProductName1]_[ProductName2]
            const companyPart = clientInfo.companyName.trim() || 'Company';
            const productPart = products.map(p => p.name.trim()).filter(Boolean).join('_') || 'Products';
            const rawFilename = `Intake Form_${companyPart}_${productPart}`;
            const cleanFilename = rawFilename.replace(/[^a-zA-Z0-9_ -]/gi, '_').replace(/_+/g, '_') + '.json';

            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(exportData, cleanFilename);
            } else {
                const dataString = JSON.stringify(exportData, null, 2);
                const blob = new Blob([dataString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = cleanFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
          };

          const handleImportJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const processData = (data) => {
                if(data.isPerfoTecIntake) {
                   // Backward compatibility check for older JSONs that had contact info flat on the client object
                   let loadedClient = { ...data.client };
                   if (!loadedClient.contacts || loadedClient.contacts.length === 0) {
                       loadedClient.contacts = [{
                           id: Date.now(),
                           name: loadedClient.contactName || '',
                           role: loadedClient.role || '',
                           email: loadedClient.email || '',
                           phoneDirect: loadedClient.phone || '',
                           phoneWork: ''
                       }];
                       // clean up old flat values to avoid confusion
                       delete loadedClient.contactName; delete loadedClient.role; delete loadedClient.email; delete loadedClient.phone;
                   }
                   
                   setClientInfo(loadedClient);
                   if(data.products && data.products.length > 0) {
                       setProducts(data.products);
                   }
                   if(data.unitSystem) setUnitSystem(data.unitSystem);
                } else { alert(t.validationErr || "Invalid intake file."); }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => {
                    alert("Error loading JSON file.");
                });
            } else {
                const reader = new FileReader();
                reader.onload = (event) => {
                  try {
                    const data = JSON.parse(event.target.result);
                    processData(data);
                  } catch (err) { alert("Error loading JSON file."); }
                };
                reader.readAsText(file);
            }
            e.target.value = null; 
          };

          const handleSubmit = (e) => {
            if (e && e.preventDefault) e.preventDefault();
            
            if (!validateForm()) {
               window.scrollTo({ top: 0, behavior: 'smooth' });
               return;
            }

            handleExportJSON();
            
            const primaryContact = clientInfo.contacts && clientInfo.contacts[0] ? clientInfo.contacts[0] : { name: '' };
            const subject = encodeURIComponent(`New PerfoTec Intake - ${clientInfo.companyName}`);
            const bodyText = `Dear Luke,\n\nPlease find our completed intake form attached (the JSON file has just been downloaded to my computer).\n\nBest regards,\n${primaryContact.name}\n${clientInfo.companyName}`;
            
            const generatedMailUrl = `mailto:luke.zuijderwijk@perfotec.com?subject=${subject}&body=${encodeURIComponent(bodyText)}`;
            setMailUrl(generatedMailUrl);

            setIsSuccessModalOpen(true);
            
            // Fallback strategy for environments where window.location.href to mailto is blocked
            setTimeout(() => {
                try {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = generatedMailUrl;
                    document.body.appendChild(iframe);
                    setTimeout(() => document.body.removeChild(iframe), 3000);
                } catch(err) {
                    console.warn('Mailto iframe failed', err);
                }
            }, 600);
          };

          if (isPreview) {
            return <PrintPreview clientInfo={clientInfo} products={products} unitSystem={unitSystem} t={t} onBack={() => setIsPreview(false)} />;
          }

          return (
            <div className="min-h-screen pb-20 font-sans text-slate-800">
              
              {/* SUCCESS MODAL (Instructions for Email) */}
              {isSuccessModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden p-10 text-center relative border-t-8 border-green-500 transform transition-all">
                     <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                       <Mail size={48} className="text-green-600" />
                     </div>
                     <h2 className="text-3xl font-extrabold text-slate-800 mb-4">{t.successTitle}</h2>
                     <div className="bg-blue-50 border border-blue-100 rounded-2xl p-6 text-left space-y-5 mb-8 shadow-sm">
                        <p className="flex items-start gap-4 text-slate-700">
                          <span className="bg-blue-600 text-white w-7 h-7 rounded-full flex items-center justify-center shrink-0 text-sm font-bold shadow-md">1</span>
                          <span className="pt-0.5 leading-relaxed">{t.successStep1}</span>
                        </p>
                        <p className="flex items-start gap-4 text-slate-700">
                          <span className="bg-blue-600 text-white w-7 h-7 rounded-full flex items-center justify-center shrink-0 text-sm font-bold shadow-md">2</span>
                          <span className="pt-0.5 leading-relaxed">{t.successStep2}</span>
                        </p>
                        <div className="flex items-start gap-4 font-bold text-slate-800 bg-yellow-100/80 p-4 rounded-xl border border-yellow-300">
                          <span className="bg-yellow-500 text-white w-7 h-7 rounded-full flex items-center justify-center shrink-0 text-sm font-bold shadow-md">!</span>
                          <span className="pt-0.5 leading-relaxed">{t.successStep3}</span>
                        </div>
                     </div>
                     
                     <div className="mb-8 p-5 bg-slate-50 border border-slate-200 rounded-xl flex flex-col items-center gap-3">
                        <p className="text-sm font-medium text-slate-500">{t.fallbackMailText}</p>
                        <a href={mailUrl !== '#' && mailUrl !== '' ? mailUrl : '#'} onClick={(e) => { if(mailUrl === '#' || mailUrl === '') e.preventDefault(); }} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition-all flex items-center gap-2 shadow-lg hover:shadow-blue-500/30 hover:-translate-y-0.5">
                          <Mail size={18} /> {t.fallbackMailBtn}
                        </a>
                     </div>

                     <button type="button" onClick={() => setIsSuccessModalOpen(false)} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-full font-bold w-full transition-all text-lg shadow-xl hover:shadow-slate-500/20 hover:-translate-y-0.5">
                       {t.closeBtn}
                     </button>
                  </div>
                </div>
              )}

              {/* HEADER */}
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                <div className="max-w-6xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <img src={BRAND.logos.default} alt="PerfoTec" className="h-9 md:h-12 object-contain" />
                    <div className="border-l-2 border-slate-200 pl-4 ml-2 hidden sm:block">
                      <h1 className="font-extrabold text-2xl tracking-tight leading-none" style={{color: BRAND.colors.blue}}>{t.title}</h1>
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">{t.subtitle}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-3">
                    <div className="flex items-center bg-slate-100 hover:bg-slate-200 transition-colors rounded-xl px-3 py-2 border border-slate-200 shadow-sm">
                       <Globe size={18} className="text-slate-500 mr-2" />
                       <select 
                         className="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer w-full" 
                         value={lang} 
                         onChange={(e) => {
                           const val = e.target.value;
                           if (globalConfig.setLanguage) globalConfig.setLanguage(val);
                           if (val !== 'en') {
                              try {
                                  window.location.assign(`intake_${val}.html`);
                              } catch(err) {
                                  console.warn("Navigation failed", err);
                              }
                           }
                         }}
                       >
                         {globalConfig.LANGUAGES ? globalConfig.LANGUAGES.map(l => (
                             <option key={l.code} value={l.code}>{l.label}</option>
                         )) : (
                             <React.Fragment><option value="en">EN</option><option value="nl">NL</option><option value="es">ES</option></React.Fragment>
                         )}
                       </select>
                    </div>
                    
                    <div className="h-8 border-l border-slate-300 mx-1 hidden md:block"></div>

                    <label className="cursor-pointer bg-white border border-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm">
                      <FolderOpen size={18} className="text-blue-600"/> <span className="hidden md:inline">{t.load}</span>
                      <input type="file" accept=".json" className="hidden" onClick={(e) => { e.target.value = null; }} onChange={handleImportJSON} ref={fileInputRef} />
                    </label>
                    <button onClick={handleExportJSON} className="bg-white border border-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm">
                      <Save size={18} className="text-green-600"/> <span className="hidden md:inline">{t.save}</span>
                    </button>
                    <button onClick={() => { if(!clientInfo.companyName) alert('Warning: Please enter a company name!'); else if(validateForm()) setIsPreview(true); else window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-md hover:shadow-blue-500/30 ml-2">
                      <FileText size={18}/> <span className="hidden md:inline">{t.preview}</span>
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-5xl mx-auto p-4 md:p-8 mt-4 space-y-10">
                
                {/* BANNERS */}
                {errors.length > 0 && (
                  <div className="bg-red-50 border border-red-200 p-6 rounded-2xl shadow-sm animate-pulse">
                    <h3 className="font-bold text-red-800 text-lg flex items-center gap-2 mb-3"><AlertTriangle size={22}/> {t.validationErr}</h3>
                    <ul className="list-disc pl-8 text-sm font-medium text-red-700 space-y-1.5">
                      {errors.map((err, i) => <li key={i}>{err}</li>)}
                    </ul>
                  </div>
                )}
                
                {/* INTRO */}
                <div className="bg-gradient-to-r from-blue-50 to-blue-100/50 border border-blue-100 p-6 md:p-8 rounded-3xl shadow-sm relative overflow-hidden">
                   <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                   <h2 className="font-extrabold text-2xl text-blue-900 mb-3">{t.introTitle}</h2>
                   <p className="text-base text-blue-800/80 leading-relaxed max-w-3xl">{t.introText}</p>
                </div>

                {/* 1. COMPANY DETAILS */}
                <section className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.green }}></div>
                  <div className="flex items-center justify-between border-b-2 border-slate-100 pb-6 mb-8">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-green-50 rounded-xl">
                        <Building2 size={28} color={BRAND.colors.green} />
                      </div>
                      <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{t.sec1Title}</h2>
                    </div>
                    
                    {/* UNIT TOGGLE SWITCH */}
                    <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-inner">
                        <button 
                          onClick={() => handleUnitToggle('metric')}
                          className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${unitSystem === 'metric' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            {t.metric}
                        </button>
                        <button 
                          onClick={() => handleUnitToggle('imperial')}
                          className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${unitSystem === 'imperial' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            {t.imperial}
                        </button>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div className="lg:col-span-2 flex flex-col gap-8">
                      
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                          <div className="sm:col-span-2">
                            <label className={labelClass}>{t.companyName} <span className="text-red-500">*</span></label>
                            <input type="text" className={`${inputClass} text-lg font-bold`} value={clientInfo.companyName} onChange={e => handleClientChange('companyName', e.target.value)} />
                          </div>
                          <div className="sm:col-span-2">
                            <label className={labelClass}>{t.website}</label>
                            <div className="relative">
                               <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Globe size={18}/></span>
                               <input type="url" className={`${inputClass} pl-11`} placeholder="https://www.example.com" value={clientInfo.website} onChange={e => handleClientChange('website', e.target.value)} />
                            </div>
                          </div>
                      </div>

                      {/* Address Block */}
                      <div className="bg-slate-50/50 p-6 rounded-2xl border border-slate-200 grid grid-cols-4 gap-5">
                         <div className="col-span-4 sm:col-span-3">
                           <label className={labelClass}>{t.street}</label>
                           <input type="text" className={inputClass} value={clientInfo.street} onChange={e => handleClientChange('street', e.target.value)} />
                         </div>
                         <div className="col-span-4 sm:col-span-1">
                           <label className={labelClass}>{t.houseNumber}</label>

                                      {/* Desktop Delete */}
                                      <div className="hidden lg:flex justify-center w-full">
                                         <button type="button" onClick={() => removeChainStep(prod.id, idx)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title={t.removeStep}>
                                           <Trash2 size={20}/>
                                         </button>
                                      </div>
                                   </div>
                                 )
                              })}
                              
                              <button type="button" onClick={() => addChainStep(prod.id)} className="w-full py-4 mt-4 border-2 border-dashed border-indigo-200 bg-indigo-50/50 hover:bg-indigo-100 text-indigo-700 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                                <div className="bg-white p-1.5 rounded-lg shadow-sm"><Plus size={16} /></div> 
                                {t.addStep}
                              </button>
                            </div>
                          </div>

                        </div>
                      </section>
                    );
                  })}
                </div>

                {/* ADD NEW PRODUCT BUTTON */}
                <button 
                  type="button"
                  onClick={addProduct} 
                  className="w-full py-6 rounded-3xl font-extrabold border-4 border-dashed border-slate-300 text-xl transition-all flex flex-col items-center justify-center gap-3 bg-white/50 hover:bg-green-50 hover:border-green-400 hover:text-green-700 text-slate-500 shadow-sm hover:shadow-md group" 
                >
                  <div className="bg-white p-3 rounded-2xl shadow-sm group-hover:scale-110 transition-transform group-hover:bg-green-500 group-hover:text-white">
                     <Plus size={32} />
                  </div>
                  {t.addProd}
                </button>

                {/* FINAL SUBMIT BUTTON */}
                <div className="pt-10 pb-20 flex justify-end">
                   <button type="button" onClick={handleSubmit} className="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white px-10 md:px-14 py-5 rounded-full font-extrabold text-xl shadow-xl shadow-green-500/40 transition-all flex items-center gap-4 transform hover:-translate-y-1 hover:shadow-green-500/60 ring-4 ring-green-500/20">
                      <Send size={28} />
                      {t.submitBtn}
                   </button>
                </div>

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
