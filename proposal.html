<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Proposal Tool</title>
    <meta name="description" content="PerfoTec Proposal Tool — Create trial proposals for MAP packaging testing.">
    <meta name="author" content="PerfoTec B.V.">
    <meta name="theme-color" content="#007C27">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler for in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Loading Proposal Tool... Please ensure 'style.css' and 'config.js' are in the same folder.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // --- FIXED IMPORT LIST ---
        import { 
          Printer, FileText, Settings, Layout, CheckCircle, 
          ArrowRight, Copy, Trash2, Plus, Scale, Upload, Truck, 
          Thermometer, Clock, Image as ImageIcon, ChevronRight, 
          Save, FolderOpen, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown, 
          Bold, Italic, Underline, List, AlertTriangle, Package, PackagePlus,
          X, Edit3, Camera, FileArchive, LineChart, Globe, AlertCircle,
          Building2, Target, Beaker, Send, Mail, ClipboardList, UserPlus
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        // i18n arrays are the single source; flat arrays are derived from them
        // so option order and content stay in sync across all tools.
        const PACKAGING_TYPES_I18N = globalConfig.PACKAGING_TYPES_I18N || [];
        const TRANSPORT_MODES_I18N = globalConfig.TRANSPORT_MODES_I18N || [];
        const DEFAULT_CRITERIA_I18N = globalConfig.DEFAULT_CRITERIA_I18N || [];
        const PERFOTEC_TECHNOLOGIES_I18N = globalConfig.PERFOTEC_TECHNOLOGIES_I18N || [];
        const PACKAGING_TYPES = PACKAGING_TYPES_I18N.map(x => x.value);
        const TRANSPORT_MODES = TRANSPORT_MODES_I18N.map(x => x.value);
        // i18n label lookup — sourced from config (v2.1); local fallback returns value.
        const getI18nLabel = globalConfig.getI18nLabel
          ? globalConfig.getI18nLabel.bind(globalConfig)
          : ((arr, value) => value);

        // Unit conversion — sourced from config (v2.1); local fallback returns value.
        const convertValue = globalConfig.convertValue
          ? globalConfig.convertValue.bind(globalConfig)
          : ((val) => val);

        const DEFAULT_CRITERIA = DEFAULT_CRITERIA_I18N.map(x => x.value);

        const PERFOTEC_TECHNOLOGIES = PERFOTEC_TECHNOLOGIES_I18N.map(x => x.value);

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // --- HELPER CLASSES ---
        const inputClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.input) || "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.label) || "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest') || n.includes('oogst') || n.includes('granja')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea') || n.includes('zee') || n.includes('marítimo')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air') || n.includes('lucht') || n.includes('aéreo')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('opslag') || n.includes('almacenamiento')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('winkel') || n.includes('tienda')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat') || n.includes('consument') || n.includes('consumidor')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // --- COMPONENTS ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const ProductSupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] py-0.5 flex items-center justify-center leading-tight w-full break-words px-0.5">
                           {step.stage}
                         </div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, '°C')}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        const SampleToggles = ({ max, selected, disabled, onChange, activeClass }) => {
          const arr = Array.from({length: max}, (_, i) => i + 1);
          return (
            <div className="flex flex-wrap gap-1.5">
              {arr.map(s => {
                const isSel = selected.includes(s);
                const isDis = disabled.includes(s);
                return (
                  <button 
                    key={s}
                    type="button"
                    onClick={() => !isDis && onChange(s)}
                    disabled={isDis}
                    title={isDis ? "Sample is already opened previously" : `Toggle Sample ${s}`}
                    className={`w-7 h-7 flex items-center justify-center text-xs font-bold rounded-lg border transition-all ${
                      isDis ? 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed' :
                      isSel ? activeClass : 
                      'bg-white border-slate-300 text-slate-500 hover:bg-slate-50 hover:border-slate-400'
                    }`}
                  >
                    {s}
                  </button>
                )
              })}
            </div>
          )
        };

        // --- PRINT PREVIEW ---
        const PrintPreview = ({ clientInfo, project, groups, proposal, supplyChain, onBack }) => {
          let allTemps = [];
          (supplyChain || []).forEach(s => {
              const ts = parseFloat(s.tempStart); if(!isNaN(ts)) allTemps.push(ts);
              const te = parseFloat(s.tempEnd); if(!isNaN(te)) allTemps.push(te);
          });
          const minTemp = allTemps.length > 0 ? Math.min(...allTemps) : null;
          const maxTemp = allTemps.length > 0 ? Math.max(...allTemps) : null;
          const tempString = allTemps.length > 0 ? (minTemp === maxTemp ? `${minTemp}°C` : `${minTemp}°C - ${maxTemp}°C`) : '-°C';
          const totalDays = project.totalDuration || (supplyChain || []).reduce((acc,s) => acc + parseFloat(s.daysStart || 0), 0);

          // Reusable class for titles to ensure they stand out even if CSS fails
          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading break-after-avoid";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title><style>body { font-family: 'Arial', sans-serif; } .page-break { page-break-before: always; } table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #007C27; color: white; } img { max-width: 100%; height: auto; }</style></head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = (project.reportTitle || 'Proposal') + '.doc';
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          return (
            <div className="min-h-screen bg-slate-600 p-0 sm:p-8 overflow-y-auto font-sans print:p-0 print:bg-white no-print-bg selection:bg-blue-200 selection:text-blue-900">
              <div className="fixed bottom-8 right-8 flex gap-4 no-print z-50">
                <button onClick={onBack} className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl font-bold transition hover:bg-slate-900 flex items-center gap-2"><Edit3 size={18}/> Edit</button>
                <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition">
                  <FileArchive size={20} /> Download Word
                </button>
                <button onClick={() => {
                  const company = clientInfo.companyName || 'Client';
                  const product = project.productName || 'Product';
                  const suggested = `PerfoTec_Proposal_${company}_${product}`;
                  if (globalConfig.printWithFilename) globalConfig.printWithFilename(suggested);
                  else window.print();
                }} className="bg-green-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-green-700 transition">
                  <Printer size={18} /> Download PDF
                </button>
              </div>

              <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0 text-slate-800">
                
                {/* --- COVER PAGE --- */}
                <div className="h-[27cm] print:h-auto print:min-h-[calc(100vh-24mm)] flex flex-col justify-between items-center text-center pt-16 break-inside-avoid">
                   <div className="w-full flex flex-col items-center">
                      {/* Logos: flex-1 halves + gap-12 guarantee a 48px separator regardless of logo dimensions */}
                      <div className="w-full flex items-center justify-between gap-12 px-8">
                          <div className="flex-1 min-w-0 flex justify-start">
                            {project.logo && (
                               <img src={project.logo} alt="PerfoTec Logo" className="h-32 print:h-28 max-h-40 max-w-[90%] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                          <div className="flex-1 min-w-0 flex justify-end">
                            {clientInfo.logo && (
                               <img src={clientInfo.logo} alt="Client Logo" className="h-32 print:h-28 max-h-40 max-w-[90%] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                      </div>

                      <h1 className="text-5xl font-bold uppercase mt-16 mb-4 brand-heading" style={{ color: BRAND.colors.green }}>{project.reportTitle || 'Trial Proposal'}</h1>
                      <h2 className="text-4xl font-light brand-heading text-slate-600 mb-12">{project.productName || '<Product Name>'}</h2>

                      <div className="w-full h-[380px] overflow-hidden flex items-center justify-center relative bg-transparent border-none mt-6 rounded-2xl">
                         {project.coverImage ? <img src={project.coverImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : project.startImage ? <img src={project.startImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : <span className="text-slate-300 italic font-medium">No Cover Photo</span>}
                      </div>
                   </div>
                   <div className="w-full flex justify-center items-end pb-4">
                       <div className="text-sm text-slate-400 font-medium">© {new Date().getFullYear()} PerfoTec B.V.</div>
                   </div>
                </div>

                <div className="page-break"></div>

                {/* --- TABLE OF CONTENTS --- */}
                <div className="flex flex-col pt-12 break-inside-avoid">
                    <h2 className="text-4xl font-extrabold uppercase mb-8 brand-heading" style={{ color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '1rem' }}>Table of Contents</h2>
                    <ul className="text-xl space-y-4 font-medium text-slate-700">
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>1. Introduction & Objectives</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>2. Company & Project Info</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>3. Product Characteristics & Defect Prevention</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>4. Simulated Supply Chain</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>5. Proposed Trial Setup</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>6. Evaluation Plan</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>7. Requirements & Agreements</span></li>
                    </ul>
                </div>

                <div className="page-break"></div>

                {/* --- PAGE 1: INTRO & SETTING --- */}
                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>1. Introduction & Objectives</h2>
                  <div className="text-base print:text-xs leading-relaxed print:leading-tight text-justify text-slate-800 mb-8 print:mb-3">
                     <div className="mb-6 print:mb-2 whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal?.intro || '' }}></div>

                     {/* Challenge + Target side by side on print to save vertical space */}
                     {(project.currentChallenge || project.trialTarget) && (
                       <div className="grid grid-cols-1 sm:grid-cols-2 print:grid-cols-2 gap-6 print:gap-3 mb-6 print:mb-2">
                         {project.currentChallenge && (
                           <div className="bg-orange-50 p-5 print:p-3 rounded-2xl border border-orange-100">
                             <h4 className="font-bold text-lg print:text-sm mb-2 print:mb-1 text-orange-800">Current Challenge:</h4>
                             <div className="whitespace-pre-wrap text-slate-700 leading-snug print:leading-tight">{project.currentChallenge}</div>
                           </div>
                         )}
                         {project.trialTarget && (
                           <div className="bg-green-50 p-5 print:p-3 rounded-2xl border border-green-100">
                             <h4 className="font-bold text-lg print:text-sm mb-2 print:mb-1 text-green-800">Trial Target:</h4>
                             <div className="whitespace-pre-wrap text-slate-700 leading-snug print:leading-tight">{project.trialTarget}</div>
                           </div>
                         )}
                       </div>
                     )}

                     {proposal?.expectedOutcomes && (
                       <div className="mb-6 print:mb-2">
                         <h4 className="font-bold text-lg print:text-sm mb-2 print:mb-1" style={{color: BRAND.colors.blue}}>Expected Outcomes:</h4>
                         <div className="whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal.expectedOutcomes }}></div>
                       </div>
                     )}
                  </div>
                </div>

                <div className="page-break"></div>

                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>2. Company & Project Info</h2>
                  <div className="grid grid-cols-[180px_1fr] print:grid-cols-[130px_1fr] gap-y-3 print:gap-y-1 text-base print:text-xs text-slate-800 bg-slate-50 p-6 print:p-3 rounded-2xl border border-slate-200 leading-snug print:leading-tight">
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs print:text-[10px] flex items-center">Product :</div> <div className="font-bold">{project.productName || '-'} {project.type ? `(${project.type})` : ''}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs print:text-[10px] flex items-center">State of product :</div> <div className="font-medium">{project.processingType === 'Whole' ? 'Whole' : 'Processed / Fresh-cut'}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs print:text-[10px] flex items-center">Product Origin :</div> <div className="font-medium">{project.origin || '-'}</div>

                     {(clientInfo.companyName || clientInfo.street || clientInfo.contactName || clientInfo.email || clientInfo.phone) && (
                       <div className="font-bold col-span-2 mt-4 print:mt-2 border-t border-slate-200 pt-4 print:pt-2 text-lg print:text-sm" style={{color: BRAND.colors.green}}>Company Info</div>
                     )}
                     {clientInfo.companyName && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs print:text-[10px] flex items-center">Company Name :</div> <div className="font-bold">{clientInfo.companyName}</div></>}

                     {(() => {
                       const streetPart = [clientInfo.street, clientInfo.houseNumber].filter(Boolean).join(' ');

            const toImperial = unitSystem === 'metric';
            const newSys = toImperial ? 'imperial' : 'metric';
            setProject(p => {
              const isBulk = p.packagingType === 'Cube crate' || p.packagingType === 'Pallet';
              return {
                ...p,
                startWeight: convertValue(p.startWeight, 'weight', isBulk, toImperial),
                length:      convertValue(p.length,      'length', isBulk, toImperial),
                width:       convertValue(p.width,       'length', isBulk, toImperial),
                height:      convertValue(p.height,      'length', isBulk, toImperial)
              };
            });
            setSupplyChain(chain => chain.map(s => ({
              ...s,
              tempStart: convertValue(s.tempStart, 'temp', false, toImperial),
              tempEnd:   convertValue(s.tempEnd,   'temp', false, toImperial)
            })));
            setGroups(gs => gs.map(g => {
              const isBulk = g.specs?.packaging === 'Cube crate' || g.specs?.packaging === 'Pallet';
              return {
                ...g,
                specs: {
                  ...g.specs,
                  length:      convertValue(g.specs?.length,      'length', isBulk, toImperial),
                  width:       convertValue(g.specs?.width,       'length', isBulk, toImperial),
                  height:      convertValue(g.specs?.height,      'length', isBulk, toImperial),
                  startWeight: convertValue(g.specs?.startWeight, 'weight', isBulk, toImperial)
                }
              };
            }));
            setUnitSystem(newSys);
          };
          
          const handleDurationChange = (e) => {
            setProject(p => ({...p, totalDuration: e.target.value}));
          };

          const exportData = async () => {
            const exportGroups = groups.map(g => ({
              ...g,
              specs: { ...g.specs, startWeight: project.startWeight }, 
              measurements: (g.measurements || []).map(m => ({
                 day: m.day,
                 samples: Array.from({length: g.specs?.sampleCount || 3}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '' })),
                 quality: 9,
                 notes: '',
                 images: [],
                 qualityParams: [],
                 evaluateQuality: true,
                 measure: m.measure || [],
                 open: m.open || [],
                 evaluate: m.evaluate || []
              }))
            }));

            // Rebuild canonical contacts[] so proposal exports round-trip cleanly.
            const normalizedClientInfo = globalConfig.buildContactsArray
              ? { ...clientInfo, contacts: globalConfig.buildContactsArray(clientInfo) }
              : clientInfo;

            const data = {
              isPerfoTecProposal: true,
              schemaVersion: globalConfig.SCHEMA_VERSION || '2.1',
              appVersion: globalConfig.APP_VERSION || '',
              exportDate: new Date().toISOString(),
              language: lang,
              unitSystem: unitSystem,
              project, clientInfo: normalizedClientInfo, supplyChain, groups: exportGroups, proposal
            };
            const cleanCompanyName = clientInfo.companyName ? clientInfo.companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'client';
            const filename = `perfotec_proposal_${cleanCompanyName}.json`; 
            
            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(data, filename);
            } else {
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            }
          };

          const importData = (e) => {
            const file = e.target.files[0]; if(!file) return;

            // Canonical contact projection comes from config; fallback to a
            // local no-op in the unlikely event config is missing.
            const extractPrimaryContact = globalConfig.extractPrimaryContact
              ? globalConfig.extractPrimaryContact.bind(globalConfig)
              : (c) => ({ contactName: '', role: '', email: '', phone: '', phoneDirect: '', phoneWork: '', contacts: [] });

            const processData = (raw) => {
                // Normalise legacy shapes (flat contacts, targetGoal alias, missing
                // schemaVersion) before we read from the payload.
                const d = globalConfig.migrateSchema ? globalConfig.migrateSchema(raw) : raw;
                // Apply language from source if present
                if (d.language && ['en','nl','es'].includes(d.language)) {
                   setLang(d.language);
                   if (globalConfig.setLanguage) globalConfig.setLanguage(d.language);
                }
                // Apply unit system from source if present
                if (d.unitSystem) setUnitSystem(d.unitSystem);
                
                if(d.isPerfoTecIntake) {
                   // === INTAKE IMPORT (intake.html --> proposal.html) ===
                   const client = d.client || {}; 
                   const prod = d.products?.[0] || {};
                   const contactData = extractPrimaryContact(client);
                   
                   setClientInfo({
                     companyName: client.companyName || '',
                     street: client.street || '',
                     houseNumber: client.houseNumber || '',
                     addressExtra: client.addressExtra || '',
                     zipCode: client.zipCode || '',
                     city: client.city || '',
                     country: client.country || '',
                     website: client.website || '',
                     ...contactData,
                     logo: client.logo || null
                   });
                   setProject(p => ({ ...p,
                     productName: prod.name || '',
                     processingType: prod.processingType || 'Whole', 
                     type: prod.type || '', 
                     origin: prod.origin || '', 
                     maturityStage: prod.maturityStage || '', 
                     postHarvestTreatment: prod.postHarvestTreatment || '', 
                     currentChallenge: prod.currentChallenge || '', 
                     trialTarget: prod.trialTarget || prod.targetGoal || '',
                     transportMode: prod.transportMode || (prod.transportModes?.[0] || ''), 
                     criteria: prod.qualityCriteria || [], 
                     startImage: prod.photo || null,
                     startWeight: prod.weight || p.startWeight,
                     technologies: prod.technologies || p.technologies || []
                   }));
                   if (prod.supplyChain) setSupplyChain(prod.supplyChain);
                   setGroups(p => { 
                     const ug = [...p]; 
                     if(ug[0]) { 
                       ug[0].specs = { 
                         ...ug[0].specs, 
                         packaging: prod.packagingType || 'Retail', 
                         material: prod.material || '', 
                         length: prod.length || '', 
                         width: prod.width || '', 
                         height: prod.height || '' 
                       }; 
                     } 
                     return ug; 
                   });
                } else {
                   // === PROPOSAL/REPORT IMPORT (own format, or report export back into proposal) ===
                   if(d.clientInfo) {
                       // Robust: handle both old (with contacts[]) and new exports
                       const ci = d.clientInfo;
                       const contactData = extractPrimaryContact(ci);
                       setClientInfo({
                         companyName: ci.companyName || '',
                         street: ci.street || '',
                         houseNumber: ci.houseNumber || '',
                         addressExtra: ci.addressExtra || '',
                         zipCode: ci.zipCode || '',
                         city: ci.city || '',
                         country: ci.country || '',
                         website: ci.website || '',
                         ...contactData,
                         logo: ci.logo || null
                       });
                   } else if (d.client) {
                       const contactData = extractPrimaryContact(d.client);
                       setClientInfo({
                         companyName: d.client.companyName || '',
                         street: d.client.street || '',
                         houseNumber: d.client.houseNumber || '',
                         addressExtra: d.client.addressExtra || '',
                         zipCode: d.client.zipCode || '',
                         city: d.client.city || '',
                         country: d.client.country || '',
                         website: d.client.website || '',
                         ...contactData,
                         logo: d.client.logo || null
                       });
                   } else if (d.project) {
                       // Legacy: client info flattened into project
                       setClientInfo({
                         companyName: d.project.company || '',
                         street: d.project.street || '',
                         houseNumber: d.project.houseNumber || '',
                         addressExtra: d.project.addressExtra || '',
                         zipCode: d.project.zipCode || '',
                         city: d.project.city || '',
                         country: d.project.country || '',
                         website: d.project.website || '',
                         contactName: d.project.contactName || '', 
                         role: d.project.contactRole || d.project.role || '', 
                         email: d.project.contactEmail || d.project.email || '', 
                         phone: d.project.contactPhone || d.project.phone || '',
                         phoneDirect: d.project.phoneDirect || '',
                         phoneWork: d.project.phoneWork || '',
                         contacts: [],
                         logo: d.project.clientLogo || null  // legacy: proposal used project.clientLogo
                       });
                   }
                   if(d.project) {
                       setProject(p => ({
                           ...p, 
                           ...d.project, 
                           packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0], 
                           transportMode: d.project.transportMode || '',
                           startWeight: d.project.startWeight || d.groups?.[0]?.specs?.startWeight || '',
                           technologies: d.project.technologies || [],
                           // Make sure project.logo falls back to default if missing
                           logo: d.project.logo || BRAND.logos.default
                       })); 
                   }
                   if(d.supplyChain) setSupplyChain(d.supplyChain); 
                   if(d.groups) {
                       const proposalGroups = d.groups.map(g => ({
                           ...g,
                           measurements: (g.measurements || []).map(m => ({ 
                               day: m.day,
                               measure: m.measure || [],
                               open: m.open || [],
                               evaluate: m.evaluate || []
                           }))
                       }));
                       setGroups(proposalGroups);
                   }
                   if(d.proposal) setProposal(d.proposal);
                }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => alert("Error loading JSON file."));
            } else {
                const reader = new FileReader(); 
                reader.onload = (ev) => { 
                    try { 
                        processData(JSON.parse(ev.target.result));
                    } catch(err){ alert("Error loading file."); } 
                }; 
                reader.readAsText(file); 
            }
            e.target.value = '';
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              return g;
            }));
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return { ...g, specs: { ...g.specs, sampleCount: c }};
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria?.includes(c) ? p.criteria.filter(x => x !== c) : [...(p.criteria||[]), c] }));
          const addNewCriteria = () => { if(newCriteria && !(project.criteria||[]).includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          const handleTransportModeToggle = (mode) => {
            setProject(p => ({ ...p, transportMode: p.transportMode === mode ? '' : mode }));
          };
          const toggleTechnology = (tech) => {
            setProject(p => ({ 
                ...p, 
                technologies: p.technologies?.includes(tech) ? p.technologies.filter(t => t !== tech) : [...(p.technologies || []), tech] 
            }));
          };

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Group Handling
          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            
            setGroups([...groups, { 
                id: newId, 
                name: `Variant ${groups.length + 1}`, 
                specs: { ...groups[0].specs }, 
                measurements: [
                   { day: 0, measure: [], open: [], evaluate: [] }
                ],
                predictedImage: null
            }]);
            setActiveGroupId(newId);
          };

          const duplicateGroup = (id) => { 
            const org = groups.find(g => g.id === id); 
            const newId = Math.max(...groups.map(g => g.id), 0) + 1; 
            setGroups(p => [...p, { 
              ...org, 
              id: newId, 
              name: `${org.name} (Copy)`,
              measurements: org.measurements.map(m => ({...m}))
            }]); 
            setActiveGroupId(newId); 
          };
          
          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                setGroups(p => {
                    const newGroups = p.filter(g => g.id !== id);
                    if (activeGroupId === id) setActiveGroupId(newGroups[0].id);
                    return newGroups;
                });
            }
          };

          // FIX v2.0: moveGroup was missing — caused crash when clicking variant up/down arrows
          const moveGroup = (id, direction) => {
            setGroups(prev => {
              const idx = prev.findIndex(g => g.id === id);
              if (idx < 0) return prev;
              const newArr = [...prev];
              if (direction === 'up' && idx > 0) {
                [newArr[idx], newArr[idx - 1]] = [newArr[idx - 1], newArr[idx]];
              } else if (direction === 'down' && idx < newArr.length - 1) {
                [newArr[idx], newArr[idx + 1]] = [newArr[idx + 1], newArr[idx]];
              }
              return newArr;
            });
          };

          // Timeline Events Handling
          const addEvaluationDay = (groupId) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const lastDay = g.measurements?.length > 0 ? Math.max(...g.measurements.map(m => parseFloat(m.day))) : 0;
                  
                  return {
                      ...g,
                      measurements: [...(g.measurements || []), { 
                          day: lastDay + 1,
                          measure: [],
                          open: [],
                          evaluate: []
                      }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const removeEvaluationDay = (groupId, dayToRemove) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).filter(m => parseFloat(m.day) !== parseFloat(dayToRemove))
                  };
              }));
          };
          
          const updateEvaluationDay = (groupId, oldDay, newDayValue) => {
              const newD = parseFloat(newDayValue) || 0;
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).map(m => parseFloat(m.day) === parseFloat(oldDay) ? { ...m, day: newD } : m).sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const toggleEvent = (groupId, day, field, sampleNum) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const newM = g.measurements.map(m => {
                      if (parseFloat(m.day) === parseFloat(day)) {
                          const arr = m[field] || [];
                          const newArr = arr.includes(sampleNum) ? arr.filter(x => x !== sampleNum) : [...arr, sampleNum].sort((a,b)=>a-b);
                          return { ...m, [field]: newArr };
                      }
                      return m;
                  });
                  return { ...g, measurements: newM };
              }));
          };

          if (isPreview) {
            return <PrintPreview clientInfo={clientInfo} project={project} groups={groups} proposal={proposal} supplyChain={supplyChain} onBack={() => setIsPreview(false)} />;
          }

          // --- EDITOR VIEW ---
          return (
            <div className="min-h-screen pb-20 font-sans text-slate-800">
              
              {pendingImageReplace && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-orange-500 transform transition-all">
                     <div className="flex items-center gap-4 mb-6 text-orange-600 bg-orange-50 p-4 rounded-xl">
                        <AlertTriangle size={28} />
                        <h3 className="font-extrabold text-xl">{pt.warning}</h3>
                     </div>
                     <p className="mb-8 text-base text-slate-700 leading-relaxed">{pt.warningText}</p>
                     <div className="flex justify-end gap-3">
                       <button onClick={() => setPendingImageReplace(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">{pt.cancel}</button>
                       <button onClick={confirmReplaceImage} className="px-6 py-3 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-bold shadow-lg shadow-orange-200 transition">{pt.overwrite}</button>
                     </div>
                  </div>
                </div>
              )}
              
              {/* HEADER */}
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-3 md:gap-4">
                  {/* LEFT: Logo + Home */}
                  <div className="flex items-center gap-2 md:gap-3 shrink-0">
                    <img src={BRAND.logos.default} alt="PerfoTec" className="h-7 md:h-9 object-contain" />
                    <a href="index.html" className="bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-800 p-2 xl:px-3 xl:py-2 rounded-lg text-xs font-bold transition-all border border-slate-200 flex items-center gap-1.5 whitespace-nowrap" title={pt.home}>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" /></svg>
                      <span className="hidden xl:inline">{pt.home}</span>
                    </a>
                  </div>

                  {/* CENTER: Title — dedicated space, visible from md */}
                  <div className="hidden md:flex flex-1 min-w-0 border-l-2 border-slate-200 pl-3 md:pl-4">
                    <div className="min-w-0">
                      <h1 className="font-extrabold text-base md:text-lg lg:text-xl xl:text-2xl tracking-tight leading-tight truncate" style={{color: BRAND.colors.blue}}>PerfoTec Manager</h1>
                      <p className="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-widest mt-0.5 truncate">PROPOSAL TOOL</p>
                    </div>
                  </div>

                  {/* SPACER for mobile when title is hidden */}
                  <div className="md:hidden flex-1"></div>

                  {/* RIGHT: Action buttons + Language selector (lang always rightmost) */}
                  <div className="flex items-center gap-1.5 md:gap-2 xl:gap-3 shrink-0">
                    <label className="cursor-pointer bg-white border border-slate-300 text-slate-700 p-2 lg:pr-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm" title={pt.loadJson}>
                      <FolderOpen size={18} className="text-blue-600 shrink-0"/>
                      <span className="hidden lg:flex flex-col items-start leading-[1.05] text-[10px] uppercase tracking-tight">
                        {(pt.loadJson || '').split(' ').map((w, i) => <span key={i} className={i === 0 ? '' : 'opacity-60 font-medium'}>{w}</span>)}
                      </span>
                      <input type="file" accept=".json" className="hidden" onChange={importData} ref={fileInputRef} />
                    </label>
                    <button onClick={exportData} className="bg-white border border-slate-300 text-slate-700 p-2 lg:pr-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm" title={pt.saveAs}>
                      <Save size={18} className="text-green-600 shrink-0"/>
                      <span className="hidden lg:flex flex-col items-start leading-[1.05] text-[10px] uppercase tracking-tight">
                        {(pt.saveAs || '').split(' ').map((w, i) => <span key={i} className={i === 0 ? '' : 'opacity-60 font-medium'}>{w}</span>)}
                      </span>
                    </button>
                    <button onClick={() => { if(!clientInfo.companyName) alert(pt.warningFillCompany); setIsPreview(true); }} className="bg-blue-600 text-white p-2 lg:pr-3 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-md hover:shadow-blue-500/30" title={pt.previewProposal}>
                      <FileText size={18} className="shrink-0"/>
                      <span className="hidden lg:flex flex-col items-start leading-[1.05] text-[10px] uppercase tracking-tight">
                        {(pt.previewProposal || '').split(' ').map((w, i) => <span key={i} className={i === 0 ? '' : 'opacity-80 font-medium'}>{w}</span>)}
                      </span>
                    </button>

                    <div className="h-8 border-l border-slate-300 mx-1 hidden lg:block"></div>

                    <div className="lang-selector" role="radiogroup" aria-label="Language">
                      {(globalConfig.LANGUAGES || [{code:'en',label:'EN'},{code:'nl',label:'NL'},{code:'es',label:'ES'}]).map(l => (
                        <button key={l.code} type="button" role="radio" aria-checked={lang === l.code} className={`lang-btn ${lang === l.code ? 'active' : ''}`} onClick={() => { setLang(l.code); if (globalConfig.setLanguage) globalConfig.setLanguage(l.code); document.documentElement.lang = l.code; }}>
                          {l.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
                <div className="col-span-1 md:col-span-12 flex flex-wrap gap-2 border-b border-slate-200 pb-1 mb-2">
                  {['setup', 'groups', 'proposal'].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 sm:px-8 py-3.5 font-bold rounded-t-xl transition-all flex items-center gap-2 ${activeTab === tab ? 'text-white shadow-sm transform scale-105 origin-bottom' : 'bg-white text-slate-500 hover:bg-slate-100 border border-b-0 border-slate-200'}`} style={{ backgroundColor: activeTab === tab ? BRAND.colors.green : undefined }}>
                      {tab === 'setup' && <Settings size={18}/>}{tab === 'groups' && <Package size={18}/>}{tab === 'proposal' && <FileText size={18}/>}
                      {tab === 'proposal' ? pt.tabTexts : tab === 'groups' ? pt.tabGroups : pt.tabSetup}
                    </button>
                  ))}
                </div>

                {/* 1. SETUP TAB — mirrors Intake's 3-part layout (Project / Company / Product A-B-C) */}
                {activeTab === 'setup' && (
                  <div className="col-span-1 md:col-span-12 space-y-10 max-w-5xl mx-auto w-full">



                    {/* ========== DEEL 1 — PROJECT DETAILS ========== */}
                    <section className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                       <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.green }}></div>
                       <div className="flex items-center justify-between border-b-2 border-slate-100 pb-6 mb-8">
                         <div className="flex items-center gap-4">
                           <div className="p-3 bg-green-50 rounded-xl">
                             <ClipboardList size={28} color={BRAND.colors.green} />
                           </div>
                           <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{pt.secProject}</h2>
                         </div>
                       </div>
                       {/* lg:items-start keeps the left column at its natural
                           height so form rows don't stretch to match the two
                           stacked upload tiles on the right. */}
                       <div className="grid grid-cols-1 lg:grid-cols-3 gap-10 lg:items-start">
                         <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4 content-start">
                           <div className="sm:col-span-2"><label className={labelClass}>{pt.projectName}</label><input type="text" className={`${inputClass} text-lg font-bold`} value={project.reportTitle || ''} onChange={e => handleProjectChange('reportTitle', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.proposalDate}</label><input type="date" className={inputClass} value={project.date || ''} onChange={e => handleProjectChange('date', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.packingDate} <span className="text-red-500">*</span></label><input type="date" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.packingDate || ''} onChange={e => handleProjectChange('packingDate', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.totalDuration} <span className="text-red-500">*</span></label><input type="number" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.totalDuration || ''} onChange={handleDurationChange} placeholder="e.g. 10" /></div>

                                 {groups.find(g => g.id === activeGroupId).predictedImage && (
                                    <div className="mt-6 border border-slate-200 rounded-2xl p-4 bg-white max-w-full relative group shadow-sm inline-block">
                                      <img src={groups.find(g => g.id === activeGroupId).predictedImage} className="max-h-[300px] w-auto object-contain rounded-xl" />
                                      <button onClick={() => removePredictedImage(activeGroupId)} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-red-600 hover:scale-110">
                                         <Trash2 size={16}/>
                                      </button>
                                    </div>
                                 )}
                               </div>
                             </>
                           )}
                        </div>
                    </div>
                  </div>
                )}

                {/* 3. PROPOSAL (Texts) */}
                {activeTab === 'proposal' && (
                  <div className="col-span-12 space-y-8 max-w-5xl mx-auto w-full">
                    <section className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-10">
                       <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.blue }}></div>
                       <div className="md:col-span-2 border-b-2 border-slate-100 pb-6 mb-2">
                          <div className="flex items-center gap-4">
                            <div className="p-3 bg-blue-50 rounded-xl">
                              <FileText size={28} color={BRAND.colors.blue}/>
                            </div>
                            <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{pt.proposalEvalText}</h2>
                          </div>
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.introLabel}</label>
                          <RichTextEditor 
                             value={proposal.intro} 
                             onChange={(val) => setProposal(prev => ({...prev, intro: val}))} 
                             placeholder={pt.introPlaceholder}
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.goalsLabel}</label>
                          <RichTextEditor 
                             value={proposal.expectedOutcomes} 
                             onChange={(val) => setProposal(prev => ({...prev, expectedOutcomes: val}))} 
                             placeholder={pt.goalsPlaceholder}
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.requirementsLabel}</label>
                          <RichTextEditor 
                             value={proposal.requirements} 
                             onChange={(val) => setProposal(prev => ({...prev, requirements: val}))} 
                             placeholder={pt.requirementsPlaceholder}
                          />
                       </div>
                    </section>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
