<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Proposal Tool</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler for in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Loading Proposal Tool... Please ensure 'style.css' and 'config.js' are in the same folder.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // --- FIXED IMPORT LIST ---
        import { 
          Printer, FileText, Settings, Layout, CheckCircle, 
          ArrowRight, Copy, Trash2, Plus, Scale, Upload, Truck, 
          Thermometer, Clock, Image as ImageIcon, ChevronRight, 
          Save, FolderOpen, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown, 
          Bold, Italic, Underline, List, AlertTriangle, Package, PackagePlus,
          X, Edit3, Camera, FileArchive, LineChart, Globe, AlertCircle,
          Building2, Target, Beaker, Send, Mail
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        // "Bin crate" removed, "Cube crate" kept.
        const PACKAGING_TYPES = globalConfig.PACKAGING_TYPES || ['Retail', 'Box/ Crate', 'Cube crate', 'Pallet', 'Punnets', 'Pillow Bag'];
        const TRANSPORT_MODES = globalConfig.TRANSPORT_MODES || ['Air Freight', 'Sea Freight', 'Road Transport', 'Storage'];

        const DEFAULT_CRITERIA = globalConfig.DEFAULT_CRITERIA || [
          'General Quality', 'Taste', 'Visual Appearance', 'Color',
          'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation',
          'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'
        ];

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // --- HELPER CLASSES (100% matched with intake.html) ---
        const inputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest') || n.includes('oogst')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // --- COMPONENTS ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const ProductSupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] py-0.5 flex items-center justify-center leading-tight w-full break-words px-0.5">
                           {step.stage}
                         </div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, '°C')}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        const SampleToggles = ({ max, selected, disabled, onChange, activeClass }) => {
          const arr = Array.from({length: max}, (_, i) => i + 1);
          return (
            <div className="flex flex-wrap gap-1.5">
              {arr.map(s => {
                const isSel = selected.includes(s);
                const isDis = disabled.includes(s);
                return (
                  <button 
                    key={s}
                    type="button"
                    onClick={() => !isDis && onChange(s)}
                    disabled={isDis}
                    title={isDis ? "Sample is already opened previously" : `Toggle Sample ${s}`}
                    className={`w-7 h-7 flex items-center justify-center text-xs font-bold rounded-lg border transition-all ${
                      isDis ? 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed' :
                      isSel ? activeClass : 
                      'bg-white border-slate-300 text-slate-500 hover:bg-slate-50 hover:border-slate-400'
                    }`}
                  >
                    {s}
                  </button>
                )
              })}
            </div>
          )
        };

        // --- MAIN APPLICATION ---
        const App = () => {
          const [lang, setLang] = useState(() => {
              if (globalConfig.getLanguage) return globalConfig.getLanguage();
              return 'en';
          });

          // Define translation object matching the interface
          const T = {
            en: {
              title: "Client Intake Form", subtitle: "Test Request Preparation",
              introTitle: "Welcome to PerfoTec!",
              introText: "Please fill in the details. Click 'Save (.json)' to save progress. Click 'View Summary' to review and print/save as PDF.",
              load: "Load JSON", save: "Save As...", preview: "Preview Proposal", print: "Download PDF", back: "Edit",
              sec1Title: "1. Company & Contact Details",
              companyName: "Company Name", street: "Street", houseNumber: "House No.", zipCode: "Zip Code", city: "City", country: "Country",
              contactName: "Contact Person", role: "Role", email: "Email", phone: "Phone",
              logoUpload: "Company Logo", clickUpload: "Click to upload",
              sec2Title: "2. Product(s) for Testing", prodDetails: "Details", delProd: "Remove Product",
              secATitle: "A. Product & Packaging", prodName: "Product Name", prodType: "Product Type / Variety", origin: "Product Origin", prodPhoto: "Photo", processingType: "State of product",
              whole: "Whole", processed: "Processed / Fresh-cut",
              maturity: "Maturity stage", treatment: "Post-harvest treatment",
              packType: "Packaging Type", material: "Material",
              dimens: "Dimensions", len: "Length", wid: "Width", widSeal: "Seal Width", hei: "Height",
              weight: "Net Weight",
              qualityCrit: "Quality criteria", qualityCritDesc: "Select the aspects to evaluate:",
              secBTitle: "B. Challenge & Objectives", challenge: "Current Challenge", challengePl: "Describe current quality issues...", goal: "Target Goal", goalPl: "What do you want to achieve?",
              secCTitle: "C. Current Supply Chain", transportMode: "Transport Mode", transportModeErr: "Transport mode",
              airFreight: "Air Freight", seaFreight: "Sea Freight", roadTransport: "Transport by road", storage: "Storage",
              step: "Step", phase: "Phase (Activity)", temp: "Temp (°C)", to: "To", days: "Time (Days)", action: "Action",
              actNone: "- None -", actPack: "Pack", actUnpack: "Unpack", addStep: "Add Extra Step", addProd: "Add another product",
              validationErr: "Not all mandatory fields have been filled in:", reqField: "is required", reqProd: "Product",
              printTitle: "Trial Proposal",
              successTitle: "Almost done!",
              successStep1: "Your email program has just been opened (addressed to luke.zuijderwijk@perfotec.com).",
              successStep2: "The request file (JSON data) has just been downloaded to your 'Downloads' folder.",
              successStep3: "IMPORTANT: Please attach the downloaded file to the opened email and click send! You can also use the 'Print to PDF' function to save the summary.",
              fallbackMailText: "Did the email not open automatically?",
              fallbackMailBtn: "Open Email Manually",
              closeBtn: "I understand, close", submitBtn: "Finish & Send",
              removeStep: "Remove Step"
            }
          };

          // Always resolve to english for this file
          const t = T['en'];

          const [activeTab, setActiveTab] = useState('setup');
          const [activeGroupId, setActiveGroupId] = useState(1);
          const [isPreview, setIsPreview] = useState(false);
          const fileInputRef = useRef(null);

          const [pendingImageReplace, setPendingImageReplace] = useState(null);

          // --- DATA STATE ---
          const [project, setProject] = useState({
            reportTitle: 'Trial Proposal', 
            productName: '', processingType: 'Whole', type: '', origin: '', company: '', contactName: '', contactEmail: '', contactPhone: '', employee: '', employeeEmail: '', employeePhone: '', trialTarget: '', currentChallenge: '',
            rrO2: '', rrCO2: '', rrTemp: '', startWeight: '', 
            acpO2: '', co2Max: '', co2Shock: '', co2ShockHours: '', tempMin: '', 
            totalDuration: '', transportMode: '',
            criteria: [], 
            date: new Date().toISOString().split('T')[0], packingDate: new Date().toISOString().split('T')[0],
            logo: BRAND.logos.default, clientLogo: null, startImage: null, coverImage: null,
            maturityStage: '', postHarvestTreatment: '',
            defectsMatrix: [] 
          });

          const [supplyChain, setSupplyChain] = useState(JSON.parse(JSON.stringify(DEFAULT_SUPPLY_CHAIN)));

          const [groups, setGroups] = useState([
            {
              id: 1, name: 'Control',
              specs: { packaging: 'Retail', material: 'BOPP', length: '', width: '', height: '', holes: '2', sampleCount: 3 },
              measurements: [
                { day: 0, measure: [], open: [], evaluate: [] }, 
                { day: 5, measure: [], open: [], evaluate: [] }
              ],
              predictedImage: null 
            },
            {
              id: 2, name: 'PerfoTec Laser',
              specs: { packaging: 'Retail', material: 'BOPP', length: '', width: '', height: '', holes: '4', sampleCount: 3 },
              measurements: [
                { day: 0, measure: [], open: [], evaluate: [] }, 
                { day: 5, measure: [], open: [], evaluate: [] }
              ],
              predictedImage: null 
            }
          ]);

          const [proposal, setProposal] = useState({ 
            intro: 'To extend the shelf life and maintain the optimal quality of your product, we propose conducting a comparative MAP (Modified Atmosphere Packaging) trial. By utilizing PerfoTec\'s advanced respiration and laser technology, we aim to create the perfect microclimate within the packaging.', 
            expectedOutcomes: '<ul><li>Extension of shelf life by X days.</li><li>Reduction of moisture loss and weight loss.</li><li>Maintenance of natural color and firmness.</li></ul>', 
            requirements: '<ul><li>Provide current packaging material for the control group.</li><li>The product must be transported under cooled conditions.</li></ul>' 
          });
          
          const [newCriteria, setNewCriteria] = useState('');

          // --- HANDLERS ---
          const handleImgUpload = (e, field) => { 
             const f = e.target.files[0]; 
             if(f) { 
                const r = new FileReader(); 
                r.onloadend = () => { setProject(p => ({...p, [field]: r.result})); }; 
                r.readAsDataURL(f); 
             }
          };

          const handlePredictedImageUpload = (e, groupId) => { 
            const file = e.target.files[0]; 
            if(file) { 
              const group = groups.find(g => g.id === groupId);
              const reader = new FileReader(); 
              reader.onloadend = () => {
                 if (group && group.predictedImage) {
                    setPendingImageReplace({ groupId: groupId, result: reader.result });
                 } else {
                    setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: reader.result } : g)); 
                 }
              };
              reader.readAsDataURL(file); 
              e.target.value = '';
            }
          };

          const confirmReplaceImage = () => {
            setGroups(prev => prev.map(g => g.id === pendingImageReplace.groupId ? { ...g, predictedImage: pendingImageReplace.result } : g));
            setPendingImageReplace(null);
          };

          const removePredictedImage = (groupId) => {
            setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: null } : g));
          };

          const handleProjectChange = (f, v) => setProject(p => ({...p, [f]: v}));
          
          const handleDurationChange = (e) => {
            setProject(p => ({...p, totalDuration: e.target.value}));
          };

          const exportData = async () => {
            const exportGroups = groups.map(g => ({
              ...g,
              specs: { ...g.specs, startWeight: project.startWeight }, 
              measurements: (g.measurements || []).map(m => ({
                 day: m.day,
                 samples: Array.from({length: g.specs?.sampleCount || 3}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '' })),
                 quality: 9,
                 notes: '',
                 images: [],
                 qualityParams: [],
                 evaluateQuality: true,
                 measure: m.measure || [],
                 open: m.open || [],
                 evaluate: m.evaluate || []
              }))
            }));

            const data = { project, supplyChain, groups: exportGroups, proposal };
            const cleanCompanyName = project.company ? project.company.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'client';
            const filename = `perfotec_proposal_${cleanCompanyName}.json`; 
            
            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(data, filename);
            } else {
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            }
          };

          const importData = (e) => { 
            const file = e.target.files[0]; if(!file) return; 
            
            const processData = (d) => {
                if(d.isPerfoTecIntake) {
                   const client = d.client || {}; const prod = d.products?.[0] || {};
                   setProject(p => ({ ...p, 
                     company: client.companyName||'', street: client.street||'', houseNumber: client.houseNumber||'', zipCode: client.zipCode||'', city: client.city||'', country: client.country||'', contactName: client.contactName||'', contactRole: client.role||'', contactEmail: client.email||'', contactPhone: client.phone||'', logo: client.logo||p.logo, productName: prod.name||'', processingType: prod.processingType||'Whole', maturityStage: prod.maturityStage||'', postHarvestTreatment: prod.postHarvestTreatment||'', currentChallenge: prod.currentChallenge||'', trialTarget: prod.targetGoal||'', transportMode: prod.transportMode || (prod.transportModes?.[0] || ''), criteria: prod.qualityCriteria||[], startImage: prod.photo||null,
                     startWeight: prod.weight || p.startWeight 
                   }));
                   if (prod.supplyChain) setSupplyChain(prod.supplyChain);
                   setGroups(p => { const ug = [...p]; if(ug[0]) { ug[0].specs = { ...ug[0].specs, packaging: prod.packagingType||'Retail', material: prod.material||'', length: prod.length||'', width: prod.width||'', height: prod.height||'' }; } return ug; });
                } else {
                   if(d.project) {
                       setProject(p => ({
                           ...p, 
                           ...d.project, 
                           packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0], 
                           transportMode: d.project.transportMode || '',
                           startWeight: d.project.startWeight || d.groups?.[0]?.specs?.startWeight || ''
                       })); 
                   }
                   if(d.supplyChain) setSupplyChain(d.supplyChain); 
                   if(d.groups) {
                       const proposalGroups = d.groups.map(g => ({
                           ...g,
                           measurements: (g.measurements || []).map(m => ({ 
                               day: m.day,
                               measure: m.measure || [],
                               open: m.open || [],
                               evaluate: m.evaluate || []
                           }))
                       }));
                       setGroups(proposalGroups);
                   }
                   if(d.proposal) setProposal(d.proposal);
                }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => alert("Error loading JSON file."));
            } else {
                const reader = new FileReader(); 
                reader.onload = (ev) => { 
                    try { 
                        processData(JSON.parse(ev.target.result));
                    } catch(err){ alert("Error loading file."); } 
                }; 
                reader.readAsText(file); 
            }
            e.target.value = '';
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              return g;
            }));
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return { ...g, specs: { ...g.specs, sampleCount: c }};
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria?.includes(c) ? p.criteria.filter(x => x !== c) : [...(p.criteria||[]), c] }));
          const addNewCriteria = () => { if(newCriteria && !(project.criteria||[]).includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          const handleTransportModeToggle = (mode) => {
            setProject(p => ({ ...p, transportMode: p.transportMode === mode ? '' : mode }));
          };

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);

            setGroups(p => [...p, { 
              ...org, 
              id: newId, 
              name: `${org.name} (Copy)`,
              measurements: org.measurements.map(m => ({...m}))
            }]); 
            setActiveGroupId(newId);

          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                setGroups(p => {
                    const newGroups = p.filter(g => g.id !== id);
                    if (activeGroupId === id) setActiveGroupId(newGroups[0].id);
                    return newGroups;

                  const lastDay = g.measurements?.length > 0 ? Math.max(...g.measurements.map(m => parseFloat(m.day))) : 0;

                          open: [],
                          evaluate: []
                      }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))

                                  <div key={i} className="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm">
                                      <span className="text-sm font-extrabold text-slate-600 ml-2">Day</span>
                                      <input type="number" className="w-16 bg-white border border-slate-300 text-blue-700 text-center text-lg font-bold rounded-lg py-1 focus:ring-2 focus:ring-blue-500 outline-none [&::-webkit-inner-spin-button]:appearance-none [-moz-appearance:textfield]" value={m.day} onChange={e => updateEvaluationDay(groups[0].id, m.day, e.target.value)} />
                                      {i > 0 && <button onClick={() => removeEvaluationDay(groups[0].id, m.day)} className="text-red-400 hover:text-red-600 p-1.5 bg-white rounded-lg border shadow-sm"><X size={16}/></button>}
                                  </div>
                              ))}
                          </div>
                          <div className="mt-auto">
                              <button onClick={() => addEvaluationDay(groups[0].id)} className="w-full sm:w-auto text-sm bg-blue-50 text-blue-700 px-5 py-3 rounded-xl font-bold border border-blue-200 hover:bg-blue-100 transition-colors inline-flex justify-center items-center gap-2"><Plus size={18}/> Add Evaluation Day</button>
                          </div>
                       </div>
                    </div>

                    {/* BOTTOM SECTION: VARIANTS */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                       
                       {/* Sidebar: Variant List */}
                       <div className="lg:col-span-3 space-y-4">
                           <button onClick={addNewVariant} className="w-full py-4 rounded-2xl font-extrabold border-2 border-dashed border-green-300 hover:border-green-500 bg-green-50/50 hover:bg-green-50 text-green-700 transition flex items-center justify-center gap-2 shadow-sm mb-2">
                              <div className="bg-white p-1 rounded-md shadow-sm"><Plus size={18}/></div>
                              Add Variant
                           </button>

                           <div className="space-y-3">
                             {groups.map((g, idx) => (
                               <div key={g.id} onClick={() => setActiveGroupId(g.id)} className={`p-4 rounded-xl border-2 cursor-pointer transition-all relative group shadow-sm ${activeGroupId === g.id ? 'bg-white border-green-500 transform scale-[1.02]' : 'bg-slate-50 border-slate-200 hover:bg-white hover:border-slate-300'}`}>
                                 <div className="flex items-center gap-3 font-extrabold text-base text-slate-800">
                                   <div className="w-4 h-4 rounded-full shrink-0 shadow-sm" style={{ backgroundColor: CHART_COLORS[idx % CHART_COLORS.length].stroke }}></div>
                                   <span className="truncate">{g.name || 'Variant'}</span>
                                 </div>
                                 <div className="absolute top-2 right-2 flex flex-col gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <div className="flex gap-1">
                                      <button onClick={(e) => { e.stopPropagation(); moveGroup(g.id, 'up'); }} className="p-1.5 bg-white border border-slate-200 text-slate-500 rounded-lg hover:bg-slate-100 shadow-sm"><ChevronUp size={16}/></button>
                                      <button onClick={(e) => { e.stopPropagation(); moveGroup(g.id, 'down'); }} className="p-1.5 bg-white border border-slate-200 text-slate-500 rounded-lg hover:bg-slate-100 shadow-sm"><ChevronDown size={16}/></button>
                                    </div>
                                    <div className="flex gap-1 mt-1">
                                      <button onClick={(e) => { e.stopPropagation(); duplicateGroup(g.id); }} className="p-1.5 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg hover:bg-blue-100 shadow-sm" title="Duplicate"><Copy size={16} /></button>
                                      <button onClick={(e) => { e.stopPropagation(); removeGroup(g.id); }} className="p-1.5 bg-red-50 text-red-600 border border-red-100 rounded-lg hover:bg-red-100 shadow-sm" title="Remove"><Trash2 size={16} /></button>
                                    </div>
                                 </div>
                               </div>
                             ))}
                           </div>
                       </div>
                       
                       {/* Main Content: Variant Details */}
                       <div className="lg:col-span-9 bg-white p-6 sm:p-10 rounded-3xl shadow-sm border border-slate-200 space-y-10 overflow-hidden relative">
                           <div className="absolute top-0 left-0 w-1 h-full bg-slate-200"></div>
                           {groups.find(g => g.id === activeGroupId) && (
                             <>
                               <div>
                                 <h3 className="font-extrabold text-2xl mb-8 text-slate-800 border-b-2 border-slate-100 pb-4">Variant Configuration</h3>
                                 
                                 <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                                   <div><label className={labelClass}>Variant Name</label><input type="text" className={`${inputClass} text-lg font-bold`} value={groups.find(g => g.id === activeGroupId).name || ''} onChange={(e) => handleGroupChange(activeGroupId, 'name', null, e.target.value)} /></div>
                                   <div><label className={labelClass}>Packaging Type</label><select className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.packaging || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'packaging', e.target.value)}>{PACKAGING_TYPES.map(t => <option key={t}>{t}</option>)}</select></div>
                                 </div>
                                 
                                 <div className="bg-gradient-to-br from-slate-50 to-slate-100 p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                   <label className="block mb-6 text-sm font-extrabold tracking-widest text-blue-900 uppercase border-b border-blue-200 pb-2">Packaging Specs & Samples</label>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6">
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Length (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.length || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'length', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Width (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.width || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'width', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Height (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.height || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'height', e.target.value)} /></div>
                                   </div>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Material</label><input className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.material || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'material', e.target.value)} /></div>
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Transmission Value</label><input type="text" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.holes || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'holes', e.target.value)} /></div>
                                     <div><label className="text-xs text-blue-700 font-extrabold uppercase tracking-wider mb-2 block">Samples / Measurement</label><input type="number" min="1" className={`${inputClass} bg-white border-blue-300 ring-2 ring-blue-50 font-extrabold text-blue-900 text-lg`} value={groups.find(g => g.id === activeGroupId).specs.sampleCount || 3} onChange={(e) => handleSampleCountChange(activeGroupId, parseInt(e.target.value))} /></div>
                                   </div>
                                 </div>
                                 
                                 <div className="bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                    <div className="flex flex-col mb-6">
                                      <h4 className="font-extrabold text-xl text-slate-800 mb-1">Timeline & Events</h4>
                                      <p className="text-sm text-slate-500">Select the specific sample numbers (e.g., 1, 2, 3) representing the physical packages to be processed for each action.</p>
                                    </div>
                                    <div className="overflow-x-auto rounded-xl border border-slate-200">
                                      <table className="w-full text-sm bg-white">
                                        <thead className="bg-slate-100 border-b border-slate-200">
                                          <tr className="text-left text-slate-600 uppercase tracking-wider text-[10px] font-bold">
                                            <th className="p-4 w-20 text-center">Day</th>
                                            <th className="p-4 border-l border-slate-200">Measure Gas/Wt.</th>
                                            <th className="p-4 border-l border-slate-200 text-orange-700">Open Pack</th>
                                            <th className="p-4 border-l border-slate-200 text-green-700">Evaluate Quality</th>
                                          </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                          {(groups.find(g => g.id === activeGroupId).measurements || []).map((m, idx, arr) => {
                                            const disabledForMeasure = [];
                                            arr.filter(prev => parseFloat(prev.day) < parseFloat(m.day)).forEach(prev => {
                                              disabledForMeasure.push(...(prev.open || []));
                                            });
                                            const sCount = groups.find(g => g.id === activeGroupId).specs.sampleCount || 3;

                                            return (
                                              <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-center font-extrabold text-slate-700 bg-slate-50/50">
                                                  P+{m.day}
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.measure||[]} disabled={disabledForMeasure} activeClass="bg-blue-500 border-blue-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'measure', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.open||[]} disabled={[]} activeClass="bg-orange-500 border-orange-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'open', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.evaluate||[]} disabled={[]} activeClass="bg-green-500 border-green-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'evaluate', s)} />
                                                </td>
                                              </tr>
                                            )
                                          })}
                                        </tbody>
                                      </table>
                                    </div>
                                    <div className="mt-4 text-sm font-medium text-slate-500 bg-white p-4 rounded-lg border border-slate-100 inline-flex items-start gap-3">
                                       <AlertCircle size={18} className="text-blue-400 shrink-0 mt-0.5" />
                                       <span>Once a sample is marked as 'Open' on a previous day, it can no longer be selected for gas/weight measurements (the button will be greyed out).</span>
                                    </div>
                                 </div>

                                 <div className="border-2 border-dashed border-blue-200 bg-blue-50 rounded-2xl p-6 sm:p-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 shadow-sm">
                                    <div className="flex items-center gap-5">
                                       <div className="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center shrink-0">
                                          <LineChart size={28} className="text-blue-500" />
                                       </div>
                                       <div>
                                         <div className="font-extrabold text-lg text-blue-950 mb-1">Predicted Gas Graph</div>
                                         <div className="text-sm font-medium text-blue-700">Upload a screenshot of the prediction for this specific variant</div>
                                       </div>
                                    </div>
                                    <label className="cursor-pointer bg-white border border-blue-200 text-blue-700 px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-100 hover:border-blue-300 transition-all shrink-0 whitespace-nowrap shadow-sm">
                                       Upload Image
                                       <input 
                                         type="file" 
                                         accept="image/*" 
                                         className="hidden" 
                                         onClick={(e) => {
                                            const g = groups.find(x => x.id === activeGroupId);
                                            if (g && g.predictedImage) {
                                              e.preventDefault();
                                              setPendingImageReplace({ groupId: activeGroupId, result: null });
                                            }
                                         }} 
                                         onChange={(e) => handlePredictedImageUpload(e, activeGroupId)} 
                                       />
                                    </label>
                                 </div>
                                 
                                 {groups.find(g => g.id === activeGroupId).predictedImage && (
                                    <div className="mt-6 border border-slate-200 rounded-2xl p-4 bg-white max-w-full relative group shadow-sm inline-block">
                                      <img src={groups.find(g => g.id === activeGroupId).predictedImage} className="max-h-[300px] w-auto object-contain rounded-xl" />
                                      <button onClick={() => removePredictedImage(activeGroupId)} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-red-600 hover:scale-110">
                                         <Trash2 size={16}/>
                                      </button>
                                    </div>
                                 )}
                               </div>
                             </>
                           )}
                        </div>
                    </div>
                  </div>
                )}

                {/* 3. PROPOSAL (Texts) */}
                {activeTab === 'proposal' && (
                  <div className="col-span-12 space-y-8">
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-10">
                       <div className="md:col-span-2 border-b-2 border-slate-100 pb-4">
                          <h2 className="font-extrabold text-2xl text-slate-800 flex items-center gap-3">
                             <FileText className="text-blue-600" size={28}/>
                             Proposal & Evaluation Text
                          </h2>
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Introduction / Current Challenge</label>
                          <RichTextEditor 
                             value={proposal.intro} 
                             onChange={(val) => setProposal(prev => ({...prev, intro: val}))} 
                             placeholder="Describe the challenge and why we are conducting this trial..."
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Goals / Expected Outcomes</label>
                          <RichTextEditor 
                             value={proposal.expectedOutcomes} 
                             onChange={(val) => setProposal(prev => ({...prev, expectedOutcomes: val}))} 
                             placeholder="What do we hope to achieve with this trial?"
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Requirements & Agreements</label>
                          <RichTextEditor 
                             value={proposal.requirements} 
                             onChange={(val) => setProposal(prev => ({...prev, requirements: val}))} 
                             placeholder="What must the client provide? What agreements have been made?"
                          />
                       </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
