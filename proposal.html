<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Proposal Tool</title>
    <meta name="description" content="PerfoTec Proposal Tool — Create trial proposals for MAP packaging testing.">
    <meta name="author" content="PerfoTec B.V.">
    <meta name="theme-color" content="#007C27">
    
    <!-- Preconnect speeds up the Google Fonts waterfall so Montserrat is
         ready before the user clicks Download PDF. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Eagerly load Montserrat so the browser has the font cached before print -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Babel compiler for in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Loading Proposal Tool... Please ensure 'style.css' and 'config.js' are in the same folder.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // --- FIXED IMPORT LIST ---
        import { 
          Printer, FileText, Settings, Layout, CheckCircle, 
          ArrowRight, Copy, Trash2, Plus, Scale, Upload, Truck, 
          Thermometer, Clock, Image as ImageIcon, ChevronRight, 
          Save, FolderOpen, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown, 
          Bold, Italic, Underline, List, AlertTriangle, Package, PackagePlus,
          X, Edit3, Camera, FileArchive, LineChart, Globe, AlertCircle,
          Building2, Target, Beaker, Send, Mail, ClipboardList, UserPlus
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: {
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27',
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A',
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A',
            gray: globalConfig.BRAND?.colors?.neutral?.lightGray || '#E9E9E9',
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          },
          fonts: {
            heading: '"Montserrat", sans-serif',
            body: '"Montserrat", sans-serif',
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        // i18n arrays are the single source; flat arrays are derived from them
        // so option order and content stay in sync across all tools.
        const PACKAGING_TYPES_I18N = globalConfig.PACKAGING_TYPES_I18N || [];
        const TRANSPORT_MODES_I18N = globalConfig.TRANSPORT_MODES_I18N || [];
        const DEFAULT_CRITERIA_I18N = globalConfig.DEFAULT_CRITERIA_I18N || [];
        const PERFOTEC_TECHNOLOGIES_I18N = globalConfig.PERFOTEC_TECHNOLOGIES_I18N || [];
        const PACKAGING_TYPES = PACKAGING_TYPES_I18N.map(x => x.value);
        const TRANSPORT_MODES = TRANSPORT_MODES_I18N.map(x => x.value);
        // i18n label lookup — sourced from config (v2.1); local fallback returns value.
        const getI18nLabel = globalConfig.getI18nLabel
          ? globalConfig.getI18nLabel.bind(globalConfig)
          : ((arr, value) => value);

        // Unit conversion — sourced from config (v2.1); local fallback returns value.
        const convertValue = globalConfig.convertValue
          ? globalConfig.convertValue.bind(globalConfig)
          : ((val) => val);

        const DEFAULT_CRITERIA = DEFAULT_CRITERIA_I18N.map(x => x.value);

        const PERFOTEC_TECHNOLOGIES = PERFOTEC_TECHNOLOGIES_I18N.map(x => x.value);

        // Rating scale — sourced from config so all tools share one definition.
        const SCORES = globalConfig.SCORES || [
          [10, 'excellent – exceptionally appealing quality, exceptional good'],
          [9,  'very good – natural quality of the product, full strong characteristic quality attributes'],
          [8,  'good – natural quality, with few specimens with slightly light impairment'],
          [7,  'commendable – natural quality, with several specimens with light impairment'],
          [6,  'satisfactory – slightly reduced quality attributes'],
          [5,  'unacceptable – impairment of natural quality attributes'],
          [4,  'beyond unacceptable – clear impairment of quality attributes'],
          [3,  'poor – generally severe loss of quality, no longer appealing'],
          [2,  'bad – strong and severe quality loss, strongly unpleasant'],
          [1,  'very bad – complete quality decay, spoiled and repulsive']
        ];

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // The supply-chain transport step is recognised by its stage label
        // (any language), never by its position — so it can be moved, renamed
        // via the dropdown, or removed like any other step.
        const TRANSPORT_STAGE_LABELS = ['transport', 'transporte', 'transport by road', 'road transport', 'wegtransport', 'transporte terrestre', 'seafreight', 'sea freight', 'zeevracht', 'transporte marítimo', 'airfreight', 'air freight', 'luchtvracht', 'transporte aéreo', 'storage', 'opslag', 'almacenamiento'];
        const isTransportStage = (stage) => TRANSPORT_STAGE_LABELS.includes((stage || '').trim().toLowerCase());

        // --- HELPER CLASSES ---
        const inputClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.input) || "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.label) || "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest') || n.includes('oogst') || n.includes('granja')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea') || n.includes('zee') || n.includes('marítimo')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air') || n.includes('lucht') || n.includes('aéreo')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('opslag') || n.includes('almacenamiento')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('winkel') || n.includes('tienda')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat') || n.includes('consument') || n.includes('consumidor')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // --- COMPONENTS ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const ProductSupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] py-0.5 flex items-center justify-center leading-tight w-full break-words px-0.5">
                           {step.stage}
                         </div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, '°C')}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        const SampleToggles = ({ max, selected, disabled, onChange, activeClass }) => {
          const arr = Array.from({length: max}, (_, i) => i + 1);
          return (
            <div className="flex flex-wrap gap-1.5">
              {arr.map(s => {
                const isSel = selected.includes(s);
                const isDis = disabled.includes(s);
                return (
                  <button 
                    key={s}
                    type="button"
                    onClick={() => !isDis && onChange(s)}
                    disabled={isDis}
                    title={isDis ? "Sample is already opened previously" : `Toggle Sample ${s}`}
                    className={`w-7 h-7 flex items-center justify-center text-xs font-bold rounded-lg border transition-all ${
                      isDis ? 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed' :
                      isSel ? activeClass : 
                      'bg-white border-slate-300 text-slate-500 hover:bg-slate-50 hover:border-slate-400'
                    }`}
                  >
                    {s}
                  </button>
                )
              })}
            </div>
          )
        };

          const parts = template.split(/(\{[a-zA-Z]+\})/g);
          return parts.map((part, i) => {
            const match = part.match(/^\{([a-zA-Z]+)\}$/);

              return React.createElement('strong', { key: i }, values[match[1]] ?? '');
            }
            return part;
          });

          let unpackIdx = chain.findIndex((s, i) => i > packIdx && s.action === 'unpack');
          if (unpackIdx === -1) unpackIdx = chain.length - 1;

          let minDays = 0;
          let maxDays = 0;

          for (let i = packIdx; i <= unpackIdx; i++) {
              const s = chain[i];
              if (!s) continue;
              const ts = parseFloat(s.tempStart); if(!isNaN(ts)) allTemps.push(ts);
              const te = parseFloat(s.tempEnd); if(!isNaN(te)) allTemps.push(te);
              
              const dStart = parseFloat(s.daysStart) || 0;
              const dEnd = s.daysEnd && !isNaN(parseFloat(s.daysEnd)) ? parseFloat(s.daysEnd) : dStart;

              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);

          });
          
          const [newCriteria, setNewCriteria] = useState('');

          const calcUnpackingDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;
            if (baseDate && duration) {
               const d = new Date(baseDate);
               d.setDate(d.getDate() + duration);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const year = d.getFullYear();
               return `${day}/${month}/${year}`;

            return '-';

          const calcRetailDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;

            if (baseDate && (duration || retailDays)) {

               d.setDate(d.getDate() + duration + retailDays);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');

          // --- HANDLERS ---
          const handleClientChange = (field, value) => {

          const syncFlatFromPrimaryContact = (prev, primary) => {

            setProject(p => {

          const loadIntakeProduct = (d, prod) => {

            setProject(prev => ({ ...prev,

              packagings: p.packagings
                ? p.packagings.map(pkg => ({ ...pkg, startWeight: pkg.startWeight || pkg.weight || '' }))
                : (p.packagingType
                    ? [{ id: 1, packagingType: p.packagingType || 'Retail', material: p.material || '', length: p.length || '', width: p.width || '', height: p.height || '', startWeight: p.weight || '' }]

            setGroups(prev => {

                };

          // Confirm handler for the multi-product picker modal.
          const confirmProductSelection = (productIdx) => {

            const { raw, products } = pendingProductSelection;
            const chosen = products[productIdx] || products[0] || {};

          const importData = (e) => {
            const file = e.target.files[0]; if(!file) return;

            // Canonical contact projection comes from config; fallback to a
            // local no-op in the unlikely event config is missing.
            const extractPrimaryContact = globalConfig.extractPrimaryContact

            const processData = (raw) => {

                } else {

                       const contactData = extractPrimaryContact(ci);
                       setClientInfo({

                         addressExtra: d.client.addressExtra || '',
                         zipCode: d.client.zipCode || '',
                         city: d.client.city || '',
                         country: d.client.country || '',

                   } else if (d.project) {
                       // Legacy: client info flattened into project (very old
                       // exports — no clientInfo, no client). Hoist the flat

                       const flatName = d.project.contactName || '';
                       const flatRole = d.project.contactRole || d.project.role || '';
                       const flatEmail = d.project.contactEmail || d.project.email || '';
                       const flatPhoneDirect = d.project.phoneDirect || d.project.contactPhone || d.project.phone || '';
                       const flatPhoneWork = d.project.phoneWork || '';
                       const hasContact = flatName || flatRole || flatEmail || flatPhoneDirect || flatPhoneWork;
                       setClientInfo({
                         companyName: d.project.company || '',
                         street: d.project.street || '',
                         houseNumber: d.project.houseNumber || '',
                         addressExtra: d.project.addressExtra || '',
                         zipCode: d.project.zipCode || '',
                         city: d.project.city || '',
                         country: d.project.country || '',
                         website: d.project.website || '',
                         contactName: flatName,
                         role: flatRole,
                         email: flatEmail,
                         phone: d.project.contactPhone || d.project.phone || '',
                         phoneDirect: flatPhoneDirect,
                         phoneWork: flatPhoneWork,
                         contacts: hasContact ? [{
                           id: 1,
                           name: flatName,

                           phoneDirect: flatPhoneDirect,
                           phoneWork: flatPhoneWork
                         }] : [],
                         logo: d.project.clientLogo || null  // legacy: proposal used project.clientLogo
                       });
                   }
                   if(d.project) {
                       setProject(p => ({
                           ...p,

                           packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0],
                           transportMode: d.project.transportMode || '',
                           startWeight: d.project.startWeight || d.groups?.[0]?.specs?.startWeight || '',
                           technologies: d.project.technologies || [],
                           // Make sure project.logo falls back to default if missing
                           logo: d.project.logo || BRAND.logos.default,
                           packagings: d.project.packagings || (d.project.packagingType ? [{ id: 1, packagingType: d.project.packagingType || 'Retail', material: d.project.material || '', length: d.project.length || '', width: d.project.width || '', height: d.project.height || '', startWeight: d.project.startWeight || '' }] : [{ id: 1, packagingType: 'Retail', material: '', length: '', width: '', height: '', startWeight: '' }]),
                       }));
                   }
                   if(d.supplyChain) setSupplyChain(d.supplyChain); 
                   if(d.groups) {
                       const proposalGroups = d.groups.map(g => ({
                           ...g,
                           measurements: (g.measurements || []).map(m => ({ 
                               day: m.day,
                               measure: m.measure || [],
                               open: m.open || [],
                               evaluate: m.evaluate || []
                           }))
                       }));
                       setGroups(proposalGroups);
                   }
                   if(d.proposal) setProposal(d.proposal);
                }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => alert("Error loading JSON file."));
            } else {
                const reader = new FileReader(); 
                reader.onload = (ev) => { 
                    try { 
                        processData(JSON.parse(ev.target.result));
                    } catch(err){ alert("Error loading file."); } 
                }; 
                reader.readAsText(file); 
            }
            e.target.value = '';
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              return g;
            }));
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return { ...g, specs: { ...g.specs, sampleCount: c }};
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria?.includes(c) ? p.criteria.filter(x => x !== c) : [...(p.criteria||[]), c] }));
          const addNewCriteria = () => { if(newCriteria && !(project.criteria||[]).includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          const handleTransportModeToggle = (mode) => {
            const isDeselect = project.transportMode === mode;
            setProject(p => ({ ...p, transportMode: isDeselect ? '' : mode }));
            // Keep the supply-chain transport step in sync with the selected mode.
            if (!isDeselect) {
              const modeToStage = { 'Road Transport': pt.transportRoad, 'Sea Freight': pt.transportSea, 'Air Freight': pt.transportAir, 'Storage': pt.transportStorage };
              const newStage = modeToStage[mode];
              if (newStage) {
                setSupplyChain(prev => {
                  const i = prev.findIndex(s => isTransportStage(s.stage));
                  if (i === -1) return prev;
                  const next = [...prev];
                  next[i] = { ...next[i], stage: newStage };
                  return next;
                });
              }
            }
          };
          const toggleTechnology = (tech) => {
            setProject(p => ({ 
                ...p, 
                technologies: p.technologies?.includes(tech) ? p.technologies.filter(t => t !== tech) : [...(p.technologies || []), tech] 
            }));
          };

          // Defects & Prevention Matrix — drives the Section 3 table in the
          // print preview (`project.defectsMatrix`). Each row has a stable id
          // so React keys stay valid across reorders/edits.
          const addDefectRow = () => setProject(p => ({
            ...p,
            defectsMatrix: [...(p.defectsMatrix || []), { id: Date.now(), defect: '', cause: '', effectMHP: '', effectMAP: '' }]
          }));

          // === PRODUCT-SHEET IMPORTER ===
          // Parses a PerfoTec product-sheet HTML (the .htm files under
          // /OneDrive/.../Product Sheets/) and extracts the Defects matrix +
          // optimal O₂/CO₂/Temp ranges + ACP value, in the user's selected
          // language.
          //
          // Robust by design: every selector is wrapped so a missing section
          // is silently skipped instead of crashing the import. Returns a
          // partial-update object that the caller merges into project state.

          // Extract the inline `const translations = { nl: {}, en: {...}, es: {...} };`
          // object literal from the product-sheet script. Uses balanced-brace
          // walking so we don't trip over nested objects, and skips over
          // string literals so braces inside translation text don't mismatch.
          const extractProductSheetTranslations = (htmlText) => {
            const startMarker = 'const translations';
            const startIdx = htmlText.indexOf(startMarker);
            if (startIdx === -1) return null;
            const eqIdx = htmlText.indexOf('=', startIdx);
            if (eqIdx === -1) return null;
            const braceStart = htmlText.indexOf('{', eqIdx);
            if (braceStart === -1) return null;
            let depth = 0, i = braceStart, inStr = null, escaped = false;
            while (i < htmlText.length) {
              const c = htmlText[i];
              if (escaped) { escaped = false; i++; continue; }
              if (inStr) {
                if (c === '\\') { escaped = true; i++; continue; }
                if (c === inStr) inStr = null;
                i++; continue;
              }
              if (c === '"' || c === "'" || c === '`') { inStr = c; i++; continue; }
              if (c === '{') depth++;
              else if (c === '}') { depth--; if (depth === 0) { i++; break; } }
              i++;
            }
            const objLit = htmlText.substring(braceStart, i);
            try {
              // Object literal evaluation — the source is user-supplied but
              // local to their machine; same trust level as the imported file.
              return new Function('return ' + objLit)();
            } catch (e) {
              return null;
            }
          };

          // Strip HTML tags (translation values may contain inline <strong>,
          // <span>, <br>, …). Returns plain text with whitespace collapsed.
          const stripHtml = (html) => {
            if (!html) return '';
            const tmp = document.createElement('div');
            tmp.innerHTML = String(html);
            return tmp.textContent.replace(/\s+/g, ' ').trim();
          };

          const parseProductSheet = (htmlText, targetLang) => {
            const result = { defects: [], o2Target: '', co2Target: '', tempCritical: '', o2Acp: '' };
            if (!htmlText || typeof htmlText !== 'string') return result;
            try {
              const doc = new DOMParser().parseFromString(htmlText, 'text/html');

              // Pull the per-language translation dictionary so we can resolve
              // each cell's `data-translate` key in the user's active language.
              // Falls back to whatever is already in the DOM (typically Dutch)
              // when a language entry is absent or empty.
              const allTrans = extractProductSheetTranslations(htmlText);
              const wanted = targetLang || 'nl';
              const langDict = (allTrans && allTrans[wanted] && Object.keys(allTrans[wanted]).length > 0)
                ? allTrans[wanted]
                : null;

              // Resolve a single <td> via its `data-translate` key.
              const cellText = (td) => {
                const key = td.getAttribute && td.getAttribute('data-translate');
                if (key && langDict && langDict[key]) return stripHtml(langDict[key]);
                return td.textContent.replace(/\s+/g, ' ').trim();
              };

              // Defects matrix — #common-defects table.data-table tbody tr
              const rows = doc.querySelectorAll('#common-defects table.data-table tbody tr, table.data-table tbody tr');
              const seen = new Set();
              rows.forEach((tr, i) => {
                const tds = tr.querySelectorAll('td');
                if (tds.length < 4) return;
                const defect = cellText(tds[0]);
                const cause = cellText(tds[1]);
                const effectMHP = cellText(tds[2]);
                const effectMAP = cellText(tds[3]);
                // Drop empty / duplicate rows (some sheets reuse the table
                // markup with placeholders).
                if (!defect && !cause) return;
                const key = defect + '|' + cause;
                if (seen.has(key)) return;
                seen.add(key);
                result.defects.push({
                  id: Date.now() + i,
                  defect, cause, effectMHP, effectMAP
                });
              });

              // Optimal conditions — section#optimal-conditions .condition-block
              // The numeric values (e.g. "1.0% - 5.0%") are language-independent
              // and sit in `.condition-value`; only category-matching is needed.
              const blocks = doc.querySelectorAll('#optimal-conditions .condition-block, .condition-block');
              blocks.forEach(block => {
                const title = (block.querySelector('.condition-title')?.textContent || '').trim();
                const value = (block.querySelector('.condition-value')?.textContent || '').replace(/\s+/g, ' ').trim();
                if (!value) return;
                if (/O₂|O2/i.test(title) && !/CO/i.test(title)) result.o2Target = value;
                else if (/CO₂|CO2/i.test(title)) result.co2Target = value;
                else if (/Temp/i.test(title)) result.tempCritical = value;
              });

              // ACP — pick numeric range from the res_box_text paragraph in
              // the user's language if available, else from the DOM. Numbers
              // themselves are language-independent.
              let acpText = '';
              if (langDict && langDict.res_box_text) {
                acpText = stripHtml(langDict.res_box_text);
              } else {
                const acpHost = doc.querySelector('[data-translate="res_box_text"]') ||
                                doc.querySelector('#anaerobic-respiration p') ||
                                doc.querySelector('section .text-xs.text-gray-700');
                acpText = acpHost?.textContent || '';
              }
              const acpMatch = acpText.match(/(\d+(?:[.,]\d+)?)\s*[-–]\s*(\d+(?:[.,]\d+)?)\s*%/);
              if (acpMatch) result.o2Acp = `${acpMatch[1].replace(',', '.')}% - ${acpMatch[2].replace(',', '.')}%`;
            } catch (e) {
              // Parsing failed — return whatever we got. Caller will alert user.
            }
            return result;
          };

          // Apply parsed product-sheet data to project state. Only overwrites
          // fields that the parser actually populated, so any manually-typed
          // values for fields the sheet doesn't carry are preserved.
          const applyProductSheet = (parsed) => {
            if (!parsed) return;
            setProject(p => ({
              ...p,
              ...(parsed.o2Target ? { o2Target: parsed.o2Target } : {}),
              ...(parsed.co2Target ? { co2Target: parsed.co2Target } : {}),
              ...(parsed.tempCritical ? { tempMin: parsed.tempCritical } : {}),
              ...(parsed.o2Acp ? { acpO2: parsed.o2Acp } : {}),
              defectsMatrix: parsed.defects && parsed.defects.length > 0 ? parsed.defects : (p.defectsMatrix || [])
            }));
          };

          // File / drag-drop handlers for product sheets.
          const handleProductSheetFile = (file) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              // Use the currently-active UI language so the matrix is
              // imported in the same language the user is working in.
              const parsed = parseProductSheet(ev.target?.result || '', lang);
              if (parsed.defects.length === 0 && !parsed.o2Target && !parsed.co2Target && !parsed.tempCritical) {
                alert(pt.productSheetParseFail || 'Could not parse this product sheet.');
                return;
              }
              applyProductSheet(parsed);
            };
            reader.onerror = () => alert(pt.productSheetParseFail || 'Could not read this product sheet.');
            reader.readAsText(file);
          };
          const [productSheetDragOver, setProductSheetDragOver] = useState(false);
          const handleProductSheetDrop = (e) => {
            e.preventDefault();
            setProductSheetDragOver(false);
            const file = e.dataTransfer?.files?.[0];
            if (file) handleProductSheetFile(file);
          };

          const removeDefectRow = (rowId) => setProject(p => ({
            ...p,
            defectsMatrix: (p.defectsMatrix || []).filter(r => r.id !== rowId)
          }));
          const updateDefectRow = (rowId, field, value) => setProject(p => ({
            ...p,
            defectsMatrix: (p.defectsMatrix || []).map(r => r.id === rowId ? { ...r, [field]: value } : r)
          }));

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Group Handling
          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            
            setGroups([...groups, { 
                id: newId, 
                name: `Variant ${groups.length + 1}`, 
                specs: { 
                    ...groups[0].specs,
                    packaging: (project.packagings?.[0]?.packagingType || project.packagingType || 'Retail'),
                    material: (project.packagings?.[0]?.material || project.material || ''),
                    length: (project.packagings?.[0]?.length || project.length || ''),
                    width: (project.packagings?.[0]?.width || project.width || ''),
                    height: (project.packagings?.[0]?.height || project.height || ''),
                    startWeight: (project.packagings?.[0]?.startWeight || project.startWeight || groups[0]?.specs?.startWeight || '')
                }, 
                measurements: groups[0].measurements.map(m => ({ day: m.day, measure: [], open: [], evaluate: [] })),
                predictedImage: null
            }]);
            setActiveGroupId(newId);
          };

          const duplicateGroup = (id) => { 
            const org = groups.find(g => g.id === id); 
            const newId = Math.max(...groups.map(g => g.id), 0) + 1; 
            setGroups(p => [...p, { 
              ...org, 
              id: newId, 
              name: `${org.name} (Copy)`,
              measurements: org.measurements.map(m => ({...m}))
            }]); 
            setActiveGroupId(newId); 
          };
          
          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                setGroups(p => {
                    const newGroups = p.filter(g => g.id !== id);
                    if (activeGroupId === id) setActiveGroupId(newGroups[0].id);
                    return newGroups;
                });
            }
          };

          // FIX v2.0: moveGroup was missing — caused crash when clicking variant up/down arrows
          const moveGroup = (id, direction) => {
            setGroups(prev => {
              const idx = prev.findIndex(g => g.id === id);
              if (idx < 0) return prev;
              const newArr = [...prev];
              if (direction === 'up' && idx > 0) {
                [newArr[idx], newArr[idx - 1]] = [newArr[idx - 1], newArr[idx]];
              } else if (direction === 'down' && idx < newArr.length - 1) {
                [newArr[idx], newArr[idx + 1]] = [newArr[idx + 1], newArr[idx]];
              }
              return newArr;
            });
          };

          // Timeline Events Handling
          //
          // Identity is by INDEX, not by day-value. Day-value identity is broken
          // for two reasons:
          //   1. While the user is mid-typing, two cards can briefly share the
          //      same value (e.g. "2" before "21"), collapsing into one row.
          //   2. Auto-sorting on every keystroke would shuffle the array under
          //      the cursor: typing "2" into card 3 (was day 15) reorders to
          //      [0, 2, 14] and the input the user is in now displays "14".
          // Sorting happens only on commit (add) and at consumption sites
          // (preview / report), never during typing.
          const addEvaluationDay = (groupId) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const numericDays = (g.measurements || [])
                      .map(m => parseFloat(m.day))
                      .filter(d => !isNaN(d));
                  const lastDay = numericDays.length > 0 ? Math.max(...numericDays) : 0;

                  return {
                      ...g,
                      // Sort once after appending so the freshly added card sits
                      // chronologically at first; subsequent edits do NOT re-sort.
                      measurements: [...(g.measurements || []), {
                          day: lastDay + 1,
                          measure: [],
                          open: [],
                          evaluate: []
                      }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const removeEvaluationDay = (groupId, indexToRemove) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).filter((_, i) => i !== indexToRemove)
                  };
              }));
          };

          const updateEvaluationDay = (groupId, indexToUpdate, newDayValue) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      // Keep the raw input string in state so empty / partial
                      // values (e.g. "" while clearing the field) round-trip
                      // without being coerced to 0. Consumers parseFloat().
                      measurements: (g.measurements || []).map((m, i) =>
                          i === indexToUpdate ? { ...m, day: newDayValue } : m
                      )
                  };
              }));
          };

          const toggleEvent = (groupId, day, field, sampleNum) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const newM = g.measurements.map(m => {
                      if (parseFloat(m.day) === parseFloat(day)) {
                          const arr = m[field] || [];
                          const newArr = arr.includes(sampleNum) ? arr.filter(x => x !== sampleNum) : [...arr, sampleNum].sort((a,b)=>a-b);
                          return { ...m, [field]: newArr };
                      }
                      return m;
                  });
                  return { ...g, measurements: newM };
              }));
          };

          if (isPreview) {
            return <PrintPreview clientInfo={clientInfo} project={project} groups={groups} proposal={proposal} supplyChain={supplyChain} lang={lang} unitSystem={unitSystem} onBack={() => setIsPreview(false)} />;
          }

          // --- EDITOR VIEW ---
          return (
            <div className="min-h-screen pb-20 font-sans text-slate-800">
              
              {pendingImageReplace && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-orange-500 transform transition-all">
                     <div className="flex items-center gap-4 mb-6 text-orange-600 bg-orange-50 p-4 rounded-xl">
                        <AlertTriangle size={28} />
                        <h3 className="font-extrabold text-xl">{pt.warning}</h3>
                     </div>
                     <p className="mb-8 text-base text-slate-700 leading-relaxed">{pt.warningText}</p>
                     <div className="flex justify-end gap-3">
                       <button onClick={() => setPendingImageReplace(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">{pt.cancel}</button>
                       <button onClick={confirmReplaceImage} className="px-6 py-3 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-bold shadow-lg shadow-orange-200 transition">{pt.overwrite}</button>
                     </div>
                  </div>
                </div>
              )}

              {/* === PRODUCT SELECTION MODAL ===
               * Shown when an intake JSON contains more than one product. The
               * user picks which product to load into this proposal; the
               * selected product is then passed to loadIntakeProduct().
               */}
              {pendingProductSelection && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-2xl w-full border-t-8 transform transition-all max-h-[90vh] flex flex-col" style={{ borderColor: BRAND.colors.green }}>
                     <div className="flex items-start justify-between gap-4 mb-6">
                        <div className="flex items-center gap-4">
                           <div className="p-3 bg-green-50 rounded-xl shrink-0">
                              <Package size={28} color={BRAND.colors.green} />
                           </div>
                           <div>
                              <h3 className="font-extrabold text-xl text-slate-800 tracking-tight">{pt.selectProductTitle}</h3>
                              <p className="text-sm text-slate-500 mt-1 leading-relaxed">{pt.selectProductDesc}</p>
                           </div>
                        </div>
                        <button onClick={() => setPendingProductSelection(null)} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition shrink-0" title={pt.cancel}>
                          <X size={20}/>
                        </button>
                     </div>
                     <p className="text-xs font-bold tracking-wide text-slate-500 uppercase mb-3">{pt.selectProductHint}</p>
                     <div className="space-y-3 overflow-y-auto pr-1 -mr-1">
                       {pendingProductSelection.products.map((p, idx) => {
                         const name = p?.name || pt.noProductName;
                         const meta = [p?.type, p?.origin, p?.processingType].filter(Boolean).join(' • ');
                         return (
                           <button
                             key={idx}
                             type="button"
                             onClick={() => confirmProductSelection(idx)}
                             className="w-full text-left p-5 bg-slate-50 hover:bg-green-50 border-2 border-slate-200 hover:border-green-400 rounded-2xl transition-all flex items-center gap-4 group shadow-sm hover:shadow-md"
                           >
                             {p?.photo ? (
                               <img src={p.photo} alt="" className="w-14 h-14 rounded-xl object-cover border border-slate-200 shrink-0"/>
                             ) : (
                               <div className="w-14 h-14 rounded-xl bg-white border border-slate-200 flex items-center justify-center shrink-0">
                                 <Package size={22} className="text-slate-300" />
                               </div>
                             )}
                             <div className="flex-1 min-w-0">
                                <div className="text-[10px] font-bold tracking-widest text-slate-400 uppercase">{pt.productLabel} {idx + 1}</div>
                                <div className="font-extrabold text-base text-slate-800 truncate">{name}</div>
                                {meta && <div className="text-xs text-slate-500 mt-0.5 truncate">{meta}</div>}
                             </div>
                             <ChevronRight size={20} className="text-slate-400 group-hover:text-green-600 shrink-0 transition-colors"/>
                           </button>
                         );
                       })}
                     </div>
                     <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
                       <button onClick={() => setPendingProductSelection(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">{pt.cancel}</button>
                     </div>
                  </div>
                </div>
              )}
              
              {/* HEADER */}
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-3 md:gap-4">
                  {/* LEFT: Logo + Home */}
                  <div className="flex items-center gap-2 md:gap-3 shrink-0">
                    <img src={BRAND.logos.default} alt="PerfoTec" className="h-7 md:h-9 object-contain" />
                    <a href="index.html" className="bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-800 p-2 xl:px-3 xl:py-2 rounded-lg text-xs font-bold transition-all border border-slate-200 flex items-center gap-1.5 whitespace-nowrap" title={pt.home}>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" /></svg>
                      <span className="hidden xl:inline">{pt.home}</span>
                    </a>
                  </div>

                  {/* CENTER: Title — dedicated space, visible from md */}
                  <div className="hidden md:flex flex-1 min-w-0 border-l-2 border-slate-200 pl-3 md:pl-4">
                    <div className="min-w-0">
                      <h1 className="font-extrabold text-base md:text-lg lg:text-xl xl:text-2xl tracking-tight leading-tight truncate" style={{color: BRAND.colors.blue}}>PerfoTec Manager</h1>
                      <p className="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-widest mt-0.5 truncate">PROPOSAL TOOL</p>
                    </div>
                  </div>

                  {/* SPACER for mobile when title is hidden */}
                  <div className="md:hidden flex-1"></div>

                  {/* RIGHT: Action buttons + Language selector (lang always rightmost) */}
                  <div className="flex items-center gap-1.5 md:gap-2 xl:gap-3 shrink-0">
                    <label className="cursor-pointer bg-white border border-slate-300 text-slate-700 p-2 lg:pr-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm" title={pt.loadJson}>
                      <FolderOpen size={18} className="text-blue-600 shrink-0"/>
                      <span className="hidden lg:flex flex-col items-start leading-[1.05] text-[10px] uppercase tracking-tight">
                        {(pt.loadJson || '').split(' ').map((w, i) => <span key={i} className={i === 0 ? '' : 'opacity-60 font-medium'}>{w}</span>)}
                      </span>
                      <input type="file" accept=".json" className="hidden" onChange={importData} ref={fileInputRef} />
                    </label>
                    <button onClick={exportData} className="bg-white border border-slate-300 text-slate-700 p-2 lg:pr-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm" title={pt.saveAs}>
                      <Save size={18} className="text-green-600 shrink-0"/>
                      <span className="hidden lg:flex flex-col items-start leading-[1.05] text-[10px] uppercase tracking-tight">

                    </button>
                    <button onClick={() => { if(!clientInfo.companyName) alert(pt.warningFillCompany); setIsPreview(true); }} className="bg-blue-600 text-white p-2 lg:pr-3 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-md hover:shadow-blue-500/30" title={pt.previewProposal}>
                      <FileText size={18} className="shrink-0"/>

                        {(pt.previewProposal || '').split(' ').map((w, i) => <span key={i} className={i === 0 ? '' : 'opacity-80 font-medium'}>{w}</span>)}
                      </span>
                    </button>

                    <div className="h-8 border-l border-slate-300 mx-1 hidden lg:block"></div>

                    <div className="lang-selector" role="radiogroup" aria-label="Language">
                      {(globalConfig.LANGUAGES || [{code:'en',label:'EN'},{code:'nl',label:'NL'},{code:'es',label:'ES'}]).map(l => (
                        <button key={l.code} type="button" role="radio" aria-checked={lang === l.code} className={`lang-btn ${lang === l.code ? 'active' : ''}`} onClick={() => { setLang(l.code); if (globalConfig.setLanguage) globalConfig.setLanguage(l.code); document.documentElement.lang = l.code; }}>
                          {l.label}
                        </button>
                      ))}

                </div>
              </header>

              <main className="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
                <div className="col-span-1 md:col-span-12 flex flex-wrap gap-2 border-b border-slate-200 pb-1 mb-2">
                  {['setup', 'groups', 'proposal'].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 sm:px-8 py-3.5 font-bold rounded-t-xl transition-all flex items-center gap-2 ${activeTab === tab ? 'text-white shadow-sm transform scale-105 origin-bottom' : 'bg-white text-slate-500 hover:bg-slate-100 border border-b-0 border-slate-200'}`} style={{ backgroundColor: activeTab === tab ? BRAND.colors.green : undefined }}>
                      {tab === 'setup' && <Settings size={18}/>}{tab === 'groups' && <Package size={18}/>}{tab === 'proposal' && <FileText size={18}/>}
                      {tab === 'proposal' ? pt.tabTexts : tab === 'groups' ? pt.tabGroups : pt.tabSetup}
                    </button>
                  ))}
                </div>

                {/* 1. SETUP TAB — mirrors Intake's 3-part layout (Project / Company / Product A-B-C) */}
                {activeTab === 'setup' && (
                  <div className="col-span-1 md:col-span-12 space-y-10 max-w-5xl mx-auto w-full">



                    {/* ========== DEEL 1 — PROJECT DETAILS ========== */}
                    <section className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                       <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.green }}></div>
                       <div className="flex items-center justify-between border-b-2 border-slate-100 pb-6 mb-8">
                         <div className="flex items-center gap-4">
                           <div className="p-3 bg-green-50 rounded-xl">
                             <ClipboardList size={28} color={BRAND.colors.green} />
                           </div>
                           <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{pt.secProject}</h2>
                         </div>
                       </div>
                       {/* lg:items-start keeps the left column at its natural
                           height so form rows don't stretch to match the two
                           stacked upload tiles on the right. */}
                       <div className="grid grid-cols-1 lg:grid-cols-3 gap-10 lg:items-start">
                         <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4 content-start">
                           <div className="sm:col-span-2"><label className={labelClass}>{pt.projectName}</label><input type="text" className={`${inputClass} text-lg font-bold`} value={project.reportTitle || ''} onChange={e => handleProjectChange('reportTitle', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.proposalDate}</label><input type="date" className={inputClass} value={project.date || ''} onChange={e => handleProjectChange('date', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.packingDate} <span className="text-red-500">*</span></label><input type="date" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.packingDate || ''} onChange={e => handleProjectChange('packingDate', e.target.value)} /></div>
                           <div><label className={labelClass}>{pt.totalDuration} <span className="text-red-500">*</span></label><input type="number" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.totalDuration || ''} onChange={handleDurationChange} placeholder="e.g. 10" /></div>
                           <div><label className={labelClass}>{pt.retailSim}</label><input type="number" className={`${inputClass} bg-blue-50 focus:bg-white`} value={project.retailOpenDays || ''} onChange={e => handleProjectChange('retailOpenDays', e.target.value)} placeholder="e.g. 7" /></div>
                         </div>
                         {/* Image uploads stacked vertically; each tile matches
                             the Deel 2 client-logo size (w-full max-w-[240px] aspect-square).
                             Fields bind to canonical names (project.logo / project.coverImage)
                             so JSON import/export round-trips correctly. */}
                         <div className="flex flex-col gap-6 lg:items-center w-full">
                            <div className="flex flex-col gap-3 lg:items-center w-full">
                               <label className={labelClass}>{pt.uploadPerfoTecLogo}</label>
                               <label className="border-2 border-dashed border-slate-300 rounded-2xl w-full max-w-[240px] aspect-square flex flex-col items-center justify-center text-center bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all cursor-pointer relative overflow-hidden shadow-sm group mt-1">
                                  <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => handleImgUpload(e, 'logo')} />
                                  {project.logo ? (
                                    <img src={project.logo} className="w-full h-full object-contain p-4 group-hover:scale-105 transition-transform" />
                                  ) : (
                                    <div className="p-6 flex flex-col items-center">
                                      <div className="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:shadow-md transition-all">
                                        <Upload size={32} className="text-blue-500" />
                                      </div>
                                      <span className="font-bold text-sm text-slate-700 block">{pt.clickUpload}</span>
                                    </div>
                                  )}
                               </label>
                            </div>

                            <div className="flex flex-col gap-3 lg:items-center w-full">
                               <label className={labelClass}>{pt.coverPhoto}</label>
                               <label className="border-2 border-dashed border-slate-300 rounded-2xl w-full max-w-[240px] aspect-square flex flex-col items-center justify-center text-center bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all cursor-pointer relative overflow-hidden shadow-sm group mt-1">
                                  <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => handleImgUpload(e, 'coverImage')} />

                                     <option value="MHP">{pt.optMHP}</option>
                                     <option value="Open">{pt.optOpen}</option>
                                   </select></div>
                                 </div>
                                 
                                 <div className="bg-gradient-to-br from-slate-50 to-slate-100 p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                   <label className="block mb-6 text-sm font-extrabold tracking-widest text-blue-900 uppercase border-b border-blue-200 pb-2">{pt.packagingSpecs}</label>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6">
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">{pt.lengthMm}</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.length || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'length', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">{pt.widthMm}</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.width || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'width', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">{pt.heightMm}</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.height || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'height', e.target.value)} /></div>
                                   </div>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">{pt.material}</label><input className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.material || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'material', e.target.value)} /></div>
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">{pt.transmissionValue}</label><input type="text" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.holes || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'holes', e.target.value)} /></div>
                                     <div><label className="text-xs text-blue-700 font-extrabold uppercase tracking-wider mb-2 block">{pt.samplesPerMeasurement}</label><input type="number" min="1" className={`${inputClass} bg-white border-blue-300 ring-2 ring-blue-50 font-extrabold text-blue-900 text-lg`} value={groups.find(g => g.id === activeGroupId).specs.sampleCount || 3} onChange={(e) => handleSampleCountChange(activeGroupId, parseInt(e.target.value))} /></div>
                                   </div>
                                 </div>
                               </div>

                               <div className="bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                    <div className="flex flex-col mb-6">
                                      <h4 className="font-extrabold text-xl text-slate-800 mb-1">{pt.timelineEvents}</h4>
                                      <p className="text-sm text-slate-500">{pt.timelineDesc}</p>
                                    </div>
                                    <div className="overflow-x-auto rounded-xl border border-slate-200">
                                      <table className="w-full text-sm bg-white">
                                        <thead className="bg-slate-100 border-b border-slate-200">
                                          <tr className="text-left text-slate-600 uppercase tracking-wider text-[10px] font-bold">
                                            <th className="p-4 w-20 text-center">{pt.thDay}</th>
                                            <th className="p-4 border-l border-slate-200">
                                              {(groups.find(g => g.id === activeGroupId).specs.atmosphereStrategy || 'MAP') === 'MAP' ? pt.thMeasure : pt.thMeasureWeight}
                                            </th>
                                            <th className="p-4 border-l border-slate-200 text-orange-700">{pt.thOpen}</th>
                                            <th className="p-4 border-l border-slate-200 text-green-700">{pt.thEvaluate}</th>
                                          </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                          {(groups.find(g => g.id === activeGroupId).measurements || []).map((m, idx, arr) => {
                                            const disabledForMeasure = [];
                                            arr.filter(prev => parseFloat(prev.day) < parseFloat(m.day)).forEach(prev => {
                                              disabledForMeasure.push(...(prev.open || []));
                                            });
                                            const sCount = groups.find(g => g.id === activeGroupId).specs.sampleCount || 3;

                                            return (
                                              <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-center font-extrabold text-slate-700 bg-slate-50/50">
                                                  P+{m.day}
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.measure||[]} disabled={disabledForMeasure} activeClass="bg-blue-500 border-blue-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'measure', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.open||[]} disabled={[]} activeClass="bg-orange-500 border-orange-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'open', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.evaluate||[]} disabled={[]} activeClass="bg-green-500 border-green-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'evaluate', s)} />
                                                </td>
                                              </tr>
                                            )
                                          })}
                                        </tbody>
                                      </table>
                                    </div>
                                    <div className="mt-4 text-sm font-medium text-slate-500 bg-white p-4 rounded-lg border border-slate-100 inline-flex items-start gap-3">
                                       <AlertCircle size={18} className="text-blue-400 shrink-0 mt-0.5" />
                                       <span>{pt.timelineNote}</span>
                                    </div>
                                 </div>

                                 {(groups.find(g => g.id === activeGroupId).specs.atmosphereStrategy || 'MAP') === 'MAP' && (
                                    <>
                                    <div className="border-2 border-dashed border-blue-200 bg-blue-50 rounded-2xl p-6 sm:p-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 shadow-sm">
                                       <div className="flex items-center gap-5">
                                          <div className="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center shrink-0">
                                             <LineChart size={28} className="text-blue-500" />
                                          </div>
                                          <div>
                                            <div className="font-extrabold text-lg text-blue-950 mb-1">{pt.predictedGraph}</div>
                                            <div className="text-sm font-medium text-blue-700">{pt.predictedGraphDesc}</div>
                                          </div>
                                       </div>
                                       <label className="cursor-pointer bg-white border border-blue-200 text-blue-700 px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-100 hover:border-blue-300 transition-all shrink-0 whitespace-nowrap shadow-sm">
                                          {pt.uploadImage}
                                          <input 
                                            type="file" 
                                            accept="image/*" 
                                            className="hidden" 
                                            onClick={(e) => {
                                               const g = groups.find(x => x.id === activeGroupId);
                                               if (g && g.predictedImage) {
                                                 e.preventDefault();
                                                 setPendingImageReplace({ groupId: activeGroupId, result: null });
                                               }
                                            }} 
                                            onChange={(e) => handlePredictedImageUpload(e, activeGroupId)} 
                                          />
                                       </label>
                                    </div>
                                    
                                    {groups.find(g => g.id === activeGroupId).predictedImage && (
                                       <div className="mt-6 border border-slate-200 rounded-2xl p-4 bg-white max-w-full relative group shadow-sm inline-block">
                                         <img src={groups.find(g => g.id === activeGroupId).predictedImage} className="max-h-[300px] w-auto object-contain rounded-xl" />
                                         <button onClick={() => removePredictedImage(activeGroupId)} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-red-600 hover:scale-110">
                                            <Trash2 size={16}/>
                                         </button>
                                       </div>
                                    )}
                                    </>
                                 )}
                             </>
                           )}
                        </div>
                    </div>
                  </div>
                )}

                {/* 3. PROPOSAL (Texts) */}
                {activeTab === 'proposal' && (
                  <div className="col-span-12 space-y-8 max-w-5xl mx-auto w-full">
                    <section className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-10">
                       <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.blue }}></div>
                       <div className="md:col-span-2 border-b-2 border-slate-100 pb-6 mb-2">
                          <div className="flex items-center gap-4">
                            <div className="p-3 bg-blue-50 rounded-xl">
                              <FileText size={28} color={BRAND.colors.blue}/>
                            </div>
                            <h2 className="text-2xl font-extrabold text-slate-800 tracking-tight">{pt.proposalEvalText}</h2>
                          </div>
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.introLabel}</label>
                          <RichTextEditor 
                             value={proposal.intro} 
                             onChange={(val) => setProposal(prev => ({...prev, intro: val}))} 
                             placeholder={pt.introPlaceholder}
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.goalsLabel}</label>
                          <RichTextEditor 
                             value={proposal.expectedOutcomes} 
                             onChange={(val) => setProposal(prev => ({...prev, expectedOutcomes: val}))} 
                             placeholder={pt.goalsPlaceholder}
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>{pt.requirementsLabel}</label>
                          <RichTextEditor 
                             value={proposal.requirements} 
                             onChange={(val) => setProposal(prev => ({...prev, requirements: val}))} 
                             placeholder={pt.requirementsPlaceholder}
                          />
                       </div>
                    </section>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
