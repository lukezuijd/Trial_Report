<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Voorstel Tool</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler for in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Voorstel Tool wordt geladen... Zorg ervoor dat 'style.css' en 'config.js' in dezelfde map staan.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // --- FIXED IMPORT LIST ---
        import { 
          Printer, FileText, Settings, Layout, CheckCircle, 
          ArrowRight, Copy, Trash2, Plus, Scale, Upload, Truck, 
          Thermometer, Clock, Image as ImageIcon, ChevronRight, 
          Save, FolderOpen, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown, 
          Bold, Italic, Underline, List, AlertTriangle, Package, PackagePlus,
          X, Edit3, Camera, FileArchive, LineChart, Globe, AlertCircle,
          Building2, Target, Beaker, Send, Mail
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        const PACKAGING_TYPES = globalConfig.PACKAGING_TYPES || ['Retail', 'Box/ Crate', 'Cube crate', 'Pallet', 'Punnets', 'Pillow Bag'];
        const TRANSPORT_MODES = globalConfig.TRANSPORT_MODES || ['Air Freight', 'Sea Freight', 'Road Transport', 'Storage'];

        const DEFAULT_CRITERIA = globalConfig.DEFAULT_CRITERIA || [
          'General Quality', 'Taste', 'Visual Appearance', 'Color',
          'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation',
          'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'
        ];

        const PERFOTEC_TECHNOLOGIES = [
          'Respiration Measurement (FRM)',
          'Laser Micro Perforation',
          'Laser Nano Perforation',
          'Gas Flush (O2 Control)',
          'CO2 Shock',
          'PerfoTec Retail Film',
          'PerfoTec Liner',
          'PerfoTec Pallet Cover'
        ];

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // --- HELPER CLASSES ---
        const inputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest') || n.includes('oogst')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea') || n.includes('zee')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air') || n.includes('lucht')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('opslag')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('winkel')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat') || n.includes('consument')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // --- COMPONENTS ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const ProductSupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] py-0.5 flex items-center justify-center leading-tight w-full break-words px-0.5">
                           {step.stage}
                         </div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, '°C')}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">Ingepakt</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">Geopend</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        const SampleToggles = ({ max, selected, disabled, onChange, activeClass }) => {
          const arr = Array.from({length: max}, (_, i) => i + 1);
          return (
            <div className="flex flex-wrap gap-1.5">
              {arr.map(s => {
                const isSel = selected.includes(s);
                const isDis = disabled.includes(s);
                return (
                  <button 
                    key={s}
                    type="button"
                    onClick={() => !isDis && onChange(s)}
                    disabled={isDis}
                    title={isDis ? "Sample is al geopend" : `Kies Sample ${s}`}
                    className={`w-7 h-7 flex items-center justify-center text-xs font-bold rounded-lg border transition-all ${
                      isDis ? 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed' :
                      isSel ? activeClass : 
                      'bg-white border-slate-300 text-slate-500 hover:bg-slate-50 hover:border-slate-400'
                    }`}
                  >
                    {s}
                  </button>
                )
              })}
            </div>
          )
        };

        // --- PRINT PREVIEW ---
        const PrintPreview = ({ clientInfo, project, groups, proposal, supplyChain, onBack }) => {
          let allTemps = [];
          (supplyChain || []).forEach(s => {
              const ts = parseFloat(s.tempStart); if(!isNaN(ts)) allTemps.push(ts);
              const te = parseFloat(s.tempEnd); if(!isNaN(te)) allTemps.push(te);
          });
          const minTemp = allTemps.length > 0 ? Math.min(...allTemps) : null;
          const maxTemp = allTemps.length > 0 ? Math.max(...allTemps) : null;
          const tempString = allTemps.length > 0 ? (minTemp === maxTemp ? `${minTemp}°C` : `${minTemp}°C - ${maxTemp}°C`) : '-°C';
          const totalDays = project.totalDuration || (supplyChain || []).reduce((acc,s) => acc + parseFloat(s.daysStart || 0), 0);

          // Reusable class for titles to ensure they stand out even if CSS fails
          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading break-after-avoid";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title><style>body { font-family: 'Arial', sans-serif; } .page-break { page-break-before: always; } table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #007C27; color: white; } img { max-width: 100%; height: auto; }</style></head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = (project.reportTitle || 'Voorstel') + '.doc';
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          return (
            <div className="min-h-screen bg-slate-600 p-0 sm:p-8 overflow-y-auto font-sans print:p-0 print:bg-white no-print-bg selection:bg-blue-200 selection:text-blue-900">
              <div className="fixed bottom-8 right-8 flex gap-4 no-print z-50">
                <button onClick={onBack} className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl font-bold transition hover:bg-slate-900 flex items-center gap-2"><Edit3 size={18}/> Bewerk</button>
                <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition">
                  <FileArchive size={20} /> Download Word
                </button>
                <button onClick={() => window.print()} className="bg-green-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-green-700 transition">
                  <Printer size={18} /> Download PDF
                </button>
              </div>

              <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0 text-slate-800">
                
                {/* --- COVER PAGE --- */}
                <div className="h-[27cm] flex flex-col justify-between items-center text-center pt-24">
                   <div className="w-full flex flex-col items-center">
                      <div className="flex justify-between items-start w-full px-8">
                          <div className="w-1/2 flex justify-start">
                            {project.logo && (
                               <img src={project.logo} alt="PerfoTec Logo" className="h-32 max-w-[400px] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                          <div className="w-1/2 flex justify-end">
                            {project.clientLogo && (
                               <img src={project.clientLogo} alt="Client Logo" className="h-32 max-w-[400px] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                      </div>

                      <h1 className="text-5xl font-bold uppercase mt-16 mb-4 brand-heading" style={{ color: BRAND.colors.green }}>{project.reportTitle || 'Test Voorstel'}</h1>
                      <h2 className="text-5xl font-light brand-heading text-slate-600 mb-16">{project.productName || '<Productnaam>'}</h2>
                      
                      <div className="w-full h-[450px] overflow-hidden flex items-center justify-center relative bg-transparent border-none mt-8 rounded-2xl">
                         {project.coverImage ? <img src={project.coverImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : project.startImage ? <img src={project.startImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : <span className="text-slate-300 italic font-medium">Geen Omslagfoto</span>}
                      </div>
                   </div>
                   <div className="w-full flex justify-center items-end pb-4">
                       <div className="text-sm text-slate-400 font-medium">© {new Date().getFullYear()} PerfoTec B.V.</div>
                   </div>
                </div>

                <div className="page-break"></div>

                {/* --- TABLE OF CONTENTS --- */}
                <div className="min-h-[27cm] flex flex-col pt-12">
                    <h2 className="text-4xl font-extrabold uppercase mb-8 brand-heading" style={{ color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '1rem' }}>Inhoudsopgave</h2>
                    <ul className="text-xl space-y-4 font-medium text-slate-700">
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>1. Introductie & Doelstellingen</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>2. Bedrijfs- & Projectinfo</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>3. Productkenmerken & Defectpreventie</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>4. Gesimuleerde Supply Chain</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>5. Voorgestelde Testopzet</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>6. Evaluatieplan</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>7. Benodigdheden & Afspraken</span></li>
                    </ul>
                </div>

                <div className="page-break"></div>

                {/* --- PAGE 1: INTRO & SETTING --- */}
                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>1. Introductie & Doelstellingen</h2>
                  <div className="text-base leading-relaxed text-justify text-slate-800 mb-8">
                     <div className="mb-6 whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal?.intro || '' }}></div>
                     
                     {project.currentChallenge && (
                       <div className="mb-6 bg-orange-50 p-5 rounded-2xl border border-orange-100">
                         <h4 className="font-bold text-lg mb-2 text-orange-800">Huidige Uitdaging:</h4>
                         <div className="whitespace-pre-wrap text-slate-700">{project.currentChallenge}</div>
                       </div>
                     )}

                     {project.trialTarget && (
                       <div className="mb-6 bg-green-50 p-5 rounded-2xl border border-green-100">
                         <h4 className="font-bold text-lg mb-2 text-green-800">Beoogd Doel:</h4>
                         <div className="whitespace-pre-wrap text-slate-700">{project.trialTarget}</div>
                       </div>
                     )}
                     
                     {proposal?.expectedOutcomes && (
                       <div className="mb-6">
                         <h4 className="font-bold text-lg mb-2" style={{color: BRAND.colors.blue}}>Verwachte Resultaten:</h4>
                         <div className="whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal.expectedOutcomes }}></div>
                       </div>
                     )}
                  </div>
                </div>

                <div className="page-break"></div>

                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>2. Bedrijfs- & Projectinfo</h2>
                  <div className="grid grid-cols-[180px_1fr] gap-y-3 text-base text-slate-800 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Product :</div> <div className="font-bold">{project.productName || '-'} {project.type ? `(${project.type})` : ''}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Staat van product :</div> <div className="font-medium">{project.processingType === 'Whole' ? 'Heel' : 'Verwerkt / Gesneden'}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Herkomst :</div> <div className="font-medium">{project.origin || '-'}</div>
                     
                     {(clientInfo.companyName || clientInfo.street || clientInfo.contactName || clientInfo.email || clientInfo.phone) && (
                       <div className="font-bold col-span-2 mt-4 border-t border-slate-200 pt-4 text-lg" style={{color: BRAND.colors.green}}>Bedrijfsgegevens</div>
                     )}
                     {clientInfo.companyName && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Bedrijfsnaam :</div> <div className="font-bold">{clientInfo.companyName}</div></>}
                     
                     {(() => {
                       const streetPart = [clientInfo.street, clientInfo.houseNumber].filter(Boolean).join(' ');
                       const cityPart = [clientInfo.zipCode, clientInfo.city].filter(Boolean).join(' ');
                       const addressStr = [streetPart, cityPart, clientInfo.country].filter(Boolean).join(', ');
                       return addressStr ? <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Adres :</div> <div className="font-medium">{addressStr}</div></> : null;
                     })()}

                     {clientInfo.contactName && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Contactpersoon :</div> <div className="font-medium">{clientInfo.contactName} {clientInfo.role && <span className="text-slate-500">({clientInfo.role})</span>}</div></>}
                     {(clientInfo.email || clientInfo.phone) && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Contactgegevens :</div> <div className="font-medium">{[clientInfo.email, clientInfo.phone].filter(Boolean).join(' | ')}</div></>}

                     <div className="font-bold col-span-2 mt-4 border-t border-slate-200 pt-4 text-lg" style={{color: BRAND.colors.green}}>PerfoTec Support</div>
                     {project.employee && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">PerfoTec Medewerker :</div> <div className="font-medium">{project.employee}</div></>}
                     {(project.employeeEmail || project.employeePhone) && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Contactgegevens :</div> <div className="font-medium">{[project.employeeEmail, project.employeePhone].filter(Boolean).join(' | ')}</div></>}
                     
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-start mt-1">Technologie :</div> 
                     <div className="font-medium">
                       {project.technologies && project.technologies.length > 0 ? (
                          <ul className="list-disc pl-4 space-y-1">
                            {project.technologies.map((t, i) => <li key={i}>{t}</li>)}
                          </ul>
                       ) : (
                          '-'
                       )}
                     </div>

            }));

            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;

              return { ...g, specs: { ...g.specs, sampleCount: c }};
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria?.includes(c) ? p.criteria.filter(x => x !== c) : [...(p.criteria||[]), c] }));
          const addNewCriteria = () => { if(newCriteria && !(project.criteria||[]).includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          const handleTransportModeToggle = (mode) => {
            setProject(p => ({ ...p, transportMode: p.transportMode === mode ? '' : mode }));

            setProject(p => ({

                technologies: p.technologies?.includes(tech) ? p.technologies.filter(t => t !== tech) : [...(p.technologies || []), tech]

          };

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Group Handling

            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            
            setGroups([...groups, { 
                id: newId, 
                name: `Variant ${groups.length + 1}`, 
                specs: { ...groups[0].specs },

            setActiveGroupId(newId);

          const duplicateGroup = (id) => { 
            const org = groups.find(g => g.id === id); 
            const newId = Math.max(...groups.map(g => g.id), 0) + 1; 
            setGroups(p => [...p, { 
              ...org, 
              id: newId, 
              name: `${org.name} (Kopie)`,
              measurements: org.measurements.map(m => ({...m}))
            }]); 
            setActiveGroupId(newId); 
          };
          
          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                setGroups(p => {
                    const newGroups = p.filter(g => g.id !== id);
                    if (activeGroupId === id) setActiveGroupId(newGroups[0].id);
                    return newGroups;
                });
            }
          };

          // Timeline Events Handling
          const addEvaluationDay = (groupId) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const lastDay = g.measurements?.length > 0 ? Math.max(...g.measurements.map(m => parseFloat(m.day))) : 0;
                  
                  return {
                      ...g,
                      measurements: [...(g.measurements || []), { 
                          day: lastDay + 1,
                          measure: [],
                          open: [],
                          evaluate: []
                      }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const removeEvaluationDay = (groupId, dayToRemove) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).filter(m => parseFloat(m.day) !== parseFloat(dayToRemove))
                  };
              }));
          };
          
          const updateEvaluationDay = (groupId, oldDay, newDayValue) => {
              const newD = parseFloat(newDayValue) || 0;
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).map(m => parseFloat(m.day) === parseFloat(oldDay) ? { ...m, day: newD } : m).sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

                          return { ...m, [field]: newArr };
                      }
                      return m;
                  });
                  return { ...g, measurements: newM };

                {activeTab === 'proposal' && (
                  <div className="col-span-12 space-y-8">
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-10">
                       <div className="md:col-span-2 border-b-2 border-slate-100 pb-4">
                          <h2 className="font-extrabold text-2xl text-slate-800 flex items-center gap-3">
                             <FileText className="text-blue-600" size={28}/>
                             Voorstel & Evaluatie Teksten
                          </h2>
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Introductie / Huidige Uitdaging</label>
                          <RichTextEditor 
                             value={proposal.intro} 
                             onChange={(val) => setProposal(prev => ({...prev, intro: val}))} 
                             placeholder="Beschrijf de uitdaging en waarom we deze test uitvoeren..."
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Doelen / Verwachte Resultaten</label>
                          <RichTextEditor 
                             value={proposal.expectedOutcomes} 
                             onChange={(val) => setProposal(prev => ({...prev, expectedOutcomes: val}))} 
                             placeholder="Wat hopen we te bereiken met deze test?"
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Benodigdheden & Afspraken</label>
                          <RichTextEditor 
                             value={proposal.requirements} 
                             onChange={(val) => setProposal(prev => ({...prev, requirements: val}))} 
                             placeholder="Wat moet de klant aanleveren? Welke afspraken zijn er gemaakt?"
                          />
                       </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
