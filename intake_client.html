            companyName: "Nombre de la Empresa", street: "Calle", houseNumber: "Número", addressExtra: "Información adicional (piso, edificio, etc.)", zipCode: "Código Postal", city: "Ciudad", country: "País", website: "Sitio Web",
            contactName: "Nombre del Contacto", role: "Cargo", email: "Correo Electrónico", phoneDirect: "Teléfono (Directo)", phoneWork: "Teléfono (Trabajo)", addContactBtn: "Añadir Contacto",

            logoUpload: "Logotipo de la Empresa", clickUpload: "Haga clic para subir",

            secATitle: "A. Producto y Empaque", prodName: "Nombre del Producto", prodType: "Variedad / Tipo", origin: "Origen", prodPhoto: "Foto del Producto", processingType: "Estado del producto",
            whole: "Entero", processed: "Procesado / Cortado",
            maturity: "Etapa de madurez", treatment: "Tratamiento estándar",
            packType: "Tipo de Empaque", material: "Material Actual",
            dimens: "Dimensiones del empaque (Internas)", len: "Longitud", wid: "Ancho", widSeal: "Ancho del Sello", hei: "Altura",
            weight: "Peso Neto",
            addPackaging: '+ Añadir Envase', removePackaging: 'Eliminar', packaging: 'Envase',
            qualityCrit: "Criterios de calidad", qualityCritDesc: "Seleccione los aspectos a evaluar:",

            secCTitle: "C. Cadena de Suministro Actual", transportMode: "Transporte y Almacenamiento", transportModeErr: "Modo de transporte",
            airFreight: "Flete Aéreo", seaFreight: "Flete Marítimo", roadTransport: "Transporte Terrestre", storage: "Almacenamiento",

            validationErr: "No se han completado todos los campos obligatorios:", reqField: "es obligatorio", reqProd: "Producto",
            printTitle: "Resumen de Ingreso",

            successDesc: "Su solicitud ha sido enviada a PerfoTec. Nos pondremos en contacto pronto.",
            downloadFileBtn: "Descargar una copia (opcional)",
            closeBtn: "Cerrar", submitBtn: "Terminar y Enviar",
            sendingBtn: "Enviando...",
            sendError: "Algo salió mal. Inténtelo de nuevo o contacte a PerfoTec directamente.",
            fileSizeError: "Archivo demasiado grande. El tamaño máximo permitido es 2MB.",
            gdprText: "Acepto que PerfoTec procese los datos enviados para preparar una propuesta de prueba.",
            gdprLink: "Política de Privacidad",
            gdprRequired: "Acepte la política de privacidad antes de enviar.",
            removeStep: "Eliminar Paso",

            warnCompanyName: "¡Advertencia: Ingrese un nombre de empresa!",
            selectCriterion: "Seleccionar criterio estándar...",
            addBtn: "Añadir"
          }
        };

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Distribution Center', tempStart: '4', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // The supply-chain transport step is recognised by its stage label
        // (any language), never by its position — it stays a normal step that
        // can be moved or removed, and is renamed when a transport mode is chosen.
        const TRANSPORT_STAGE_LABELS = ['transport', 'transporte', 'transport by road', 'road transport', 'wegtransport', 'transporte terrestre', 'seafreight', 'sea freight', 'zeevracht', 'transporte marítimo', 'airfreight', 'air freight', 'luchtvracht', 'transporte aéreo', 'storage', 'opslag', 'almacenamiento'];
        const isTransportStage = (stage) => TRANSPORT_STAGE_LABELS.includes((stage || '').trim().toLowerCase());

        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('distribution')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('shop')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        // --- HELPER CLASSES ---
        const inputClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.input) || "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.label) || "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // Unit conversion — sourced from config (v2.1).
        // Note: config uses g <-> oz (matches UNIT_LABELS.imperial.weight = 'oz');
        // the previous local copy incorrectly used g <-> lb for non-bulk weight.
        const convertValue = globalConfig.convertValue
          ? globalConfig.convertValue.bind(globalConfig)
          : ((val) => val);

        // --- COMPONENT: PRODUCT SUPPLY CHAIN FLOW (Visualizer for PDF) ---
        const ProductSupplyChainFlow = ({ chain, unitSystem, t, lang }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;
          const isMetric = unitSystem === 'metric';
          const tempUnit = isMetric ? '°C' : '°F';
          const displayStage = (value) => {
            if (!value) return '-';
            if (globalConfig.translateLabel) return globalConfig.translateLabel(value, lang);
            return value;
          };

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden print:overflow-visible">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative min-h-[5.5rem]">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] flex items-center justify-center leading-tight w-full break-words px-0.5">{displayStage(step.stage)}</div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, tempUnit)}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap w-full text-center">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">{t.actPack}</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">{t.actUnpack}</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        // --- COMPONENT: PRINT VIEW ---
        const PrintPreview = ({ clientInfo, products, unitSystem, t, lang, onBack }) => {
          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading break-after-avoid";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          const isMetric = unitSystem === 'metric';

          const handlePdfExport = () => {
            const company = clientInfo.companyName || 'Client';
            const suggested = `PerfoTec_Intake_${company}`;
            if (globalConfig.printWithFilename) globalConfig.printWithFilename(suggested);
            else window.print();
          };

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title><style>body { font-family: 'Arial', sans-serif; } .page-break { page-break-before: always; } table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #007C27; color: white; } img { max-width: 100%; height: auto; }</style></head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = `Intake_${clientInfo.companyName || 'Client'}.doc`;
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          return (
             <div className="min-h-screen bg-slate-600 p-0 sm:p-8 overflow-y-auto print:overflow-visible print:h-auto print:min-h-0 print:block font-sans print:p-0 print:bg-white no-print-bg">
                <div className="fixed top-6 right-6 flex gap-4 no-print z-50">
                    <button onClick={onBack} className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-slate-900 transition"><Edit3 size={18}/> {t.back}</button>
                    <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-blue-700 transition"><FileArchive size={20} /> Download Word</button>
                    <button onClick={handlePdfExport} className="bg-green-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex items-center gap-2 hover:bg-green-700 transition"><Printer size={18}/> {t.print}</button>
                </div>

                <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0 text-slate-800">
                   
                   {/* HEADER */}
                   <div className="flex justify-between items-center border-b-4 pb-6 mb-10" style={{ borderColor: BRAND.colors.green }}>
                     <div>
                        {clientInfo.logo ? (
                          <img src={clientInfo.logo} className="h-16 object-contain" crossOrigin="anonymous" />
                        ) : (
                          <img src={BRAND.logos.default} className="h-16 object-contain" crossOrigin="anonymous" />
                        )}
                     </div>
                     <div className="text-right">
                       <h1 className="text-4xl font-bold uppercase brand-heading" style={{ color: BRAND.colors.blue }}>{t.printTitle}</h1>
                       <p className="text-sm font-bold text-slate-500 mt-1">{new Date().toLocaleDateString()}</p>
                     </div>
                   </div>

                   {/* CLIENT INFO */}
                   <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-10 break-inside-avoid text-sm">
                      <h2 className="font-bold text-xl mb-5 border-b border-slate-200 pb-3 text-slate-800 uppercase tracking-wide brand-heading">{t.sec1Title}</h2>
                      <div className="grid grid-cols-2 gap-y-6 gap-x-8">
                         <div>
                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">{t.companyName}</p>
                            <p className="font-bold text-slate-800 text-lg">{clientInfo.companyName || '-'}</p>
                            {clientInfo.website && <p className="text-blue-600 font-medium mt-1 text-xs">{clientInfo.website}</p>}
                         </div>
                         <div>
                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Address</p>
                            <p className="text-slate-700 text-base">{clientInfo.street} {clientInfo.houseNumber}</p>
                            {clientInfo.addressExtra && <p className="text-slate-700 text-base">{clientInfo.addressExtra}</p>}
                            <p className="text-slate-700 text-base">{clientInfo.zipCode} {clientInfo.city}, {clientInfo.country}</p>
                         </div>
                      </div>
                      
                      {clientInfo.contacts && clientInfo.contacts.length > 0 && (
                          <div className="mt-8">
                             <p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-2">Contacts</p>
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {clientInfo.contacts.map((contact, i) => (
                                    <div key={i} className="bg-white p-4 border border-slate-200 rounded-xl">
                                        <p className="font-bold text-slate-800 text-base">{contact.name || '-'} {contact.role && <span className="font-normal text-slate-500 text-sm ml-1">({contact.role})</span>}</p>
                                        <div className="mt-2 space-y-1">
                                            {contact.email && <p className="text-slate-600 text-sm flex items-center gap-2"><Mail size={14}/> {contact.email}</p>}
                                            {contact.phoneDirect && <p className="text-slate-600 text-sm flex items-center gap-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> {contact.phoneDirect} (Direct)</p>}
                                            {contact.phoneWork && <p className="text-slate-600 text-sm flex items-center gap-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg> {contact.phoneWork} (Work)</p>}
                                        </div>
                                    </div>
                                ))}
                             </div>
                          </div>
                      )}
                   </div>

                   {/* PRODUCTS */}
                   <div className="space-y-12">
                     {products.map((prod, idx) => {
                       const firstPkg = (prod.packagings && prod.packagings.length > 0) ? prod.packagings[0] : { packagingType: prod.packagingType };
                       const isLargeBulk = firstPkg.packagingType === 'Cube crate' || firstPkg.packagingType === 'Pallet';
                       const dimUnit = isLargeBulk ? (isMetric ? 'cm' : 'inch') : (isMetric ? 'mm' : 'inch');
                       const weightUnit = isLargeBulk ? (isMetric ? 'kg' : 'lbs') : (isMetric ? 'g' : 'lbs');

                       return (
                         <div key={prod.id} className="border border-slate-200 rounded-2xl p-8 print:p-3 mb-8 print:mb-2 break-inside-avoid bg-white">
                            {/* Top grid: [Title + Specifications stacked] (left) | [Photo] (right, full height) */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 print:grid-cols-3 gap-6 print:gap-3 mb-5 print:mb-2">
                               <div className="sm:col-span-2 print:col-span-2 flex flex-col gap-5 print:gap-2 min-w-0">
                                  {/* Title block */}
                                  <div className="border-b-2 border-slate-100 pb-4 print:pb-2">
                                     <h2 className="text-4xl print:text-2xl font-bold brand-heading" style={{ color: BRAND.colors.green }}>{prod.name || 'Unnamed Product'}</h2>
                                     <p className="text-slate-500 uppercase tracking-widest text-sm print:text-[10px] font-bold mt-2 print:mt-1 bg-slate-100 inline-block px-3 py-1 print:px-2 print:py-0.5 rounded">{prod.processingType === 'Whole' ? t.whole : t.processed}</p>
                                  </div>
                                  {/* Specifications block */}
                                  <div className="bg-slate-50 p-6 print:p-3 rounded-2xl border border-slate-200 flex-1">
                                     <h4 className="font-bold text-lg print:text-sm mb-4 print:mb-2" style={{color: BRAND.colors.blue}}>Specifications</h4>
                                     <div className="grid grid-cols-[130px_1fr] print:grid-cols-[110px_1fr] gap-y-2 print:gap-y-0.5 text-sm print:text-xs leading-snug print:leading-tight">
                                        <div className="font-bold text-slate-500">Variety :</div> <div>{prod.type || '-'}</div>
                                        <div className="font-bold text-slate-500">Origin :</div> <div>{prod.origin || '-'}</div>
                                        <div className="font-bold text-slate-500">Maturity :</div> <div>{prod.maturityStage || '-'}</div>
                                        <div className="font-bold text-slate-500">Treatment :</div> <div>{prod.postHarvestTreatment || '-'}</div>
                                        {(prod.packagings || [{ packagingType: prod.packagingType, material: prod.material, length: prod.length, width: prod.width, height: prod.height, weight: prod.weight }]).map((pkg, pkgIdx) => {
                                          const pkgB = pkg.packagingType === 'Cube crate' || pkg.packagingType === 'Pallet';
                                          const pkgDU = pkgB ? (isMetric ? 'cm' : 'inch') : (isMetric ? 'mm' : 'inch');
                                          const pkgWU = pkgB ? (isMetric ? 'kg' : 'lbs') : (isMetric ? 'g' : 'lbs');
                                          const multi = (prod.packagings || []).length > 1;
                                          return (
                                            <React.Fragment key={pkgIdx}>
                                              <div className="font-bold text-slate-500 mt-2 pt-2 print:mt-1 print:pt-1 border-t">{multi ? 'Packaging ' + (pkgIdx + 1) + ' :' : 'Packaging :'}</div>
                                              <div className="mt-2 pt-2 print:mt-1 print:pt-1 border-t">{pkg.packagingType || '-'} ({pkg.material || '-'})</div>
                                              <div className="font-bold text-slate-500">Dimensions :</div>
                                              <div>{pkg.length || '-'} x {pkg.width || '-'}{pkg.packagingType !== 'Pillow Bag' ? ' x ' + (pkg.height || '-') : ''} {pkgDU} · <span className="font-bold">{pkg.weight || '-'} {pkgWU}</span></div>
                                            </React.Fragment>
                                          );
                                        })}
                                     </div>
                                  </div>
                               </div>

                               {/* Photo: occupies full right column, matches height of title+specs */}
                               <div className="border border-slate-200 rounded-xl flex items-center justify-center bg-white p-2 print:p-1 shadow-sm overflow-hidden min-h-[55mm]">
                                  {prod.photo ? (
                                     <img src={prod.photo} className="max-w-full max-h-full object-contain rounded" crossOrigin="anonymous" />
                                  ) : (
                                     <div className="flex flex-col items-center text-slate-300">
                                        <ImageIcon size={28} className="mb-1 opacity-50"/>
                                        <span className="text-xs italic font-medium">No Photo</span>
                                     </div>
                                  )}
                               </div>
                            </div>

                            {/* Challenge + Goal side by side (print:grid-cols-2 forces 2 cols on print where md: breakpoint wouldn't trigger) */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 print:grid-cols-2 gap-6 print:gap-3 mb-5 print:mb-2">
                               <div className="bg-orange-50 p-6 print:p-3 rounded-2xl border border-orange-100">
                                  <h4 className="font-bold text-lg print:text-sm mb-2 print:mb-1 text-orange-800 flex items-center gap-2"><AlertCircle size={18}/> {t.challenge}</h4>
                                  <div className="whitespace-pre-wrap text-sm print:text-xs text-slate-700 leading-snug print:leading-tight">{prod.currentChallenge || '-'}</div>
                               </div>
                               <div className="bg-green-50 p-6 print:p-3 rounded-2xl border border-green-100">
                                  <h4 className="font-bold text-lg print:text-sm mb-2 print:mb-1 text-green-800 flex items-center gap-2"><CheckCircle size={18}/> {t.goal}</h4>
                                  <div className="whitespace-pre-wrap text-sm print:text-xs text-slate-700 leading-snug print:leading-tight">{prod.trialTarget || '-'}</div>
                               </div>
                            </div>

                            {/* Supply chain (tightened padding) */}
                            <div className="break-inside-avoid bg-slate-50 p-6 print:p-3 rounded-2xl border border-slate-200 mb-5 print:mb-2">
                               <h4 className="font-bold text-lg print:text-sm mb-4 print:mb-2 text-slate-800 flex items-center gap-2"><Truck size={20} className="text-indigo-600"/> Supply Chain ({prod.transportMode || 'None'})</h4>
                               <ProductSupplyChainFlow chain={prod.supplyChain} unitSystem={unitSystem} t={t} lang={lang} />
                            </div>

                            {/* Quality criteria: compact 3-col grid on print */}
                            {prod.qualityCriteria && prod.qualityCriteria.length > 0 && (
                                <div className="break-inside-avoid bg-slate-50 p-6 print:p-3 rounded-2xl border border-slate-200">
                                   <h4 className="font-bold text-lg print:text-sm mb-3 print:mb-1 text-slate-800">Desired Quality Criteria</h4>
                                   <ul className="list-disc pl-5 print:pl-4 grid grid-cols-2 md:grid-cols-3 gap-x-4 print:gap-x-3 gap-y-1 print:gap-y-0 text-sm print:text-xs text-slate-700 leading-snug print:leading-tight">
                                     {prod.qualityCriteria.map((c, i) => <li key={i}>{c}</li>)}
                                   </ul>
                                </div>
                            )}
                         </div>
                       )
                     })}
                   </div>
                </div>
             </div>
          );
        };

        // --- MAIN APPLICATION (EDITOR) ---
        const App = () => {
          // v2.0: Dynamic language — no more separate files per language
          const getInitialLang = () => {
            if (globalConfig.getLanguage) return globalConfig.getLanguage();
            const saved = localStorage.getItem('perfotec_lang');
            if (saved && T[saved]) return saved;
            const browser = (navigator.language || '').substring(0, 2).toLowerCase();
            if (T[browser]) return browser;
            return 'en';
          };
          const [lang, setLang] = useState(getInitialLang);
          const t = T[lang] || T['en'];

          const [clientInfo, setClientInfo] = useState({
            companyName: '', street: '', houseNumber: '', addressExtra: '', zipCode: '', city: '', country: '', website: '',
            contacts: [{ id: 1, name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }],
            logo: null
          });

          const [unitSystem, setUnitSystem] = useState('metric'); // 'metric' or 'imperial'

          const initialProduct = {
            id: Date.now(), name: '', type: '', origin: '', processingType: 'Whole',
            maturityStage: '', postHarvestTreatment: '',
            packagings: [{ id: 1, packagingType: 'Punnets', material: '', length: '', width: '', height: '', weight: '' }],
            qualityCriteria: [], currentChallenge: '', trialTarget: '',
            transportMode: '', supplyChain: JSON.parse(JSON.stringify(DEFAULT_SUPPLY_CHAIN)).map(s => ({...s, stage: (globalConfig.translateLabel ? globalConfig.translateLabel(s.stage, lang) : s.stage)})), photo: null
          };

          const [products, setProducts] = useState([initialProduct]);
          const [newCriteria, setNewCriteria] = useState('');
          const [errors, setErrors] = useState([]);
          const [isSuccessModalOpen, setIsSuccessModalOpen] = useState(false);
          const [isSending, setIsSending] = useState(false);
          const [gdprAccepted, setGdprAccepted] = useState(false);
          const [isPreview, setIsPreview] = useState(false);
          const fileInputRef = useRef(null);

          // Re-translate supply-chain stage labels when the user switches UI language.
          // Only canonical stages (Farm / Harvest, Packing House, …) are remapped;
          // free-text entries entered by the user are preserved unchanged.
          useEffect(() => {
            if (!globalConfig.retranslateStage) return;
            setProducts(prev => prev.map(p => ({
              ...p,
              supplyChain: (p.supplyChain || []).map(step => ({
                ...step,
                stage: globalConfig.retranslateStage(step.stage, lang)
              }))
            })));
          }, [lang]);

          // --- HANDLERS UNIT TOGGLE ---
          const handleUnitToggle = (newSystem) => {
              if (newSystem === unitSystem) return;
              const toImperial = newSystem === 'imperial';

              setProducts(prevProds => prevProds.map(p => {
                  // Convert packagings dimensions and weight
                  const newPackagings = (p.packagings || []).map(pkg => {
                      const isBulk = pkg.packagingType === 'Cube crate' || pkg.packagingType === 'Pallet';
                      return {
                          ...pkg,
                          length: convertValue(pkg.length, 'length', isBulk, toImperial),
                          width:  convertValue(pkg.width,  'length', isBulk, toImperial),
                          height: convertValue(pkg.height, 'length', isBulk, toImperial),
                          weight: convertValue(pkg.weight, 'weight', isBulk, toImperial),
                      };
                  });

                  // Convert Supply Chain Temps
                  const newChain = p.supplyChain.map(step => ({
                      ...step,
                      tempStart: convertValue(step.tempStart, 'temp', false, toImperial),
                      tempEnd: convertValue(step.tempEnd, 'temp', false, toImperial)
                  }));

                  return {
                      ...p,
                      packagings: newPackagings,
                      supplyChain: newChain
                  };
              }));

              setUnitSystem(newSystem);
          };

          // --- HANDLERS CLIENT INFO ---
          const handleClientChange = (field, value) => {
            setClientInfo(prev => ({ ...prev, [field]: value }));
            if (errors.length > 0) setErrors([]); 
          };

          const handleContactChange = (id, field, value) => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: prev.contacts.map(c => c.id === id ? { ...c, [field]: value } : c)
             }));
             if (errors.length > 0) setErrors([]); 
          };

          const addContact = () => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: [...prev.contacts, { id: Date.now(), name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }]
             }));
          };

          const removeContact = (id) => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: prev.contacts.filter(c => c.id !== id)
             }));
          };

          const handleLogoUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              if (file.size > 2 * 1024 * 1024) { alert(t.fileSizeError); e.target.value = null; return; }
              const reader = new FileReader();
              reader.onloadend = () => handleClientChange('logo', reader.result);
              reader.readAsDataURL(file);
            }
          };

          // --- HANDLERS PRODUCTS ---
          const addProduct = () => {
            const newId = Date.now() + Math.random(); 
            setProducts([...products, { ...initialProduct, id: newId }]);
          };

          const removeProduct = (id) => {
            if (products.length > 1) {
                const newProds = products.filter(p => p.id !== id);
                setProducts(newProds);
            }
          };

          const handleProductChange = (id, field, value) => {
            setProducts(prev => prev.map(p => {
              if (p.id === id) {
                const updatedProduct = { ...p, [field]: value };
                
                // Smart Supply Chain Logic for Packaging Action
                if (field === 'packagingType') {
                  const bulkTypes = ['Box/ Crate', 'Cube crate', 'Pallet'];
                  const isBulk = bulkTypes.includes(value);
                  
                  updatedProduct.supplyChain = updatedProduct.supplyChain.map(step => {
                    const stageLower = step.stage.toLowerCase();
                    let newAction = step.action;
                    if (newAction === 'unpack') newAction = 'none';

                    if (stageLower.includes('packing') || stageLower.includes('verpak') || stageLower.includes('empaca')) {
                       newAction = 'pack';
                    } else if (stageLower.includes('distribution') || stageLower.includes('dc') || stageLower.includes('distribu')) {
                       if (isBulk) newAction = 'unpack';
                    } else if (stageLower.includes('consumer') || stageLower.includes('consum')) {
                       if (!isBulk) newAction = 'unpack';
                    }
                    return { ...step, action: newAction };
                  });
                }

                // Keep the supply-chain transport step in sync with the
                // selected transport mode (Air/Sea/Road/Storage).
                if (field === 'transportMode' && value) {
                  const newStage = getI18nLabel(TRANSPORT_MODES_I18N, value, lang);
                  const ti = updatedProduct.supplyChain.findIndex(s => isTransportStage(s.stage));
                  if (ti !== -1 && newStage) {
                    updatedProduct.supplyChain = updatedProduct.supplyChain.map((s, i) => i === ti ? { ...s, stage: newStage } : s);
                  }
                }
                return updatedProduct;
              }
              return p;
            }));

            if (errors.length > 0) setErrors([]);
          };

          const handlePackagingChange = (productId, pkgId, field, value) => {
            setProducts(prev => prev.map(p => p.id !== productId ? p : {
              ...p,
              packagings: p.packagings.map(pkg => pkg.id !== pkgId ? pkg : { ...pkg, [field]: value })
            }));
          };
          const addPackaging = (productId) => {
            setProducts(prev => prev.map(p => p.id !== productId ? p : {
              ...p,
              packagings: [...p.packagings, { id: p.packagings.length + 100, packagingType: 'Punnets', material: '', length: '', width: '', height: '', weight: '' }]
            }));
          };
          const removePackaging = (productId, pkgId) => {
            setProducts(prev => prev.map(p => p.id !== productId ? p : {
              ...p,
              packagings: p.packagings.filter(pkg => pkg.id !== pkgId)
            }));
          };

          const toggleCriteria = (productId, crit) => {
             setProducts(prev => prev.map(p => {
                if (p.id === productId) {
                   const exists = p.qualityCriteria.includes(crit);
                   const newCriteria = exists ? p.qualityCriteria.filter(c => c !== crit) : [...p.qualityCriteria, crit];
                   return { ...p, qualityCriteria: newCriteria };
                }
                return p;
             }));
          };

          const addNewCriteriaField = (productId) => { 
              if(newCriteria) { 
                  toggleCriteria(productId, newCriteria); 
                  setNewCriteria(''); 
              }
          };

          const handleProductPhotoUpload = (e, id) => {
            const file = e.target.files[0];
            if (file) {
              if (file.size > 2 * 1024 * 1024) { alert(t.fileSizeError); e.target.value = null; return; }
              const reader = new FileReader();
              reader.onloadend = () => handleProductChange(id, 'photo', reader.result);
              reader.readAsDataURL(file);
            }
          };

          // --- HANDLERS SUPPLY CHAIN ---
          const addChainStep = (productId) => {
            setProducts(prev => prev.map(p => p.id === productId ? { ...p, supplyChain: [...p.supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }] } : p));
          };
          const updateChainStep = (productId, index, field, value) => {
            setProducts(prev => prev.map(p => {
              if (p.id === productId) {
                const newChain = [...p.supplyChain]; newChain[index][field] = value; return { ...p, supplyChain: newChain };
              }
              return p;
            }));
            if (errors.length > 0) setErrors([]);
          };
          const removeChainStep = (productId, index) => {
            setProducts(prev => prev.map(p => p.id === productId ? { ...p, supplyChain: p.supplyChain.filter((_, i) => i !== index) } : p));
          };
          const moveChainStep = (productId, index, direction) => {
            setProducts(prev => prev.map(p => {
              if (p.id === productId) {
                const newChain = [...p.supplyChain];
                if (direction === 'up' && index > 0) { [newChain[index], newChain[index - 1]] = [newChain[index - 1], newChain[index]]; }
                else if (direction === 'down' && index < newChain.length - 1) { [newChain[index], newChain[index + 1]] = [newChain[index + 1], newChain[index]]; }
                return { ...p, supplyChain: newChain };
              }
              return p;
            }));
          };

          // --- VALIDATION & EXPORT ---
          const validateForm = () => {
            let newErrors = [];
            
            // Only Company Name and at least one Contact Person are mandatory now for address/company section
            if (!clientInfo.companyName.trim()) newErrors.push(`${t.companyName} ${t.reqField}`);
            
            clientInfo.contacts.forEach((c, idx) => {
               const cPrefix = clientInfo.contacts.length > 1 ? `Contact ${idx + 1}: ` : '';
               if (!c.name.trim()) newErrors.push(`${cPrefix}${t.contactName} ${t.reqField}`);
               if (!c.email.trim()) newErrors.push(`${cPrefix}${t.email} ${t.reqField}`);
            });

            products.forEach((p, idx) => {
              const prefix = `${t.reqProd} ${idx + 1} (${p.name || '?'}): `;
              if (!p.name.trim()) newErrors.push(`${prefix}${t.prodName} ${t.reqField}`);
              const firstPkg = p.packagings && p.packagings.length > 0 ? p.packagings[0] : {};
              if (!(firstPkg.material || '').toString().trim()) newErrors.push(`${prefix}${t.material} ${t.reqField}`);
              if (!(firstPkg.length || '').toString().trim()) newErrors.push(`${prefix}${t.len} ${t.reqField}`);
              if (!(firstPkg.width || '').toString().trim()) newErrors.push(`${prefix}${firstPkg.packagingType === 'Pillow Bag' ? t.widSeal : t.wid} ${t.reqField}`);
              if (firstPkg.packagingType !== 'Pillow Bag' && !(firstPkg.height || '').toString().trim()) newErrors.push(`${prefix}${t.hei} ${t.reqField}`);
              if (!(firstPkg.weight || '').toString().trim()) newErrors.push(`${prefix}${t.weight} ${t.reqField}`);
              if (!p.currentChallenge.trim()) newErrors.push(`${prefix}${t.challenge} ${t.reqField}`);
              if (!p.trialTarget.trim()) newErrors.push(`${prefix}${t.goal} ${t.reqField}`);
              if (!p.transportMode) newErrors.push(`${prefix}${t.transportModeErr} ${t.reqField}`);

              p.supplyChain.forEach((step, sIdx) => {
                 if (!step.stage.trim()) newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.phase} ${t.reqField}`);
                 if (step.tempStart === '') newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.temp} ${t.reqField}`);
                 if (step.daysStart === '') newErrors.push(`${prefix}${t.step} ${sIdx + 1} - ${t.days} ${t.reqField}`);
              });
            });

            setErrors(newErrors);
            return newErrors.length === 0;
          };

          const handleExportJSON = () => {
            // Ensure the canonical contacts[] array reflects the primary-contact
            // UI fields before export (round-trip safety).
            const normalizedClient = globalConfig.buildContactsArray
              ? { ...clientInfo, contacts: globalConfig.buildContactsArray(clientInfo) }
              : clientInfo;

            const exportData = {
              isPerfoTecIntake: true,
              schemaVersion: globalConfig.SCHEMA_VERSION || '2.1',
              appVersion: globalConfig.APP_VERSION || '',
              exportDate: new Date().toISOString(),
              language: lang,
              unitSystem: unitSystem,
              client: normalizedClient,
              products: products
            };

            // Automatically Generate Filename: Intake Form_[Company Name]_[ProductName1]_[ProductName2]
            const companyPart = clientInfo.companyName.trim() || 'Company';
            const productPart = products.map(p => p.name.trim()).filter(Boolean).join('_') || 'Products';
            const rawFilename = `Intake Form_${companyPart}_${productPart}`;
            const cleanFilename = rawFilename.replace(/[^a-zA-Z0-9_ -]/gi, '_').replace(/_+/g, '_') + '.json';

            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(exportData, cleanFilename);
            } else {
                const dataString = JSON.stringify(exportData, null, 2);
                const blob = new Blob([dataString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = cleanFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            // render it regardless of the field-name shape the JSON used.
            // Accepts both the canonical {name, role, email, phoneDirect,
            // phoneWork} shape and legacy aliases (`contactName`, `phone`).
            const normalizeContact = (c, idx) => {
              const raw = c && typeof c === 'object' ? c : {};
              const phoneFallback = raw.phone || '';
              return {
                id: raw.id != null ? raw.id : (Date.now() + idx),
                name:        (raw.name != null ? raw.name : (raw.contactName || '')) + '',
                role:        (raw.role || '') + '',
                email:       (raw.email || '') + '',
                phoneDirect: (raw.phoneDirect || phoneFallback || '') + '',
                phoneWork:   (raw.phoneWork || '') + ''
              };
            };

            const processData = (raw) => {
                // Run through the shared schema migration so legacy exports
                // (flat contact fields, targetGoal, missing schemaVersion) are
                // normalised to the canonical shape before use.
                const data = globalConfig.migrateSchema ? globalConfig.migrateSchema(raw) : raw;

                if(data.isPerfoTecIntake) {

                   // Strip any stale flat fields so the UI binds only to contacts[]
                   delete loadedClient.contactName; delete loadedClient.role;
                   delete loadedClient.email; delete loadedClient.phone;
                   delete loadedClient.phoneDirect; delete loadedClient.phoneWork;

                   // Normalise each contact and guarantee at least one entry so
                   // the multi-contact UI always renders something. Empty
                   // exports (e.g. when buildContactsArray returned []) get a
                   // fresh seed card here.
                   const rawContacts = Array.isArray(loadedClient.contacts) ? loadedClient.contacts : [];
                   const normContacts = rawContacts.map(normalizeContact);
                   loadedClient.contacts = normContacts.length > 0
                     ? normContacts
                     : [{ id: Date.now(), name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }];

                   // Merge into prev state so fields the JSON doesn't carry
                   // (e.g. an older export missing `addressExtra`) don't blank
                   // out the UI. Loaded fields still win for everything they
                   // do contain.
                   setClientInfo(prev => ({ ...prev, ...loadedClient }));
                   if(data.products && data.products.length > 0) {
                       const migrateProduct = (p) => {
                         if (!p.packagings) {
                           return { ...p, packagings: [{ id: 1, packagingType: p.packagingType || 'Punnets', material: p.material || '', length: p.length || '', width: p.width || '', height: p.height || '', weight: p.weight || '' }] };
                         }

                       };
                       setProducts(data.products.map(migrateProduct));

                   if(data.unitSystem) setUnitSystem(data.unitSystem);
                } else { alert(t.validationErr || "Invalid intake file."); }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => {
                    alert("Error loading JSON file.");

                const reader = new FileReader();
                reader.onload = (event) => {
                  try {
                    const data = JSON.parse(event.target.result);
                    processData(data);
                  } catch (err) { alert("Error loading JSON file."); }
                };
                reader.readAsText(file);
            }
            e.target.value = null;

                                      {prod.packagings.length > 1 && (
                                        <div className="flex items-center justify-between mb-3 border-b border-slate-200 pb-3">
                                          <span className="text-xs font-extrabold uppercase tracking-widest text-blue-800">
                                            {t.packaging || 'Packaging'} {pkgIdx + 1}
                                          </span>
                                          <button type="button" onClick={() => removePackaging(prod.id, pkg.id)}
                                            className="text-red-400 hover:text-red-600 text-xs font-bold flex items-center gap-1 bg-red-50 hover:bg-red-100 px-2 py-1 rounded-lg transition-colors">
                                            <X size={12}/> {t.removePackaging || 'Remove'}
                                          </button>
                                        </div>
                                      )}
                                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-4">
                                        <div>
                                          <label className={labelClass}>{t.packType} <span className="text-red-500">*</span></label>
                                          <select className={`${inputClass} cursor-pointer bg-white`} value={pkg.packagingType} onChange={e => handlePackagingChange(prod.id, pkg.id, 'packagingType', e.target.value)}>
                                            {PACKAGING_TYPES.map(type => <option key={type} value={type}>{getI18nLabel(PACKAGING_TYPES_I18N, type, lang)}</option>)}
                                          </select>
                                        </div>
                                        <div>
                                          <label className={labelClass}>{t.material} <span className="text-red-500">*</span></label>
                                          <input type="text" className={inputClass} value={pkg.material} onChange={e => handlePackagingChange(prod.id, pkg.id, 'material', e.target.value)} />
                                        </div>
                                      </div>
                                      <div>
                                        <label className="block mb-3 text-[10px] font-extrabold tracking-widest text-blue-800 uppercase border-b border-blue-200 pb-2">{t.dimens}</label>
                                        <div className={`grid gap-4 ${pkgIsPillow ? 'grid-cols-2 sm:grid-cols-3' : 'grid-cols-2 sm:grid-cols-4'}`}>
                                          <div>
                                            <label className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1.5 block">{t.len} <span className="text-red-500">*</span></label>
                                            <div className="relative">
                                              <input type="number" className={`${inputClass} pl-4 pr-12`} value={pkg.length} onChange={e => handlePackagingChange(prod.id, pkg.id, 'length', e.target.value)} />
                                              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">{pkgDimUnit}</span>
                                            </div>
                                          </div>
                                          <div>
                                            <label className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1.5 block">{pkgIsPillow ? t.widSeal : t.wid} <span className="text-red-500">*</span></label>
                                            <div className="relative">
                                              <input type="number" className={`${inputClass} pl-4 pr-12`} value={pkg.width} onChange={e => handlePackagingChange(prod.id, pkg.id, 'width', e.target.value)} />
                                              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">{pkgDimUnit}</span>
                                            </div>
                                          </div>
                                          {!pkgIsPillow && (
                                            <div>
                                              <label className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1.5 block">{t.hei} <span className="text-red-500">*</span></label>
                                              <div className="relative">
                                                <input type="number" className={`${inputClass} pl-4 pr-12`} value={pkg.height} onChange={e => handlePackagingChange(prod.id, pkg.id, 'height', e.target.value)} />
                                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">{pkgDimUnit}</span>
                                              </div>
                                            </div>
                                          )}
                                          <div>
                                            <label className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1.5 block">{t.weight || 'Net Weight'} <span className="text-red-500">*</span></label>
                                            <div className="relative">
                                              <input type="number" className={`${inputClass} pl-4 pr-12`} value={pkg.weight} onChange={e => handlePackagingChange(prod.id, pkg.id, 'weight', e.target.value)} />
                                              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">{pkgWgtUnit}</span>
                                            </div>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  );
                                })}
                                <button type="button" onClick={() => addPackaging(prod.id)}
                                  className="w-full py-3 rounded-xl border-2 border-dashed border-green-300 hover:border-green-500 bg-green-50/50 hover:bg-green-50 text-green-700 font-bold text-sm transition flex items-center justify-center gap-2">
                                  <Plus size={16}/> {t.addPackaging || '+ Add Packaging'}
                                </button>
                              </div>
                              
                              <div className="md:col-span-3 mt-4">
                                <label className="block mb-2 text-sm font-extrabold tracking-wide text-slate-800 uppercase flex items-center gap-2">
                                   <div className="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center"><Beaker size={16} className="text-blue-700"/></div>
                                   {t.qualityCrit}
                                </label>
                                <p className="text-sm text-slate-500 mb-4">{t.qualityCritDesc}</p>
                                <div className="flex flex-wrap gap-3">
                                   {DEFAULT_CRITERIA.map(crit => {
                                     const isSelected = prod.qualityCriteria && prod.qualityCriteria.includes(crit);
                                     return (
                                       <button
                                         key={crit}
                                         type="button"
                                         onClick={() => toggleCriteria(prod.id, crit)}
                                         className={`px-4 py-2.5 rounded-xl text-sm font-bold transition-all border shadow-sm flex items-center gap-2 ${isSelected ? 'bg-blue-50 text-blue-800 border-blue-400 ring-2 ring-blue-500/20 transform scale-[1.02]' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:border-slate-300'}`}
                                       >
                                         {getI18nLabel(DEFAULT_CRITERIA_I18N, crit, lang)} {isSelected && <CheckCircle size={16} className="text-blue-600" />}
                                       </button>
                                     )
                                   })}
                                </div>
                              </div>
                            </div>
                          </div>

                          {/* B. Goal & Challenge */}
                          <div>
                            <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-3">
                               <div className="w-8 h-8 rounded-lg bg-orange-100 flex items-center justify-center"><AlertCircle size={16} className="text-orange-700"/></div>
                               <h4 className="font-extrabold text-lg text-slate-800">{t.secBTitle}</h4>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                              <div>
                                <label className="block mb-3 text-xs font-bold tracking-wide text-orange-700 uppercase flex items-center gap-2"><AlertCircle size={16}/> {t.challenge} <span className="text-red-500">*</span></label>
                                <textarea rows="5" className={`${inputClass} resize-y focus:ring-orange-500 focus:border-orange-500`} value={prod.currentChallenge} onChange={e => handleProductChange(prod.id, 'currentChallenge', e.target.value)}></textarea>
                              </div>
                              <div>
                                <label className="block mb-3 text-xs font-bold tracking-wide text-green-700 uppercase flex items-center gap-2"><CheckCircle size={16}/> {t.goal} <span className="text-red-500">*</span></label>
                                <textarea rows="5" className={`${inputClass} resize-y focus:ring-green-500 focus:border-green-500`} value={prod.trialTarget} onChange={e => handleProductChange(prod.id, 'trialTarget', e.target.value)}></textarea>
                              </div>
                            </div>
                          </div>

                          {/* C. Supply Chain */}
                          <div>
                            <div className="flex items-center gap-3 mb-6 border-b border-slate-100 pb-3">
                               <div className="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center"><Truck size={16} className="text-indigo-700"/></div>
                               <h4 className="font-extrabold text-lg text-slate-800">{t.secCTitle}</h4>
                            </div>
                            
                            <div className="mb-8 bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100">
                              <label className="block mb-3 text-xs font-bold tracking-wide text-indigo-900 uppercase">{t.transportMode} <span className="text-red-500">*</span></label>
                              <div className="flex flex-wrap gap-4">
                                 {TRANSPORT_MODES.map(mode => {
                                    const modeKeys = { 'Air Freight': 'airFreight', 'Sea Freight': 'seaFreight', 'Road Transport': 'roadTransport', 'Storage': 'storage' };
                                    const isSelected = prod.transportMode === mode;
                                    return (
                                      <button 
                                        key={mode}
                                        type="button"
                                        onClick={() => handleProductChange(prod.id, 'transportMode', isSelected ? '' : mode)}
                                        className={`px-5 py-3 rounded-xl text-sm font-bold transition-all border shadow-sm flex items-center gap-2 ${isSelected ? 'bg-indigo-600 text-white border-indigo-700 ring-4 ring-indigo-600/20 transform scale-[1.02]' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}
                                      >
                                        {t[modeKeys[mode]]} {isSelected && <CheckCircle size={16} className="text-white" />}
                                      </button>
                                    )
                                 })}
                              </div>
                            </div>
                            
                            {/* --- PERFECT CSS GRID SUPPLY CHAIN FLOW --- */}
                            <div className="space-y-3">
                              <label className="block mb-2 text-xs font-bold tracking-wide text-slate-500 uppercase">Supply Chain Flow</label>
                              
                              {/* Desktop Header - CSS GRID */}
                              <div className="hidden lg:grid grid-cols-[80px_1fr_150px_150px_130px_40px] items-center gap-4 px-4 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                 <div>{t.step}</div>
                                 <div>{t.phase} <span className="text-red-500">*</span></div>
                                 <div className="text-center">{t.temp} <span className="text-red-500">*</span></div>
                                 <div className="text-center">{t.days} <span className="text-red-500">*</span></div>
                                 <div>{t.action}</div>
                                 <div></div>
                              </div>

                              {prod.supplyChain.map((step, idx) => {
                                 const tempUnit = unitSystem === 'metric' ? '°C' : '°F';
                                 return (
                                   <div key={idx} className="grid grid-cols-1 lg:grid-cols-[80px_1fr_150px_150px_130px_40px] items-start lg:items-center gap-4 bg-white hover:bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm transition-all group">
                                      
                                      {/* Step Controls (Up/Down + Number) */}
                                      <div className="flex items-center gap-2 justify-between lg:justify-start">
                                         <div className="flex lg:flex-col gap-1">
                                            <button type="button" onClick={() => moveChainStep(prod.id, idx, 'up')} disabled={idx === 0} className="p-1 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded disabled:opacity-30 transition-colors"><ChevronUp size={16}/></button>
                                            <button type="button" onClick={() => moveChainStep(prod.id, idx, 'down')} disabled={idx === prod.supplyChain.length - 1} className="p-1 text-slate-400 hover:bg-slate-200 hover:text-slate-700 rounded disabled:opacity-30 transition-colors"><ChevronDown size={16}/></button>
                                         </div>
                                         <div className="w-8 h-8 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold text-sm shadow-sm">
                                            {idx + 1}
                                         </div>
                                         {/* Mobile Delete */}
                                         <button type="button" onClick={() => removeChainStep(prod.id, idx)} className="lg:hidden p-2 text-red-500 hover:bg-red-50 rounded-lg">
                                            <Trash2 size={18}/>
                                         </button>
                                      </div>

                                      {/* Stage Input */}
                                      <div className="w-full">
                                         <label className="lg:hidden block mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">{t.phase} <span className="text-red-500">*</span></label>
                                         <input type="text" className={`${inputClass} py-2.5 font-bold w-full`} value={step.stage} onChange={e => updateChainStep(prod.id, idx, 'stage', e.target.value)} />
                                      </div>

                                      {/* Temp Block */}
                                      <div className="w-full">
                                         <label className="lg:hidden block mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">{t.temp} ({tempUnit}) <span className="text-red-500">*</span></label>
                                         <div className="flex items-center gap-1.5">
                                            <input type="number" className={`${narrowInputClass} w-full`} value={step.tempStart} placeholder="Min" onChange={e => updateChainStep(prod.id, idx, 'tempStart', e.target.value)} />
                                            <span className="text-slate-400 font-bold shrink-0">-</span>
                                            <input type="number" className={`${narrowInputClass} w-full`} value={step.tempEnd} placeholder="Max" onChange={e => updateChainStep(prod.id, idx, 'tempEnd', e.target.value)} />
                                         </div>
                                      </div>

                                      {/* Days Block */}
                                      <div className="w-full">
                                         <label className="lg:hidden block mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">{t.days} <span className="text-red-500">*</span></label>
                                         <div className="flex items-center gap-1.5">
                                            <input type="number" className={`${narrowInputClass} w-full`} value={step.daysStart} placeholder="Min" onChange={e => updateChainStep(prod.id, idx, 'daysStart', e.target.value)} />
                                            <span className="text-slate-400 font-bold shrink-0">-</span>
                                            <input type="number" className={`${narrowInputClass} w-full`} value={step.daysEnd} placeholder="Max" onChange={e => updateChainStep(prod.id, idx, 'daysEnd', e.target.value)} />
                                         </div>
                                      </div>

                                      {/* Action Block */}
                                      <div className="w-full">
                                         <label className="lg:hidden block mb-1 text-xs font-bold text-slate-500 uppercase tracking-widest">{t.action}</label>
                                         <select className={`${inputClass} py-2.5 font-bold px-2 w-full text-slate-700`} value={step.action} onChange={e => updateChainStep(prod.id, idx, 'action', e.target.value)}>
                                           <option value="none">{t.actNone}</option>
                                           <option value="pack" className="text-green-700">{t.actPack}</option>
                                           <option value="unpack" className="text-red-700">{t.actUnpack}</option>
                                         </select>
                                      </div>

                                      {/* Desktop Delete */}
                                      <div className="hidden lg:flex justify-center w-full">
                                         <button type="button" onClick={() => removeChainStep(prod.id, idx)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title={t.removeStep}>
                                           <Trash2 size={20}/>
                                         </button>
                                      </div>
                                   </div>
                                 )
                              })}
                              
                              <button type="button" onClick={() => addChainStep(prod.id)} className="w-full py-4 mt-4 border-2 border-dashed border-indigo-200 bg-indigo-50/50 hover:bg-indigo-100 text-indigo-700 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-sm">
                                <div className="bg-white p-1.5 rounded-lg shadow-sm"><Plus size={16} /></div> 
                                {t.addStep}
                              </button>
                            </div>
                          </div>

                        </div>
                      </section>
                    );
                  })}
                </div>

                {/* ADD NEW PRODUCT BUTTON */}
                <button 
                  type="button"
                  onClick={addProduct} 
                  className="w-full py-6 rounded-3xl font-extrabold border-4 border-dashed border-slate-300 text-xl transition-all flex flex-col items-center justify-center gap-3 bg-white/50 hover:bg-green-50 hover:border-green-400 hover:text-green-700 text-slate-500 shadow-sm hover:shadow-md group" 
                >
                  <div className="bg-white p-3 rounded-2xl shadow-sm group-hover:scale-110 transition-transform group-hover:bg-green-500 group-hover:text-white">
                     <Plus size={32} />
                  </div>
                  {t.addProd}
                </button>

                {/* GDPR CONSENT */}
                <div className="flex items-start gap-3 p-5 bg-slate-50 rounded-2xl border border-slate-200">
                  <input type="checkbox" id="gdpr-consent" checked={gdprAccepted} onChange={e => setGdprAccepted(e.target.checked)} className="mt-0.5 w-4 h-4 shrink-0 accent-green-600 cursor-pointer" />
                  <label htmlFor="gdpr-consent" className="text-sm text-slate-600 leading-relaxed cursor-pointer">
                    {t.gdprText}{' '}
                    <a href="https://www.perfotec.com/privacy-policy" target="_blank" rel="noopener noreferrer" className="underline text-blue-600 hover:text-blue-800">{t.gdprLink}</a>
                  </label>
                </div>

                {/* FINAL SUBMIT BUTTON */}
                <div className="pt-6 pb-20 flex justify-end">
                   <button type="button" onClick={handleSubmit} disabled={isSending} className="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 disabled:opacity-60 disabled:cursor-not-allowed text-white px-10 md:px-14 py-5 rounded-full font-extrabold text-xl shadow-xl shadow-green-500/40 transition-all flex items-center gap-4 transform hover:-translate-y-1 hover:shadow-green-500/60 ring-4 ring-green-500/20">
                      {isSending ? <><svg className="animate-spin w-7 h-7" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>{t.sendingBtn}</> : <><Send size={28} />{t.submitBtn}</>}
                   </button>
                </div>

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
