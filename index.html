<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Official Report Tool</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler voor in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #f8fafc; }
        
        .label { 
            display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; 
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; 
            font-family: 'Inter', sans-serif;
        }
        .input { 
            width: 100%; padding: 0.6rem; border: 1px solid #e2e8f0; 
            border-radius: 0.5rem; outline: none; transition: 0.2s; 
            font-size: 0.9rem; font-family: 'Inter', sans-serif; 
        }
        .input:focus { 
            border-color: #007C27; box-shadow: 0 0 0 3px rgba(0, 124, 39, 0.1); 
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=League+Spartan:wght@700&display=swap');
        .brand-heading { font-family: 'League Spartan', sans-serif; }
        .brand-body { font-family: 'Inter', sans-serif; }

        .rich-text-editor { min-height: 120px; }
        .rich-text-editor ul { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .rich-text-editor li { margin-bottom: 0.25rem; }
        .rich-text-editor b { font-weight: 700; }
        .rich-text-editor i { font-style: italic; }
        .rich-text-editor u { text-decoration: underline; }
        [contenteditable]:empty:before { content: attr(data-placeholder); color: #94a3b8; pointer-events: none; display: block; }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            #print-area { width: 100%; padding: 0; margin: 0; }
            .page-break { page-break-before: always; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            body * { visibility: hidden; }
            #print-content, #print-content * { visibility: visible; }
            #print-content { 
              position: absolute; left: 0; top: 0; width: 100%; 
              margin: 0; padding: 0; background: white; box-shadow: none; 
            }
            svg { break-inside: avoid; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        .report-section-title { 
            color: #007C27; font-family: 'League Spartan', sans-serif; 
            font-size: 1.5rem; font-weight: bold; border-bottom: 2px solid #E9E9E9; 
            padding-bottom: 0.5rem; margin-bottom: 1rem; margin-top: 2rem; 
        }
        .report-table th { background-color: #007C27; color: white; padding: 8px; text-align: left; font-family: 'League Spartan', sans-serif; }
        .report-table td { border-bottom: 1px solid #E9E9E9; padding: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
        
        .pdf-rich-text ul { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .pdf-rich-text li { margin-bottom: 0.25rem; }
        .pdf-rich-text b { font-weight: 700; }
        .pdf-rich-text i { font-style: italic; }
        .pdf-rich-text u { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Printer, FileText, Activity, Settings, Layout, MessageSquare, 
          CheckCircle, AlertTriangle, ArrowRight, Copy, Trash2, Plus, 
          Edit3, Scale, X, Upload, Truck, Thermometer, Clock, Camera, 
          ClipboardList, Image as ImageIcon, BarChart2, ChevronRight, 
          Save, Download, FolderOpen, LineChart, Tractor, Ship, Plane, 
          Warehouse, Store, Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown,
          Bold, Italic, Underline, List, FileArchive
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- BRAND CONFIGURATION ---
        const BRAND = {
          colors: { green: '#007C27', blue: '#054E9A', black: '#211A1A', gray: '#E9E9E9', lightGray: '#F3F4F6', white: '#FFFFFF' },
          fonts: { heading: '"League Spartan", sans-serif', body: '"Inter", sans-serif' }
        };

        const CHART_COLORS = [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        const PACKAGING_TYPES = ['Retail', 'Box/ Crate', 'Cube crate', 'Pallet', 'Punnets', 'Pillow Bag', 'Bin crate'];
        const DEFAULT_CRITERIA = ['General Quality', 'Taste', 'Visual Appearance', 'Color', 'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation', 'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'];

        // --- HELPER FUNCTIONS ---
        const getAverage = (samples, key) => {
          if (!samples || samples.length === 0) return 0;
          const validSamples = samples.filter(s => s[key] !== '' && !isNaN(s[key]));
          if (validSamples.length === 0) return 0;
          const sum = validSamples.reduce((acc, curr) => acc + parseFloat(curr[key]), 0);
          return (sum / validSamples.length).toFixed(1);
        };

        const getWeightLoss = (samples, day0Samples) => {
            if (!samples || samples.length === 0 || !day0Samples || day0Samples.length === 0) return 0;
            let totalLoss = 0, count = 0;
            samples.forEach((s, idx) => {
                const startW = day0Samples[idx] ? parseFloat(day0Samples[idx].weight) : 0;
                const currentW = parseFloat(s.weight);
                if (startW > 0 && !isNaN(currentW)) { totalLoss += ((startW - currentW) / startW) * 100; count++; }
            });
            return count > 0 ? (totalLoss / count).toFixed(1) : 0;
        };

        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('distribution')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => (start && end && start !== end) ? `${start}-${end}${unit}` : start ? `${start}${unit}` : `-`;
        const formatDay = (day) => `P+${day}`;

        // --- COMPONENTS ---

        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);
          useEffect(() => { if (editorRef.current && value !== editorRef.current.innerHTML) editorRef.current.innerHTML = value || ''; }, [value]);
          const handleInput = () => { if (editorRef.current) onChange(editorRef.current.innerHTML); };
          const execCmd = (cmd) => { document.execCommand(cmd, false, null); editorRef.current.focus(); handleInput(); };

          return (
            <div className="border border-slate-200 rounded-md bg-white focus-within:border-green-600 focus-within:ring-2 flex flex-col min-h-[120px]">
              <div className="bg-slate-50 border-b p-1 flex gap-1">
                {[['bold', <Bold size={16}/>], ['italic', <Italic size={16}/>], ['underline', <Underline size={16}/>], ['insertUnorderedList', <List size={16}/>]].map(([c, i]) => (
                   <button key={c} type="button" onClick={() => execCmd(c)} className="p-1 hover:bg-slate-200 rounded text-slate-700 w-8 flex justify-center items-center">{i}</button>
                ))}
              </div>
              <div ref={editorRef} contentEditable onInput={handleInput} onBlur={handleInput} className="p-3 outline-none flex-1 overflow-y-auto text-sm rich-text-editor" data-placeholder={placeholder} />
            </div>
          );
        };

        const SupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumMin = 0, cumMax = 0;
          return (
            <div className="flex w-full gap-1 items-start justify-between mt-4 mb-2 font-sans overflow-x-auto pb-2">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumMin += minD; cumMax += maxD;
                const cumStr = cumMin === cumMax ? `${cumMin}` : `${cumMin}-${cumMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-20 flex items-center justify-center"><ChevronRight size={16} className="text-gray-300 flex-shrink-0" /></div>}
                    <div className="flex flex-col items-center flex-1 min-w-[100px]">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded-lg shadow-sm p-1.5 relative min-h-[5.5rem]">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">{getStageIcon(step.stage || '')}</div>
                         <div className="text-[8px] font-bold text-center uppercase mb-1 flex-grow flex items-center justify-center leading-tight w-full break-words px-1">{step.stage || '-'}</div>
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap"><Thermometer size={8} className="text-red-500"/>{formatRange(step.tempStart, step.tempEnd, '°C')}</span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap"><Clock size={8}/>{formatRange(step.daysStart, step.daysEnd, 'd')}</span>
                         </div>
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap w-full text-center">∑ {cumStr}d</div>
                      </div>
                      <div className="h-8 w-full flex justify-center items-start mt-1 relative">
                          {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={12} /></div><span className="text-[7px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                          {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={12} /></div><span className="text-[7px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                )
              })}
            </div>
          );
        };

        const VariantGasChart = ({ group }) => {
          if (!group || !group.measurements) return null;
          const width = 350; const height = 200; const padding = 30;
          const data = group.measurements.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
          const maxDay = Math.max(...data.map(d => parseFloat(d.day) || 0), 5);
          const maxY = 25; 
          const getX = (day) => padding + (parseFloat(day) / maxDay) * (width - 2 * padding);
          const getY = (val) => height - padding - (parseFloat(val) / maxY) * (height - 2 * padding);
          const pointsO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'o2'))}`).join(' ');
          const pointsCO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'co2'))}`).join(' ');

          return (
            <div className="flex-1 border rounded bg-white p-3 font-sans w-full h-full flex flex-col justify-between">
              <h5 className="text-center font-bold text-sm mb-2 text-slate-800 border-b pb-1">Actual Results: {group.name || 'Variant'}</h5>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {[0, 5, 10, 15, 20, 25].map(val => (
                  <g key={val}>
                    <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#f0f0f0" />
                    <text x={padding - 5} y={getY(val) + 3} textAnchor="end" fontSize="9" fill="#ccc">{val}%</text>
                  </g>
                ))}
                {data.map(d => <text key={d.day} x={getX(d.day)} y={height - 10} textAnchor="middle" fontSize="9" fill="#999">{formatDay(d.day)}</text>)}
                <polyline points={pointsO2} fill="none" stroke={BRAND.colors.blue} strokeWidth="2" />
                <polyline points={pointsCO2} fill="none" stroke={BRAND.colors.green} strokeWidth="2" />
                {data.map((d, i) => (
                  <g key={i}>
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'o2'))} r="3" fill={BRAND.colors.blue} />
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'co2'))} r="3" fill={BRAND.colors.green} />
                  </g>
                ))}
              </svg>
              <div className="flex justify-center gap-4 mt-2 text-xs">
                <span className="flex items-center gap-1 font-bold" style={{color: BRAND.colors.blue}}>● O₂</span>
                <span className="flex items-center gap-1 font-bold" style={{color: BRAND.colors.green}}>● CO₂</span>
              </div>
            </div>
          );
        };

        const WeightLossChart = ({ groups }) => {
          if (!groups || groups.length === 0) return null;
          const width = 600; const height = 250; const padding = 40;
          const allDays = Array.from(new Set(groups.flatMap(g => g.measurements.map(m => parseFloat(m.day))))).sort((a,b) => a-b);
          const days = allDays.filter(d => d > 0);
          if (days.length === 0) return <div className="text-center text-gray-400 italic p-4">No weight loss data available yet.</div>;

          const maxLoss = Math.max(...groups.flatMap(g => g.measurements.map(m => {
             const day0 = g.measurements.find(meas => parseFloat(meas.day) === 0);
             return getWeightLoss(m.samples, day0?.samples);
          })), 1); 
          
          const yAxisMax = Math.ceil(maxLoss * 1.2); 
          const slotWidth = (width - 2 * padding) / days.length;
          const barGroupWidth = slotWidth * 0.6;
          const barWidth = barGroupWidth / groups.length;
          const getX = (dayIndex) => padding + (dayIndex * slotWidth);
          const getY = (val) => height - padding - (val / yAxisMax) * (height - 2 * padding);

          return (
            <div className="w-full border rounded bg-white p-4 font-sans">
              <h4 className="text-center font-bold mb-4 uppercase text-xs tracking-wider" style={{ color: BRAND.colors.black, fontFamily: BRAND.fonts.heading }}>Weight Loss Comparison (%)</h4>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {[0, Math.max(yAxisMax/2, 0.1), Math.max(yAxisMax, 0.2)].map(val => (
                   <g key={val}>
                     <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#E9E9E9" strokeDasharray="4"/>
                     <text x={padding - 5} y={getY(val) + 4} textAnchor="end" fontSize="10" fill="#999">{val.toFixed(1)}%</text>
                   </g>
                ))}
                {days.map((day, dayIdx) => (
                  <g key={day}>
                    <text x={getX(dayIdx) + (slotWidth / 2)} y={height - 15} textAnchor="middle" fontSize="10" fill="#666" fontWeight="bold">{formatDay(day)}</text>
                    {groups.map((g, grpIdx) => {
                       const meas = g.measurements.find(m => parseFloat(m.day) === day);
                       const day0 = g.measurements.find(m => parseFloat(m.day) === 0);
                       const loss = getWeightLoss(meas?.samples, day0?.samples);
                       const groupStartX = getX(dayIdx) + (slotWidth - barGroupWidth) / 2;
                       return (
                         <rect 
                            key={grpIdx}
                            x={groupStartX + (grpIdx * barWidth)}
                            y={getY(loss)}
                            width={Math.max(barWidth - 2, 1)}
                            height={height - padding - getY(loss)}
                            fill={CHART_COLORS[grpIdx % CHART_COLORS.length].stroke}
                            rx="2"
                         />
                       );
                    })}
                  </g>
                ))}
              </svg>
              <div className="flex flex-wrap justify-center gap-4 mt-4">
                {groups.map((g, idx) => (
                  <div key={g.id} className="flex items-center gap-2 text-xs font-bold" style={{fontFamily: BRAND.fonts.heading, color: BRAND.colors.black}}>
                    <div className="w-3 h-3 rounded-sm" style={{ backgroundColor: CHART_COLORS[idx % CHART_COLORS.length].stroke }}></div>
                    {g.name || 'Variant'}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const SampleModal = ({ isOpen, onClose, data, onSave, startWeight, projectCriteria, isEvaluationDay, isDayEditable }) => {
          if (!isOpen) return null;
          const [samples, setSamples] = useState(data.samples || []);
          const [day, setDay] = useState(data.day || 0);
          const [notes, setNotes] = useState(data.notes || '');
          const [evaluateQuality, setEvaluateQuality] = useState(data.evaluateQuality !== undefined ? data.evaluateQuality : false);
          const [qualityParams, setQualityParams] = useState(data.qualityParams || []);

          useEffect(() => {
            if (evaluateQuality && projectCriteria?.length > 0 && qualityParams.length === 0) {
              setQualityParams(projectCriteria.map(c => ({ name: c, score: '', notes: '' })));
            }
          }, [evaluateQuality, projectCriteria, qualityParams]);

          const addSample = () => setSamples([...samples, { id: Date.now(), o2: '', co2: '', weight: '' }]);
          const updateSample = (index, field, value) => {
            const newSamples = [...samples]; newSamples[index][field] = value; setSamples(newSamples);
          };
          const removeSample = (index) => setSamples(samples.filter((_, i) => i !== index));
          
          const updateParam = (index, field, value) => {
            const newParams = [...qualityParams];
            newParams[index][field] = value;
            setQualityParams(newParams);
          };

          const handleSave = () => { onSave({ ...data, day, notes, samples, qualityParams, evaluateQuality }); onClose(); };
          
          const avgWeight = getAverage(samples, 'weight');
          const weightLoss = startWeight && avgWeight > 0 ? (((startWeight - avgWeight) / startWeight) * 100).toFixed(2) : 0;

          return (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 font-sans backdrop-blur-sm print:hidden">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden border border-gray-100 flex flex-col max-h-[90vh]">
                <div className="p-4 flex justify-between items-center text-white" style={{ background: `linear-gradient(90deg, ${BRAND.colors.black} 0%, #423B3B 50%, ${BRAND.colors.black} 100%)` }}>
                  <h3 className="font-bold flex items-center gap-2" style={{ fontFamily: BRAND.fonts.heading }}><Edit3 size={18}/> Edit Measurement Data ({formatDay(day)})</h3>
                  <button onClick={onClose}><X size={20}/></button>
                </div>
                
                <div className="p-6 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <h4 className="font-bold text-sm text-slate-700 border-b pb-2 mb-4">Atmosphere & Weight</h4>
                    <div className="flex justify-between items-center mb-4 bg-[#E9E9E9] p-3 rounded-lg text-xs">
                      <div className="flex items-center gap-2"><label className="font-bold">Day:</label><input type="number" value={day || ''} disabled={!isDayEditable} onChange={e => setDay(e.target.value)} className={`w-16 p-1.5 border rounded text-center font-bold ${!isDayEditable ? 'bg-gray-200 cursor-not-allowed text-gray-500' : 'bg-white'}`} /></div>
                      <div className="text-right">
                         {day > 0 && <div style={{ color: weightLoss > 3 ? '#dc2626' : BRAND.colors.green, fontWeight: 'bold' }}>Avg Loss: {weightLoss}%</div>}
                         <div>Avg Weight: <strong>{avgWeight}g</strong></div>
                      </div>
                    </div>
                    <table className="w-full text-sm mb-4">
                      <thead><tr className="text-left text-[#211A1A] border-b border-gray-200"><th className="pb-2 font-bold">#</th><th className="pb-2" style={{color: BRAND.colors.blue}}>O₂</th><th className="pb-2" style={{color: BRAND.colors.green}}>CO₂</th><th className="pb-2">Weight {day===0 && '(Start)'}</th><th className="pb-2"></th></tr></thead>
                      <tbody>
                        {samples.map((s, i) => (
                          <tr key={i} className="border-b border-gray-100 last:border-0">
                            <td className="py-2 font-medium text-gray-500">{i + 1}</td>
                            <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.o2 || ''} onChange={e => updateSample(i, 'o2', e.target.value)} /></td>
                            <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.co2 || ''} onChange={e => updateSample(i, 'co2', e.target.value)} /></td>
                            <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.weight || ''} onChange={e => updateSample(i, 'weight', e.target.value)} placeholder="g" /></td>
                            <td className="py-2 text-right"><button onClick={() => removeSample(i)} className="text-red-400 hover:text-red-600"><Trash2 size={14}/></button></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    <button onClick={addSample} className="text-xs flex items-center gap-1 font-bold hover:underline mb-4" style={{ color: BRAND.colors.green }}><Plus size={14}/> Add Sample</button>
                    <textarea className="w-full p-2 border rounded text-sm h-20" value={notes || ''} onChange={e => setNotes(e.target.value)} placeholder="General observations..." />
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col h-full">
                     <h4 className="font-bold text-sm text-slate-700 border-b pb-2 mb-4 flex justify-between items-center">
                       Quality Evaluation 
                       <label className="flex items-center gap-2 text-xs bg-white border border-gray-300 px-2 py-1 rounded cursor-pointer shadow-sm hover:bg-gray-50">
                         <input type="checkbox" checked={evaluateQuality} onChange={e => setEvaluateQuality(e.target.checked)} className="accent-green-600" />
                         <span className="font-bold text-slate-600">Evaluate</span>
                       </label>
                     </h4>
                     
                     {evaluateQuality ? (
                       <div className="flex-1 flex flex-col">
                         <div className="flex-1 overflow-y-auto pr-1">
                           <table className="w-full text-sm">
                             <thead className="text-left text-slate-500"><tr><th className="pb-2">Criterion</th><th className="pb-2 w-16">Score</th><th className="pb-2">Notes</th></tr></thead>
                             <tbody>
                               {qualityParams.length === 0 && <tr><td colSpan="3" className="text-center italic text-gray-400 py-4">No criteria selected in Groups tab.</td></tr>}
                               {qualityParams.map((param, i) => (
                                 <tr key={i} className="border-b border-slate-200 last:border-0">
                                   <td className="py-2 text-slate-700 font-medium">{param.name}</td>
                                   <td className="py-2"><input type="number" min="1" max="10" className="w-full p-1.5 border rounded text-center font-bold" value={param.score || ''} onChange={e => updateParam(i, 'score', e.target.value)} placeholder="-" /></td>

                                 </tr>
                               ))}
                             </tbody>
                           </table>
                         </div>
                         
                         {/* Legend */}
                         <div className="mt-4 pt-4 border-t border-slate-200 shrink-0">
                           <p className="text-[10px] font-bold text-slate-500 mb-1 uppercase">Score Scale (1-10)</p>
                           <div className="grid grid-cols-2 gap-x-2 gap-y-1 text-[9px] text-slate-500">

                             <div><strong className="text-green-600">8:</strong> Good</div>
                             <div><strong className="text-yellow-600">6:</strong> Satisfactory</div>
                             <div><strong className="text-red-600">4:</strong> Unacceptable</div>

                           </div>
                         </div>
                       </div>
                     ) : (
                       <div className="flex flex-col items-center justify-center flex-1 text-center text-gray-400">
                         <AlertTriangle size={32} className="mb-2 opacity-50"/>
                         <p className="text-sm">Quality scoring is currently disabled.<br/>Check 'Evaluate' to fill in.</p>
                       </div>
                     )}
                  </div>
                </div>

                <div className="bg-gray-50 p-4 border-t flex justify-end gap-3"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-medium">Cancel</button><button onClick={handleSave} className="px-6 py-2 text-white font-bold rounded hover:opacity-90 shadow-lg" style={{ backgroundColor: BRAND.colors.green }}>Save</button></div>
              </div>
            </div>
          );
        };

        const DetailsModal = ({ isOpen, onClose, data, onSave }) => {
          if (!isOpen) return null;
          const initialImages = (data.images || []).map(img => typeof img === 'string' ? {url: img, caption: '', category: 'External Quality'} : { ...img, category: img.category || 'External Quality' });
          const [images, setImages] = useState(initialImages);

          const handleImageUpload = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
              const reader = new FileReader();
              reader.onloadend = () => setImages(prev => [...prev, { url: reader.result, caption: '', category: 'External Quality' }]);
              reader.readAsDataURL(file);
            });
          };

          const removeImage = (idx) => setImages(images.filter((_, i) => i !== idx));
          const updateImageField = (idx, field, value) => {
            const newImgs = [...images];
            newImgs[idx][field] = value;
            setImages(newImgs);
          };

          const handleSave = () => { onSave({ ...data, images }); onClose(); };

          return (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 font-sans backdrop-blur-sm print:hidden">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl overflow-hidden border border-gray-100 flex flex-col max-h-[90vh]">
                <div className="p-4 flex justify-between items-center text-white" style={{ background: `linear-gradient(90deg, ${BRAND.colors.black} 0%, #423B3B 50%, ${BRAND.colors.black} 100%)` }}>
                  <h3 className="font-bold flex items-center gap-2" style={{ fontFamily: BRAND.fonts.heading }}><Camera size={18}/> Manage Photos</h3>
                  <button onClick={onClose}><X size={20}/></button>
                </div>
                <div className="p-6 overflow-y-auto">
                  <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-3">
                    {images.map((img, idx) => (
                      <div key={idx} className="relative group border border-gray-200 rounded-lg overflow-hidden bg-gray-50 flex flex-col">
                        <div className="aspect-square relative">
                           <img src={img.url} className="w-full h-full object-cover" />
                           <button onClick={() => removeImage(idx)} className="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg"><X size={12}/></button>
                        </div>
                        <select className="w-full p-2 text-xs border-t outline-none bg-white" value={img.category || 'External Quality'} onChange={e => updateImageField(idx, 'category', e.target.value)}>
                            {['External Quality', 'Internal Quality', 'Loose Produce', 'Box/Crate', 'Weight measurement', 'Gas measurement', 'Other'].map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <input type="text" className="w-full p-2 text-xs border-t outline-none focus:bg-blue-50 transition" placeholder="Caption / Description..." value={img.caption || ''} onChange={e => updateImageField(idx, 'caption', e.target.value)} />
                      </div>
                    ))}
                    <label className="border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 aspect-square min-h-[150px]">
                       <Upload size={24} className="text-gray-400"/>
                       <span className="text-xs text-gray-500 mt-1 font-bold">Upload Photos</span>
                       <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} />
                    </label>
                  </div>
                </div>
                <div className="bg-gray-50 p-4 border-t flex justify-end gap-3"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-medium">Done</button><button onClick={handleSave} className="px-6 py-2 text-white font-bold rounded hover:opacity-90 shadow-lg" style={{ backgroundColor: BRAND.colors.green }}>Save</button></div>
              </div>
            </div>
          );
        };

        // --- HOOFD APPLICATIE ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('setup');
          const [activeGroupId, setActiveGroupId] = useState(1);
          const [isPreview, setIsPreview] = useState(false);
          const fileInputRef = useRef(null);
          
          // Modals
          const [sampleModalOpen, setSampleModalOpen] = useState(false);
          const [detailsModalOpen, setDetailsModalOpen] = useState(false);
          const [editingMeasurement, setEditingMeasurement] = useState(null);

          // --- DATA STATE ---
          const [project, setProject] = useState({
            reportTitle: 'Quality Report MAP Test', 
            productName: '',
            processingType: 'Whole',
            type: '', origin: '', company: '', contactName: '', contactEmail: '', employee: '', trialTarget: '',
            rrO2: '', rrCO2: '', rrTemp: '', totalDuration: '', 
            criteria: [...DEFAULT_CRITERIA], 
            date: new Date().toISOString().split('T')[0],
            packingDate: new Date().toISOString().split('T')[0],
            logo: 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png',
            clientLogo: null, startImage: null, coverImage: null
          });

          const [supplyChain, setSupplyChain] = useState([
            { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
            { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
            { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
            { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
            { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
            { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
          ]);

          const [groups, setGroups] = useState([
            {
              id: 1, name: 'Control',
              specs: { packaging: 'Punnets', material: 'BOPP', length: '', width: '', height: '', holes: '2', holeSize: '6000', startWeight: '500', sampleCount: 3 },
              measurements: [{ day: 0, samples: [{id:1,o2:'20.9',co2:'0.03',weight:'500'}, {id:2,o2:'20.9',co2:'0.03',weight:'500'}, {id:3,o2:'20.9',co2:'0.03',weight:'500'}], quality: 10, notes: 'Start', images: [], qualityParams: [], evaluateQuality: true }],
              predictedImage: null 
            }
          ]);

          const [analysis, setAnalysis] = useState({ graphNotes: '', conclusion: '', variantConclusions: {}, recommendation: 'retest', nextSteps: [], temperatureImage: null });
          const [newStep, setNewStep] = useState('');
          const [newStepVariant, setNewStepVariant] = useState('general');
          const [newCriteria, setNewCriteria] = useState('');

          // --- HANDLERS ---
          const handleImgUpload = (e, field, isGroup = false) => { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onloadend = () => { if(isGroup) setGroups(p => p.map(g => g.id === activeGroupId ? {...g, predictedImage: r.result} : g)); else setProject(p => ({...p, [field]: r.result})); }; r.readAsDataURL(f); }};
          const handleProjectChange = (f, v) => setProject(p => ({...p, [f]: v}));
          
          const handleDurationChange = (e) => {
            const val = e.target.value;
            setProject(p => ({...p, totalDuration: val}));
            if (val && parseInt(val) > 0) {
               const endDay = parseInt(val);
               setGroups(prev => prev.map(g => {
                 if (!g.measurements.find(m => m.day === endDay)) {
                    const sCount = g.specs.sampleCount || 3;
                    const smpls = Array.from({length: sCount}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '' }));
                    const endMeas = { day: endDay, samples: smpls, quality: 9, notes: 'End', images: [], qualityParams: [], evaluateQuality: true };
                    return { ...g, measurements: [...g.measurements, endMeas].sort((a,b) => a.day - b.day) };
                 }
                 return g;
               }));
            }
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const newM = g.measurements.map(m => {
                let smpls = [...m.samples];
                if (smpls.length < c) { for (let i = 0; i < c - smpls.length; i++) smpls.push({ id: Date.now()+i+Math.random(), o2: parseFloat(m.day)===0?'20.9':'', co2: parseFloat(m.day)===0?'0.03':'', weight: '' }); } 
                else if (smpls.length > c) { smpls = smpls.slice(0, c); }
                return { ...m, samples: smpls };
              });
              return { ...g, specs: { ...g.specs, sampleCount: c }, measurements: newM };
            }));
          };

          const exportData = async () => {
            const data = { project, supplyChain, groups, analysis };
            const jsonString = JSON.stringify(data, null, 2);
            const defaultName = `perfotec-report-${project.productName ? project.productName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'data'}.json`;
            try {
              if (window.showSaveFilePicker) {
                const handle = await window.showSaveFilePicker({ suggestedName: defaultName, types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }] });
                const writable = await handle.createWritable();
                await writable.write(jsonString); await writable.close();
              } else { throw new Error("API not supported"); }
            } catch (err) {
              if (err.name !== 'AbortError') {
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = defaultName; a.click(); URL.revokeObjectURL(url);
              }
            }
          };

          const importData = (e) => { 
            const file = e.target.files[0]; if(!file) return; 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                try { 
                    const d = JSON.parse(ev.target.result); 
                    if(d.isPerfoTecIntake) {
                       const client = d.client || {}; const prod = d.products?.[0] || {};
                       setProject(p => ({ ...p, company: client.companyName||'', street: client.street||'', houseNumber: client.houseNumber||'', zipCode: client.zipCode||'', city: client.city||'', country: client.country||'', contactName: client.contactName||'', contactRole: client.role||'', contactEmail: client.email||'', contactPhone: client.phone||'', logo: client.logo||p.logo, productName: prod.name||'', processingType: prod.processingType||'Whole', maturityStage: prod.maturityStage||'', postHarvestTreatment: prod.postHarvestTreatment||'', currentChallenge: prod.currentChallenge||'', trialTarget: prod.targetGoal||'', transportModes: prod.transportModes||[], criteria: prod.qualityCriteria||[], startImage: prod.photo||null }));
                       if (prod.supplyChain) setSupplyChain(prod.supplyChain);
                       setGroups(p => { const ug = [...p]; if(ug[0]) { ug[0].specs = { ...ug[0].specs, packaging: prod.packagingType||'Retail', material: prod.material||'', length: prod.length||'', width: prod.width||'', height: prod.height||'', startWeight: prod.weight||'' }; } return ug; });
                    } else {
                       if(d.project) setProject({...d.project, packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0]}); 
                       if(d.supplyChain) setSupplyChain(d.supplyChain); 
                       if(d.groups) setGroups(d.groups); 
                       if(d.analysis) setAnalysis({ graphNotes: d.analysis.graphNotes||'', conclusion: d.analysis.conclusion||'', variantConclusions: d.analysis.variantConclusions||{}, recommendation: d.analysis.recommendation||'retest', nextSteps: d.analysis.nextSteps||[], temperatureImage: d.analysis.temperatureImage||null });
                    }
                } catch(err){ alert("Error loading file."); } 
            }; reader.readAsText(file); 
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              if (section === 'startGas') return { ...g, specs: { ...g.specs, startGas: { ...g.specs.startGas, [field]: value } } };
              return g;
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria.includes(c) ? p.criteria.filter(x => x !== c) : [...p.criteria, c] }));
          const addNewCriteria = () => { if(newCriteria && !project.criteria.includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          
          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Modals
          const openSampleModal = (groupId, index) => { 
            const g = groups.find(x => x.id === groupId); 
            const meas = g.measurements[index];
            const isEndDay = project.totalDuration && parseFloat(meas.day) === parseInt(project.totalDuration);
            const isEvaluationDay = parseFloat(meas.day) === 0 || isEndDay;
            const isDayEditable = parseFloat(meas.day) !== 0 && !isEndDay;
            const day0 = g.measurements.find(m => parseFloat(m.day) === 0);
            
            setEditingMeasurement({ groupId, index, data: meas, day0Samples: day0?.samples, isEvaluationDay, isDayEditable, projectCriteria: project.criteria, startWeight: g.specs.startWeight }); 
            setSampleModalOpen(true); 
          };
          
          const openDetailsModal = (groupId, index) => { 
            const g = groups.find(x => x.id === groupId); 
            setEditingMeasurement({ groupId, index, data: g.measurements[index] }); 
            setDetailsModalOpen(true); 
          };

          const saveSampleData = (u) => { setGroups(p => p.map(g => g.id !== editingMeasurement.groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === editingMeasurement.index ? { ...u, qualityParams: u.qualityParams } : m).sort((a,b) => parseFloat(a.day) - parseFloat(b.day)) })); };
          const saveDetailsData = (u) => { setGroups(p => p.map(g => g.id !== editingMeasurement.groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === editingMeasurement.index ? { ...m, images: u.images } : m) })); };

          const addMeasurementDay = (groupId) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const lastDay = parseFloat(g.measurements[g.measurements.length - 1]?.day || 0);
              const sCount = g.specs.sampleCount || 3;
              const newSamples = Array.from({length: sCount}, (_, i) => ({ id: Date.now() + i, o2: '', co2: '', weight: '' }));
              return { ...g, measurements: [...g.measurements, { day: lastDay + 1, samples: newSamples, quality: 9, notes: '', images: [], qualityParams: [], evaluateQuality: false }]};
            }));
          };
          const updateQuality = (groupId, index, val) => { setGroups(p => p.map(g => g.id !== groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === index ? { ...m, quality: val } : m) })); };

          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id)) + 1;
            const duration = parseInt(project.totalDuration) || 0;
            const sCount = groups[0].specs.sampleCount || 3;
            
            const generateSamples = (isDay0) => Array.from({length: sCount}, (_, i) => ({
                id: Date.now() + i, o2: isDay0 ? '20.9' : '', co2: isDay0 ? '0.03' : '', weight: ''
            }));

            const day0 = { day: 0, samples: generateSamples(true), quality: 10, notes: 'Start', images: [], qualityParams: [], evaluateQuality: true };
            const meas = [day0];
            if (duration > 0) meas.push({ day: duration, samples: generateSamples(false), quality: 9, notes: 'End', images: [], qualityParams: [], evaluateQuality: true });
            
            setGroups([...groups, { id: newId, name: `Variant ${groups.length + 1}`, specs: { ...groups[0].specs, sampleCount: sCount }, measurements: meas, predictedImage: null }]);
            setActiveGroupId(newId);
          };

          const duplicateGroup = (id) => { const org = groups.find(g => g.id === id); const newId = Math.max(...groups.map(g => g.id)) + 1; setGroups(p => [...p, { ...org, id: newId, name: `${org.name} (Copy)` }]); setActiveGroupId(newId); };
          
          const addNextStep = () => { 
            if (newStep.trim()) { 
                setAnalysis(prev => ({ ...prev, nextSteps: [...prev.nextSteps, { text: newStep, variantId: newStepVariant }] })); 
                setNewStep(''); 
            }
          };
          const removeNextStep = (i) => setAnalysis(prev => ({ ...prev, nextSteps: prev.nextSteps.filter((_, idx) => idx !== i) }));

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
              <head><meta charset='utf-8'><title>Export HTML To Doc</title>
              <style>
                body { font-family: 'Arial', sans-serif; }

                table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
                th { background-color: #007C27; color: white; }
                img { max-width: 100%; height: auto; }
              </style>
              </head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(html);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = (project.reportTitle || 'Report') + '.doc';
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          if (isPreview) {
            const totalChainDays = supplyChain.reduce((acc, step) => acc + (parseFloat(step.daysStart) || 0), 0);
            const allPhotos = groups.flatMap(g => g.measurements.flatMap(m => (m.images || []).map(img => ({ groupName: g.name, day: m.day, url: typeof img === 'string' ? img : img.url, caption: typeof img === 'string' ? '' : img.caption, category: (typeof img === 'object' && img.category) ? img.category : 'Other' }))));
            const photosByCat = {};
            allPhotos.forEach(p => { if (!photosByCat[p.category]) photosByCat[p.category] = []; photosByCat[p.category].push(p); });
            const catsPresent = ['External Quality', 'Internal Quality', 'Loose Produce', 'Box/Crate', 'Weight measurement', 'Gas measurement', 'Other'].filter(c => photosByCat[c] && photosByCat[c].length > 0);

            return (
              <div className="min-h-screen bg-gray-500 p-0 sm:p-8 overflow-y-auto font-sans print:p-0 print:bg-white">
                <div className="fixed bottom-8 right-8 flex gap-4 no-print z-50">
                  <button onClick={() => setIsPreview(false)} className="bg-slate-600 text-white px-6 py-3 rounded-full shadow-lg font-bold transition hover:bg-slate-700">Edit</button>
                  <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg font-bold flex gap-2 hover:bg-blue-700 transition"><FileArchive size={20} /> Download Word</button>
                  <button onClick={() => window.print()} className="text-white px-6 py-3 rounded-full shadow-lg font-bold flex gap-2 hover:opacity-90 transition" style={{backgroundColor: BRAND.colors.green}}><Printer size={20} /> Download PDF</button>
                </div>

                <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0">
                  
                  {/* COVER */}
                  <div className="h-[27cm] flex flex-col justify-between">
                     <div>
                        <div className="flex justify-between items-start mb-16 w-full">
                          <div className="flex flex-col">
                            <img src={project.logo || ''} alt="PerfoTec Logo" className="h-20 object-contain self-start mb-2" />
                            <div className="text-sm font-bold tracking-[0.25em] uppercase" style={{ color: BRAND.colors.blue, fontFamily: BRAND.fonts.heading, marginLeft: '4px' }}>Best for Freshness</div>
                          </div>
                          {project.clientLogo && <img src={project.clientLogo} alt="Client Logo" className="h-16 max-w-[200px] object-contain self-end" />}
                        </div>

                        <h1 className="text-5xl font-bold uppercase mb-4 brand-heading" style={{ color: BRAND.colors.green }}>{project.reportTitle || ''}</h1>
                        <h2 className="text-4xl font-light brand-heading text-slate-600 mb-12">{project.productName || '<Product Name>'}</h2>
                        <div className="w-full h-[450px] overflow-hidden flex items-center justify-center relative bg-white">
                           {project.coverImage ? <img src={project.coverImage} className="w-full h-full object-contain" /> : project.startImage ? <img src={project.startImage} className="w-full h-full object-contain" /> : <span className="text-slate-300 italic">No Cover Photo</span>}
                           <div className="absolute bottom-6 left-0 right-0 text-center"><span className="bg-white/90 px-6 py-2 rounded-full text-lg font-bold shadow-sm" style={{color: BRAND.colors.green, fontFamily: BRAND.fonts.heading}}>Super fresh quality</span></div>
                        </div>
                     </div>
                     <div className="text-center text-sm text-slate-400 brand-body">{new Date().getFullYear()} © PerfoTec B.V.</div>
                  </div>

                  <div className="page-break"></div>

                  {/* SETTING & SUMMARY */}
                  <div className="min-h-[27cm] flex flex-col pt-4">
                    <h3 className="text-xl font-bold mb-6 brand-heading">Contents</h3>
                    <ul className="space-y-2 brand-body text-sm mb-12 text-slate-700">
                      <li className="flex justify-between border-b border-dotted border-slate-300 pb-1"><span>1 Setting</span> <span>3</span></li>
