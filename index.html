<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Manager</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Printer, FileText, Activity, Settings, Layout, MessageSquare, 
          CheckCircle, AlertTriangle, ArrowRight, Copy, Trash2, Plus, 
          Edit3, Scale, X, Upload, Truck, Thermometer, Clock, Camera, 
          ClipboardList, Image as ImageIcon, BarChart2, ChevronRight, Save, 
          Download, FolderOpen, LineChart, Tractor, Ship, Plane, 
          Warehouse, Store, Utensils, Factory, ArrowDown, ArrowUp, 
          ChevronUp, ChevronDown, FileArchive, Bold, Italic, Underline, List
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- CONFIGURATIE ---
        const BRAND = {
          colors: {
            green: '#007C27', blue: '#054E9A', black: '#211A1A', 
            gray: '#E9E9E9', lightGray: '#F3F4F6', white: '#FFFFFF'
          },
          fonts: {
            heading: '"League Spartan", sans-serif',
            body: '"Inter", sans-serif'
          }
        };

        const CHART_COLORS = [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        const PACKAGING_TYPES = ['Punnets', 'Pillow Bag', 'Box/ Crate', 'Cube crate', 'Pallet'];

        const PHOTO_CATEGORIES = [
          'External Quality',
          'Internal Quality',
          'Loose Produce',
          'Box/Crate',
          'Weight measurement',
          'Gas measurement',
          'Other'
        ];

        const DEFAULT_CRITERIA = [
          'General Quality', 'Taste', 'Visual Appearance', 'Color',
          'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation',
          'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'
        ];

        // --- HULPFUNCTIES ---
        const getAverage = (samples, key) => {
          if (!samples || samples.length === 0) return 0;
          const validSamples = samples.filter(s => s[key] !== '' && !isNaN(s[key]));
          if (validSamples.length === 0) return 0;
          const sum = validSamples.reduce((acc, curr) => acc + parseFloat(curr[key]), 0);
          return (sum / validSamples.length).toFixed(1);
        };

        const getWeightLoss = (samples, day0Samples) => {
            if (!samples || samples.length === 0 || !day0Samples || day0Samples.length === 0) return 0;
            let totalLoss = 0, count = 0;
            samples.forEach((s, idx) => {
                const startW = day0Samples[idx] ? parseFloat(day0Samples[idx].weight) : 0;
                const currentW = parseFloat(s.weight);
                if (startW > 0 && !isNaN(currentW)) {
                    totalLoss += ((startW - currentW) / startW) * 100;
                    count++;
                }
            });
            return count > 0 ? (totalLoss / count).toFixed(1) : 0;
        };

        const getStageIcon = (name) => {
          const n = name.toLowerCase();
          if (n.includes('farm') || n.includes('harvest')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDay = (day) => `P+${day}`;

        // --- COMPONENTEN ---
        
        // Rich Text Editor Component
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-200 rounded-md overflow-hidden bg-white focus-within:border-green-600 focus-within:ring-2 focus-within:ring-green-100 transition flex flex-col h-full min-h-[120px]">
              <div className="bg-slate-50 border-b border-slate-200 p-1 flex gap-1 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-1.5 hover:bg-slate-200 rounded text-slate-700 w-8 flex justify-center items-center" title="Bold"><Bold size={16}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-1.5 hover:bg-slate-200 rounded text-slate-700 w-8 flex justify-center items-center" title="Italic"><Italic size={16}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-1.5 hover:bg-slate-200 rounded text-slate-700 w-8 flex justify-center items-center" title="Underline"><Underline size={16}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-1.5 hover:bg-slate-200 rounded text-slate-700 w-8 flex justify-center items-center" title="Bullet List"><List size={16}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-3 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const SupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          return (
            <div className="flex w-full gap-1 items-start justify-between mt-4 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => (
                <React.Fragment key={idx}>
                  {idx > 0 && <div className="h-20 flex items-center justify-center"><ChevronRight size={16} className="text-gray-300 flex-shrink-0" /></div>}
                  <div className="flex flex-col items-center flex-1 min-w-0">
                    <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded-lg shadow-sm p-1.5 relative min-h-[5rem]">
                       <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                       <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">{getStageIcon(step.stage)}</div>
                       <div className="text-[8px] font-bold text-center uppercase mb-1 flex-grow flex items-center justify-center leading-tight w-full break-words px-1">{step.stage}</div>
                       <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                       <div className="flex flex-col justify-center w-full text-[8px] gap-0.5">
                          <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap"><Thermometer size={8} className="text-red-500"/>{formatRange(step.tempStart, step.tempEnd, '°C')}</span>
                          <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap"><Clock size={8}/>{formatRange(step.daysStart, step.daysEnd, 'd')}</span>
                       </div>
                    </div>
                    <div className="h-8 w-full flex justify-center items-start mt-1 relative">
                        {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={12} /></div><span className="text-[7px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                        {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={12} /></div><span className="text-[7px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                    </div>
                  </div>
                </React.Fragment>
              ))}
            </div>
          );
        };

        const VariantGasChart = ({ group }) => {
          if (!group || !group.measurements) return null;
          const width = 350;
          const height = 200;
          const padding = 30;
          const data = group.measurements.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
          const maxDay = Math.max(...data.map(d => parseFloat(d.day) || 0), 5);
          const maxY = 25; 
          const getX = (day) => padding + (parseFloat(day) / maxDay) * (width - 2 * padding);
          const getY = (val) => height - padding - (parseFloat(val) / maxY) * (height - 2 * padding);
          const pointsO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'o2'))}`).join(' ');
          const pointsCO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'co2'))}`).join(' ');

          return (
            <div className="border rounded bg-white p-3 font-sans w-full h-full flex flex-col justify-between">
              <h5 className="text-center font-bold text-sm mb-2 text-slate-800 border-b pb-1">Actual Results: {group.name}</h5>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {[0, 5, 10, 15, 20, 25].map(val => (
                  <g key={val}>
                    <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#f0f0f0" />
                    <text x={padding - 5} y={getY(val) + 3} textAnchor="end" fontSize="9" fill="#ccc">{val}%</text>
                  </g>
                ))}
                {data.map(d => <text key={d.day} x={getX(d.day)} y={height - 10} textAnchor="middle" fontSize="9" fill="#999">{formatDay(d.day)}</text>)}
                <polyline points={pointsO2} fill="none" stroke={BRAND.colors.blue} strokeWidth="2" />
                <polyline points={pointsCO2} fill="none" stroke={BRAND.colors.green} strokeWidth="2" />
                {data.map((d, i) => (
                  <g key={i}>
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'o2'))} r="3" fill={BRAND.colors.blue} />
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'co2'))} r="3" fill={BRAND.colors.green} />
                  </g>
                ))}
              </svg>
              <div className="flex justify-center gap-4 mt-2 text-xs">
                <span className="flex items-center gap-1 font-bold" style={{color: BRAND.colors.blue}}>● O₂</span>
                <span className="flex items-center gap-1 font-bold" style={{color: BRAND.colors.green}}>● CO₂</span>
              </div>
            </div>
          );
        };

        const WeightLossChart = ({ groups }) => {
          if (!groups || groups.length === 0) return null;
          const width = 600;
          const height = 250;
          const padding = 40;
          const allDays = Array.from(new Set(groups.flatMap(g => g.measurements.map(m => parseFloat(m.day))))).sort((a,b) => a-b);
          const days = allDays.filter(d => d > 0);
          if (days.length === 0) return <div className="text-center text-gray-400 italic p-4">No weight loss data available yet.</div>;

          const maxLoss = Math.max(...groups.flatMap(g => g.measurements.map(m => {
             const day0 = g.measurements.find(meas => parseFloat(meas.day) === 0);
             return getWeightLoss(m.samples, day0?.samples);
          })), 1); 
          
          const yAxisMax = Math.ceil(maxLoss * 1.2); 
          const slotWidth = (width - 2 * padding) / days.length;
          const barGroupWidth = slotWidth * 0.6;
          const barWidth = barGroupWidth / groups.length;
          const getX = (dayIndex) => padding + (dayIndex * slotWidth);
          const getY = (val) => height - padding - (val / yAxisMax) * (height - 2 * padding);

          return (
            <div className="w-full border rounded bg-white p-4 font-sans">
              <h4 className="text-center font-bold mb-4 uppercase text-xs tracking-wider" style={{ color: BRAND.colors.black, fontFamily: BRAND.fonts.heading }}>Weight Loss Comparison (%)</h4>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {[0, yAxisMax/2, yAxisMax].map(val => (
                   <g key={val}>
                     <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#E9E9E9" strokeDasharray="4"/>
                     <text x={padding - 5} y={getY(val) + 4} textAnchor="end" fontSize="10" fill="#999">{val.toFixed(1)}%</text>
                   </g>
                ))}
                {days.map((day, dayIdx) => (
                  <g key={day}>
                    <text x={getX(dayIdx) + (slotWidth / 2)} y={height - 15} textAnchor="middle" fontSize="10" fill="#666" fontWeight="bold">{formatDay(day)}</text>
                    {groups.map((g, grpIdx) => {
                       const meas = g.measurements.find(m => parseFloat(m.day) === day);
                       const day0 = g.measurements.find(m => parseFloat(m.day) === 0);
                       const loss = getWeightLoss(meas?.samples, day0?.samples);
                       
                       const groupStartX = getX(dayIdx) + (slotWidth - barGroupWidth) / 2;
                       return (
                         <rect 
                            key={grpIdx}
                            x={groupStartX + (grpIdx * barWidth)}
                            y={getY(loss)}
                            width={Math.max(barWidth - 2, 1)}
                            height={height - padding - getY(loss)}
                            fill={CHART_COLORS[grpIdx % CHART_COLORS.length].stroke}
                            rx="2"
                         />
                       );
                    })}
                  </g>
                ))}
              </svg>
              <div className="flex flex-wrap justify-center gap-4 mt-4">
                {groups.map((g, idx) => (
                  <div key={g.id} className="flex items-center gap-2 text-xs font-bold" style={{fontFamily: BRAND.fonts.heading, color: BRAND.colors.black}}>
                    <svg width="12" height="12" className="shrink-0"><rect width="12" height="12" rx="2" fill={CHART_COLORS[idx % CHART_COLORS.length].stroke} /></svg>
                    {g.name}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const SampleModal = ({ isOpen, onClose, data, onSave, day0Samples, projectCriteria, isEvaluationDay, isDayEditable }) => {
          if (!isOpen) return null;
          const [samples, setSamples] = useState(data.samples || []);
          const [day, setDay] = useState(data.day);
          const [notes, setNotes] = useState(data.notes);
          const [evaluateQuality, setEvaluateQuality] = useState(data.evaluateQuality !== undefined ? data.evaluateQuality : false);
          const [qualityParams, setQualityParams] = useState(data.qualityParams || []);

          useEffect(() => {
            if (isEvaluationDay && projectCriteria.length > 0) {
              const currentParams = qualityParams || [];
              const newParams = projectCriteria.map(c => {
                const existing = currentParams.find(p => p.name === c);
                return existing || { name: c, score: '', notes: '' };
              });
              if(JSON.stringify(currentParams) !== JSON.stringify(newParams)) {
                 setQualityParams(newParams);
              }
            }
          }, [evaluateQuality, projectCriteria, qualityParams]);

          const addSample = () => setSamples([...samples, { id: Date.now(), o2: '', co2: '', weight: '' }]);
          const updateSample = (index, field, value) => {
            const newSamples = [...samples]; newSamples[index][field] = value; setSamples(newSamples);
          };
          const removeSample = (index) => setSamples(samples.filter((_, i) => i !== index));
          
          const updateParam = (index, field, value) => {
            const newParams = [...qualityParams];
            newParams[index][field] = value;
            setQualityParams(newParams);
          };

          const handleSave = () => { onSave({ ...data, day, notes, samples, qualityParams, evaluateQuality }); onClose(); };
          
          const avgWeight = getAverage(samples, 'weight');
          const weightLoss = getWeightLoss(samples, day0Samples); 

          return (
            <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 font-sans backdrop-blur-sm print:hidden">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl overflow-hidden border border-gray-100 flex flex-col max-h-[90vh]">
                <div className="p-4 flex justify-between items-center text-white" style={{ background: `linear-gradient(90deg, ${BRAND.colors.black} 0%, #423B3B 50%, ${BRAND.colors.black} 100%)` }}>
                  <h3 className="font-bold flex items-center gap-2" style={{ fontFamily: BRAND.fonts.heading }}><Edit3 size={18}/> Data Input ({formatDay(day)})</h3>
                  <button onClick={onClose} className="hover:text-red-300 transition"><X size={20}/></button>
                </div>
                
                <div className="p-6 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <div>
                    <h4 className="font-bold text-sm text-slate-700 border-b pb-2 mb-4">Atmosphere & Weight</h4>
                    <div className="flex flex-wrap justify-between items-center mb-4 bg-[#E9E9E9] p-3 rounded-lg text-xs gap-4">
                      <div className="flex items-center gap-2">
                         <label className="font-bold">Day:</label>
                         <input 
                           type="number" 
                           value={day} 
                           disabled={!isDayEditable} 
                           onChange={e => setDay(e.target.value)} 
                           className={`w-16 p-1.5 border rounded text-center font-bold ${!isDayEditable ? 'bg-gray-200 cursor-not-allowed text-gray-500' : 'bg-white'}`} 
                         />
                      </div>
                      <div className="text-right flex gap-4">
                         {parseFloat(day) > 0 && <div style={{ color: weightLoss > 3 ? '#dc2626' : BRAND.colors.green, fontWeight: 'bold' }}>Avg Loss: {weightLoss}%</div>}
                         <div>Avg Weight: <strong>{avgWeight}g</strong></div>
                      </div>
                    </div>
                    <div className="overflow-x-auto w-full">
                      <table className="w-full text-sm mb-4">
                        <thead><tr className="text-left text-[#211A1A] border-b border-gray-200"><th className="pb-2 font-bold">#</th><th className="pb-2" style={{color: BRAND.colors.blue}}>O₂</th><th className="pb-2" style={{color: BRAND.colors.green}}>CO₂</th><th className="pb-2">Weight {parseFloat(day)===0 && '(Start)'}</th><th className="pb-2"></th></tr></thead>
                        <tbody>
                          {samples.map((s, i) => (
                            <tr key={i} className="border-b border-gray-100 last:border-0">
                              <td className="py-2 font-medium text-gray-500">{i + 1}</td>
                              <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.o2} onChange={e => updateSample(i, 'o2', e.target.value)} /></td>
                              <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.co2} onChange={e => updateSample(i, 'co2', e.target.value)} /></td>
                              <td className="py-2"><input type="number" className="w-16 md:w-20 p-1.5 border rounded" value={s.weight} onChange={e => updateSample(i, 'weight', e.target.value)} placeholder="g" /></td>
                              <td className="py-2 text-right"><button onClick={() => removeSample(i)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <button onClick={addSample} className="text-xs flex items-center gap-1 font-bold hover:underline mb-4" style={{ color: BRAND.colors.green }}><Plus size={14}/> Add Sample</button>
                    <textarea className="w-full p-2 border rounded text-sm h-20 outline-none focus:ring-2 focus:ring-green-600" value={notes} onChange={e => setNotes(e.target.value)} placeholder="General observations..." />
                  </div>

                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col h-full overflow-hidden">
                     <div className="flex justify-between items-center border-b pb-2 mb-4">
                       <h4 className="font-bold text-sm text-slate-700">Quality Evaluation</h4>
                       <label className="flex items-center gap-2 text-xs bg-white border border-gray-300 px-2 py-1 rounded cursor-pointer shadow-sm hover:bg-gray-50">
                         <input type="checkbox" checked={evaluateQuality} onChange={e => setEvaluateQuality(e.target.checked)} className="accent-green-600" />
                         <span className="font-bold text-slate-600">Beoordelen</span>
                       </label>
                     </div>
                     
                     {evaluateQuality ? (
                       <div className="flex-1 flex flex-col overflow-hidden">
                         <div className="flex-1 overflow-y-auto pr-2">
                           <table className="w-full text-sm">
                             <thead className="text-left text-slate-500 sticky top-0 bg-slate-50"><tr><th className="pb-2">Criterion</th><th className="pb-2 w-16">Score</th><th className="pb-2">Notes</th></tr></thead>
                             <tbody>
                               {qualityParams.length === 0 && <tr><td colSpan="3" className="text-center italic text-gray-400 py-4">No criteria selected in Groups tab.</td></tr>}
                               {qualityParams.map((param, i) => (
                                 <tr key={i} className="border-b border-slate-200 last:border-0">
                                   <td className="py-2 text-slate-700 font-medium">{param.name}</td>
                                   <td className="py-2"><input type="number" min="1" max="10" className="w-full p-1.5 border rounded text-center font-bold outline-none focus:ring-2 focus:ring-blue-500" value={param.score} onChange={e => updateParam(i, 'score', e.target.value)} placeholder="-" /></td>
                                   <td className="py-2"><input type="text" className="w-full p-1.5 border rounded outline-none focus:ring-2 focus:ring-blue-500" value={param.notes} onChange={e => updateParam(i, 'notes', e.target.value)} placeholder="..." /></td>
                                 </tr>
                               ))}
                             </tbody>
                           </table>
                         </div>
                         
                         {/* Legend */}
                         <div className="mt-4 pt-4 border-t border-slate-200 shrink-0">
                           <p className="text-[10px] font-bold text-slate-500 mb-1 uppercase">Score Scale (1-10)</p>
                           <div className="grid grid-cols-2 gap-x-2 gap-y-1 text-[9px] text-slate-500">
                             <div><strong className="text-green-700">10:</strong> Excellent</div>
                             <div><strong className="text-green-600">8:</strong> Good</div>
                             <div><strong className="text-yellow-600">6:</strong> Satisfactory</div>
                             <div><strong className="text-red-600">4:</strong> Unacceptable</div>
                             <div><strong className="text-red-800">1:</strong> Very Bad</div>
                           </div>
                         </div>
                       </div>
                     ) : (
                       <div className="flex flex-col items-center justify-center flex-1 text-center text-gray-400">
                         <AlertTriangle size={32} className="mb-2 opacity-50"/>
                         <p className="text-sm">Kwaliteitsbeoordeling staat uit voor dit moment.<br/>Vink 'Beoordelen' aan om in te vullen.</p>
                       </div>
                     )}
                  </div>
                </div>

                <div className="bg-gray-50 p-4 border-t flex justify-end gap-3"><button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded font-medium transition">Cancel</button><button onClick={handleSave} className="px-6 py-2 text-white font-bold rounded hover:opacity-90 shadow-lg transition" style={{ backgroundColor: BRAND.colors.green }}>Save</button></div>
              </div>
            </div>
          );
        };

        const DetailsModal = ({ isOpen, onClose, data, onSave }) => {
          if (!isOpen) return null;
          const initialImages = (data.images || []).map(img => 
            typeof img === 'string'

          const handleImageUpload = (e) => {

              reader.readAsDataURL(file);

          return (

                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-3">

                        </select>
                        <input type="text" className="w-full p-2 text-xs border-t outline-none focus:bg-blue-50 transition" placeholder="Caption / Beschrijving..." value={img.caption} onChange={e => updateImageField(idx, 'caption', e.target.value)} />
                      </div>

                    <label className="border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 aspect-square min-h-[150px]">

                       <input type="file" multiple accept="image/*" className="hidden" onChange={handleImageUpload} />
                    </label>

                </div>

              </div>
            </div>
          );
        };

        // --- HOOFD APPLICATIE ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('setup');
          const [activeGroupId, setActiveGroupId] = useState(1);
          const [isPreview, setIsPreview] = useState(false);
          const fileInputRef = useRef(null);
          
          const [sampleModalOpen, setSampleModalOpen] = useState(false);
          const [detailsModalOpen, setDetailsModalOpen] = useState(false);
          const [editingMeasurement, setEditingMeasurement] = useState(null);

          const [project, setProject] = useState({
            reportTitle: 'Kwaliteitsrapportage MAP Test', 
            productName: '', type: '', origin: '', company: '', contactName: '', contactEmail: '', employee: '', trialTarget: '',
            rrO2: '', rrCO2: '', rrTemp: '', totalDuration: '', criteria: [], 
            date: new Date().toISOString().split('T')[0],
            packingDate: new Date().toISOString().split('T')[0],
            logo: 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png',
            clientLogo: null, startImage: null, coverImage: null
          });

          const [supplyChain, setSupplyChain] = useState([
            { stage: 'Farm', tempStart: '15', tempEnd: '', daysStart: '0', daysEnd: '', action: 'none' },
            { stage: 'Packing House (Bulk/Retail)', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
            { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
            { stage: 'Importer / Processor (Repack)', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
            { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
            { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
          ]);

          const [groups, setGroups] = useState([
            {
              id: 1, name: 'Control',
              specs: { packaging: 'Punnets', material: 'BOPP', length: '', width: '', height: '', holes: '2', holeSize: '6000', otr: '', cotr: '', startGas: { o2: '20.9', co2: '0.03' }, sampleCount: 3 },
              measurements: [{ day: 0, samples: [{id:1,o2:'20.9',co2:'0.03',weight:''}, {id:2,o2:'20.9',co2:'0.03',weight:''}, {id:3,o2:'20.9',co2:'0.03',weight:''}], quality: 10, notes: 'Start', images: [], qualityParams: [], evaluateQuality: true }],
              predictedImage: null 
            }
          ]);

          const [analysis, setAnalysis] = useState({ 
            graphNotes: '', 
            conclusion: '', 
            variantConclusions: {},
            recommendation: 'retest', 
            nextSteps: [] 
          });
          
          const [newStep, setNewStep] = useState('');
          const [newStepVariant, setNewStepVariant] = useState('general');
          const [newCriteria, setNewCriteria] = useState('');

          const handleLogoUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setProject(p => ({...p, logo: reader.result})); reader.readAsDataURL(file); }};
          const handleClientLogoUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setProject(p => ({...p, clientLogo: reader.result})); reader.readAsDataURL(file); }};
          const handleStartImageUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setProject(p => ({...p, startImage: reader.result})); reader.readAsDataURL(file); }};
          const handleCoverImageUpload = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setProject(p => ({...p, coverImage: reader.result})); reader.readAsDataURL(file); }};
          const handlePredictedImageUpload = (e, groupId) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: reader.result } : g)); reader.readAsDataURL(file); }};

          const handleDurationChange = (e) => {
            const val = e.target.value;
            setProject(p => ({...p, totalDuration: val}));
            if (val && parseInt(val) > 0) {
               const endDay = parseInt(val);
               setGroups(prev => prev.map(g => {
                 const newMeas = [...g.measurements];
                 if (newMeas.length > 1) {
                     newMeas[newMeas.length - 1].day = endDay;
                 } else {
                     const sCount = g.specs.sampleCount || 3;
                     const endSamples = Array.from({length: sCount}, (_, i) => ({
                         id: Date.now() + i, o2: '', co2: '', weight: ''
                     }));
                     newMeas.push({ day: endDay, samples: endSamples, quality: 9, notes: 'End', images: [], qualityParams: [], evaluateQuality: true });
                 }
                 newMeas.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
                 return { ...g, measurements: newMeas };
               }));
            }
          };

          const handleSampleCountChange = (groupId, newCount) => {
            if (isNaN(newCount) || newCount < 1) newCount = 1;
            if (newCount > 50) newCount = 50; 
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const newMeas = g.measurements.map(m => {
                let newSamples = [...m.samples];
                if (newSamples.length < newCount) {
                  const toAdd = newCount - newSamples.length;
                  for (let i = 0; i < toAdd; i++) {
                    newSamples.push({ id: Date.now() + i + Math.random(), o2: parseFloat(m.day) === 0 ? '20.9' : '', co2: parseFloat(m.day) === 0 ? '0.03' : '', weight: '' });
                  }
                } else if (newSamples.length > newCount) {
                  newSamples = newSamples.slice(0, newCount);
                }
                return { ...m, samples: newSamples };
              });
              return { ...g, specs: { ...g.specs, sampleCount: newCount }, measurements: newMeas };
            }));
          };

          const exportData = () => {
            const data = { project, supplyChain, groups, analysis };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `perfotec-report.json`; a.click();
          };
          
          const importData = (e) => { 
            const file = e.target.files[0]; 
            if(!file) return; 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                try { 
                    const d = JSON.parse(ev.target.result); 
                    if(d.project) {
                      setProject({
                        ...d.project,
                        packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0]
                      });
                    } 
                    if(d.supplyChain) setSupplyChain(d.supplyChain); 
                    if(d.groups) setGroups(d.groups); 
                    if(d.analysis) {
                        setAnalysis({
                            graphNotes: d.analysis.graphNotes || '',
                            conclusion: d.analysis.conclusion || '',
                            variantConclusions: d.analysis.variantConclusions || {},
                            recommendation: d.analysis.recommendation || 'retest',
                            nextSteps: d.analysis.nextSteps || []
                        });
                    }
                } catch(err){
                    alert("Error loading file");
                } 
            }; 
            reader.readAsText(file); 
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              if (section === 'startGas') return { ...g, specs: { ...g.specs, startGas: { ...g.specs.startGas, [field]: value } } };
              return g;
            }));
          };

          const toggleCriteria = (crit) => {
            setProject(prev => {
              const exists = prev.criteria.includes(crit);
              return { ...prev, criteria: exists ? prev.criteria.filter(c => c !== crit) : [...prev.criteria, crit] };
            });
          };

          const addNewCriteria = () => {
            if(newCriteria && !project.criteria.includes(newCriteria)) {
              toggleCriteria(newCriteria);
              setNewCriteria('');
            }
          };

          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          const openSampleModal = (groupId, index) => { 
            const g = groups.find(x => x.id === groupId); 
            const meas = g.measurements[index];
            const isEndDay = project.totalDuration && parseFloat(meas.day) === parseInt(project.totalDuration);
            const isEvaluationDay = parseFloat(meas.day) === 0 || isEndDay;
            
            // P+0 and EndDay are NOT editable in terms of day-number
            const isDayEditable = parseFloat(meas.day) !== 0 && !isEndDay;
            
            const day0 = g.measurements.find(m => parseFloat(m.day) === 0);
            
            setEditingMeasurement({ groupId, index, data: meas, day0Samples: day0?.samples, isEvaluationDay, isDayEditable }); 
            setSampleModalOpen(true); 
          };
          
          const openDetailsModal = (groupId, index) => { 
            const g = groups.find(x => x.id === groupId); 
            setEditingMeasurement({ groupId, index, data: g.measurements[index] }); 
            setDetailsModalOpen(true); 
          };

          const saveSampleData = (u) => { 
            setGroups(p => p.map(g => {
                if (g.id !== editingMeasurement.groupId) return g;
                let newMeasurements = g.measurements.map((m, i) => i === editingMeasurement.index ? { ...u, qualityParams: u.qualityParams } : m);
                newMeasurements.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
                return { ...g, measurements: newMeasurements };
            })); 
          };

          const saveDetailsData = (u) => { setGroups(p => p.map(g => g.id !== editingMeasurement.groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === editingMeasurement.index ? { ...m, images: u.images } : m) })); };

          const addMeasurementDay = (groupId) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              
              const hasEndDay = project.totalDuration && parseInt(project.totalDuration) > 0 && g.measurements.length > 1;
              const sCount = g.specs.sampleCount || 3;
              const newSamples = Array.from({length: sCount}, (_, i) => ({
                  id: Date.now() + i, o2: '', co2: '', weight: ''
              }));

              if (hasEndDay) {
                  const lastIndex = g.measurements.length - 1;
                  const prevMeas = g.measurements[lastIndex - 1];
                  const newDay = prevMeas ? parseFloat(prevMeas.day) + 1 : 1;
                  const newMeas = { day: newDay, samples: newSamples, quality: 9, notes: '', images: [], qualityParams: [], evaluateQuality: false };
                  
                  const updatedMeasurements = [...g.measurements];
                  updatedMeasurements.splice(lastIndex, 0, newMeas);
                  return { ...g, measurements: updatedMeasurements };
              } else {
                  const lastMeas = g.measurements[g.measurements.length - 1];
                  const newDay = lastMeas ? parseFloat(lastMeas.day) + 1 : 1;
                  const newMeas = { day: newDay, samples: newSamples, quality: 9, notes: '', images: [], qualityParams: [], evaluateQuality: false };
                  return { ...g, measurements: [...g.measurements, newMeas] };
              }
            }));
          };
          
          const removeMeasurementDay = (groupId, index) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const newMeas = [...g.measurements];
              newMeas.splice(index, 1);
              return { ...g, measurements: newMeas };
            }));
          };

          const updateQuality = (groupId, index, val) => { setGroups(p => p.map(g => g.id !== groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === index ? { ...m, quality: val } : m) })); };

          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id)) + 1;
            const duration = parseInt(project.totalDuration) || 0;
            const sCount = groups[0].specs.sampleCount || 3;
            
            const generateSamples = (isDay0) => Array.from({length: sCount}, (_, i) => ({

                co2: isDay0 ? '0.03' : '', 
                weight: ''
            }));

            if (duration > 0) {
               meas.push({ day: duration, samples: generateSamples(false), quality: 9, notes: 'End', images: [], qualityParams: [], evaluateQuality: true });
            }
            setGroups([...groups, { id: newId, name: `Variant ${groups.length + 1}`, specs: { ...groups[0].specs, sampleCount: sCount }, measurements: meas, predictedImage: null }]);
            setActiveGroupId(newId);

          const removeGroup = (id) => { if(groups.length > 1) { setGroups(p => p.filter(g => g.id !== id)); setActiveGroupId(groups[0].id); }};

                    ...prev, 
                    nextSteps: [...prev.nextSteps, { text: newStep, variantId: newStepVariant }]

              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = (project.reportTitle || 'Report') + '.doc';
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          if (isPreview) {
            
            // Total chain days calculation
            const totalChainDays = supplyChain.reduce((acc, step) => acc + (parseFloat(step.daysStart) || 0), 0);

            const allPhotos = groups.flatMap(g => 
              g.measurements.flatMap(m =>

                   groupName: g.name,
                   day: m.day,
                   url: typeof img === 'string' ? img : img.url,

                }))

                photosByCategory[p.category].push(p);

            Object.keys(photosByCategory).forEach(c => {
                if (!categoriesPresent.includes(c)) categoriesPresent.push(c);

            return (

                <style>{`
                    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=League+Spartan:wght@700&display=swap');
                    .brand-heading { font-family: 'League Spartan', sans-serif; }

                        text-transform: uppercase;

                        margin-bottom: 1.5rem;

                    .report-table td { border-bottom: 1px solid ${BRAND.colors.gray}; padding: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; }

                    .pdf-rich-text ul { list-style-type: disc; padding-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
                    .pdf-rich-text li { margin-bottom: 0.25rem; }
                    .pdf-rich-text b { font-weight: 700; }
                    .pdf-rich-text i { font-style: italic; }

                      body { background: white; margin: 0; padding: 0; }
                      body * { visibility: hidden; }
                      #print-content, #print-content * { visibility: visible !important; }
                      #print-content {

                        width: 100%;

                      }

                      }
                      .no-print, .no-print * {

                        visibility: hidden !important; 
                      }
                      button { display: none !important; }
                      .page-break { page-break-before: always !important; break-before: page !important; }
                      .break-inside-avoid { 
                        break-inside: avoid !important; 
                        page-break-inside: avoid !important;
                      }
                      svg { break-inside: avoid; }
                    }
                `}</style>

                <div>

                       <div>
                          {/* Header Logos */}

                              <img src={project.logo} alt="PerfoTec" className="h-16 max-w-[200px] object-contain self-start mb-2" />
                              <div className="text-sm font-bold tracking-[0.25em] uppercase" style={{ color: BRAND.colors.blue, fontFamily: BRAND.fonts.heading, marginLeft: '4px' }}>Best for Freshness</div>
                            </div>

                               <img src={project.clientLogo} alt="Client Logo" className="h-16 max-w-[200px] object-contain self-end" />

                            </div>
                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center text-center bg-slate-50 relative group min-h-[100px]">
                              <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleClientLogoUpload} />
                              {project.clientLogo ? <img src={project.clientLogo} className="h-full object-contain" /> : <><Upload size={24} color={BRAND.colors.green} className="mb-2"/><span className="font-bold text-xs text-slate-600">Upload Client Logo</span></>}
                            </div>
                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center text-center bg-slate-50 relative group min-h-[150px]"><input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleCoverImageUpload} />{project.coverImage ? <img src={project.coverImage} className="w-full h-full object-cover rounded" /> : <><ImageIcon size={24} color={BRAND.colors.green} className="mb-2"/><span className="font-bold text-xs text-slate-600">Cover Photo</span></>}</div>
                            <div className="border-2 border-dashed border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center text-center bg-slate-50 relative group min-h-[150px]"><input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleStartImageUpload} />{project.startImage ? <img src={project.startImage} className="w-full h-full object-cover rounded" /> : <><ImageIcon size={24} color={BRAND.colors.green} className="mb-2"/><span className="font-bold text-xs text-slate-600">Ref Photo (P+0)</span></>}</div>
                         </div>
                       </div>
                    </div>
                    <div className="bg-white p-4 sm:p-8 rounded-xl shadow-sm border border-slate-100">
                      <h2 className="font-bold text-lg mb-6 text-[#211A1A] border-b pb-2 flex items-center gap-2"><Truck size={20}/> Product Supply Chain</h2>
                      <div className="space-y-4 overflow-hidden">
                        {supplyChain.map((step, idx) => (
                           <div key={idx} className="flex flex-wrap xl:flex-nowrap gap-4 items-end bg-slate-50 p-4 rounded-lg border border-slate-200 relative group">
                              <div className="flex flex-col gap-1 shrink-0 w-full sm:w-auto flex-row xl:flex-col justify-end xl:justify-start">
                                 <button onClick={() => moveChainStep(idx, 'up')} disabled={idx === 0} className="p-2 sm:p-1 hover:bg-slate-200 rounded disabled:opacity-30"><ChevronUp size={16}/></button>
                                 <button onClick={() => moveChainStep(idx, 'down')} disabled={idx === supplyChain.length - 1} className="p-2 sm:p-1 hover:bg-slate-200 rounded disabled:opacity-30"><ChevronDown size={16}/></button>
                              </div>
                              <div className="flex-1 min-w-[200px] w-full">
                                <label className="label">Step {idx+1}</label>
                                {idx === 2 ? (<select className="input" value={step.stage} onChange={e => updateChainStep(idx, 'stage', e.target.value)}><option>Transport by road</option><option>Seafreight</option><option>Airfreight</option><option>Storage</option></select>) : (<input type="text" className="input" value={step.stage} onChange={e => updateChainStep(idx, 'stage', e.target.value)} />)}
                              </div>
                              <div className="flex gap-2 w-full sm:w-auto">
                                 <div className="w-1/2 sm:w-24"><label className="label">Temp (°C)</label><input type="number" className="input font-bold" value={step.tempStart} onChange={e => updateChainStep(idx, 'tempStart', e.target.value)} /></div>
                                 <div className="w-1/2 sm:w-24"><label className="label">To</label><input type="number" className="input" value={step.tempEnd} onChange={e => updateChainStep(idx, 'tempEnd', e.target.value)} placeholder="-" /></div>
                              </div>
                              <div className="flex gap-2 w-full sm:w-auto">
                                 <div className="w-1/2 sm:w-24"><label className="label">Days</label><input type="number" className="input" value={step.daysStart} onChange={e => updateChainStep(idx, 'daysStart', e.target.value)} /></div>
                                 <div className="w-1/2 sm:w-24"><label className="label">To</label><input type="number" className="input" value={step.daysEnd} onChange={e => updateChainStep(idx, 'daysEnd', e.target.value)} placeholder="-" /></div>
                              </div>
                              <div className="w-full sm:w-32 shrink-0">
                                <label className="label">Action</label>
                                <select className="input" value={step.action} onChange={e => updateChainStep(idx, 'action', e.target.value)}>
                                  <option value="none">-</option>
                                  <option value="pack">Pack</option>
                                  <option value="unpack">Unpack</option>
                                </select>
                              </div>
                              <button onClick={() => removeChainStep(idx)} className="p-3 bg-red-50 text-red-500 rounded border border-red-100 hover:bg-red-100 shrink-0 w-full sm:w-auto mt-2 sm:mt-0 flex justify-center items-center"><Trash2 size={18}/></button>
                           </div>
                        ))}
                        <button onClick={addChainStep} className="flex items-center gap-2 text-sm font-bold text-green-700 hover:text-green-800 p-2"><Plus size={16}/> Add Step</button>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'groups' && (
                  <>
                    <div className="col-span-1 md:col-span-3 space-y-4">
                       {/* Global Criteria Config */}
                       <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm mb-4">
                          <label className="label mb-2 text-slate-700">Global Assessment Criteria</label>
                          <div className="flex flex-wrap gap-2 mb-3">
                            {project.criteria.length === 0 && <span className="text-xs text-gray-400 italic">No criteria selected.</span>}
                            {project.criteria.map(c => (
                              <span key={c} className="bg-slate-50 border border-slate-300 text-slate-700 text-xs px-2 py-1 rounded flex items-center gap-1">{c} <button onClick={() => toggleCriteria(c)} className="text-red-400 hover:text-red-600 font-bold ml-1">×</button></span>
                            ))}
                          </div>
                          <div className="flex flex-col gap-2">
                            <select className="input w-full" value={newCriteria} onChange={e => setNewCriteria(e.target.value)}>
                               <option value="">Select standard criterion...</option>
                               {DEFAULT_CRITERIA.filter(c => !project.criteria.includes(c)).map(c => <option key={c}>{c}</option>)}
                            </select>
                            <button onClick={addNewCriteria} className="bg-slate-800 text-white px-3 py-2 rounded hover:bg-black flex justify-center items-center"><Plus size={16}/></button>
                          </div>
                       </div>

                       <button onClick={addNewVariant} className="w-full py-3 rounded font-bold border-2 border-dashed hover:bg-green-50 text-green-700 transition" style={{borderColor: BRAND.colors.green}}>+ New Variant</button>
                       {groups.map((g, idx) => (
                         <div key={g.id} onClick={() => setActiveGroupId(g.id)} className={`p-4 rounded-lg border cursor-pointer transition relative group ${activeGroupId === g.id ? 'bg-white shadow-md border-green-500 border-l-4' : 'bg-slate-50 hover:bg-white'}`}>
                           <div className="flex items-center gap-3 font-bold text-sm text-slate-700"><div className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: CHART_COLORS[idx % CHART_COLORS.length].stroke }}></div><span className="truncate">{g.name}</span></div>
                           <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                              <button onClick={(e) => { e.stopPropagation(); duplicateGroup(g.id); }} className="p-1.5 bg-blue-50 text-blue-600 rounded"><Copy size={14} /></button>
                              <button onClick={(e) => { e.stopPropagation(); removeGroup(g.id); }} className="p-1.5 bg-red-50 text-red-600 rounded"><Trash2 size={14} /></button>
                           </div>
                         </div>
                       ))}
                    </div>
                    <div className="col-span-1 md:col-span-9 bg-white p-4 sm:p-8 rounded-xl shadow-sm border border-slate-100 space-y-8 overflow-hidden">
                       {groups.find(g => g.id === activeGroupId) && (
                         <>
                           <div>
                             <h3 className="font-bold text-lg mb-4 text-[#211A1A]">Trial Samples Config</h3>
                             <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mb-4">
                               <div><label className="label">Name</label><input type="text" className="input font-bold" value={groups.find(g => g.id === activeGroupId).name} onChange={(e) => handleGroupChange(activeGroupId, 'name', null, e.target.value)} /></div>
                               <div><label className="label">Packaging Type</label><select className="input" value={groups.find(g => g.id === activeGroupId).specs.packaging} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'packaging', e.target.value)}>{PACKAGING_TYPES.map(t => <option key={t}>{t}</option>)}</select></div>
                             </div>
                             
                             <label className="label text-blue-800 mb-2 border-b border-blue-200 pb-1 w-full block mt-4">Packaging Dimensions & Samples</label>
                             <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-t-lg border-x border-t border-slate-100">
                                <div><label className="label">Length (mm)</label><input type="number" className="input" value={groups.find(g => g.id === activeGroupId).specs.length} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'length', e.target.value)} /></div>
                                <div><label className="label">Width (mm)</label><input type="number" className="input" value={groups.find(g => g.id === activeGroupId).specs.width} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'width', e.target.value)} /></div>
                                <div><label className="label">Height (mm)</label><input type="number" className="input" value={groups.find(g => g.id === activeGroupId).specs.height} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'height', e.target.value)} /></div>
                             </div>
                             <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-b-lg border border-slate-100 mb-6">
                               <div><label className="label">Material</label><input className="input" value={groups.find(g => g.id === activeGroupId).specs.material} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'material', e.target.value)} /></div>
                               <div><label className="label">Transmission Value (TV)</label><input type="number" className="input" value={groups.find(g => g.id === activeGroupId).specs.holes} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'holes', e.target.value)} /></div>
                               <div><label className="label">Aantal Samples / Meting</label><input type="number" min="1" className="input bg-white border-blue-200 font-bold text-blue-900" value={groups.find(g => g.id === activeGroupId).specs.sampleCount || 3} onChange={(e) => handleSampleCountChange(activeGroupId, parseInt(e.target.value))} /></div>
                             </div>
                             
                             <div className="border-2 border-dashed border-blue-200 bg-blue-50 rounded-lg p-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                                <div className="flex items-center gap-4">
                                   <LineChart size={24} className="text-blue-500 shrink-0" />
                                   <div>
                                     <div className="font-bold text-sm text-blue-900">Predicted Gas Graph</div>
                                     <div className="text-xs text-blue-600">Upload screenshot for this variant</div>
                                   </div>
                                </div>
                                <label className="cursor-pointer bg-white border border-blue-200 text-blue-700 px-4 py-2 rounded font-bold text-xs hover:bg-blue-50 transition shrink-0 whitespace-nowrap">
                                   Upload Image
                                   <input type="file" accept="image/*" className="hidden" onChange={(e) => handlePredictedImageUpload(e, activeGroupId)} />
                                </label>
                             </div>
                             {groups.find(g => g.id === activeGroupId).predictedImage && <div className="mt-2 border rounded p-2 bg-white inline-block max-w-full"><img src={groups.find(g => g.id === activeGroupId).predictedImage} className="h-32 max-w-full object-contain" /></div>}
                           </div>
                           
                           <div className="w-full">
                             <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="font-bold text-lg text-[#211A1A]">Measurements</h3><button onClick={() => addMeasurementDay(activeGroupId)} className="text-xs text-white px-3 py-1.5 rounded font-bold shadow-md hover:opacity-90" style={{background: BRAND.colors.green}}>+ Add Day</button></div>
                             <div className="overflow-x-auto">
                               <table className="w-full text-sm min-w-[600px]">
                                 <thead><tr className="bg-slate-50 text-left text-slate-500"><th className="p-3">Day</th><th className="p-3">Samples</th><th className="p-3 font-bold" style={{color:BRAND.colors.blue}}>O₂</th><th className="p-3 font-bold" style={{color:BRAND.colors.green}}>CO₂</th><th className="p-3">Wt.</th><th className="p-3">Qual.</th><th className="p-3">Actions</th></tr></thead>
                                 <tbody>
                                   {groups.find(g => g.id === activeGroupId).measurements.map((m, idx) => {
                                     const isEndDay = project.totalDuration && parseFloat(m.day) === parseInt(project.totalDuration);
                                     const isFixedDay = parseFloat(m.day) === 0 || isEndDay;
                                     return (
                                       <tr key={idx} className="hover:bg-blue-50 transition border-b border-slate-50">
                                         <td className="p-3 font-bold">{formatDay(m.day)}</td>
                                         <td className="p-3 text-xs text-slate-400">{m.samples.length}x</td>
                                         <td className="p-3 font-bold text-blue-700">{getAverage(m.samples, 'o2')}%</td>
                                         <td className="p-3 font-bold text-green-700">{getAverage(m.samples, 'co2')}%</td>
                                         <td className="p-3 text-slate-600">{getAverage(m.samples, 'weight')}g</td>
                                         <td className="p-3"><input type="number" className="w-12 p-1 border rounded" value={m.quality} onChange={e => updateQuality(activeGroupId, idx, e.target.value)} /></td>
                                         <td className="p-3 flex gap-2">
                                            <button onClick={() => openSampleModal(activeGroupId, idx)} className="text-slate-500 hover:text-green-600 bg-white border shadow-sm p-1.5 rounded" title="Edit Data & Quality"><Edit3 size={14}/></button>
                                            <button onClick={() => openDetailsModal(activeGroupId, idx)} className={`text-slate-500 hover:text-blue-600 bg-white border shadow-sm p-1.5 rounded ${m.images && m.images.length > 0 ? 'text-blue-600 border-blue-200 bg-blue-50' : ''}`} title="Photos"><Camera size={14}/></button>
                                            <button onClick={() => removeMeasurementDay(activeGroupId, idx)} disabled={isFixedDay} className={`p-1.5 rounded border shadow-sm ${isFixedDay ? 'bg-gray-100 text-gray-300' : 'bg-white text-red-500 hover:bg-red-50'}`}><Trash2 size={14}/></button>
                                         </td>
                                       </tr>
                                     )
                                   })}
                                 </tbody>
                               </table>
                             </div>
                           </div>
                         </>
                       )}
                    </div>
                  </>
                )}

                {activeTab === 'analysis' && (
                  <div className="col-span-1 md:col-span-12 space-y-6">
                    <div className="bg-white p-4 sm:p-8 rounded-xl shadow-sm border border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-8">
                       <div className="md:col-span-2"><h2 className="font-bold text-lg border-b pb-2 mb-2 text-[#211A1A]">2 Summary and Conclusions</h2></div>
                       
                       <div className="md:col-span-2">
                          <label className="label mb-2">Main Conclusion</label>
                          <RichTextEditor 
                             value={analysis.conclusion} 
                             onChange={(val) => setAnalysis(prev => ({...prev, conclusion: val}))} 
                             placeholder="Schrijf hier de algemene hoofdconclusie..."
                          />
                       </div>

                       <div className="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6">
                          {groups.map(g => (
                             <div key={g.id}>
                                <label className="label mb-2">Conclusie: {g.name}</label>
                                <RichTextEditor 
                                  value={(analysis.variantConclusions || {})[g.id] || ''} 
                                  onChange={(val) => setAnalysis(prev => ({ ...prev, variantConclusions: { ...(prev.variantConclusions || {}), [g.id]: val } }))} 
                                  placeholder={`Specifieke conclusie voor ${g.name}...`} 
                                />
                             </div>
                          ))}
                       </div>

                       <div className="md:col-span-2">
                          <label className="label mb-2">Detailed Conclusions</label>
                          <div className="flex flex-col sm:flex-row gap-2 mb-2">
                            <select className="input sm:w-1/4" value={newStepVariant} onChange={e => setNewStepVariant(e.target.value)}>
                               <option value="general">Algemeen</option>
                               {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                            </select>
                            <input type="text" className="input flex-1" placeholder="Voeg actiepunt of detail conclusie toe..." value={newStep} onChange={e => setNewStep(e.target.value)} onKeyPress={e => e.key === 'Enter' && addNextStep()} />
                            <button onClick={addNextStep} className="bg-slate-800 text-white px-4 py-2 rounded hover:bg-black"><Plus size={18}/></button>
                          </div>
                          
                          <div className="space-y-2 mt-4">
                            {analysis.nextSteps.map((s, i) => {
                               const stepObj = typeof s === 'string' ? { text: s, variantId: 'general' } : s;
                               const vName = stepObj.variantId === 'general' ? 'Algemeen' : groups.find(g => g.id === parseInt(stepObj.variantId))?.name || 'Verwijderde Variant';
                               return (
                                 <div key={i} className="text-sm bg-slate-50 p-3 rounded border border-slate-200 flex justify-between items-start gap-4">
                                   <div>
                                     <span className="text-[10px] font-bold uppercase bg-slate-200 text-slate-600 px-2 py-0.5 rounded mr-2">{vName}</span>
                                     <span className="text-slate-800">{stepObj.text}</span>
                                   </div>
                                   <button onClick={() => removeNextStep(i)} className="text-red-400 hover:text-red-600 shrink-0"><Trash2 size={16}/></button>
                                 </div>
                               );
                            })}
                          </div>
                       </div>
                       
                       <div className="md:col-span-2">
                           <label className="label mb-2">Gas Levels Analysis</label>
                           <RichTextEditor 
                              value={analysis.graphNotes} 
                              onChange={(val) => setAnalysis(prev => ({...prev, graphNotes: val}))} 
                              placeholder="Interpretatie van het gasverloop..."
                           />
                       </div>
                    </div>
                  </div>
                )}
              </main>
              <style>{`.label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; font-family: 'Inter', sans-serif; } .input { width: 100%; padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; outline: none; transition: 0.2s; font-size: 0.9rem; font-family: 'Inter', sans-serif; } .input:focus { border-color: ${BRAND.colors.green}; box-shadow: 0 0 0 3px rgba(0, 124, 39, 0.1); }`}</style>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
