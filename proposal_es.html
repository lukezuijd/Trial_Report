<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Herramienta de Propuesta</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel compiler for in-browser React (JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Cargando Herramienta de Propuesta... Asegúrese de que 'style.css' y 'config.js' estén en la misma carpeta.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        // --- FIXED IMPORT LIST ---
        import { 
          Printer, FileText, Settings, Layout, CheckCircle, 
          ArrowRight, Copy, Trash2, Plus, Scale, Upload, Truck, 
          Thermometer, Clock, Image as ImageIcon, ChevronRight, 
          Save, FolderOpen, Tractor, Ship, Plane, Warehouse, Store, 
          Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown, 
          Bold, Italic, Underline, List, AlertTriangle, Package, PackagePlus,
          X, Edit3, Camera, FileArchive, LineChart, Globe, AlertCircle,
          Building2, Target, Beaker, Send, Mail
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- LINK WITH CONFIG.JS ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        const PACKAGING_TYPES = globalConfig.PACKAGING_TYPES || ['Retail', 'Box/ Crate', 'Cube crate', 'Pallet', 'Punnets', 'Pillow Bag'];
        const TRANSPORT_MODES = globalConfig.TRANSPORT_MODES || ['Air Freight', 'Sea Freight', 'Road Transport', 'Storage'];

        const DEFAULT_CRITERIA = globalConfig.DEFAULT_CRITERIA || [
          'General Quality', 'Taste', 'Visual Appearance', 'Color',
          'Smell / Aroma', 'Texture / Firmness', 'Humidity / Condensation',
          'Dehydration / Shriveling', 'Moulds / Decay', 'Internal Browning'
        ];

        const PERFOTEC_TECHNOLOGIES = [
          'Respiration Measurement (FRM)',
          'Laser Micro Perforation',
          'Laser Nano Perforation',
          'Gas Flush (O2 Control)',
          'CO2 Shock',
          'PerfoTec Retail Film',
          'PerfoTec Liner',
          'PerfoTec Pallet Cover'
        ];

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // --- HELPER CLASSES ---
        const inputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest') || n.includes('oogst') || n.includes('granja')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea') || n.includes('zee') || n.includes('marítimo')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air') || n.includes('lucht') || n.includes('aéreo')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('opslag') || n.includes('almacenamiento')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail') || n.includes('winkel') || n.includes('tienda')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat') || n.includes('consument') || n.includes('consumidor')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => {
          if (start && end && start !== end) return `${start}-${end}${unit}`;
          if (start) return `${start}${unit}`;
          return `-`;
        };

        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        // --- COMPONENTS ---
        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const ProductSupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumulativeMin = 0;
          let cumulativeMax = 0;

          return (
            <div className="flex w-full gap-1 items-start justify-between mt-2 mb-2 font-sans overflow-hidden">
              {chain.map((step, idx) => {
                const minD = parseFloat(step.daysStart) || 0;
                const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                cumulativeMin += minD;
                cumulativeMax += maxD;
                
                const cumStr = cumulativeMin === cumulativeMax ? `${cumulativeMin}` : `${cumulativeMin}-${cumulativeMax}`;

                return (
                  <React.Fragment key={idx}>
                    {idx > 0 && <div className="h-16 flex items-center justify-center"><ChevronRight size={14} className="text-gray-300 flex-shrink-0" /></div>}
                    
                    <div className="flex flex-col items-center flex-1 min-w-0">
                      <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded shadow-sm p-1.5 relative">
                         <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: idx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                         
                         <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">
                            {getStageIcon(step.stage)}
                         </div>
                         
                         <div className="text-[8px] font-bold text-center uppercase mb-1 min-h-[24px] py-0.5 flex items-center justify-center leading-tight w-full break-words px-0.5">
                           {step.stage}
                         </div>
                         
                         <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                         
                         <div className="flex flex-col justify-center w-full text-[8px] gap-0.5 pb-0.5">
                            <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap">
                              <Thermometer size={8} className="text-red-500"/> {formatRange(step.tempStart, step.tempEnd, '°C')}
                            </span>
                            <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap">
                              <Clock size={8}/> {formatRange(step.daysStart, step.daysEnd, 'd')}
                            </span>
                         </div>
                         
                         <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap">
                            ∑ {cumStr}d
                         </div>
                      </div>
                      
                      <div className="h-6 w-full flex justify-center items-start mt-1 relative">
                         {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5"><ArrowDown size={10} /></div><span className="text-[6px] font-bold text-green-700 uppercase mt-0.5">Empacado</span></div>}
                         {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5"><ArrowUp size={10} /></div><span className="text-[6px] font-bold text-red-700 uppercase mt-0.5">Abierto</span></div>}
                      </div>
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        };

        const SampleToggles = ({ max, selected, disabled, onChange, activeClass }) => {
          const arr = Array.from({length: max}, (_, i) => i + 1);
          return (
            <div className="flex flex-wrap gap-1.5">
              {arr.map(s => {
                const isSel = selected.includes(s);
                const isDis = disabled.includes(s);
                return (
                  <button 
                    key={s}
                    type="button"
                    onClick={() => !isDis && onChange(s)}
                    disabled={isDis}
                    title={isDis ? "La muestra ya se abrió anteriormente" : `Seleccionar Muestra ${s}`}
                    className={`w-7 h-7 flex items-center justify-center text-xs font-bold rounded-lg border transition-all ${
                      isDis ? 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed' :
                      isSel ? activeClass : 
                      'bg-white border-slate-300 text-slate-500 hover:bg-slate-50 hover:border-slate-400'
                    }`}
                  >
                    {s}
                  </button>
                )
              })}
            </div>
          )
        };

        // --- PRINT PREVIEW ---
        const PrintPreview = ({ clientInfo, project, groups, proposal, supplyChain, onBack }) => {
          let allTemps = [];
          (supplyChain || []).forEach(s => {
              const ts = parseFloat(s.tempStart); if(!isNaN(ts)) allTemps.push(ts);
              const te = parseFloat(s.tempEnd); if(!isNaN(te)) allTemps.push(te);
          });
          const minTemp = allTemps.length > 0 ? Math.min(...allTemps) : null;
          const maxTemp = allTemps.length > 0 ? Math.max(...allTemps) : null;
          const tempString = allTemps.length > 0 ? (minTemp === maxTemp ? `${minTemp}°C` : `${minTemp}°C - ${maxTemp}°C`) : '-°C';
          const totalDays = project.totalDuration || (supplyChain || []).reduce((acc,s) => acc + parseFloat(s.daysStart || 0), 0);

          // Reusable class for titles to ensure they stand out even if CSS fails
          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading break-after-avoid";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          const handleWordExport = () => {
              const content = document.getElementById('print-content').innerHTML;
              const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML To Doc</title><style>body { font-family: 'Arial', sans-serif; } .page-break { page-break-before: always; } table { width: 100%; border-collapse: collapse; margin-bottom: 20px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #007C27; color: white; } img { max-width: 100%; height: auto; }</style></head><body>`;
              const postHtml = "</body></html>";
              const html = preHtml + content + postHtml;
              const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
              const url = URL.createObjectURL(blob);
              const downloadLink = document.createElement("a");
              document.body.appendChild(downloadLink);
              downloadLink.href = URL.createObjectURL(blob);
              downloadLink.download = (project.reportTitle || 'Propuesta') + '.doc';
              downloadLink.click();
              document.body.removeChild(downloadLink);
          };

          return (
            <div className="min-h-screen bg-slate-600 p-0 sm:p-8 overflow-y-auto font-sans print:p-0 print:bg-white no-print-bg selection:bg-blue-200 selection:text-blue-900">
              <div className="fixed bottom-8 right-8 flex gap-4 no-print z-50">
                <button onClick={onBack} className="bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl font-bold transition hover:bg-slate-900 flex items-center gap-2"><Edit3 size={18}/> Editar</button>
                <button onClick={handleWordExport} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition">
                  <FileArchive size={20} /> Descargar Word
                </button>
                <button onClick={() => window.print()} className="bg-green-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 hover:bg-green-700 transition">
                  <Printer size={18} /> Descargar PDF
                </button>
              </div>

              <div id="print-content" className="max-w-[21cm] mx-auto bg-white shadow-2xl min-h-[29.7cm] p-12 relative print:shadow-none print:max-w-full print:w-full print:p-0 text-slate-800">
                
                {/* --- COVER PAGE --- */}
                <div className="h-[27cm] flex flex-col justify-between items-center text-center pt-24">
                   <div className="w-full flex flex-col items-center">
                      <div className="flex justify-between items-start w-full px-8">
                          <div className="w-1/2 flex justify-start">
                            {project.logo && (
                               <img src={project.logo} alt="PerfoTec Logo" className="h-32 max-w-[400px] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                          <div className="w-1/2 flex justify-end">
                            {project.clientLogo && (
                               <img src={project.clientLogo} alt="Client Logo" className="h-32 max-w-[400px] object-contain" crossOrigin="anonymous" />
                            )}
                          </div>
                      </div>

                      <h1 className="text-5xl font-bold uppercase mt-16 mb-4 brand-heading" style={{ color: BRAND.colors.green }}>{project.reportTitle || 'Propuesta de Prueba'}</h1>
                      <h2 className="text-5xl font-light brand-heading text-slate-600 mb-16">{project.productName || '<Nombre del Producto>'}</h2>
                      
                      <div className="w-full h-[450px] overflow-hidden flex items-center justify-center relative bg-transparent border-none mt-8 rounded-2xl">
                         {project.coverImage ? <img src={project.coverImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : project.startImage ? <img src={project.startImage} className="w-full h-full object-contain" crossOrigin="anonymous" /> : <span className="text-slate-300 italic font-medium">Sin Foto de Portada</span>}
                      </div>
                   </div>
                   <div className="w-full flex justify-center items-end pb-4">
                       <div className="text-sm text-slate-400 font-medium">© {new Date().getFullYear()} PerfoTec B.V.</div>
                   </div>
                </div>

                <div className="page-break"></div>

                {/* --- TABLE OF CONTENTS --- */}
                <div className="min-h-[27cm] flex flex-col pt-12">
                    <h2 className="text-4xl font-extrabold uppercase mb-8 brand-heading" style={{ color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '1rem' }}>Tabla de Contenido</h2>
                    <ul className="text-xl space-y-4 font-medium text-slate-700">
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>1. Introducción y Objetivos</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>2. Información del Proyecto y la Empresa</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>3. Características del Producto y Prevención de Defectos</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>4. Cadena de Suministro Simulada</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>5. Configuración de Prueba Propuesta</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>6. Plan de Evaluación</span></li>
                        <li className="flex justify-between border-b border-slate-200 pb-2"><span>7. Requisitos y Acuerdos</span></li>
                    </ul>
                </div>

                <div className="page-break"></div>

                {/* --- PAGE 1: INTRO & SETTING --- */}
                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>1. Introducción y Objetivos</h2>
                  <div className="text-base leading-relaxed text-justify text-slate-800 mb-8">
                     <div className="mb-6 whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal?.intro || '' }}></div>
                     
                     {project.currentChallenge && (
                       <div className="mb-6 bg-orange-50 p-5 rounded-2xl border border-orange-100">
                         <h4 className="font-bold text-lg mb-2 text-orange-800">Desafío Actual:</h4>
                         <div className="whitespace-pre-wrap text-slate-700">{project.currentChallenge}</div>
                       </div>
                     )}

                     {project.trialTarget && (
                       <div className="mb-6 bg-green-50 p-5 rounded-2xl border border-green-100">
                         <h4 className="font-bold text-lg mb-2 text-green-800">Objetivo:</h4>
                         <div className="whitespace-pre-wrap text-slate-700">{project.trialTarget}</div>
                       </div>
                     )}
                     
                     {proposal?.expectedOutcomes && (
                       <div className="mb-6">
                         <h4 className="font-bold text-lg mb-2" style={{color: BRAND.colors.blue}}>Resultados Esperados:</h4>
                         <div className="whitespace-pre-wrap pdf-rich-text" dangerouslySetInnerHTML={{ __html: proposal.expectedOutcomes }}></div>
                       </div>
                     )}
                  </div>
                </div>

                <div className="page-break"></div>

                <div className="pt-4">
                  <h2 className={reportTitleClass} style={reportTitleStyle}>2. Información del Proyecto y la Empresa</h2>
                  <div className="grid grid-cols-[180px_1fr] gap-y-3 text-base text-slate-800 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Producto :</div> <div className="font-bold">{project.productName || '-'} {project.type ? `(${project.type})` : ''}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Estado del producto :</div> <div className="font-medium">{project.processingType === 'Whole' ? 'Entero' : 'Procesado / Cortado'}</div>
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Origen del Producto :</div> <div className="font-medium">{project.origin || '-'}</div>
                     
                     {(clientInfo.companyName || clientInfo.street || clientInfo.contactName || clientInfo.email || clientInfo.phone) && (
                       <div className="font-bold col-span-2 mt-4 border-t border-slate-200 pt-4 text-lg" style={{color: BRAND.colors.green}}>Detalles de la Empresa</div>
                     )}
                     {clientInfo.companyName && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Nombre de Empresa :</div> <div className="font-bold">{clientInfo.companyName}</div></>}
                     
                     {(() => {
                       const streetPart = [clientInfo.street, clientInfo.houseNumber].filter(Boolean).join(' ');
                       const cityPart = [clientInfo.zipCode, clientInfo.city].filter(Boolean).join(' ');
                       const addressStr = [streetPart, cityPart, clientInfo.country].filter(Boolean).join(', ');
                       return addressStr ? <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Dirección :</div> <div className="font-medium">{addressStr}</div></> : null;
                     })()}

                     {clientInfo.contactName && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Persona de Contacto :</div> <div className="font-medium">{clientInfo.contactName} {clientInfo.role && <span className="text-slate-500">({clientInfo.role})</span>}</div></>}
                     {(clientInfo.email || clientInfo.phone) && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Detalles de Contacto :</div> <div className="font-medium">{[clientInfo.email, clientInfo.phone].filter(Boolean).join(' | ')}</div></>}

                     <div className="font-bold col-span-2 mt-4 border-t border-slate-200 pt-4 text-lg" style={{color: BRAND.colors.green}}>Soporte PerfoTec</div>
                     {project.employee && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Empleado de PerfoTec :</div> <div className="font-medium">{project.employee}</div></>}
                     {(project.employeeEmail || project.employeePhone) && <><div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-center">Detalles de Contacto :</div> <div className="font-medium">{[project.employeeEmail, project.employeePhone].filter(Boolean).join(' | ')}</div></>}
                     
                     <div className="font-bold text-slate-500 uppercase tracking-wide text-xs flex items-start mt-1">Tecnología :</div> 
                     <div className="font-medium">

            productName: '', processingType: 'Whole', type: '', origin: '', company: '', contactName: '', contactEmail: '', contactPhone: '', employee: '', employeeEmail: '', employeePhone: '', trialTarget: '', currentChallenge: '',
            rrO2: '', rrCO2: '', rrTemp: '', startWeight: '', 
            acpO2: '', co2Max: '', co2Shock: '', co2ShockHours: '', tempMin: '', 
            totalDuration: '', transportMode: '',
            criteria: [],
            technologies: [],
            date: new Date().toISOString().split('T')[0], packingDate: new Date().toISOString().split('T')[0],
            logo: BRAND.logos.default, clientLogo: null, startImage: null, coverImage: null,
            maturityStage: '', postHarvestTreatment: '',
            defectsMatrix: [] 
          });

          const [supplyChain, setSupplyChain] = useState(JSON.parse(JSON.stringify(DEFAULT_SUPPLY_CHAIN)));

          const [groups, setGroups] = useState([
            {
              id: 1, name: 'Control',
              specs: { packaging: 'Retail', material: 'BOPP', length: '', width: '', height: '', holes: '2', sampleCount: 3 },
              measurements: [
                { day: 0, measure: [], open: [], evaluate: [] }, 
                { day: 5, measure: [], open: [], evaluate: [] }
              ],
              predictedImage: null 
            },
            {
              id: 2, name: 'PerfoTec Laser',
              specs: { packaging: 'Retail', material: 'BOPP', length: '', width: '', height: '', holes: '4', sampleCount: 3 },
              measurements: [
                { day: 0, measure: [], open: [], evaluate: [] }, 
                { day: 5, measure: [], open: [], evaluate: [] }
              ],
              predictedImage: null 
            }
          ]);

          const [proposal, setProposal] = useState({ 
            intro: 'Para extender la vida útil y mantener la calidad óptima de su producto, proponemos realizar una prueba comparativa MAP (Empaque de Atmósfera Modificada). Utilizando la tecnología avanzada de medición de respiración y láser de PerfoTec, buscamos crear el microclima perfecto dentro del empaque.', 
            expectedOutcomes: '<ul><li>Extensión de la vida útil por X días.</li><li>Reducción de pérdida de humedad y peso.</li><li>Mantenimiento del color y firmeza natural.</li></ul>', 
            requirements: '<ul><li>Proporcionar el material de empaque actual para el grupo de control.</li><li>El producto debe ser transportado bajo condiciones refrigeradas.</li></ul>' 
          });
          
          const [newCriteria, setNewCriteria] = useState('');

          const calcUnpackingDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;
            if (baseDate && duration) {
               const d = new Date(baseDate);
               d.setDate(d.getDate() + duration);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const year = d.getFullYear();
               return `${day}/${month}/${year}`; 
            }
            return '-';
          };
          
          const calcRetailDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;
            const retailDays = parseInt(project.retailOpenDays) || 0;
            if (baseDate && (duration || retailDays)) {
               const d = new Date(baseDate);
               d.setDate(d.getDate() + duration + retailDays);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const year = d.getFullYear();
               return `${day}/${month}/${year}`; 
            }
            return '-';
          };

          // --- HANDLERS ---
          const handleClientChange = (field, value) => {
            setClientInfo(prev => ({ ...prev, [field]: value }));
          };

          const handleImgUpload = (e, field) => { 
             const f = e.target.files[0]; 
             if(f) { 
                const r = new FileReader(); 
                r.onloadend = () => { setProject(p => ({...p, [field]: r.result})); }; 
                r.readAsDataURL(f); 
             }
          };

          const handlePredictedImageUpload = (e, groupId) => { 
            const file = e.target.files[0]; 
            if(file) { 
              const group = groups.find(g => g.id === groupId);
              const reader = new FileReader(); 
              reader.onloadend = () => {
                 if (group && group.predictedImage) {
                    setPendingImageReplace({ groupId: groupId, result: reader.result });
                 } else {
                    setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: reader.result } : g)); 
                 }
              };
              reader.readAsDataURL(file); 
              e.target.value = '';
            }
          };

          const confirmReplaceImage = () => {
            setGroups(prev => prev.map(g => g.id === pendingImageReplace.groupId ? { ...g, predictedImage: pendingImageReplace.result } : g));
            setPendingImageReplace(null);
          };

          const removePredictedImage = (groupId) => {
            setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: null } : g));
          };

          const handleProjectChange = (f, v) => setProject(p => ({...p, [f]: v}));
          
          const handleDurationChange = (e) => {
            setProject(p => ({...p, totalDuration: e.target.value}));
          };

          const exportData = async () => {
            const exportGroups = groups.map(g => ({
              ...g,
              specs: { ...g.specs, startWeight: project.startWeight }, 
              measurements: (g.measurements || []).map(m => ({
                 day: m.day,
                 samples: Array.from({length: g.specs?.sampleCount || 3}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '' })),
                 quality: 9,
                 notes: '',
                 images: [],
                 qualityParams: [],
                 evaluateQuality: true,
                 measure: m.measure || [],
                 open: m.open || [],
                 evaluate: m.evaluate || []
              }))
            }));

            const data = { project, clientInfo, supplyChain, groups: exportGroups, proposal };
            const cleanCompanyName = clientInfo.companyName ? clientInfo.companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'cliente';
            const filename = `perfotec_propuesta_${cleanCompanyName}.json`; 
            
            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(data, filename);
            } else {
                const jsonString = JSON.stringify(data, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            }
          };

          const importData = (e) => { 
            const file = e.target.files[0]; if(!file) return; 
            
            const processData = (d) => {
                if(d.isPerfoTecIntake) {
                   const client = d.client || {}; const prod = d.products?.[0] || {};
                   setClientInfo({
                     companyName: client.companyName||'', street: client.street||'', houseNumber: client.houseNumber||'', zipCode: client.zipCode||'', city: client.city||'', country: client.country||'', contactName: client.contactName||'', role: client.role||'', email: client.email||'', phone: client.phone||'', logo: client.logo||null
                   });
                   setProject(p => ({ ...p, 
                     productName: prod.name||'', processingType: prod.processingType||'Whole', type: prod.type||'', origin: prod.origin||'', maturityStage: prod.maturityStage||'', postHarvestTreatment: prod.postHarvestTreatment||'', currentChallenge: prod.currentChallenge||'', trialTarget: prod.targetGoal||'', transportMode: prod.transportMode || (prod.transportModes?.[0] || ''), criteria: prod.qualityCriteria||[], startImage: prod.photo||null,
                     startWeight: prod.weight || p.startWeight,
                     technologies: prod.technologies || p.technologies || []
                   }));
                   if (prod.supplyChain) setSupplyChain(prod.supplyChain);
                   setGroups(p => { const ug = [...p]; if(ug[0]) { ug[0].specs = { ...ug[0].specs, packaging: prod.packagingType||'Retail', material: prod.material||'', length: prod.length||'', width: prod.width||'', height: prod.height||'' }; } return ug; });
                } else {
                   if(d.clientInfo) {
                       setClientInfo(d.clientInfo);
                   } else if (d.client) {
                       setClientInfo(d.client);
                   } else if (d.project) {
                       setClientInfo({
                         companyName: d.project.company || '', 
                         street: d.project.street || '', 
                         houseNumber: d.project.houseNumber || '', 
                         zipCode: d.project.zipCode || '', 
                         city: d.project.city || '', 
                         country: d.project.country || '', 
                         contactName: d.project.contactName || '', 
                         role: d.project.contactRole || d.project.role || '', 
                         email: d.project.contactEmail || d.project.email || '', 
                         phone: d.project.contactPhone || d.project.phone || '', 
                         logo: d.project.logo || null
                       });
                   }
                   if(d.project) {
                       setProject(p => ({
                           ...p, 
                           ...d.project, 
                           packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0], 
                           transportMode: d.project.transportMode || '',
                           startWeight: d.project.startWeight || d.groups?.[0]?.specs?.startWeight || '',
                           technologies: d.project.technologies || []
                       })); 
                   }
                   if(d.supplyChain) setSupplyChain(d.supplyChain); 
                   if(d.groups) {
                       const proposalGroups = d.groups.map(g => ({
                           ...g,
                           measurements: (g.measurements || []).map(m => ({ 
                               day: m.day,
                               measure: m.measure || [],
                               open: m.open || [],
                               evaluate: m.evaluate || []
                           }))
                       }));
                       setGroups(proposalGroups);
                   }
                   if(d.proposal) setProposal(d.proposal);
                }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => alert("Error al cargar el archivo JSON."));
            } else {
                const reader = new FileReader(); 
                reader.onload = (ev) => { 
                    try { 
                        processData(JSON.parse(ev.target.result));
                    } catch(err){ alert("Error al cargar el archivo."); } 
                }; 
                reader.readAsText(file); 
            }
            e.target.value = '';
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) return g;
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              return g;
            }));
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return { ...g, specs: { ...g.specs, sampleCount: c }};
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria?.includes(c) ? p.criteria.filter(x => x !== c) : [...(p.criteria||[]), c] }));
          const addNewCriteria = () => { if(newCriteria && !(project.criteria||[]).includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          const handleTransportModeToggle = (mode) => {
            setProject(p => ({ ...p, transportMode: p.transportMode === mode ? '' : mode }));
          };
          const toggleTechnology = (tech) => {
            setProject(p => ({ 
                ...p, 
                technologies: p.technologies?.includes(tech) ? p.technologies.filter(t => t !== tech) : [...(p.technologies || []), tech] 
            }));
          };

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Group Handling
          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            
            setGroups([...groups, { 
                id: newId, 
                name: `Variante ${groups.length + 1}`, 
                specs: { ...groups[0].specs }, 
                measurements: [
                   { day: 0, measure: [], open: [], evaluate: [] }
                ],
                predictedImage: null
            }]);
            setActiveGroupId(newId);
          };

          const duplicateGroup = (id) => { 
            const org = groups.find(g => g.id === id); 
            const newId = Math.max(...groups.map(g => g.id), 0) + 1; 
            setGroups(p => [...p, { 
              ...org, 
              id: newId, 
              name: `${org.name} (Copia)`,
              measurements: org.measurements.map(m => ({...m}))
            }]); 
            setActiveGroupId(newId); 
          };
          
          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                setGroups(p => {
                    const newGroups = p.filter(g => g.id !== id);
                    if (activeGroupId === id) setActiveGroupId(newGroups[0].id);
                    return newGroups;
                });
            }
          };

          // Timeline Events Handling
          const addEvaluationDay = (groupId) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const lastDay = g.measurements?.length > 0 ? Math.max(...g.measurements.map(m => parseFloat(m.day))) : 0;
                  
                  return {
                      ...g,
                      measurements: [...(g.measurements || []), { 
                          day: lastDay + 1,
                          measure: [],
                          open: [],
                          evaluate: []
                      }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const removeEvaluationDay = (groupId, dayToRemove) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).filter(m => parseFloat(m.day) !== parseFloat(dayToRemove))
                  };
              }));
          };
          
          const updateEvaluationDay = (groupId, oldDay, newDayValue) => {
              const newD = parseFloat(newDayValue) || 0;
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  return {
                      ...g,
                      measurements: (g.measurements || []).map(m => parseFloat(m.day) === parseFloat(oldDay) ? { ...m, day: newD } : m).sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
                  };
              }));
          };

          const toggleEvent = (groupId, day, field, sampleNum) => {
              setGroups(prev => prev.map(g => {
                  if (g.id !== groupId) return g;
                  const newM = g.measurements.map(m => {
                      if (parseFloat(m.day) === parseFloat(day)) {
                          const arr = m[field] || [];
                          const newArr = arr.includes(sampleNum) ? arr.filter(x => x !== sampleNum) : [...arr, sampleNum].sort((a,b)=>a-b);
                          return { ...m, [field]: newArr };
                      }
                      return m;
                  });
                  return { ...g, measurements: newM };
              }));
          };

          if (isPreview) {
            return <PrintPreview clientInfo={clientInfo} project={project} groups={groups} proposal={proposal} supplyChain={supplyChain} onBack={() => setIsPreview(false)} />;
          }

          // --- EDITOR VIEW ---
          return (
            <div className="min-h-screen pb-20 font-sans text-slate-800">
              
              {pendingImageReplace && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-orange-500 transform transition-all">
                     <div className="flex items-center gap-4 mb-6 text-orange-600 bg-orange-50 p-4 rounded-xl">
                        <AlertTriangle size={28} />
                        <h3 className="font-extrabold text-xl">Advertencia</h3>
                     </div>
                     <p className="mb-8 text-base text-slate-700 leading-relaxed">Está a punto de sobrescribir el Gráfico de Gas Predicho actual con una nueva imagen. ¿Desea continuar?</p>
                     <div className="flex justify-end gap-3">
                       <button onClick={() => setPendingImageReplace(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">Cancelar</button>
                       <button onClick={confirmReplaceImage} className="px-6 py-3 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-bold shadow-lg shadow-orange-200 transition">Sobrescribir</button>
                     </div>
                  </div>
                </div>
              )}
              
              {/* HEADER */}
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <img src={BRAND.logos.default} alt="PerfoTec" className="h-9 md:h-12 object-contain" />
                    <div className="border-l-2 border-slate-200 pl-4 ml-2 hidden sm:block">
                      <h1 className="font-extrabold text-2xl tracking-tight leading-none" style={{color: BRAND.colors.blue}}>PerfoTec Manager</h1>
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">HERRAMIENTA DE PROPUESTA</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-3">
                    <div className="flex items-center bg-slate-100 hover:bg-slate-200 transition-colors rounded-xl px-3 py-2 border border-slate-200 shadow-sm">
                       <Globe size={18} className="text-slate-500 mr-2" />
                       <select 
                         className="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer w-full" 
                         value={lang} 
                         onChange={(e) => {
                           const val = e.target.value;
                           setLang(val);
                           if (globalConfig.setLanguage) globalConfig.setLanguage(val);
                           if (val !== 'es') {
                               setTimeout(() => {
                                   try { 
                                       if(val === 'en') window.location.assign('proposal.html');
                                       else window.location.assign(`proposal_${val}.html`); 
                                   } catch(err) {}
                               }, 100);
                           }
                         }}
                       >
                         {globalConfig.LANGUAGES ? globalConfig.LANGUAGES.map(l => (
                             <option key={l.code} value={l.code}>{l.label}</option>
                         )) : (
                             <option value="es">ES</option>
                         )}
                       </select>
                    </div>
                    
                    <div className="h-8 border-l border-slate-300 mx-1 hidden md:block"></div>

                    <label className="cursor-pointer bg-white border border-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm">
                      <FolderOpen size={18} className="text-blue-600"/> <span className="hidden md:inline">Cargar JSON</span>
                      <input type="file" accept=".json" className="hidden" onChange={importData} ref={fileInputRef} />
                    </label>
                    <button onClick={exportData} className="bg-white border border-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-50 hover:border-slate-400 transition-all shadow-sm">
                      <Save size={18} className="text-green-600"/> <span className="hidden md:inline">Guardar como...</span>
                    </button>
                    <button onClick={() => { if(!clientInfo.companyName) alert('¡Atención: Complete los datos de la empresa!'); setIsPreview(true); }} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-700 transition-all shadow-md hover:shadow-blue-500/30 ml-2">
                      <FileText size={18}/> <span className="hidden md:inline">Ver Propuesta</span>
                    </button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto p-4 sm:p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
                <div className="col-span-1 md:col-span-12 flex flex-wrap gap-2 border-b border-slate-200 pb-1 mb-2">
                  {['setup', 'groups', 'proposal'].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 sm:px-8 py-3.5 font-bold rounded-t-xl transition-all flex items-center gap-2 ${activeTab === tab ? 'text-white shadow-sm transform scale-105 origin-bottom' : 'bg-white text-slate-500 hover:bg-slate-100 border border-b-0 border-slate-200'}`} style={{ backgroundColor: activeTab === tab ? BRAND.colors.green : undefined }}>
                      {tab === 'setup' && <Settings size={18}/>}{tab === 'groups' && <Package size={18}/>}{tab === 'proposal' && <FileText size={18}/>}
                      {tab === 'proposal' ? 'Textos de Propuesta' : tab === 'groups' ? 'Variantes y Planificación' : 'Proyecto y Producto'}
                    </button>
                  ))}
                </div>

                {/* 1. SETUP TAB */}
                {activeTab === 'setup' && (
                  <div className="col-span-1 md:col-span-12 space-y-8">
                    {/* Project & Product Info */}
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 relative overflow-hidden">
                       <div className="absolute top-0 left-0 w-full h-1" style={{ backgroundColor: BRAND.colors.green }}></div>
                       <h2 className="font-extrabold text-2xl mb-8 text-slate-800 border-b-2 border-slate-100 pb-4">1. Proyecto y Producto</h2>
                       
                       <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                         <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-6">
                           <div className="sm:col-span-2"><label className={labelClass}>Título de la Propuesta</label><input type="text" className={`${inputClass} text-lg font-bold`} value={project.reportTitle || ''} onChange={e => handleProjectChange('reportTitle', e.target.value)} /></div>
                           <div className="sm:col-span-2"><label className={labelClass}>Nombre del Producto <span className="text-red-500">*</span></label><input type="text" className={`${inputClass} text-lg font-bold`} value={project.productName || ''} onChange={e => handleProjectChange('productName', e.target.value)} /></div>
                           <div><label className={labelClass}>Fecha de Propuesta</label><input type="date" className={inputClass} value={project.date || ''} onChange={e => handleProjectChange('date', e.target.value)} /></div>
                           
                           <div><label className={labelClass}>Fecha de Empaque <span className="text-red-500">*</span></label><input type="date" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.packingDate || ''} onChange={e => handleProjectChange('packingDate', e.target.value)} /></div>
                           <div><label className={labelClass}>Duración Total (Días) <span className="text-red-500">*</span></label><input type="number" className={`${inputClass} bg-amber-50 focus:bg-white`} value={project.totalDuration || ''} onChange={handleDurationChange} placeholder="ej. 10" /></div>
                           <div><label className={labelClass}>Simulación en Tienda (después de abrir)</label><input type="number" className={`${inputClass} bg-blue-50 focus:bg-white`} value={project.retailOpenDays || ''} onChange={e => handleProjectChange('retailOpenDays', e.target.value)} placeholder="ej. 7" /></div>
                           
                           <div className="sm:col-span-2 bg-slate-50 border border-slate-200 p-5 rounded-2xl">
                              <label className={labelClass}>Tipo de Procesamiento <span className="text-red-500">*</span></label>
                              <div className="flex flex-wrap gap-4 mt-3">
                                 {['Whole', 'Processed'].map(type => (
                                   <button
                                     key={type}
                                     type="button"
                                     onClick={() => handleProjectChange('processingType', type)}
                                     className={`px-6 py-3 rounded-xl text-sm font-bold transition-all border shadow-sm flex-1 sm:flex-none ${project.processingType === type ? 'bg-blue-600 text-white border-blue-700 ring-4 ring-blue-600/20 transform scale-[1.02]' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}
                                   >
                                     {type === 'Whole' ? 'Entero' : 'Procesado / Cortado'}
                                   </button>
                                 ))}
                              </div>
                           </div>

                           <div><label className={labelClass}>Tipo de Producto / Variedad</label><input type="text" className={inputClass} value={project.type || ''} onChange={e => handleProjectChange('type', e.target.value)} /></div>
                           <div><label className={labelClass}>Origen</label><input type="text" className={inputClass} value={project.origin || ''} onChange={e => handleProjectChange('origin', e.target.value)} /></div>
                           
                           <div>

                                    <div className="flex gap-1 mt-1">
                                      <button onClick={(e) => { e.stopPropagation(); duplicateGroup(g.id); }} className="p-1.5 bg-blue-50 text-blue-600 border border-blue-100 rounded-lg hover:bg-blue-100 shadow-sm" title="Duplicar"><Copy size={16} /></button>
                                      <button onClick={(e) => { e.stopPropagation(); removeGroup(g.id); }} className="p-1.5 bg-red-50 text-red-600 border border-red-100 rounded-lg hover:bg-red-100 shadow-sm" title="Eliminar"><Trash2 size={16} /></button>
                                    </div>
                                 </div>
                               </div>
                             ))}
                           </div>
                       </div>
                       
                       {/* Main Content: Variant Details */}
                       <div className="lg:col-span-9 bg-white p-6 sm:p-10 rounded-3xl shadow-sm border border-slate-200 space-y-10 overflow-hidden relative">
                           <div className="absolute top-0 left-0 w-1 h-full bg-slate-200"></div>
                           {groups.find(g => g.id === activeGroupId) && (
                             <>
                               <div>
                                 <h3 className="font-extrabold text-2xl mb-8 text-slate-800 border-b-2 border-slate-100 pb-4">Configuración de Variante</h3>
                                 
                                 <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                                   <div><label className={labelClass}>Nombre de Variante</label><input type="text" className={`${inputClass} text-lg font-bold`} value={groups.find(g => g.id === activeGroupId).name || ''} onChange={(e) => handleGroupChange(activeGroupId, 'name', null, e.target.value)} /></div>
                                   <div><label className={labelClass}>Tipo de Empaque</label><select className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.packaging || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'packaging', e.target.value)}>{PACKAGING_TYPES.map(t => <option key={t}>{t}</option>)}</select></div>
                                 </div>
                                 
                                 <div className="bg-gradient-to-br from-slate-50 to-slate-100 p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                   <label className="block mb-6 text-sm font-extrabold tracking-widest text-blue-900 uppercase border-b border-blue-200 pb-2">Especificaciones de Empaque y Muestras</label>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-6">
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Longitud (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.length || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'length', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Ancho (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.width || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'width', e.target.value)} /></div>
                                      <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Altura (mm)</label><input type="number" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.height || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'height', e.target.value)} /></div>
                                   </div>
                                   <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Material</label><input className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.material || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'material', e.target.value)} /></div>
                                     <div><label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Valor de Transmisión</label><input type="text" className={inputClass} value={groups.find(g => g.id === activeGroupId).specs.holes || ''} onChange={(e) => handleGroupChange(activeGroupId, 'specs', 'holes', e.target.value)} /></div>
                                     <div><label className="text-xs text-blue-700 font-extrabold uppercase tracking-wider mb-2 block">Muestras / Medición</label><input type="number" min="1" className={`${inputClass} bg-white border-blue-300 ring-2 ring-blue-50 font-extrabold text-blue-900 text-lg`} value={groups.find(g => g.id === activeGroupId).specs.sampleCount || 3} onChange={(e) => handleSampleCountChange(activeGroupId, parseInt(e.target.value))} /></div>
                                   </div>
                                 </div>
                                 
                                 <div className="bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-sm mb-10">
                                    <div className="flex flex-col mb-6">
                                      <h4 className="font-extrabold text-xl text-slate-800 mb-1">Línea de Tiempo y Eventos</h4>
                                      <p className="text-sm text-slate-500">Seleccione los números de muestra específicos (ej. 1, 2, 3) que representan los empaques físicos a procesar para cada acción.</p>
                                    </div>
                                    <div className="overflow-x-auto rounded-xl border border-slate-200">
                                      <table className="w-full text-sm bg-white">
                                        <thead className="bg-slate-100 border-b border-slate-200">
                                          <tr className="text-left text-slate-600 uppercase tracking-wider text-[10px] font-bold">
                                            <th className="p-4 w-20 text-center">Día</th>
                                            <th className="p-4 border-l border-slate-200">Medir Gas/Peso</th>
                                            <th className="p-4 border-l border-slate-200 text-orange-700">Abrir Empaque</th>
                                            <th className="p-4 border-l border-slate-200 text-green-700">Evaluar Calidad</th>
                                          </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                          {(groups.find(g => g.id === activeGroupId).measurements || []).map((m, idx, arr) => {
                                            const disabledForMeasure = [];
                                            arr.filter(prev => parseFloat(prev.day) < parseFloat(m.day)).forEach(prev => {
                                              disabledForMeasure.push(...(prev.open || []));
                                            });
                                            const sCount = groups.find(g => g.id === activeGroupId).specs.sampleCount || 3;

                                            return (
                                              <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 text-center font-extrabold text-slate-700 bg-slate-50/50">
                                                  P+{m.day}
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.measure||[]} disabled={disabledForMeasure} activeClass="bg-blue-500 border-blue-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'measure', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.open||[]} disabled={[]} activeClass="bg-orange-500 border-orange-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'open', s)} />
                                                </td>
                                                <td className="p-4 border-l border-slate-100">
                                                  <SampleToggles max={sCount} selected={m.evaluate||[]} disabled={[]} activeClass="bg-green-500 border-green-600 text-white shadow-sm transform scale-105" onChange={s => toggleEvent(activeGroupId, m.day, 'evaluate', s)} />
                                                </td>
                                              </tr>
                                            )
                                          })}
                                        </tbody>
                                      </table>
                                    </div>
                                    <div className="mt-4 text-sm font-medium text-slate-500 bg-white p-4 rounded-lg border border-slate-100 inline-flex items-start gap-3">
                                       <AlertCircle size={18} className="text-blue-400 shrink-0 mt-0.5" />
                                       <span>Una vez que una muestra se marca como 'Abierta' en un día anterior, lógicamente ya no se puede seleccionar para mediciones de gas/peso (el botón se volverá gris y no se podrá hacer clic).</span>
                                    </div>
                                 </div>

                                 <div className="border-2 border-dashed border-blue-200 bg-blue-50 rounded-2xl p-6 sm:p-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 shadow-sm">
                                    <div className="flex items-center gap-5">
                                       <div className="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center shrink-0">
                                          <LineChart size={28} className="text-blue-500" />
                                       </div>
                                       <div>
                                         <div className="font-extrabold text-lg text-blue-950 mb-1">Gráfico de Gas Predicho</div>
                                         <div className="text-sm font-medium text-blue-700">Sube una captura de pantalla de la predicción para esta variante específica</div>
                                       </div>
                                    </div>
                                    <label className="cursor-pointer bg-white border border-blue-200 text-blue-700 px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-100 hover:border-blue-300 transition-all shrink-0 whitespace-nowrap shadow-sm">
                                       Subir Imagen
                                       <input 
                                         type="file" 
                                         accept="image/*" 
                                         className="hidden" 
                                         onClick={(e) => {
                                            const g = groups.find(x => x.id === activeGroupId);
                                            if (g && g.predictedImage) {
                                              e.preventDefault();
                                              setPendingImageReplace({ groupId: activeGroupId, result: null });
                                            }
                                         }} 
                                         onChange={(e) => handlePredictedImageUpload(e, activeGroupId)} 
                                       />
                                    </label>
                                 </div>
                                 
                                 {groups.find(g => g.id === activeGroupId).predictedImage && (
                                    <div className="mt-6 border border-slate-200 rounded-2xl p-4 bg-white max-w-full relative group shadow-sm inline-block">
                                      <img src={groups.find(g => g.id === activeGroupId).predictedImage} className="max-h-[300px] w-auto object-contain rounded-xl" />
                                      <button onClick={() => removePredictedImage(activeGroupId)} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-red-600 hover:scale-110">
                                         <Trash2 size={16}/>
                                      </button>
                                    </div>
                                 )}
                               </div>
                             </>
                           )}
                        </div>
                    </div>
                  </div>
                )}

                {/* 3. PROPOSAL (Texts) */}
                {activeTab === 'proposal' && (
                  <div className="col-span-12 space-y-8">
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-10">
                       <div className="md:col-span-2 border-b-2 border-slate-100 pb-4">
                          <h2 className="font-extrabold text-2xl text-slate-800 flex items-center gap-3">
                             <FileText className="text-blue-600" size={28}/>
                             Textos de Propuesta y Evaluación
                          </h2>
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Introducción / Desafío Actual</label>
                          <RichTextEditor 
                             value={proposal.intro} 
                             onChange={(val) => setProposal(prev => ({...prev, intro: val}))} 
                             placeholder="Describa el desafío y por qué estamos realizando esta prueba..."
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Objetivos / Resultados Esperados</label>
                          <RichTextEditor 
                             value={proposal.expectedOutcomes} 
                             onChange={(val) => setProposal(prev => ({...prev, expectedOutcomes: val}))} 
                             placeholder="¿Qué esperamos lograr con esta prueba?"
                          />
                       </div>
                       
                       <div className="md:col-span-2">
                          <label className={`${labelClass} text-sm mb-3`}>Requisitos y Acuerdos</label>
                          <RichTextEditor 
                             value={proposal.requirements} 
                             onChange={(val) => setProposal(prev => ({...prev, requirements: val}))} 
                             placeholder="¿Qué debe proporcionar el cliente? ¿Qué acuerdos se han tomado?"
                          />
                       </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
