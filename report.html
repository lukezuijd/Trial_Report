<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfoTec Official Report Tool</title>
    <meta name="description" content="PerfoTec Official Report Tool — Process trial data into professional reports with charts and conclusions.">
    <meta name="author" content="PerfoTec B.V.">
    <meta name="theme-color" content="#007C27">
    
    <!-- Preconnect speeds up the Google Fonts waterfall so Montserrat is
         ready before the user clicks Download PDF. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Eagerly load Montserrat so the browser has the font cached before print -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Babel compiler for in-browser React (JSX) -->
    <!-- Pinned to Babel 7. v8 (released 2026-05) changed React preset's default
         runtime to "automatic", which emits `import "react/jsx-runtime"` — a
         bare specifier the browser cannot resolve, breaking ESM imports. -->
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <!-- LOAD CENTRAL STYLING & CONFIGURATION -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root">
        <div style="padding: 2rem; text-align: center; font-family: sans-serif; color: #666;">
            Loading Report Tool... Please ensure 'style.css' and 'config.js' are in the same folder.
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
          Printer, FileText, Activity, Settings, Layout, MessageSquare, 
          CheckCircle, AlertTriangle, ArrowRight, Copy, Trash2, Plus, 
          Edit3, Scale, X, Upload, Truck, Thermometer, Clock, Camera, 
          ClipboardList, Image as ImageIcon, BarChart2, ChevronRight, 
          Save, Download, FolderOpen, LineChart, Tractor, Ship, Plane, 
          Warehouse, Store, Utensils, Factory, ArrowDown, ArrowUp, ChevronUp, ChevronDown,
          Bold, Italic, Underline, List, FileArchive, Globe, AlertCircle, Building2, Target, Beaker, Package, PackagePlus
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- BRAND CONFIGURATION ---
        const globalConfig = window.PERFOTEC_CONFIG || {};

        // Unit conversion helper sourced from config; falls back to identity
        // so the report still functions if config is unavailable.
        const convertValue = globalConfig.convertValue
          ? globalConfig.convertValue.bind(globalConfig)
          : ((value) => value);

        const BRAND = {
          colors: { 
            green: globalConfig.BRAND?.colors?.primary?.green || '#007C27', 
            blue: globalConfig.BRAND?.colors?.primary?.blue || '#054E9A', 
            black: globalConfig.BRAND?.colors?.neutral?.black || '#211A1A' 
          },
          logos: {
            default: globalConfig.BRAND?.logos?.default || 'https://cdn.prod.website-files.com/68b594c756c22085ddc6c1ea/68b59ba2f027bfeecd25261b_PerfoTec%20logo.png'
          },
          fonts: {
            heading: '"Montserrat", sans-serif',
            body: '"Montserrat", sans-serif'
          }
        };

        const CHART_COLORS = globalConfig.CHART_COLORS || [
          { stroke: '#054E9A', fill: '#dbeafe', name: 'Electric Blue' },    
          { stroke: '#007C27', fill: '#dcfce7', name: 'La Salle Green' },     
          { stroke: '#211A1A', fill: '#f3f4f6', name: 'Eerie Black' },   
          { stroke: '#ea580c', fill: '#ffedd5', name: 'Orange' },  
          { stroke: '#9333ea', fill: '#f3e8ff', name: 'Purple' }   
        ];

        // i18n arrays are the single source; flat arrays are derived from them
        // so option order and content stay in sync across all tools.
        const PACKAGING_TYPES_I18N = globalConfig.PACKAGING_TYPES_I18N || [];
        const TRANSPORT_MODES_I18N = globalConfig.TRANSPORT_MODES_I18N || [];
        const DEFAULT_CRITERIA_I18N = globalConfig.DEFAULT_CRITERIA_I18N || [];
        const PERFOTEC_TECHNOLOGIES_I18N = globalConfig.PERFOTEC_TECHNOLOGIES_I18N || [];
        const PACKAGING_TYPES = PACKAGING_TYPES_I18N.map(x => x.value);
        const TRANSPORT_MODES = TRANSPORT_MODES_I18N.map(x => x.value);
        // i18n label lookup — sourced from config (v2.1); local fallback returns value.
        const getI18nLabel = globalConfig.getI18nLabel
          ? globalConfig.getI18nLabel.bind(globalConfig)
          : ((arr, value) => value);

        const DEFAULT_CRITERIA = DEFAULT_CRITERIA_I18N.map(x => x.value);
        const PERFOTEC_TECHNOLOGIES = PERFOTEC_TECHNOLOGIES_I18N.map(x => x.value);

        const DEFAULT_SUPPLY_CHAIN = globalConfig.DEFAULT_SUPPLY_CHAIN || [
          { stage: 'Farm / Harvest', tempStart: '15', tempEnd: '', daysStart: '0.5', daysEnd: '', action: 'none' },
          { stage: 'Packing House', tempStart: '12', tempEnd: '', daysStart: '1', daysEnd: '', action: 'pack' },
          { stage: 'Transport by road', tempStart: '6', tempEnd: '', daysStart: '2', daysEnd: '', action: 'none' },
          { stage: 'Importer / Processor', tempStart: '8', tempEnd: '', daysStart: '1', daysEnd: '', action: 'none' },
          { stage: 'Retail Store', tempStart: '18', tempEnd: '', daysStart: '4', daysEnd: '', action: 'none' },
          { stage: 'Consumer (Open Pack)', tempStart: '20', tempEnd: '', daysStart: '2', daysEnd: '', action: 'unpack' }
        ];

        // The supply-chain transport step is recognised by its stage label
        // (any language), never by its position — so it can be moved, renamed
        // via the dropdown, or removed like any other step.
        const TRANSPORT_STAGE_LABELS = ['transport', 'transporte', 'transport by road', 'road transport', 'wegtransport', 'transporte terrestre', 'seafreight', 'sea freight', 'zeevracht', 'transporte marítimo', 'airfreight', 'air freight', 'luchtvracht', 'transporte aéreo', 'storage', 'opslag', 'almacenamiento'];
        const isTransportStage = (stage) => TRANSPORT_STAGE_LABELS.includes((stage || '').trim().toLowerCase());

        const SCORES = globalConfig.SCORES || [
          [10, 'excellent – exceptionally appealing quality, exceptional good'],
          [9, 'very good – natural quality of the product, full strong characteristic quality attributes'],
          [8, 'good – natural quality, with few specimens with slightly light impairment'],
          [7, 'commendable – natural quality, with several specimens with light impairment'],
          [6, 'satisfactory – slightly reduced quality attributes'],
          [5, 'unacceptable – impairment of natural quality attributes'],
          [4, 'beyond unacceptable – clear impairment of quality attributes'],
          [3, 'poor – generally severe loss of quality, no longer appealing'],
          [2, 'bad – strong and severe quality loss, strongly unpleasant'],
          [1, 'very bad – complete quality decay, spoiled and repulsive']
        ];
        
        const MINI_SCORES = globalConfig.MINI_SCORES || [
          [10, 'Excellent', 'text-green-700'], [8, 'Good', 'text-green-600'],
          [6, 'Satisfactory', 'text-yellow-600'], [4, 'Unacceptable', 'text-red-600'], [1, 'Very Bad', 'text-red-800']
        ];

        // --- HELPER CLASSES ---
        const inputClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.input) || "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 shadow-sm transition-all hover:bg-slate-100 focus:bg-white";
        const narrowInputClass = "w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block py-2.5 px-1 text-center shadow-sm transition-all hover:bg-slate-100 focus:bg-white [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] min-w-0";
        const labelClass = (globalConfig.UI_CLASSES && globalConfig.UI_CLASSES.label) || "block mb-2 text-xs font-bold tracking-wide text-slate-600 uppercase";

        // --- HELPER FUNCTIONS ---
        const getAverage = (samples, key) => {
          if (!samples || samples.length === 0) return 0;
          const validSamples = samples.filter(s => s[key] !== '' && !isNaN(s[key]));
          if (validSamples.length === 0) return 0;
          const sum = validSamples.reduce((acc, curr) => acc + parseFloat(curr[key]), 0);
          return (sum / validSamples.length).toFixed(1);
        };

        // Weight loss per sample. Samples unpacked at different evaluation
        // moments are usually different physical units, so each sample can
        // carry its own `initialWeight` (weight of that unit at packing).
        // When present it takes precedence; otherwise fall back to the
        // index-matched day-0 sample weight (legacy behaviour).
        const getWeightLoss = (samples, day0Samples) => {
            if (!samples || samples.length === 0) return 0;
            let totalLoss = 0, count = 0;
            samples.forEach((s, idx) => {
                const ownStart = parseFloat(s.initialWeight);
                const startW = (!isNaN(ownStart) && ownStart > 0)
                  ? ownStart
                  : (day0Samples && day0Samples[idx] ? parseFloat(day0Samples[idx].weight) : 0);
                const currentW = parseFloat(s.weight);
                if (startW > 0 && !isNaN(currentW)) { totalLoss += ((startW - currentW) / startW) * 100; count++; }
            });
            return count > 0 ? (totalLoss / count).toFixed(1) : 0;
        };

        const getStageIcon = (name) => {
          const n = name?.toLowerCase() || '';
          if (n.includes('farm') || n.includes('harvest')) return <Tractor size={14} color={BRAND.colors.black} />;
          if (n.includes('sea')) return <Ship size={14} color={BRAND.colors.black} />;
          if (n.includes('air')) return <Plane size={14} color={BRAND.colors.black} />;
          if (n.includes('storage') || n.includes('dc') || n.includes('distribution')) return <Warehouse size={14} color={BRAND.colors.black} />;
          if (n.includes('store') || n.includes('retail')) return <Store size={14} color={BRAND.colors.black} />;
          if (n.includes('consumer') || n.includes('eat')) return <Utensils size={14} color={BRAND.colors.black} />;
          if (n.includes('pack') && !n.includes('transport')) return <Factory size={14} color={BRAND.colors.black} />;
          return <Truck size={14} color={BRAND.colors.black} />;
        };

        const formatRange = (start, end, unit) => (start && end && start !== end) ? `${start}-${end}${unit}` : start ? `${start}${unit}` : `-`;
        const formatDay = (day) => `P+${day}`;
        
        const formatDateToDDMMYYYY = (dateStr) => {
          if (!dateStr) return '-';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        const calcUnpackingDate = (project) => {
          const baseDate = project.packingDate || project.date;
          const duration = parseInt(project.totalDuration) || 0;
          if (baseDate && duration) {
             const d = new Date(baseDate);
             d.setDate(d.getDate() + duration);
             const day = String(d.getDate()).padStart(2, '0');
             const month = String(d.getMonth() + 1).padStart(2, '0');
             const year = d.getFullYear();
             return `${day}/${month}/${year}`; 
          }
          return '-';
        };
        
        const calcRetailDate = (project) => {
          const baseDate = project.packingDate || project.date;
          const duration = parseInt(project.totalDuration) || 0;
          const retailDays = parseInt(project.retailOpenDays) || 0;
          if (baseDate && (duration || retailDays)) {
             const d = new Date(baseDate);
             d.setDate(d.getDate() + duration + retailDays);
             const day = String(d.getDate()).padStart(2, '0');
             const month = String(d.getMonth() + 1).padStart(2, '0');
             const year = d.getFullYear();
             return `${day}/${month}/${year}`; 
          }
          return '-';
        };

        // Resolve the temperature-logger images as an array. Supports the new
        // multi-image field (temperatureImages[]) and stays backward compatible
        // with older reports that stored a single temperatureImage.
        const getTempImages = (analysis) => {
          if (Array.isArray(analysis?.temperatureImages)) return analysis.temperatureImages.filter(Boolean);
          if (analysis?.temperatureImage) return [analysis.temperatureImage];
          return [];
        };

        // ---- Native Word (.docx) export -----------------------------------
        // Converts the rendered report DOM into real Word content: editable
        // paragraphs, headings and tables, with photos/charts embedded as
        // pictures. Layout containers (CSS grid / flex rows) become borderless
        // tables so side-by-side content stays side-by-side in Word, and the
        // report's .page-break sections map to real Word page breaks — content
        // flows naturally within each section, matching the PDF's pagination.
        const domToDocx = async (root, docx, opts = {}) => {
          const { onProgress, supplyChain, scores } = opts;
          const { Paragraph, TextRun, ImageRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle, VerticalAlign, TableOfContents, HeadingLevel, TableLayoutType } = docx;
          // Printable A4 area at 96dpi with 12mm margins (~186 x 273 mm).
          const MAX_W = 690, MAX_H = 940;
          const CONTENT_DXA = 10546; // usable page width in twips (A4 minus 12mm margins)
          const ctx = { pendingBreak: false, tableDepth: 0, imgCount: 0, inCell: false, keepNext: false };

          const colorHex = (css) => {
            const m = (css || '').match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
            if (!m || (m[4] !== undefined && parseFloat(m[4]) === 0)) return null;
            return [m[1], m[2], m[3]].map(n => (+n).toString(16).padStart(2, '0')).join('').toUpperCase();
          };
          const skip = (el) => {
            const cs = getComputedStyle(el);
            return cs.display === 'none' || cs.visibility === 'hidden' || el.classList.contains('no-print');
          };
          const alignOf = (el) => {
            const cs = getComputedStyle(el);
            if (cs.textAlign === 'center' || (cs.display === 'flex' && cs.justifyContent === 'center')) return AlignmentType.CENTER;
            if (cs.textAlign === 'right') return AlignmentType.RIGHT;
            return AlignmentType.LEFT;
          };
          const mkPara = (o) => {
            const p = new Paragraph({
              ...o,
              pageBreakBefore: (ctx.pendingBreak || o.pageBreakBefore) || undefined,
              keepNext: (ctx.keepNext || o.keepNext) || undefined,
            });
            ctx.pendingBreak = false;
            return p;
          };
          // Flush a pending page break before content that cannot carry the
          // flag itself (tables) — otherwise the break would land INSIDE it.
          const flushBreak = (out) => {
            if (ctx.pendingBreak) { out.push(new Paragraph({ pageBreakBefore: true, spacing: { after: 0 } })); ctx.pendingBreak = false; }
          };

          const baseStyle = (el) => {
            const cs = getComputedStyle(el);
            return {
              bold: parseInt(cs.fontWeight, 10) >= 600,
              italics: cs.fontStyle === 'italic',
              underline: (cs.textDecorationLine || '').includes('underline'),
              color: colorHex(cs.color) || '000000',
              size: Math.max(2, Math.round(parseFloat(cs.fontSize) * 1.5)), // px -> half-points
            };
          };
          const mkRun = (text, st) => new TextRun({
            text,
            bold: st.bold || undefined,
            italics: st.italics || undefined,
            underline: st.underline ? {} : undefined,
            color: st.color,
            size: st.size,
          });
          const runsOf = (el) => {
            const st = baseStyle(el);
            const runs = [];
            for (const n of el.childNodes) {
              if (n.nodeType === 3) {
                const text = n.textContent.replace(/\s+/g, ' ');
                if (text.trim()) runs.push(mkRun(text, st));
              } else if (n.nodeType === 1) {
                if (n.tagName === 'BR') { runs.push(new TextRun({ text: '', break: 1 })); continue; }
                if (n.tagName === 'IMG' || n.tagName.toLowerCase() === 'svg' || skip(n)) continue;
                runs.push(...runsOf(n));
              }
            }
            return runs;
          };

          const imgCache = new Map();
          const loadImg = (src) => {
            if (imgCache.has(src)) return imgCache.get(src);
            const p = (async () => {
              try {
                const res = await fetch(src, src.startsWith('data:') ? undefined : { mode: 'cors' });
                const blob = await res.blob();
                const type = (blob.type || '').toLowerCase();
                const url = URL.createObjectURL(blob);
                try {
                  const im = new Image();
                  await new Promise((ok, err) => { im.onload = ok; im.onerror = err; im.src = url; });
                  const w = im.naturalWidth, h = im.naturalHeight;
                  let buf;
                  if (type !== 'image/png' && type !== 'image/jpeg') {
                    // Word only reliably embeds PNG/JPEG — transcode anything else.
                    const c = document.createElement('canvas'); c.width = w; c.height = h;
                    c.getContext('2d').drawImage(im, 0, 0);
                    buf = Uint8Array.from(atob(c.toDataURL('image/png').split(',')[1]), (ch) => ch.charCodeAt(0));
                  } else {
                    buf = new Uint8Array(await blob.arrayBuffer());
                  }
                  return { buf, w, h };
                } finally { URL.revokeObjectURL(url); }
              } catch (e) { return null; }
            })();
            imgCache.set(src, p);
            return p;
          };

          const imgPara = async (imgEl) => {
            const rect = imgEl.getBoundingClientRect();
            if (rect.width < 24 || rect.height < 24) return null; // UI icon, not content
            const data = await loadImg(imgEl.currentSrc || imgEl.src);
            if (!data || !data.w || !data.h) return null;
            ctx.imgCount++;
            if (onProgress && ctx.imgCount % 5 === 0) onProgress('Embedding photo ' + ctx.imgCount + '...');
            // Fit natural aspect into the on-screen box, then into the page.
            let scale = Math.min(rect.width / data.w, rect.height / data.h);
            let w = data.w * scale, h = data.h * scale;
            const cap = Math.min(MAX_W / w, MAX_H / h, 1);
            w = Math.round(w * cap); h = Math.round(h * cap);
            return mkPara({
              children: [new ImageRun({ data: data.buf, transformation: { width: w, height: h } })],
              alignment: alignOf(imgEl.parentElement || imgEl),
              spacing: { after: 80 },
            });
          };

          const svgPara = async (svgEl) => {
            const rect = svgEl.getBoundingClientRect();
            if (rect.width < 60 || rect.height < 40) return null; // inline icon
            try {
              // Inline the computed text styles: serialized SVG loses page CSS.
              const clone = svgEl.cloneNode(true);
              const src = svgEl.querySelectorAll('text, tspan');
              const dst = clone.querySelectorAll('text, tspan');
              src.forEach((t, i) => {
                const cs = getComputedStyle(t);
                dst[i].setAttribute('font-size', cs.fontSize);
                dst[i].setAttribute('font-family', 'Arial, sans-serif');
                dst[i].setAttribute('font-weight', cs.fontWeight);
                if (!dst[i].getAttribute('fill')) dst[i].setAttribute('fill', cs.fill);
              });
              clone.setAttribute('width', rect.width);
              clone.setAttribute('height', rect.height);
              clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
              const xml = new XMLSerializer().serializeToString(clone);
              const im = new Image();
              await new Promise((ok, err) => { im.onload = ok; im.onerror = err; im.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(xml); });
              const SC = 2; // 2x raster for print sharpness
              const c = document.createElement('canvas');
              c.width = Math.round(rect.width * SC); c.height = Math.round(rect.height * SC);
              const g = c.getContext('2d');
              g.fillStyle = '#ffffff'; g.fillRect(0, 0, c.width, c.height);
              g.drawImage(im, 0, 0, c.width, c.height);
              const buf = Uint8Array.from(atob(c.toDataURL('image/png').split(',')[1]), (ch) => ch.charCodeAt(0));
              let w = rect.width, h = rect.height;
              const cap = Math.min(MAX_W / w, MAX_H / h, 1);
              w = Math.round(w * cap); h = Math.round(h * cap);
              return mkPara({
                children: [new ImageRun({ data: buf, transformation: { width: w, height: h } })],
                alignment: AlignmentType.CENTER,
                spacing: { after: 80 },
              });
            } catch (e) { return null; }
          };

          const borders = (visible) => {
            const s = visible
              ? { style: BorderStyle.SINGLE, size: 4, color: 'CBD5E1' }
              : { style: BorderStyle.NONE, size: 0, color: 'FFFFFF' };
            return { top: s, bottom: s, left: s, right: s };
          };

          const cellOf = async (el, { span = 1, pct, visible, keepNext = false }) => {
            const kids = [];
            const prevCell = ctx.inCell, prevKeep = ctx.keepNext;
            ctx.inCell = true; ctx.keepNext = keepNext;
            await walkInto(el, kids);
            ctx.inCell = prevCell; ctx.keepNext = prevKeep;
            if (!kids.length) kids.push(new Paragraph({ children: [] }));
            const bg = colorHex(getComputedStyle(el).backgroundColor);
            return new TableCell({
              children: kids,
              columnSpan: span > 1 ? span : undefined,
              width: pct ? { size: pct, type: WidthType.PERCENTAGE } : undefined,
              shading: bg && bg !== 'FFFFFF' ? { fill: bg } : undefined,
              borders: borders(visible),
              verticalAlign: VerticalAlign.CENTER,
              margins: { top: 40, bottom: 40, left: 80, right: 80 },
            });
          };

          const realTable = async (tableEl) => {
            const rowEls = Array.from(tableEl.rows || []);
            if (!rowEls.length) return null;
            const tRect = tableEl.getBoundingClientRect();
            // Fixed column widths (taken from the rendered layout) stop Word
            // from re-flowing columns and wrapping cell text over many lines.
            const colWidths = Array.from(rowEls[0].cells || []).map((td) =>
              Math.max(300, Math.round((td.getBoundingClientRect().width / (tRect.width || 1)) * CONTENT_DXA))
            );
            const rows = [];
            for (let ri = 0; ri < rowEls.length; ri++) {
              const tr = rowEls[ri];
              const cells = [];
              // keep-with-next on every row except the last keeps the table in
              // one piece: if it doesn't fit, it starts whole on the next page.
              const keepNext = ri < rowEls.length - 1;
              for (const td of Array.from(tr.cells || [])) {
                const pct = tRect.width > 0
                  ? Math.max(2, Math.round((td.getBoundingClientRect().width / tRect.width) * 100))
                  : undefined;
                cells.push(await cellOf(td, { span: td.colSpan || 1, pct, visible: true, keepNext }));
              }
              if (cells.length) rows.push(new TableRow({ children: cells, cantSplit: true }));
            }
            if (!rows.length) return null;
            return new Table({ rows, width: { size: 100, type: WidthType.PERCENTAGE }, layout: TableLayoutType.FIXED, columnWidths: colWidths });
          };

          const layoutTable = async (rowsSpec, cols) => {
            const rows = [];
            for (const rowEls of rowsSpec) {
              const cells = [];
              for (const { el, span } of rowEls) {
                cells.push(await cellOf(el, { span, pct: Math.round((span / cols) * 100), visible: false }));
              }
              rows.push(new TableRow({ children: cells, cantSplit: true }));
            }
            return new Table({ rows, width: { size: 100, type: WidthType.PERCENTAGE } });
          };

          const gridSpanOf = (el, cols) => {
            const gc = getComputedStyle(el).gridColumnStart || '';
            const m = gc.match(/span\s+(\d+)/);
            return m ? Math.min(cols, parseInt(m[1], 10)) : 1;
          };

          // --- data-docx special blocks --------------------------------------

          // Native, clickable Word TOC with page numbers. Word builds it from
          // the Heading 1/2 outline when it refreshes fields on open.
          const buildToc = (out) => {
            out.push(mkPara({
              children: [mkRun('CONTENTS', { bold: true, color: '007C27', size: 56 })],
              spacing: { after: 300 },
            }));
            out.push(new TableOfContents('Contents', { hyperlink: true, headingStyleRange: '1-2' }));
          };

          const fmtRange = (a, b, unit) => {
            const as = (a === 0 ? '0' : (a || '')).toString().trim();
            const bs = (b === 0 ? '0' : (b || '')).toString().trim();
            if (!as && !bs) return '-';
            if (!bs || as === bs) return `${as}${unit}`;
            return `${as} - ${bs}${unit}`;
          };
          const txtCell = (text, { bold, color = '334155', fill, size = 18, align = AlignmentType.CENTER, pct } = {}) => new TableCell({
            children: [new Paragraph({ alignment: align, spacing: { after: 0 }, children: [mkRun(text, { bold, color, size })] })],
            shading: fill ? { fill } : undefined,
            width: pct ? { size: pct, type: WidthType.PERCENTAGE } : undefined,
            borders: borders(true),
            verticalAlign: VerticalAlign.CENTER,
            margins: { top: 50, bottom: 50, left: 80, right: 80 },
          });

          // Clean bordered table for the supply chain — the tiny on-screen
          // flow boxes don't translate to Word.
          const buildSupplyChain = (out) => {
            const widths = [6, 28, 17, 15, 17, 17]; // percent per column
            const header = ['#', 'Stage', 'Temperature', 'Duration', 'Total Elapsed', 'Action'];
            const rows = [new TableRow({
              children: header.map((h, i) => txtCell(h, { bold: true, color: 'FFFFFF', fill: '007C27', size: 16, pct: widths[i], align: i === 1 ? AlignmentType.LEFT : AlignmentType.CENTER })),
              cantSplit: true, tableHeader: true,
            })];
            let cMin = 0, cMax = 0;
            supplyChain.forEach((s, i) => {
              const dMin = parseFloat(s.daysStart) || 0;
              const dMax = s.daysEnd ? (parseFloat(s.daysEnd) || dMin) : dMin;
              cMin += dMin; cMax += dMax;
              const fill = i % 2 ? 'F1F5F9' : undefined;
              const action = s.action === 'pack' ? 'PACKED' : s.action === 'unpack' ? 'OPENED' : '';
              rows.push(new TableRow({
                cantSplit: true,
                children: [
                  txtCell(String(i + 1), { bold: true, color: '64748B', fill, pct: widths[0] }),
                  txtCell(s.stage || '-', { bold: true, fill, pct: widths[1], align: AlignmentType.LEFT }),
                  txtCell(fmtRange(s.tempStart, s.tempEnd, '°C'), { fill, pct: widths[2] }),
                  txtCell(fmtRange(s.daysStart, s.daysEnd, ' d'), { fill, pct: widths[3] }),
                  txtCell(cMin === cMax ? `${cMin} d` : `${cMin} - ${cMax} d`, { color: '054E9A', fill, pct: widths[4] }),
                  txtCell(action, { bold: true, color: s.action === 'pack' ? '007C27' : 'DC2626', fill, pct: widths[5] }),
                ],
              }));
            });
            out.push(new Table({
              rows,
              width: { size: 100, type: WidthType.PERCENTAGE },
              layout: TableLayoutType.FIXED,
              columnWidths: widths.map((w) => Math.round((w / 100) * CONTENT_DXA)),
            }));
            out.push(new Paragraph({ children: [], spacing: { after: 80 } }));
          };

          // Score scale: "10  excellent – ..." in two tidy columns, number first.
          const buildScoreScale = (out) => {
            const rows = [];
            for (let i = 0; i < scores.length; i += 2) {
              const cells = scores.slice(i, i + 2).map(([num, desc]) => {
                const col = num >= 7 ? '16A34A' : num >= 5 ? 'EA580C' : 'DC2626';
                return new TableCell({
                  children: [new Paragraph({
                    spacing: { after: 20 },
                    children: [mkRun(String(num), { bold: true, color: col, size: 20 }), mkRun('   ' + desc, { color: '334155', size: 16 })],
                  })],
                  width: { size: 50, type: WidthType.PERCENTAGE },
                  borders: borders(false),
                  margins: { top: 30, bottom: 30, left: 60, right: 60 },
                });
              });
              while (cells.length < 2) cells.push(new TableCell({ children: [new Paragraph({ children: [] })], borders: borders(false) }));
              rows.push(new TableRow({ children: cells, cantSplit: true }));
            }
            out.push(new Table({ rows, width: { size: 100, type: WidthType.PERCENTAGE } }));
            out.push(new Paragraph({ children: [], spacing: { after: 80 } }));
          };

          // Photo grids become bordered tables: photo on top, caption below.
          const buildPhotoGrid = async (el, out) => {
            const cs = getComputedStyle(el);
            const cols = Math.max(1, (cs.gridTemplateColumns || '').split(' ').filter(Boolean).length);
            const cards = Array.from(el.children).filter((c) => !skip(c));
            if (!cards.length) return;
            const rows = [];
            for (let i = 0; i < cards.length; i += cols) {
              const slice = cards.slice(i, i + cols);
              const cells = [];
              for (const card of slice) {
                const kids = [];
                const img = card.querySelector('img');
                if (img) { const p = await imgPara(img); if (p) kids.push(p); }
                const lines = (card.innerText || '').split('\n').map((s) => s.trim()).filter(Boolean);
                let badge = null;
                if (lines.length > 1 && lines[0].length <= 8) badge = lines.shift();
                lines.forEach((line, li) => kids.push(new Paragraph({
                  alignment: AlignmentType.CENTER,
                  spacing: { before: li === 0 ? 60 : 0, after: 0 },
                  children: [
                    mkRun(line, li === 0 ? { bold: true, color: '1E293B', size: 16 } : { color: '475569', size: 15 }),
                    ...((li === 0 && badge) ? [mkRun('  (' + badge + ')', { color: '64748B', size: 14 })] : []),
                  ],
                })));
                if (!kids.length) kids.push(new Paragraph({ children: [] }));
                cells.push(new TableCell({
                  children: kids,
                  width: { size: Math.floor(100 / cols), type: WidthType.PERCENTAGE },
                  borders: borders(true),
                  verticalAlign: VerticalAlign.CENTER,
                  margins: { top: 60, bottom: 60, left: 60, right: 60 },
                }));
              }
              while (cells.length < cols) cells.push(new TableCell({ children: [new Paragraph({ children: [] })], borders: borders(true), width: { size: Math.floor(100 / cols), type: WidthType.PERCENTAGE } }));
              rows.push(new TableRow({ children: cells, cantSplit: true }));
            }
            out.push(new Table({
              rows,
              width: { size: 100, type: WidthType.PERCENTAGE },
              layout: TableLayoutType.FIXED,
              columnWidths: Array.from({ length: cols }, () => Math.round(CONTENT_DXA / cols)),
            }));
            out.push(new Paragraph({ children: [], spacing: { after: 120 } }));
          };

          const walkEl = async (el, out) => {
            if (skip(el)) return;
            if (el.classList.contains('page-break')) ctx.pendingBreak = true;

            // Special-cased blocks, marked with data-docx in the report JSX.
            const special = el.getAttribute && el.getAttribute('data-docx');
            if (special === 'toc') { flushBreak(out); buildToc(out); return; }
            if (special === 'supply-chain' && Array.isArray(supplyChain) && supplyChain.length) { flushBreak(out); buildSupplyChain(out); return; }
            if (special === 'score-scale' && Array.isArray(scores) && scores.length) { flushBreak(out); buildScoreScale(out); return; }
            if (special === 'photo-grid') { flushBreak(out); await buildPhotoGrid(el, out); return; }

            const tag = el.tagName;
            const cs = getComputedStyle(el);

            if (/^H[1-6]$/.test(tag)) {
              // Numbered section headings get real Word heading styles: they
              // form the outline the native (clickable) TOC is generated from.
              const t = (el.textContent || '').trim();
              let heading;
              if (tag === 'H2' && /^\d+\.\s/.test(t)) heading = HeadingLevel.HEADING_1;
              else if (tag === 'H3' && /^\d+\.\d+/.test(t)) heading = HeadingLevel.HEADING_2;
              const runs = runsOf(el);
              if (runs.length) out.push(mkPara({ children: runs, heading, keepNext: true, alignment: alignOf(el), spacing: { before: 200, after: 160 } }));
              return;
            }
            if (tag === 'TABLE') {
              flushBreak(out);
              const t = await realTable(el);
              if (t) { out.push(t); out.push(new Paragraph({ children: [], spacing: { after: 80 } })); }
              return;
            }
            if (tag === 'IMG') { const p = await imgPara(el); if (p) out.push(p); return; }
            if (tag.toLowerCase() === 'svg') { const p = await svgPara(el); if (p) out.push(p); return; }
            if (tag === 'UL' || tag === 'OL') {
              for (const li of Array.from(el.children)) {
                if (li.tagName !== 'LI' || skip(li)) continue;
                const runs = runsOf(li);
                if (runs.length) out.push(mkPara({ children: runs, bullet: { level: 0 }, spacing: { after: 60 } }));
              }
              return;
            }

            // Leaf block (inline content only) -> one paragraph.
            if (!el.querySelector('div, p, table, ul, ol, img, svg, h1, h2, h3, h4, h5, h6, li')) {
              const runs = runsOf(el);
              if (runs.length) out.push(mkPara({ children: runs, alignment: alignOf(el), spacing: { after: ctx.inCell ? 20 : 100 } }));
              return;
            }

            const children = Array.from(el.children).filter((c) => !skip(c));

            // CSS grid -> borderless layout table (respecting col-span).
            if (cs.display === 'grid' && ctx.tableDepth < 2) {
              const cols = (cs.gridTemplateColumns || '').split(' ').filter(Boolean).length;
              if (cols >= 2 && children.length >= 2) {
                flushBreak(out);
                ctx.tableDepth++;
                const rowsSpec = [];
                let row = [], used = 0;
                for (const c of children) {
                  const span = gridSpanOf(c, cols);
                  if (used + span > cols && row.length) { rowsSpec.push(row); row = []; used = 0; }
                  row.push({ el: c, span }); used += span;
                  if (used >= cols) { rowsSpec.push(row); row = []; used = 0; }
                }
                if (row.length) rowsSpec.push(row);
                const t = await layoutTable(rowsSpec, cols);
                ctx.tableDepth--;
                out.push(t);
                out.push(new Paragraph({ children: [], spacing: { after: 80 } }));
                return;
              }
            }

            // Horizontal flex holding visual blocks -> one borderless row
            // (keeps e.g. the two cover logos side by side).
            if (cs.display === 'flex' && (cs.flexDirection === 'row' || cs.flexDirection === 'row-reverse') && ctx.tableDepth < 2) {
              const complex = children.length >= 2 && children.some((c) => c.tagName === 'IMG' || c.querySelector('img, svg, table'));
              if (complex) {
                flushBreak(out);
                ctx.tableDepth++;
                const t = await layoutTable([children.map((c) => ({ el: c, span: 1 }))], children.length);
                ctx.tableDepth--;
                out.push(t);
                out.push(new Paragraph({ children: [], spacing: { after: 80 } }));
                return;
              }
            }

            await walkInto(el, out);
          };

          const walkInto = async (el, out) => {
            for (const n of el.childNodes) {
              if (n.nodeType === 3) {
                const t = n.textContent.replace(/\s+/g, ' ');
                if (t.trim()) out.push(mkPara({ children: [mkRun(t, baseStyle(el))], spacing: { after: ctx.inCell ? 20 : 60 } }));
              } else if (n.nodeType === 1) {
                await walkEl(n, out);
              }
            }
          };

          const out = [];
          await walkInto(root, out);
          return out;
        };

        // --- COMPONENTS ---

        const RichTextEditor = ({ value, onChange, placeholder }) => {
          const editorRef = useRef(null);

          useEffect(() => {
            if (editorRef.current && value !== editorRef.current.innerHTML) {
              editorRef.current.innerHTML = value || '';
            }
          }, [value]);

          const handleInput = () => {
            if (editorRef.current) onChange(editorRef.current.innerHTML);
          };

          const execCmd = (cmd) => {
            document.execCommand(cmd, false, null);
            editorRef.current.focus();
            handleInput();
          };

          return (
            <div className="border border-slate-300 rounded-xl overflow-hidden bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-500/50 transition flex flex-col h-full min-h-[140px] shadow-sm">
              <div className="bg-slate-50 border-b border-slate-200 p-1.5 flex gap-1.5 shrink-0">
                <button type="button" onClick={() => execCmd('bold')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Bold size={18}/></button>
                <button type="button" onClick={() => execCmd('italic')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Italic size={18}/></button>
                <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><Underline size={18}/></button>
                <div className="w-px bg-slate-300 mx-1 my-1"></div>
                <button type="button" onClick={() => execCmd('insertUnorderedList')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 w-9 flex justify-center items-center transition-colors"><List size={18}/></button>
              </div>
              <div
                ref={editorRef}
                contentEditable
                onInput={handleInput}
                onBlur={handleInput}
                className="p-5 outline-none rich-text-editor text-sm font-sans flex-1 overflow-y-auto min-h-[100px] leading-relaxed pdf-rich-text"
                data-placeholder={placeholder}
              />
            </div>
          );
        };

        const SupplyChainFlow = ({ chain }) => {
          if (!chain || chain.length === 0) return null;
          let cumMin = 0, cumMax = 0;
          
          const chunkSize = 6;
          const rows = [];
          for (let i = 0; i < chain.length; i += chunkSize) {
            rows.push(chain.slice(i, i + chunkSize));
          }

          return (
            <div className="flex flex-col w-full font-sans">
              {rows.map((row, rowIdx) => (
                <div key={rowIdx} className="flex w-full gap-1 items-start justify-start mt-4 mb-2 pb-2">
                  {row.map((step, idx) => {
                    const globalIdx = rowIdx * chunkSize + idx;
                    const minD = parseFloat(step.daysStart) || 0;
                    const maxD = step.daysEnd ? parseFloat(step.daysEnd) : minD;
                    cumMin += minD; cumMax += maxD;
                    const cumStr = cumMin === cumMax ? `${cumMin}` : `${cumMin}-${cumMax}`;

                    return (
                      <React.Fragment key={globalIdx}>
                        {idx > 0 && <div className="h-20 flex items-center justify-center shrink-0 w-2 lg:w-4"><ChevronRight size={16} className="text-gray-300" /></div>}
                        <div className="flex flex-col items-center flex-1 min-w-0" style={{ maxWidth: '16%', flexBasis: '16%' }}>
                          <div className="w-full flex flex-col items-center bg-white border border-gray-200 rounded-lg shadow-sm p-1.5 relative min-h-[5.5rem]">
                             <div className="absolute top-0 left-0 w-full h-1" style={{backgroundColor: globalIdx % 2 === 0 ? BRAND.colors.green : BRAND.colors.blue}}></div>
                             <div className="bg-gray-50 p-1.5 rounded-full mb-1 flex-shrink-0 mt-1">{getStageIcon(step.stage || '')}</div>
                             <div className="text-[8px] font-bold text-center uppercase mb-1 flex-grow flex items-center justify-center leading-tight w-full break-words px-1 overflow-hidden text-ellipsis line-clamp-2">{step.stage || '-'}</div>
                             <div className="w-full border-t border-dotted border-gray-200 my-0.5"></div>
                             <div className="flex flex-col justify-center w-full text-[8px] gap-0.5">
                                <span className="flex items-center justify-center gap-0.5 font-bold text-gray-700 whitespace-nowrap"><Thermometer size={8} className="text-red-500"/>{formatRange(step.tempStart, step.tempEnd, '°C')}</span>
                                <span className="flex items-center justify-center gap-0.5 text-gray-500 whitespace-nowrap"><Clock size={8}/>{formatRange(step.daysStart, step.daysEnd, 'd')}</span>
                             </div>
                             <div className="mt-1 bg-blue-50 text-blue-700 border border-blue-100 text-[7px] font-bold px-1 rounded whitespace-nowrap w-full text-center">∑ {cumStr}d</div>
                          </div>
                          <div className="h-8 w-full flex justify-center items-start mt-1 relative">
                              {step.action === 'pack' && <div className="flex flex-col items-center"><div className="bg-green-100 text-green-700 rounded-full p-0.5 border border-green-200"><ArrowDown size={12} /></div><span className="text-[7px] font-bold text-green-700 uppercase mt-0.5">Packed</span></div>}
                              {step.action === 'unpack' && <div className="flex flex-col items-center"><div className="bg-red-100 text-red-700 rounded-full p-0.5 border border-red-200"><ArrowUp size={12} /></div><span className="text-[7px] font-bold text-red-700 uppercase mt-0.5">Opened</span></div>}
                          </div>
                        </div>
                      </React.Fragment>
                    )
                  })}
                </div>
              ))}
            </div>
          );
        };

        const VariantGasChart = ({ group, packedDays }) => {
          if (!group || !group.measurements) return null;
          const width = 350; const height = 200; const padding = 30;
          
          const pDays = parseFloat(packedDays);
          const filteredMeasurements = isNaN(pDays) || pDays === 0 ? (group.measurements || []) : (group.measurements || []).filter(m => parseFloat(m.day) <= pDays);
          const data = [...filteredMeasurements].sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
          
          if(data.length === 0) return <div className="flex-1 border border-slate-200 rounded-2xl bg-slate-50 p-6 font-sans w-full h-full flex flex-col items-center justify-center text-slate-400 text-sm italic shadow-sm">No packed gas data</div>;

          const maxDay = Math.max(...data.map(d => parseFloat(d.day) || 0), 5);
          const maxY = 25; 
          const getX = (day) => padding + (parseFloat(day) / maxDay) * (width - 2 * padding);
          const getY = (val) => height - padding - (parseFloat(val) / maxY) * (height - 2 * padding);
          const pointsO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'o2'))}`).join(' ');
          const pointsCO2 = data.map(d => `${getX(d.day)},${getY(getAverage(d.samples, 'co2'))}`).join(' ');

          return (
            <div className="flex-1 border border-slate-200 rounded-2xl bg-white p-5 shadow-sm font-sans w-full h-full flex flex-col justify-between">
              <h5 className="text-center font-extrabold text-sm mb-4 text-slate-800 border-b border-slate-100 pb-2">Actual Results: {group.name || 'Variant'}</h5>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto">
                {[0, 5, 10, 15, 20, 25].map(val => (
                  <g key={val}>
                    <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#f1f5f9" strokeWidth="1.5" />
                    <text x={padding - 5} y={getY(val) + 3} textAnchor="end" fontSize="9" fill="#94a3b8" fontWeight="600">{val}%</text>
                  </g>
                ))}
                {data.map(d => <text key={d.day} x={getX(d.day)} y={height - 10} textAnchor="middle" fontSize="10" fill="#64748b" fontWeight="bold">{formatDay(d.day)}</text>)}
                <polyline points={pointsO2} fill="none" stroke={BRAND.colors.blue} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                <polyline points={pointsCO2} fill="none" stroke={BRAND.colors.green} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                {data.map((d, i) => (
                  <g key={i}>
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'o2'))} r="4" fill="#ffffff" stroke={BRAND.colors.blue} strokeWidth="2" />
                    <circle cx={getX(d.day)} cy={getY(getAverage(d.samples, 'co2'))} r="4" fill="#ffffff" stroke={BRAND.colors.green} strokeWidth="2" />
                  </g>
                ))}
              </svg>
              <div className="flex justify-center gap-6 mt-4 text-xs">
                <span className="flex items-center gap-1.5 font-extrabold" style={{color: BRAND.colors.blue}}><div className="w-3 h-3 rounded-full" style={{backgroundColor: BRAND.colors.blue}}></div> O₂</span>
                <span className="flex items-center gap-1.5 font-extrabold" style={{color: BRAND.colors.green}}><div className="w-3 h-3 rounded-full" style={{backgroundColor: BRAND.colors.green}}></div> CO₂</span>
              </div>
            </div>
          );
        };

        const WeightLossChart = ({ groups }) => {
          if (!groups || groups.length === 0) return null;
          const width = 600; const height = 250; const padding = 40;
          const allDays = Array.from(new Set(groups.flatMap(g => (g.measurements || []).map(m => parseFloat(m.day))))).sort((a,b) => a-b);
          const days = allDays.filter(d => !isNaN(d) && d > 0);
          if (days.length === 0) return <div className="text-center text-slate-400 italic p-8 bg-slate-50 border border-slate-200 rounded-3xl shadow-sm">No weight loss data available yet.</div>;

          const maxLoss = Math.max(...groups.flatMap(g => (g.measurements || []).map(m => {
             const day0 = (g.measurements || []).find(meas => parseFloat(meas.day) === 0);
             return getWeightLoss(m.samples, day0?.samples);
          })), 1); 
          
          const yAxisMax = Math.ceil(maxLoss * 1.2); 
          const slotWidth = (width - 2 * padding) / days.length;
          const barGroupWidth = slotWidth * 0.6;
          const barWidth = barGroupWidth / groups.length;
          const getX = (dayIndex) => padding + (dayIndex * slotWidth);
          const getY = (val) => height - padding - (val / yAxisMax) * (height - 2 * padding);

          return (
            <div className="w-full border border-slate-200 rounded-3xl bg-white p-8 font-sans shadow-sm">
              <h4 className="text-center font-extrabold mb-6 uppercase text-sm tracking-wider text-slate-800 border-b border-slate-100 pb-4">Weight Loss Comparison (%)</h4>
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto mt-2">
                {[0, Math.max(yAxisMax/2, 0.1), Math.max(yAxisMax, 0.2)].map(val => (
                   <g key={val}>
                     <line x1={padding} y1={getY(val)} x2={width-padding} y2={getY(val)} stroke="#f1f5f9" strokeWidth="2" strokeDasharray="4"/>
                     <text x={padding - 10} y={getY(val) + 4} textAnchor="end" fontSize="11" fill="#94a3b8" fontWeight="600">{val.toFixed(1)}%</text>
                   </g>
                ))}
                {days.map((day, dayIdx) => (
                  <g key={day}>
                    <text x={getX(dayIdx) + (slotWidth / 2)} y={height - 10} textAnchor="middle" fontSize="12" fill="#475569" fontWeight="bold">{formatDay(day)}</text>
                    {groups.map((g, grpIdx) => {
                       const meas = (g.measurements || []).find(m => parseFloat(m.day) === day);
                       const day0 = (g.measurements || []).find(m => parseFloat(m.day) === 0);
                       const loss = getWeightLoss(meas?.samples, day0?.samples);
                       
                       const groupStartX = getX(dayIdx) + (slotWidth - barGroupWidth) / 2;
                       return (
                         <rect 
                            key={grpIdx}
                            x={groupStartX + (grpIdx * barWidth)}
                            y={getY(loss)}
                            width={Math.max(barWidth - 4, 2)}
                            height={height - padding - getY(loss)}
                            fill={CHART_COLORS[grpIdx % CHART_COLORS.length].stroke}
                            rx="4"
                         />
                       );
                    })}
                  </g>
                ))}
              </svg>
              <div className="flex flex-wrap justify-center gap-6 mt-8">
                {groups.map((g, idx) => (
                  <div key={g.id} className="flex items-center gap-2 text-sm font-extrabold text-slate-700">
                    <div className="w-4 h-4 rounded-full shadow-sm" style={{ backgroundColor: CHART_COLORS[idx % CHART_COLORS.length].stroke }}></div>
                    {g.name || 'Variant'}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const SampleModal = ({ isOpen, onClose, data, onSave, startWeight, day0Samples, projectCriteria, isEvaluationDay, isDayEditable, projectTotalDuration, isMAP = true, rt }) => {
          if (!isOpen) return null;
          const [samples, setSamples] = useState(data.samples || []);
          const [day, setDay] = useState(data.day === 0 ? 0 : (data.day || ''));
          const [notes, setNotes] = useState(data.notes || '');
          const [evaluateQuality, setEvaluateQuality] = useState(data.evaluateQuality !== undefined ? data.evaluateQuality : false);
          const [qualityParams, setQualityParams] = useState(data.qualityParams || []);

          useEffect(() => {
            if (evaluateQuality && projectCriteria?.length > 0 && qualityParams.length === 0) {
              setQualityParams(projectCriteria.map(c => ({ name: c, score: '', notes: '' })));
            }
          }, [evaluateQuality, projectCriteria, qualityParams]);

                        <div className="p-3 border-t border-slate-100 flex flex-col gap-2">

                              {[

                                ['Weight measurement', rt?.catWeightMeas    || 'Weight measurement'],
                                ['Gas measurement',  rt?.catGasMeas         || 'Gas measurement'],

                              ].map(([val, label]) => <option key={val} value={val}>{label}</option>)}
                          </select>
                          <input type="text" className="w-full p-2 text-xs border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-shadow placeholder:text-slate-400" placeholder={rt?.captionPlaceholder || 'Caption / Description...'} value={img.caption || ''} onChange={e => updateImageField(idx, 'caption', e.target.value)} />

                      </div>
                    ))}
                    <label className="border-4 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all aspect-square min-h-[200px] shadow-sm group">
                       <div className="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                          <Upload size={28} className="text-blue-500"/>
                       </div>

                    </label>
                  </div>
                </div>
                
                <div className="bg-white p-6 border-t border-slate-200 flex justify-end gap-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                   <button onClick={onClose} className="px-6 py-3 text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-xl font-bold transition-all shadow-sm">{rt?.done || 'Done'}</button>
                   <button onClick={handleSave} className="px-8 py-3 text-white font-bold rounded-xl shadow-lg shadow-green-500/30 hover:shadow-green-500/50 hover:-translate-y-0.5 transition-all flex items-center gap-2" style={{ backgroundColor: BRAND.colors.green }}><Save size={18}/> {rt?.savePhotos || 'Save Photos'}</button>
                </div>
              </div>
            </div>
          );
        };

        const PrintPreview = ({ clientInfo, project, groups, analysis, supplyChain, onBack, unitSystem = 'metric', lang = 'en' }) => {
          // Recognised stage labels are re-translated to the report language at
          // render time, so a chain entered in another language (e.g. Spanish)
          // never leaks untranslated into the report. Free text passes through.
          const displayChain = (supplyChain || []).map(s => globalConfig.retranslateStage
            ? { ...s, stage: globalConfig.retranslateStage(s.stage, lang) }
            : s);
          const [isPrinting, setIsPrinting] = useState(false);
          const [isWordExporting, setIsWordExporting] = useState(false);
          const [wordProgress, setWordProgress] = useState('');
          // Only use temperatures from the 'pack' stage up to (not including) the 'unpack' stage.
          // Pre-packaging steps like harvest and transport are excluded so the report shows
          // the temperature the product was actually packed and stored at.
          const _packIdx   = (supplyChain || []).findIndex(s => s.action === 'pack');
          const _unpackIdx = (supplyChain || []).findIndex((s, i) => i > _packIdx && s.action === 'unpack');
          const _packedStages = _packIdx >= 0
            ? (_unpackIdx > _packIdx
                ? (supplyChain || []).slice(_packIdx, _unpackIdx)
                : (supplyChain || []).slice(_packIdx))
            : (supplyChain || []); // fallback: all stages when no explicit 'pack' action is set
          let allTemps = [];
          _packedStages.forEach(s => {
              const ts = parseFloat(s.tempStart); if(!isNaN(ts)) allTemps.push(ts);
              const te = parseFloat(s.tempEnd);   if(!isNaN(te)) allTemps.push(te);
          });
          const minTemp = allTemps.length > 0 ? Math.min(...allTemps) : null;
          const maxTemp = allTemps.length > 0 ? Math.max(...allTemps) : null;
          const tempString = allTemps.length > 0 ? (minTemp === maxTemp ? `${minTemp}°C` : `${minTemp}°C - ${maxTemp}°C`) : '-°C';
          const totalDays = project.totalDuration || (supplyChain || []).reduce((acc,s) => acc + parseFloat(s.daysStart || 0), 0);

          // Unit-aware weight label: bulk packaging (Pallet / Cube crate) uses kg or lb; retail uses g or oz.
          const projIsBulk = (project.packagings?.[0]?.packagingType || project.packagingType || 'Retail') === 'Cube crate' || (project.packagings?.[0]?.packagingType || project.packagingType || 'Retail') === 'Pallet';
          const isImperial = unitSystem === 'imperial';
          const weightUnit = isImperial ? (projIsBulk ? 'lb' : 'oz') : (projIsBulk ? 'kg' : 'g');

          const allPhotos = groups.flatMap(g => (g.measurements || []).flatMap(m => (m.images || []).map(img => ({ groupName: g.name, day: m.day, url: typeof img === 'string' ? img : img.url, caption: typeof img === 'string' ? '' : img.caption, category: (typeof img === 'object' && img.category) ? img.category : 'Other' }))));
          const photosByCat = {};
          allPhotos.forEach(p => { if (!photosByCat[p.category]) photosByCat[p.category] = []; photosByCat[p.category].push(p); });
          const catsPresent = ['External Quality', 'Internal Quality', 'Loose Produce', 'Box/Crate', 'Weight measurement', 'Gas measurement', 'Other'].filter(c => photosByCat[c] && photosByCat[c].length > 0);

          // Auto-detect which optional sections have data to render.
          const mapGroupsList = groups.filter(g => !g.specs?.atmosphereStrategy || g.specs.atmosphereStrategy === 'MAP');
          const autoShowGas = mapGroupsList.some(g =>
            (g.measurements || []).some(m =>
              parseFloat(m.day) > 0 &&
              (m.samples || []).some(s => s.o2 !== '' && s.o2 !== undefined && s.o2 !== null)
            )
          );
          const autoShowHub = mapGroupsList.some(g => !!g.predictedImage);
          const autoShowWeight = groups.some(g => {
            const daysWithWeight = (g.measurements || []).filter(m =>
              (m.samples || []).some(s => s.weight !== '' && s.weight !== undefined && s.weight !== null && parseFloat(s.weight) > 0)
            );
            return daysWithWeight.length >= 2;
          });

          // Effective values — null/undefined = "auto", true/false = manual override.
          // Use ?? (nullish coalescing) so that both null AND undefined (old JSON files) fall through to auto.
          const showGas = analysis.showGasSection ?? autoShowGas;
          const showAnyHubPrediction = analysis.showHubPredictions ?? autoShowHub;
          const showWeight = analysis.showWeightLoss ?? autoShowWeight;

          // Dynamic section numbering for 4.x — depends on which optional sections are visible.
          const sec4Nums = (() => {
            let n = 0;
            return {
              gas:      showGas                   ? ++n : null,
              temp:     getTempImages(analysis).length > 0 ? ++n : null,
              weight:   showWeight                ? ++n : null,
              visual:   ++n,
              detailed: ++n,
              score:    ++n,
            };
          })();

          const reportTitleClass = "text-3xl font-extrabold uppercase mb-6 brand-heading";
          const reportTitleStyle = { color: BRAND.colors.green, borderBottom: `3px solid ${BRAND.colors.gray}`, paddingBottom: '0.75rem', marginTop: '2rem' };

          // Builds a genuine .docx (via the `docx` library) from the rendered
          // report DOM: fully editable text, native Word tables and headings.
          // Only photos and charts are embedded as pictures. Page breaks occur
          // exactly at the report's .page-break sections; everything else
          // flows naturally, so pagination tracks the PDF.
          const handleWordExport = async () => {
              const root = document.getElementById('print-content');
              if (!root || isWordExporting) return;
              setIsWordExporting(true);
              setWordProgress('Loading Word engine...');
              try {
                  await document.fonts.ready;
                  // jsDelivr serves the package's own prebuilt browser bundle;
                  // esm.sh's re-bundle of docx has a broken Packer that hangs.
                  const docx = await import('https://cdn.jsdelivr.net/npm/docx@8.5.0/+esm');
                  setWordProgress('Converting report...');
                  const children = await domToDocx(root, docx, { onProgress: setWordProgress, supplyChain, scores: SCORES });
                  setWordProgress('Assembling document...');
                  const doc = new docx.Document({
                      styles: {
                          default: {
                              document: { run: { font: 'Montserrat' } },
                              // Brand heading styles: without these Word's own
                              // Heading 1/2 (blue Calibri Light) would restyle
                              // the section titles used for the TOC outline.
                              heading1: { run: { font: 'Montserrat', color: '007C27', bold: true } },
                              heading2: { run: { font: 'Montserrat', color: '334155', bold: true } },
                          },
                      },
                      // Refresh fields on open so the TOC gets page numbers
                      // and clickable links straight away.
                      features: { updateFields: true },
                      sections: [{
                          properties: {
                              page: {
                                  size: { width: 11906, height: 16838 },     // A4 portrait (twips)
                                  margin: { top: 680, right: 680, bottom: 680, left: 680 }, // 12mm
                              },
                          },
                          footers: {
                              default: new docx.Footer({
                                  children: [new docx.Paragraph({
                                      alignment: docx.AlignmentType.CENTER,
                                      children: [new docx.TextRun({ children: [docx.PageNumber.CURRENT], size: 16, color: '94A3B8', font: 'Montserrat' })],
                                  })],
                              }),
                          },
                          children,
                      }],
                  });
                  const blob = await docx.Packer.toBlob(doc);
                  const a = document.createElement('a');
                  document.body.appendChild(a);
                  a.href = URL.createObjectURL(blob);
                  a.download = (project.reportTitle || 'Report') + '.docx';
                  a.click();
                  document.body.removeChild(a);
              } catch (e) {
                  alert('Word export failed: ' + ((e && e.message) ? e.message : e));
              } finally {
                  setIsWordExporting(false);
                  setWordProgress('');
              }
