            productName: '', processingType: 'Whole', type: '', origin: '', company: '', contactName: '', contactEmail: '', contactRole: '', contactPhone: '', street: '', houseNumber: '', addressExtra: '', zipCode: '', city: '', country: '', employee: '', trialTarget: '', currentChallenge: '',
            rrO2: '', rrCO2: '', rrTemp: '', startWeight: '',
            // Packaging — mirrors proposal so the Setup tab has full parity.
            packagings: [{ id: 1, packagingType: 'Retail', material: '', length: '', width: '', height: '', startWeight: '' }],
            // Product Characteristics (Section 3 in print preview / DEEL 6 editor)
            // — additive, do not affect existing flows when empty.
            acpO2: '', co2Max: '', co2Shock: '', co2ShockHours: '', tempMin: '',
            o2Target: '', co2Target: '', ethyleneProfile: '',
            totalDuration: '', retailOpenDays: '', transportMode: '',
            // Optional free-text sections rendered in "3. Trial set up".
            processDescription: '', ripeningProtocol: '',
            criteria: [], technologies: [], technologyNote: '',
            date: new Date().toISOString().split('T')[0], packingDate: new Date().toISOString().split('T')[0],
            logo: BRAND.logos.default, clientLogo: null, startImage: null, coverImage: null,
            maturityStage: '', postHarvestTreatment: '',
            // Defects & Prevention Matrix rows for Section 3 of the report.
            defectsMatrix: []
          });

          const [supplyChain, setSupplyChain] = useState(JSON.parse(JSON.stringify(DEFAULT_SUPPLY_CHAIN)).map(s => ({...s, stage: (globalConfig.translateLabel ? globalConfig.translateLabel(s.stage, lang) : s.stage)})));

          // Re-translate recognised supply-chain stage labels whenever the UI
          // language changes. retranslateStage() maps any canonical stage label
          // (in any language) to the target language and leaves genuine
          // free-text stages untouched — so a chain entered in Spanish shows
          // up in English/Dutch after switching, and vice versa.
          useEffect(() => {
            if (globalConfig.retranslateStage) {
              setSupplyChain(prev => prev.map(s => ({ ...s, stage: globalConfig.retranslateStage(s.stage, lang) })));
            }
          }, [lang]);

          const [groups, setGroups] = useState([
            {
              id: 1, name: 'Control',
              specs: { packaging: 'Punnets', material: 'BOPP', length: '', width: '', height: '', holes: '2', holeSize: '6000', startWeight: '', sampleCount: 3 },
              measurements: [{ day: 0, samples: [{id:1,o2:'20.9',co2:'0.03',weight:''}, {id:2,o2:'20.9',co2:'0.03',weight:''}, {id:3,o2:'20.9',co2:'0.03',weight:''}], quality: 10, notes: 'Start quality excellent', images: [], qualityParams: [], evaluateQuality: true }],
              predictedImage: null 
            }
          ]);

          const [analysis, setAnalysis] = useState({ graphNotes: '', conclusion: '', variantConclusions: {}, recommendation: 'retest', nextSteps: [], temperatureImages: [], temperatureLabel: '', showGasSection: null, showHubPredictions: null, showWeightLoss: null, generalObservations: '', targetAchieved: null, targetEvaluation: '' });
          const [newStep, setNewStep] = useState('');
          const [newStepVariant, setNewStepVariant] = useState('general');
          const [newCriteria, setNewCriteria] = useState('');

          const calcUnpackingDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;
            if (baseDate && duration) {
               const d = new Date(baseDate);
               d.setDate(d.getDate() + duration);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const year = d.getFullYear();
               return `${day}/${month}/${year}`; 
            }
            return '-';
          };
          
          const calcRetailDate = () => {
            const baseDate = project.packingDate || project.date;
            const duration = parseInt(project.totalDuration) || 0;
            const retailDays = parseInt(project.retailOpenDays) || 0;
            if (baseDate && (duration || retailDays)) {
               const d = new Date(baseDate);
               d.setDate(d.getDate() + duration + retailDays);
               const day = String(d.getDate()).padStart(2, '0');
               const month = String(d.getMonth() + 1).padStart(2, '0');
               const year = d.getFullYear();
               return `${day}/${month}/${year}`; 
            }
            return '-';
          };

          // --- HANDLERS ---
          const handleClientChange = (field, value) => { setClientInfo(prev => ({ ...prev, [field]: value })); };

          // Multi-contact helpers — mirror intake/proposal so the same
          // clientInfo.contacts[] array round-trips across all three tools.
          //
          // When editing the primary contact (contacts[0]), keep the legacy
          // flat shadow fields (`contactName`, `role`, `email`, `phone`,
          // `phoneDirect`, `phoneWork`) in sync. The print/PDF preview rendering
          // and legacy `project.contact*` export fields still read those flats,
          // so without this sync they would show stale data after an edit.
          const syncFlatFromPrimaryContact = (prev, primary) => {
             if (!primary) return prev;
             return {
                ...prev,
                contactName: primary.name || '',
                role: primary.role || '',
                email: primary.email || '',
                phone: primary.phoneDirect || primary.phoneWork || '',
                phoneDirect: primary.phoneDirect || '',
                phoneWork: primary.phoneWork || ''
             };
          };

          const handleContactChange = (id, field, value) => {
             setClientInfo(prev => {
                const newContacts = (prev.contacts || []).map(c => c.id === id ? { ...c, [field]: value } : c);
                const primaryEdited = prev.contacts && prev.contacts[0] && prev.contacts[0].id === id;
                const next = { ...prev, contacts: newContacts };
                return primaryEdited ? syncFlatFromPrimaryContact(next, newContacts[0]) : next;
             });
          };

          const addContact = () => {
             setClientInfo(prev => ({
                 ...prev,
                 contacts: [...(prev.contacts || []), { id: Date.now(), name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }]
             }));
          };

          const removeContact = (id) => {
             setClientInfo(prev => {
                const newContacts = (prev.contacts || []).filter(c => c.id !== id);
                const primaryRemoved = prev.contacts && prev.contacts[0] && prev.contacts[0].id === id;
                const next = { ...prev, contacts: newContacts };
                // Promote the new primary into the flat shadow fields.
                return primaryRemoved ? syncFlatFromPrimaryContact(next, newContacts[0]) : next;
             });
          };

          // Metric/Imperial toggle — converts startWeight (project & per-group)
          // and supply chain temperatures so visible values stay correct.
          const handleUnitToggle = () => {
            const toImperial = unitSystem === 'metric';
            const newSys = toImperial ? 'imperial' : 'metric';
            setProject(p => ({
              ...p,
              startWeight: convertValue(p.startWeight, 'weight', false, toImperial)
            }));
            setSupplyChain(chain => chain.map(s => ({
              ...s,
              tempStart: convertValue(s.tempStart, 'temp', false, toImperial),
              tempEnd:   convertValue(s.tempEnd,   'temp', false, toImperial)
            })));
            setGroups(gs => gs.map(g => {
              const isBulk = g.specs?.packaging === 'Cube crate' || g.specs?.packaging === 'Pallet';
              return {
                ...g,
                specs: {
                  ...g.specs,
                  length:      convertValue(g.specs?.length,      'length', isBulk, toImperial),
                  width:       convertValue(g.specs?.width,       'length', isBulk, toImperial),
                  height:      convertValue(g.specs?.height,      'length', isBulk, toImperial),
                  startWeight: convertValue(g.specs?.startWeight, 'weight', isBulk, toImperial)
                }
              };
            }));
            setUnitSystem(newSys);
          };

          const handleImgUpload = (e, field, isGroup = false) => { const f = e.target.files[0]; if(f) { const r = new FileReader(); r.onloadend = () => { if(isGroup) setGroups(p => p.map(g => g.id === activeGroupId ? {...g, predictedImage: r.result} : g)); else if(field === 'clientLogo') setClientInfo(c => ({...c, logo: r.result})); else setProject(p => ({...p, [field]: r.result})); }; r.readAsDataURL(f); }};
          
          const handlePredictedImageUpload = (e, groupId) => { 
            const file = e.target.files[0]; 
            if(file) { 
              const reader = new FileReader(); 
              reader.onloadend = () => {
                 const group = groups.find(g => g.id === groupId);
                 if (group && group.predictedImage) {
                    setPendingImageReplace({ groupId: groupId, result: reader.result });
                 } else {
                    setGroups(prev => prev.map(g => g.id === groupId ? { ...g, predictedImage: reader.result } : g)); 
                 }
              };
              reader.readAsDataURL(file); 
              e.target.value = '';
            }
          };

          const handleProjectChange = (f, v) => setProject(p => ({...p, [f]: v}));
          
          const syncMeasurements = (currentGroups, packedStr, openStr) => {
            const p = parseInt(packedStr) || 0;
            const o = parseInt(openStr) || 0;
            return currentGroups.map(g => {
              const newM = [...g.measurements];
              const sCount = g.specs.sampleCount || 3;
              const createMeas = (day, notes) => ({
                 day, samples: Array.from({length: sCount}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '', initialWeight: '' })), quality: 9, notes: notes, images: [], qualityParams: [], evaluateQuality: true
              });
              
              if (p > 0 && !newM.find(m => parseFloat(m.day) === p)) {
                 newM.push(createMeas(p, 'End Packing'));
              }
              if (p > 0 && o > 0) {
                 const openDay = p + o;
                 if (!newM.find(m => parseFloat(m.day) === openDay)) {
                    newM.push(createMeas(openDay, 'Retail Simulation (Open)'));
                 }
              }
              newM.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
              return { ...g, measurements: newM };
            });
          };

          const handleDurationChange = (e) => {
            const val = e.target.value;
            setProject(p => ({...p, totalDuration: val}));
            setGroups(prev => syncMeasurements(prev, val, project.retailOpenDays));
          };
          
          const handleOpenDaysChange = (e) => {
            const val = e.target.value;
            setProject(p => ({...p, retailOpenDays: val}));
            setGroups(prev => syncMeasurements(prev, project.totalDuration, val));
          };

          const handleSampleCountChange = (groupId, num) => {
            let c = isNaN(num) || num < 1 ? 1 : num > 50 ? 50 : num;
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const newM = g.measurements.map(m => {
                let smpls = [...m.samples];
                if (smpls.length < c) { for (let i = 0; i < c - smpls.length; i++) smpls.push({ id: Date.now()+i+Math.random(), o2: parseFloat(m.day)===0?'20.9':'', co2: parseFloat(m.day)===0?'0.03':'', weight: '', initialWeight: '' }); } 
                else if (smpls.length > c) { smpls = smpls.slice(0, c); }
                return { ...m, samples: smpls };
              });
              return { ...g, specs: { ...g.specs, sampleCount: c }, measurements: newM };
            }));
          };

          const exportData = async () => {
            // Rebuild canonical contacts[] so report exports round-trip cleanly.
            const normalizedClientInfo = globalConfig.buildContactsArray
              ? { ...clientInfo, contacts: globalConfig.buildContactsArray(clientInfo) }
              : clientInfo;

            // Legacy `project.contactName/contactRole/...` fields are kept for
            // backward compatibility with older importers. Source them from the
            // canonical contacts[0] (post-build) so they always reflect the
            // multi-contact UI's current state — never stale shadow flats.
            const primaryContact = (normalizedClientInfo.contacts && normalizedClientInfo.contacts[0]) || {};

            const data = {
              isPerfoTecReport: true,
              schemaVersion: globalConfig.SCHEMA_VERSION || '2.1',
              appVersion: globalConfig.APP_VERSION || '',
              exportDate: new Date().toISOString(),
              language: lang,
              unitSystem: unitSystem,
              project: { ...project, company: clientInfo.companyName, street: clientInfo.street, houseNumber: clientInfo.houseNumber, addressExtra: clientInfo.addressExtra, zipCode: clientInfo.zipCode, city: clientInfo.city, country: clientInfo.country, contactName: primaryContact.name || '', contactRole: primaryContact.role || '', contactEmail: primaryContact.email || '', contactPhone: primaryContact.phoneDirect || primaryContact.phoneWork || '' },
              clientInfo: normalizedClientInfo, supplyChain, groups, analysis
            };
            const jsonString = JSON.stringify(data, null, 2);
            const defaultName = `perfotec_report_${project.productName ? project.productName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'data'}.json`;
            if (globalConfig.exportJSON) {
                globalConfig.exportJSON(data, defaultName);
            } else {
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = defaultName; a.click(); URL.revokeObjectURL(url);
            }
          };

          // Shared helpers used by both the direct import path and the
          // multi-product modal flow (declared at component scope so they can
          // be invoked from confirmProductSelection too).
          const reportExtractPrimaryContact = globalConfig.extractPrimaryContact
            ? globalConfig.extractPrimaryContact.bind(globalConfig)
            : (c) => ({ contactName: '', role: '', email: '', phone: '', phoneDirect: '', phoneWork: '', contacts: [] });

          // Ensure clientInfo.contacts[] always has at least one seed card so
          // the multi-contact UI renders consistently after legacy imports.
          const reportSeedContacts = (data) => {
            if (!data || !Array.isArray(data.contacts) || data.contacts.length === 0) {
              return {
                ...data,
                contacts: [{ id: Date.now(), name: '', role: '', email: '', phoneDirect: '', phoneWork: '' }]
              };
            }
            return data;
          };

          // Apply a single intake product (from a migrated intake payload) to
          // report state. Extracted so the import flow can call it both
          // directly (1 product) and after the user picks one in the modal
          // (>1 products).
          const loadIntakeProduct = (d, prod) => {
            const client = d.client || {};
            const p = prod || {};
            const contactData = reportSeedContacts(reportExtractPrimaryContact(client));

            setClientInfo({
              companyName: client.companyName || '',
              street: client.street || '',
              houseNumber: client.houseNumber || '',
              addressExtra: client.addressExtra || '',
              zipCode: client.zipCode || '',
              city: client.city || '',
              country: client.country || '',
              website: client.website || '',
              ...contactData,
              logo: client.logo || null
            });
            setProject(prev => ({ ...prev,
              productName: p.name || '',
              processingType: p.processingType || 'Whole',
              type: p.type || '',
              origin: p.origin || '',
              maturityStage: p.maturityStage || '',
              postHarvestTreatment: p.postHarvestTreatment || '',
              currentChallenge: p.currentChallenge || '',
              trialTarget: p.trialTarget || p.targetGoal || '',
              transportMode: p.transportMode || (p.transportModes?.[0] || ''),
              criteria: p.qualityCriteria || [],
              startImage: p.photo || null,
              startWeight: p.weight || prev.startWeight,
              technologies: p.technologies || prev.technologies || [],
              packagingType: p.packagingType || prev.packagingType || 'Retail',
              material: p.material || prev.material || '',
              length: p.length || prev.length || '',
              width: p.width || prev.width || '',
              height: p.height || prev.height || ''
            }));
            if (p.supplyChain) setSupplyChain(p.supplyChain);
            setGroups(prev => {
              const ug = [...prev];
              if (ug[0]) {
                ug[0].specs = {
                  ...ug[0].specs,
                  packaging: p.packagingType || 'Retail',
                  material: p.material || '',
                  length: p.length || '',
                  width: p.width || '',
                  height: p.height || '',
                  startWeight: p.weight || ''
                };
              }
              return ug;
            });
          };

          // Confirm handler for the multi-product picker modal.
          const confirmProductSelection = (productIdx) => {
            if (!pendingProductSelection) return;
            const { raw, products } = pendingProductSelection;
            const chosen = products[productIdx] || products[0] || {};
            loadIntakeProduct(raw, chosen);
            setPendingProductSelection(null);
          };

          const importData = (e) => {
            const file = e.target.files[0]; if(!file) return;

            // Local aliases for the helpers declared at component scope above —
            // keeps the existing processData body unchanged.
            const extractPrimaryContact = reportExtractPrimaryContact;
            const seedContacts = reportSeedContacts;

            const processData = (raw) => {
                // Normalise legacy shapes (flat contacts, targetGoal alias, missing
                // schemaVersion) before we read from the payload.
                const d = globalConfig.migrateSchema ? globalConfig.migrateSchema(raw) : raw;
                // Apply language from source if present
                if (d.language && ['en','nl','es'].includes(d.language)) {
                   setLang(d.language);
                   if (globalConfig.setLanguage) globalConfig.setLanguage(d.language);
                }
                // Apply unit system from source if present
                if (d.unitSystem) setUnitSystem(d.unitSystem);
                
                if(d.isPerfoTecIntake) {
                   // === INTAKE IMPORT ===
                   // Report works with one product per session. If the intake
                   // JSON carries multiple products, defer the import and let
                   // the user pick which one to load via the modal below.
                   const products = Array.isArray(d.products) ? d.products : [];
                   if (products.length > 1) {
                     setPendingProductSelection({ raw: d, products });
                   } else {
                     loadIntakeProduct(d, products[0] || {});
                   }
                } else {
                   // === PROPOSAL/REPORT IMPORT ===
                   if(d.clientInfo) {
                       const ci = d.clientInfo;
                       const contactData = seedContacts(extractPrimaryContact(ci));
                       setClientInfo({
                         companyName: ci.companyName || '',
                         street: ci.street || '',
                         houseNumber: ci.houseNumber || '',
                         addressExtra: ci.addressExtra || '',
                         zipCode: ci.zipCode || '',
                         city: ci.city || '',
                         country: ci.country || '',
                         website: ci.website || '',
                         ...contactData,
                         logo: ci.logo || null
                       });
                   } else if (d.client) {
                       const contactData = seedContacts(extractPrimaryContact(d.client));
                       setClientInfo({
                         companyName: d.client.companyName || '',
                         street: d.client.street || '',
                         houseNumber: d.client.houseNumber || '',
                         addressExtra: d.client.addressExtra || '',
                         zipCode: d.client.zipCode || '',
                         city: d.client.city || '',
                         country: d.client.country || '',
                         website: d.client.website || '',
                         ...contactData,
                         logo: d.client.logo || null
                       });
                   } else if (d.project) {
                       // Legacy: client info flattened into project. Hoist any
                       // legacy single-contact fields into the canonical
                       // contacts[] seed so the multi-contact UI renders.
                       const legacyContact = {
                         id: Date.now(),
                         name: d.project.contactName || '',
                         role: d.project.contactRole || d.project.role || '',
                         email: d.project.contactEmail || d.project.email || '',
                         phoneDirect: d.project.phoneDirect || '',
                         phoneWork: d.project.phoneWork || d.project.contactPhone || d.project.phone || ''
                       };
                       setClientInfo({
                         companyName: d.project.company || '',
                         street: d.project.street || '',
                         houseNumber: d.project.houseNumber || '',
                         addressExtra: d.project.addressExtra || '',
                         zipCode: d.project.zipCode || '',
                         city: d.project.city || '',
                         country: d.project.country || '',
                         website: d.project.website || '',
                         contactName: d.project.contactName || '',
                         role: d.project.contactRole || d.project.role || '',
                         email: d.project.contactEmail || d.project.email || '',
                         phone: d.project.contactPhone || d.project.phone || '',
                         phoneDirect: d.project.phoneDirect || '',
                         phoneWork: d.project.phoneWork || '',
                         contacts: [legacyContact],
                         logo: d.project.clientLogo || null  // legacy fallback
                       });
                   }

                   const migrateProjectPackagings = (proj) => {
                     if (!proj) return proj;
                     if (!proj.packagings) {
                       return { ...proj, packagings: proj.packagingType
                         ? [{ id: 1, packagingType: proj.packagingType || 'Retail', material: proj.material || '', length: proj.length || '', width: proj.width || '', height: proj.height || '', startWeight: proj.startWeight || '' }]
                         : [{ id: 1, packagingType: 'Retail', material: '', length: '', width: '', height: '', startWeight: '' }] };
                     }
                     return proj;
                   };
                   if(d.project) setProject(p => ({
                     ...p,
                     ...migrateProjectPackagings(d.project),
                     packingDate: d.project.packingDate || d.project.date || new Date().toISOString().split('T')[0],
                     transportMode: d.project.transportMode || '',
                     technologies: d.project.technologies || [],
                     logo: d.project.logo || BRAND.logos.default
                   })); 
                   if(d.supplyChain) setSupplyChain(d.supplyChain); 
                   if(d.groups) setGroups(d.groups.map(g => ({
                     ...g,
                     measurements: (g.measurements || []).map(m => ({
                       ...m,
                       // When an `evaluate` array is present (proposal origin), derive
                       // evaluateQuality from it so the Enable Evaluation checkbox matches
                       // what was ticked in the Variants & Planning timeline.
                       // Falls back to the explicit boolean for pure report JSONs.
                       evaluateQuality: Array.isArray(m.evaluate)
                         ? m.evaluate.length > 0
                         : (m.evaluateQuality !== undefined ? m.evaluateQuality : false)
                     }))
                   })));
                   if(d.analysis) setAnalysis({ graphNotes: d.analysis.graphNotes||'', conclusion: d.analysis.conclusion||'', variantConclusions: d.analysis.variantConclusions||{}, recommendation: d.analysis.recommendation||'retest', nextSteps: d.analysis.nextSteps||[], temperatureImages: getTempImages(d.analysis), temperatureLabel: d.analysis.temperatureLabel||'', showGasSection: d.analysis.showGasSection ?? null, showHubPredictions: d.analysis.showHubPredictions ?? null, showWeightLoss: d.analysis.showWeightLoss ?? null, generalObservations: d.analysis.generalObservations||'', targetAchieved: d.analysis.targetAchieved||null, targetEvaluation: d.analysis.targetEvaluation||'' });
                }
            };

            if (globalConfig.importJSON) {
                globalConfig.importJSON(file, processData, () => alert("Error loading JSON file."));
            } else {
                const reader = new FileReader(); 
                reader.onload = (ev) => { 
                    try { processData(JSON.parse(ev.target.result)); } catch(err){ alert("Error loading file."); } 
                }; 
                reader.readAsText(file); 
            }
            e.target.value = '';
          };

          const handleGroupChange = (id, section, field, value) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== id) {
                // Verification rounds must keep an identical packaging
                // configuration to their Round-1 source, so packaging spec
                // edits propagate to linked R2 groups (sample count stays
                // independent per round).
                if (section === 'specs' && g.verificationOf === id && field !== 'sampleCount') {
                  return { ...g, specs: { ...g.specs, [field]: value } };
                }
                return g;
              }
              if (section === 'name') return { ...g, name: value };
              if (section === 'specs') return { ...g, specs: { ...g.specs, [field]: value } };
              if (section === 'startGas') return { ...g, specs: { ...g.specs, startGas: { ...g.specs.startGas, [field]: value } } };
              if (!section && field) return { ...g, [field]: value };
              return g;
            }));
          };

          const toggleCriteria = (c) => setProject(p => ({ ...p, criteria: p.criteria.includes(c) ? p.criteria.filter(x => x !== c) : [...p.criteria, c] }));
          const addNewCriteria = () => { if(newCriteria && !project.criteria.includes(newCriteria)) { toggleCriteria(newCriteria); setNewCriteria(''); }};
          
          const handleTransportModeToggle = (mode) => {
            const isDeselect = project.transportMode === mode;
            setProject(p => ({ ...p, transportMode: isDeselect ? '' : mode }));
            // Keep the supply-chain transport step in sync with the selected mode.
            if (!isDeselect) {
              const modeToStage = { 'Road Transport': rt.transportRoad, 'Sea Freight': rt.transportSea, 'Air Freight': rt.transportAir, 'Storage': rt.transportStorage };
              const newStage = modeToStage[mode];
              if (newStage) {
                setSupplyChain(prev => {
                  const i = prev.findIndex(s => isTransportStage(s.stage));
                  if (i === -1) return prev;
                  const next = [...prev];
                  next[i] = { ...next[i], stage: newStage };
                  return next;
                });
              }
            }
          };
          const toggleTechnology = (tech) => { setProject(p => ({ ...p, technologies: p.technologies?.includes(tech) ? p.technologies.filter(t => t !== tech) : [...(p.technologies || []), tech] })); };

          // === DEFECTS & PREVENTION MATRIX ===
          // Mirrors proposal.html: stable per-row ids so React keys stay valid
          // and the matrix round-trips cleanly through JSON.
          const addDefectRow = () => setProject(p => ({
            ...p,
            defectsMatrix: [...(p.defectsMatrix || []), { id: Date.now(), defect: '', cause: '', effectMHP: '', effectMAP: '' }]
          }));
          const removeDefectRow = (rowId) => setProject(p => ({
            ...p,
            defectsMatrix: (p.defectsMatrix || []).filter(r => r.id !== rowId)
          }));
          const updateDefectRow = (rowId, field, value) => setProject(p => ({
            ...p,
            defectsMatrix: (p.defectsMatrix || []).map(r => r.id === rowId ? { ...r, [field]: value } : r)
          }));

          // === PRODUCT-SHEET IMPORTER ===
          // Drop-zone parser: takes a PerfoTec product-sheet HTML and fills
          // gas/temp targets + the defects matrix. Mirrors proposal.html so
          // both tools speak the same product-sheet format.
          const extractProductSheetTranslations = (htmlText) => {
            const startMarker = 'const translations';
            const startIdx = htmlText.indexOf(startMarker);
            if (startIdx === -1) return null;
            const eqIdx = htmlText.indexOf('=', startIdx);
            if (eqIdx === -1) return null;
            const braceStart = htmlText.indexOf('{', eqIdx);
            if (braceStart === -1) return null;
            let depth = 0, i = braceStart, inStr = null, escaped = false;
            while (i < htmlText.length) {
              const c = htmlText[i];
              if (escaped) { escaped = false; i++; continue; }
              if (inStr) {
                if (c === '\\') { escaped = true; i++; continue; }
                if (c === inStr) inStr = null;
                i++; continue;
              }
              if (c === '"' || c === "'" || c === '`') { inStr = c; i++; continue; }
              if (c === '{') depth++;
              else if (c === '}') { depth--; if (depth === 0) { i++; break; } }
              i++;
            }
            const objLit = htmlText.substring(braceStart, i);
            try { return new Function('return ' + objLit)(); } catch (e) { return null; }
          };
          const stripHtml = (html) => {
            if (!html) return '';
            const tmp = document.createElement('div');
            tmp.innerHTML = String(html);
            return tmp.textContent.replace(/\s+/g, ' ').trim();
          };
          const parseProductSheet = (htmlText, targetLang) => {
            const result = { defects: [], o2Target: '', co2Target: '', tempCritical: '', o2Acp: '' };
            if (!htmlText || typeof htmlText !== 'string') return result;
            try {
              const doc = new DOMParser().parseFromString(htmlText, 'text/html');
              const allTrans = extractProductSheetTranslations(htmlText);
              const wanted = targetLang || 'nl';
              const langDict = (allTrans && allTrans[wanted] && Object.keys(allTrans[wanted]).length > 0)
                ? allTrans[wanted] : null;
              const cellText = (td) => {
                const key = td.getAttribute && td.getAttribute('data-translate');
                if (key && langDict && langDict[key]) return stripHtml(langDict[key]);
                return td.textContent.replace(/\s+/g, ' ').trim();
              };
              const rows = doc.querySelectorAll('#common-defects table.data-table tbody tr, table.data-table tbody tr');
              const seen = new Set();
              rows.forEach((tr, i) => {
                const tds = tr.querySelectorAll('td');
                if (tds.length < 4) return;
                const defect = cellText(tds[0]);
                const cause = cellText(tds[1]);
                const effectMHP = cellText(tds[2]);
                const effectMAP = cellText(tds[3]);
                if (!defect && !cause) return;
                const key = defect + '|' + cause;
                if (seen.has(key)) return;
                seen.add(key);
                result.defects.push({ id: Date.now() + i, defect, cause, effectMHP, effectMAP });
              });
              const blocks = doc.querySelectorAll('#optimal-conditions .condition-block, .condition-block');
              blocks.forEach(block => {
                const title = (block.querySelector('.condition-title')?.textContent || '').trim();
                const value = (block.querySelector('.condition-value')?.textContent || '').replace(/\s+/g, ' ').trim();
                if (!value) return;
                if (/O₂|O2/i.test(title) && !/CO/i.test(title)) result.o2Target = value;
                else if (/CO₂|CO2/i.test(title)) result.co2Target = value;
                else if (/Temp/i.test(title)) result.tempCritical = value;
              });
              let acpText = '';
              if (langDict && langDict.res_box_text) acpText = stripHtml(langDict.res_box_text);
              else {
                const acpHost = doc.querySelector('[data-translate="res_box_text"]') ||
                                doc.querySelector('#anaerobic-respiration p') ||
                                doc.querySelector('section .text-xs.text-gray-700');
                acpText = acpHost?.textContent || '';
              }
              const acpMatch = acpText.match(/(\d+(?:[.,]\d+)?)\s*[-–]\s*(\d+(?:[.,]\d+)?)\s*%/);
              if (acpMatch) result.o2Acp = `${acpMatch[1].replace(',', '.')}% - ${acpMatch[2].replace(',', '.')}%`;
            } catch (e) { /* return partial result */ }
            return result;
          };
          const applyProductSheet = (parsed) => {
            if (!parsed) return;
            setProject(p => ({
              ...p,
              ...(parsed.o2Target ? { o2Target: parsed.o2Target } : {}),
              ...(parsed.co2Target ? { co2Target: parsed.co2Target } : {}),
              ...(parsed.tempCritical ? { tempMin: parsed.tempCritical } : {}),
              ...(parsed.o2Acp ? { acpO2: parsed.o2Acp } : {}),
              defectsMatrix: parsed.defects && parsed.defects.length > 0 ? parsed.defects : (p.defectsMatrix || [])
            }));
          };
          const handleProductSheetFile = (file) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              const parsed = parseProductSheet(ev.target?.result || '', lang);
              if (parsed.defects.length === 0 && !parsed.o2Target && !parsed.co2Target && !parsed.tempCritical) {
                alert(rt.productSheetParseFail || 'Could not parse this product sheet.');
                return;
              }
              applyProductSheet(parsed);
            };
            reader.onerror = () => alert(rt.productSheetParseFail || 'Could not read this product sheet.');
            reader.readAsText(file);
          };
          const [productSheetDragOver, setProductSheetDragOver] = useState(false);
          const handleProductSheetDrop = (e) => {
            e.preventDefault();
            setProductSheetDragOver(false);
            const file = e.dataTransfer?.files?.[0];
            if (file) handleProductSheetFile(file);
          };

          // === EVALUATION DAYS (Groups tab) ===
          // Identity is by INDEX, not by day-value. Mirrors proposal.html so
          // editing one card doesn't shift others during typing.
          const addEvaluationDay = (groupId) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const numericDays = (g.measurements || []).map(m => parseFloat(m.day)).filter(d => !isNaN(d));
              const lastDay = numericDays.length > 0 ? Math.max(...numericDays) : 0;
              const sCount = g.specs?.sampleCount || 3;
              const newSamples = Array.from({length: sCount}, (_, i) => ({ id: Date.now()+i, o2: '', co2: '', weight: '', initialWeight: '' }));
              return {
                ...g,
                measurements: [...(g.measurements || []), {
                  day: lastDay + 1, samples: newSamples,
                  quality: 9, notes: '', images: [], qualityParams: [], evaluateQuality: true
                }].sort((a,b) => parseFloat(a.day) - parseFloat(b.day))
              };
            }));
          };
          const removeEvaluationDay = (groupId, indexToRemove) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return { ...g, measurements: (g.measurements || []).filter((_, i) => i !== indexToRemove) };
            }));
          };
          const updateEvaluationDay = (groupId, indexToUpdate, newDayValue) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              return {
                ...g,
                measurements: (g.measurements || []).map((m, i) =>
                  i === indexToUpdate ? { ...m, day: newDayValue } : m
                )
              };
            }));
          };

          // Supply Chain
          const addChainStep = () => setSupplyChain([...supplyChain, { stage: '', tempStart: '', tempEnd: '', daysStart: '', daysEnd: '', action: 'none' }]);
          const updateChainStep = (i, f, v) => { const n = [...supplyChain]; n[i][f] = v; setSupplyChain(n); };
          const removeChainStep = (i) => setSupplyChain(supplyChain.filter((_, idx) => idx !== i));
          const moveChainStep = (i, dir) => { const n = [...supplyChain]; if(dir==='up' && i>0){ [n[i], n[i-1]] = [n[i-1], n[i]]; } else if(dir==='down' && i<n.length-1){ [n[i], n[i+1]] = [n[i+1], n[i]]; } setSupplyChain(n); };

          // Group Movement
          const moveGroup = (id, dir) => {
            setGroups(prev => {
              const idx = prev.findIndex(g => g.id === id);
              if (idx < 0) return prev;
              const newG = [...prev];
              if (dir === 'up' && idx > 0) { [newG[idx], newG[idx - 1]] = [newG[idx - 1], newG[idx]]; } 
              else if (dir === 'down' && idx < newG.length - 1) { [newG[idx], newG[idx + 1]] = [newG[idx + 1], newG[idx]]; }
              return newG;
            });
          };

          // Modals
          const openSampleModal = (groupId, index) => {
            const g = groups.find(x => x.id === groupId);
            const meas = g.measurements[index];
            const isEndDay = project.totalDuration && parseFloat(meas.day) === parseInt(project.totalDuration);
            const isRetailDay = project.retailOpenDays && parseFloat(meas.day) === (parseInt(project.totalDuration) + parseInt(project.retailOpenDays));
            const isEvaluationDay = parseFloat(meas.day) === 0 || isEndDay || isRetailDay;
            const isDayEditable = parseFloat(meas.day) !== 0 && !isEndDay && !isRetailDay;
            const day0 = g.measurements.find(m => parseFloat(m.day) === 0);
            // Hide gas inputs when the group is not using a Modified Atmosphere
            // Packaging strategy — for ambient (MHP / Open) variants the O₂/CO₂
            // fields are meaningless.
            const isMAP = !g.specs?.atmosphereStrategy || g.specs.atmosphereStrategy === 'MAP';

            setEditingMeasurement({ groupId, index, data: meas, day0Samples: day0?.samples, isEvaluationDay, isDayEditable, projectCriteria: project.criteria, startWeight: g.specs.startWeight || project.packagings?.[0]?.startWeight || project.startWeight, projectTotalDuration: project.totalDuration, isMAP });
            setSampleModalOpen(true);
          };
          
          const openDetailsModal = (groupId, index) => { 
            const g = groups.find(x => x.id === groupId); 
            setEditingMeasurement({ groupId, index, data: g.measurements[index] }); 
            setDetailsModalOpen(true); 
          };

          const saveSampleData = (u) => { 
            setGroups(p => p.map(g => {
                if (g.id !== editingMeasurement.groupId) return g;
                let newMeasurements = g.measurements.map((m, i) => i === editingMeasurement.index ? { ...u, qualityParams: u.qualityParams } : m);
                newMeasurements.sort((a,b) => parseFloat(a.day) - parseFloat(b.day));
                return { ...g, measurements: newMeasurements };
            })); 
          };

          const saveDetailsData = (u) => { setGroups(p => p.map(g => g.id !== editingMeasurement.groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === editingMeasurement.index ? { ...m, images: u.images } : m) })); };

          const addMeasurementDay = (groupId) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const lastDay = parseFloat(g.measurements[g.measurements.length - 1]?.day || 0);
              const sCount = g.specs.sampleCount || 3;
              const newSamples = Array.from({length: sCount}, (_, i) => ({ id: Date.now() + i, o2: '', co2: '', weight: '', initialWeight: '' }));
              return { ...g, measurements: [...g.measurements, { day: lastDay + 1, samples: newSamples, quality: 9, notes: '', images: [], qualityParams: [], evaluateQuality: false }]};
            }));
          };
          
          const removeMeasurementDay = (groupId, index) => {
            setGroups(prev => prev.map(g => {
              if (g.id !== groupId) return g;
              const newMeas = [...g.measurements];
              newMeas.splice(index, 1);
              return { ...g, measurements: newMeas };
            }));
          };

          const updateQuality = (groupId, index, val) => { setGroups(p => p.map(g => g.id !== groupId ? g : { ...g, measurements: g.measurements.map((m, i) => i === index ? { ...m, quality: val } : m) })); };

          const addNewVariant = () => {
            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            const p = parseInt(project.totalDuration) || 0;
            const o = parseInt(project.retailOpenDays) || 0;
            const sCount = groups[0]?.specs.sampleCount || 3;
            
            const genS = (isD0) => Array.from({length: sCount}, (_, i) => ({ id: Date.now()+i, o2: isD0?'20.9':'', co2: isD0?'0.03':'', weight: '', initialWeight: '' }));

            const meas = [{ day: 0, samples: genS(true), quality: 10, notes: 'Start', images: [], qualityParams: [], evaluateQuality: true }];
            if (p > 0) meas.push({ day: p, samples: genS(false), quality: 9, notes: 'End Packing', images: [], qualityParams: [], evaluateQuality: true });
            if (p > 0 && o > 0) meas.push({ day: p + o, samples: genS(false), quality: 9, notes: 'Retail Simulation (Open)', images: [], qualityParams: [], evaluateQuality: true });
            
            setGroups([...groups, { 
                id: newId, 
                name: `Variant ${groups.length + 1}`, 
                specs: { 
                    ...(groups[0]?.specs||{}), 
                    sampleCount: sCount,
                    packaging: (project.packagings?.[0]?.packagingType || project.packagingType || 'Retail'),
                    material: (project.packagings?.[0]?.material || project.material || ''),
                    length: (project.packagings?.[0]?.length || project.length || ''),
                    width: (project.packagings?.[0]?.width || project.width || ''),
                    height: (project.packagings?.[0]?.height || project.height || ''),
                    startWeight: (project.packagings?.[0]?.startWeight || project.startWeight || groups[0]?.specs?.startWeight || '')
                }, 
                measurements: meas, 
                predictedImage: null 
            }]);
            setActiveGroupId(newId);
          };

          const duplicateGroup = (id) => { const org = groups.find(g => g.id === id); const newId = Math.max(...groups.map(g => g.id), 0) + 1; const { verificationOf, round, ...rest } = org; setGroups(p => [...p, { ...rest, id: newId, name: `${org.name} (Copy)` }]); setActiveGroupId(newId); };

          // === VERIFICATION ROUND (Round 2) ===
          // A second test round for the same variant. The packaging
          // configuration is copied from — and stays locked to — Round 1, so
          // the second round is a true verification of the first. Deviating
          // configurations are by definition a new trial and belong in a new
          // report. Measurements start empty on the same evaluation days.
          const addVerificationRound = (sourceId) => {
            const src = groups.find(g => g.id === sourceId);
            if (!src || src.verificationOf) return;
            if (groups.some(g => g.verificationOf === sourceId)) return;
            const newId = Math.max(...groups.map(g => g.id), 0) + 1;
            const sCount = src.specs?.sampleCount || 3;
            const genS = (isD0) => Array.from({length: sCount}, (_, i) => ({ id: Date.now()+i, o2: isD0?'20.9':'', co2: isD0?'0.03':'', weight: '', initialWeight: '' }));
            const meas = (src.measurements || []).map(m => ({
              day: m.day, samples: genS(parseFloat(m.day) === 0), quality: 9,
              notes: parseFloat(m.day) === 0 ? 'Start (Round 2)' : '', images: [], qualityParams: [],
              evaluateQuality: m.evaluateQuality || false
            }));
            setGroups(prev => {
              const idx = prev.findIndex(g => g.id === sourceId);
              const ng = { id: newId, name: `${src.name} (R2)`, round: 2, verificationOf: sourceId, specs: JSON.parse(JSON.stringify(src.specs || {})), measurements: meas, predictedImage: null };
              const arr = [...prev];
              arr.splice(idx + 1, 0, ng);
              return arr;
            });
            setActiveGroupId(newId);
          };
          
          const removeGroup = (id) => { 
            if(groups.length > 1) { 
                const newGroups = groups.filter(g => g.id !== id);
                setGroups(newGroups);
                if (activeGroupId === id) {
                   setActiveGroupId(newGroups[0].id);
                }
            }
          };

          const addNextStep = () => { 
            if (newStep.trim()) { 
                setAnalysis(prev => ({ 
                    ...prev, 
                    nextSteps: [...prev.nextSteps, { text: newStep, variantId: newStepVariant }] 
                })); 
                setNewStep(''); 
            }
          };
          const removeNextStep = (i) => setAnalysis(prev => ({ ...prev, nextSteps: prev.nextSteps.filter((_, idx) => idx !== i) }));
          // Inline edit + reorder for detailed conclusion points. Legacy string
          // entries are normalised to { text, variantId } on first edit.
          const updateNextStep = (i, field, value) => setAnalysis(prev => ({
            ...prev,
            nextSteps: prev.nextSteps.map((s, idx) => {
              if (idx !== i) return s;
              const stepObj = typeof s === 'string' ? { text: s, variantId: 'general' } : s;
              return { ...stepObj, [field]: value };
            })
          }));
          const moveNextStep = (i, dir) => setAnalysis(prev => {
            const arr = [...prev.nextSteps];
            const j = dir === 'up' ? i - 1 : i + 1;
            if (j < 0 || j >= arr.length) return prev;
            [arr[i], arr[j]] = [arr[j], arr[i]];
            return { ...prev, nextSteps: arr };
          });

          if (isPreview) {
            return <PrintPreview clientInfo={clientInfo} project={project} groups={groups} supplyChain={supplyChain} onBack={() => setIsPreview(false)} analysis={analysis} unitSystem={unitSystem} lang={lang} />;
          }

          // Auto-detect section visibility for checkbox defaults (null = auto, true/false = manual override)
          const autoShowGas = groups.some(g =>
            (!g.specs?.atmosphereStrategy || g.specs.atmosphereStrategy === 'MAP') &&
            (g.measurements || []).some(m =>
              parseFloat(m.day) > 0 &&
              (m.samples || []).some(s => s.o2 !== '' && s.o2 !== undefined && s.o2 !== null)
            )
          );
          const autoShowHub = groups.some(g =>
            (!g.specs?.atmosphereStrategy || g.specs.atmosphereStrategy === 'MAP') && !!g.predictedImage
          );
          const autoShowWeight = groups.some(g => {
            const daysWithWeight = (g.measurements || []).filter(m =>
              (m.samples || []).some(s => s.weight !== '' && s.weight !== undefined && s.weight !== null && parseFloat(s.weight) > 0)
            );
            return daysWithWeight.length >= 2;
          });

          // --- EDITOR VIEW ---
          return (
            <div className="min-h-screen font-sans text-slate-800 bg-slate-50 pb-20">
              
              {/* Modals */}
              <SampleModal isOpen={sampleModalOpen} onClose={() => setSampleModalOpen(false)} data={editingMeasurement ? editingMeasurement.data : {}} onSave={saveSampleData} day0Samples={editingMeasurement ? editingMeasurement.day0Samples : null} projectCriteria={project.criteria || []} isEvaluationDay={editingMeasurement ? editingMeasurement.isEvaluationDay : false} isDayEditable={editingMeasurement ? editingMeasurement.isDayEditable : false} startWeight={editingMeasurement ? editingMeasurement.startWeight : 0} projectTotalDuration={project.totalDuration} isMAP={editingMeasurement ? editingMeasurement.isMAP : true} rt={rt} />
              <DetailsModal isOpen={detailsModalOpen} onClose={() => setDetailsModalOpen(false)} data={editingMeasurement ? editingMeasurement.data : {}} onSave={saveDetailsData} rt={rt} />

              {pendingImageReplace && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 print:hidden">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full border-t-8 border-orange-500 transform transition-all">
                     <div className="flex items-center gap-4 mb-6 text-orange-600 bg-orange-50 p-4 rounded-xl">
                        <AlertTriangle size={28} />
                        <h3 className="font-extrabold text-xl">{rt.warning}</h3>
                     </div>
                     <p className="mb-8 text-base text-slate-700 leading-relaxed">{rt.warningText}</p>
                     <div className="flex justify-end gap-3">
                       <button onClick={() => setPendingImageReplace(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">{rt.cancel}</button>
                       <button onClick={() => {
                           setGroups(prev => prev.map(g => g.id === pendingImageReplace.groupId ? { ...g, predictedImage: pendingImageReplace.result } : g));
                           setPendingImageReplace(null);
                       }} className="px-6 py-3 bg-orange-600 text-white rounded-full hover:bg-orange-700 font-bold shadow-lg shadow-orange-200 transition">{rt.overwrite}</button>
                     </div>
                  </div>
                </div>
              )}

              {/* === PRODUCT SELECTION MODAL ===
               * Shown when an intake JSON contains more than one product. The
               * user picks which product to load into this report; the
               * selected product is then passed to loadIntakeProduct().
               */}
              {pendingProductSelection && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 print:hidden">
                  <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-2xl w-full border-t-8 transform transition-all max-h-[90vh] flex flex-col" style={{ borderColor: BRAND.colors.green }}>
                     <div className="flex items-start justify-between gap-4 mb-6">
                        <div className="flex items-center gap-4">
                           <div className="p-3 bg-green-50 rounded-xl shrink-0">
                              <Package size={28} color={BRAND.colors.green} />
                           </div>
                           <div>
                              <h3 className="font-extrabold text-xl text-slate-800 tracking-tight">{rt.selectProductTitle}</h3>
                              <p className="text-sm text-slate-500 mt-1 leading-relaxed">{rt.selectProductDesc}</p>
                           </div>
                        </div>
                        <button onClick={() => setPendingProductSelection(null)} className="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition shrink-0" title={rt.cancel}>
                          <X size={20}/>
                        </button>
                     </div>
                     <p className="text-xs font-bold tracking-wide text-slate-500 uppercase mb-3">{rt.selectProductHint}</p>
                     <div className="space-y-3 overflow-y-auto pr-1 -mr-1">
                       {pendingProductSelection.products.map((p, idx) => {
                         const name = p?.name || rt.noProductName;
                         const meta = [p?.type, p?.origin, p?.processingType].filter(Boolean).join(' • ');
                         return (
                           <button
                             key={idx}
                             type="button"
                             onClick={() => confirmProductSelection(idx)}
                             className="w-full text-left p-5 bg-slate-50 hover:bg-green-50 border-2 border-slate-200 hover:border-green-400 rounded-2xl transition-all flex items-center gap-4 group shadow-sm hover:shadow-md"
                           >
                             {p?.photo ? (
                               <img src={p.photo} alt="" className="w-14 h-14 rounded-xl object-cover border border-slate-200 shrink-0"/>
                             ) : (
                               <div className="w-14 h-14 rounded-xl bg-white border border-slate-200 flex items-center justify-center shrink-0">
                                 <Package size={22} className="text-slate-300" />
                               </div>
                             )}
                             <div className="flex-1 min-w-0">
                                <div className="text-[10px] font-bold tracking-widest text-slate-400 uppercase">{rt.productLabel} {idx + 1}</div>
                                <div className="font-extrabold text-base text-slate-800 truncate">{name}</div>
                                {meta && <div className="text-xs text-slate-500 mt-0.5 truncate">{meta}</div>}
                             </div>
                             <ChevronRight size={20} className="text-slate-400 group-hover:text-green-600 shrink-0 transition-colors"/>
                           </button>
                         );
                       })}
                     </div>
                     <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
                       <button onClick={() => setPendingProductSelection(null)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 font-bold transition">{rt.cancel}</button>
                     </div>
                  </div>
                </div>
              )}

              {/* HEADER */}
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-3 md:gap-4">
                  {/* LEFT: Logo + Home */}
                  <div className="flex items-center gap-2 md:gap-3 shrink-0">
                    <img src={BRAND.logos.default} alt="PerfoTec" className="h-7 md:h-9 object-contain" />
                    <a href="index.html" className="bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-800 p-2 xl:px-3 xl:py-2 rounded-lg text-xs font-bold transition-all border border-slate-200 flex items-center gap-1.5 whitespace-nowrap" title={rt.home}>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" /></svg>
                      <span className="hidden xl:inline">{rt.home}</span>
                    </a>

                       <div className="md:col-span-2 bg-slate-50 p-8 rounded-3xl border border-slate-200 shadow-sm mt-4">
                         <label className={`${labelClass} text-sm mb-4`}>{rt.detailedConclusions}</label>
                         <div className="flex flex-col sm:flex-row gap-4 mb-6">
                           <select className={`${inputClass} sm:w-1/4 font-bold text-slate-700`} value={newStepVariant || 'general'} onChange={e => setNewStepVariant(e.target.value)}>
                              <option value="general">{rt.general}</option>
                              {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                           </select>
                           <input type="text" className={`${inputClass} flex-1`} placeholder={rt.addActionPoint} value={newStep || ''} onChange={e => setNewStep(e.target.value)} onKeyPress={e => e.key === 'Enter' && addNextStep()} />
                           <button onClick={addNextStep} className="bg-slate-800 text-white px-6 py-3 rounded-xl hover:bg-slate-900 transition-all font-bold shadow-md flex items-center justify-center"><Plus size={20}/></button>
                         </div>
                         
                         <div className="space-y-3 mt-4">
                           {analysis.nextSteps && analysis.nextSteps.map((s, i) => {
                              const stepObj = typeof s === 'string' ? { text: s, variantId: 'general' } : s;
                              return (
                                <div key={i} className="text-sm bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3 hover:border-slate-300 transition-colors">
                                  <div className="flex flex-col shrink-0">
                                    <button onClick={() => moveNextStep(i, 'up')} disabled={i === 0} className="p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700 rounded disabled:opacity-30 transition-colors" title="Move up"><ChevronUp size={16}/></button>
                                    <button onClick={() => moveNextStep(i, 'down')} disabled={i === analysis.nextSteps.length - 1} className="p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700 rounded disabled:opacity-30 transition-colors" title="Move down"><ChevronDown size={16}/></button>
                                  </div>
                                  <select
                                    className="text-[10px] font-extrabold uppercase bg-slate-100 text-slate-600 px-2 py-1.5 rounded-md border border-slate-200 shrink-0 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer max-w-[130px]"
                                    value={String(stepObj.variantId ?? 'general')}
                                    onChange={e => updateNextStep(i, 'variantId', e.target.value)}
                                  >
                                    <option value="general">{rt.general}</option>
                                    {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                  </select>
                                  <input
                                    type="text"
                                    className="flex-1 text-slate-800 font-medium bg-transparent border border-transparent hover:border-slate-200 focus:border-blue-400 focus:bg-slate-50 rounded-lg px-2 py-1.5 outline-none transition-colors min-w-0"
                                    value={stepObj.text || ''}
                                    onChange={e => updateNextStep(i, 'text', e.target.value)}
                                  />
                                  <button onClick={() => removeNextStep(i)} className="text-red-400 hover:text-red-600 shrink-0 bg-red-50 p-2 rounded-lg hover:bg-red-100 transition-colors"><Trash2 size={16}/></button>
                                </div>
                              );
                           })}
                           {(!analysis.nextSteps || analysis.nextSteps.length === 0) && (
                               <div className="text-sm italic text-slate-400 py-2 text-center">{rt.noConclusions}</div>
                           )}
                         </div>
                       </div>

                       {/* Trial Target evaluation — references the target defined in Setup
                           and records whether it was achieved, with an explanation. */}
                       <div className="md:col-span-2 bg-green-50/40 p-8 rounded-3xl border border-green-200 shadow-sm mt-4">
                         <label className={`${labelClass} text-sm mb-3 flex items-center gap-2`}><Target size={16} className="text-green-700"/> {rt.targetEval}</label>
                         {project.trialTarget ? (
                           <div className="bg-white p-4 rounded-xl border border-slate-200 mb-5 text-sm text-slate-700 italic shadow-sm">
                             <span className="text-[10px] font-extrabold uppercase tracking-widest text-green-700 not-italic block mb-1">{rt.trialTarget}</span>
                             {project.trialTarget}
                           </div>
                         ) : (
                           <div className="bg-white p-4 rounded-xl border border-dashed border-slate-300 mb-5 text-sm text-slate-400 italic">{rt.noTrialTarget}</div>
                         )}
                         <div className="flex flex-wrap gap-3 mb-5">
                           {[
                             ['achieved',    rt.targetAchievedOpt,    'bg-green-600 border-green-700 ring-green-600/20'],
                             ['partial',     rt.targetPartialOpt,     'bg-orange-500 border-orange-600 ring-orange-500/20'],
                             ['notAchieved', rt.targetNotAchievedOpt, 'bg-red-600 border-red-700 ring-red-600/20']
                           ].map(([val, label, activeCls]) => (
                             <button key={val} type="button"
                               onClick={() => setAnalysis(prev => ({ ...prev, targetAchieved: prev.targetAchieved === val ? null : val }))}
                               className={`px-5 py-2.5 rounded-xl text-sm font-bold transition-all border shadow-sm ${analysis.targetAchieved === val ? `${activeCls} text-white ring-4 transform scale-[1.02]` : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                               {label}
                             </button>
                           ))}
                         </div>
                         <textarea rows="3" className={`${inputClass} resize-y`} placeholder={rt.targetEvalPlaceholder} value={analysis.targetEvaluation || ''} onChange={e => setAnalysis(prev => ({ ...prev, targetEvaluation: e.target.value }))} />
                       </div>

                       {/* General observations — trial-level notes independent from samples. */}
                       <div className="md:col-span-2 mt-4">
                         <label className={`${labelClass} text-sm mb-3`}>{rt.generalObs}</label>
                         <textarea rows="4" className={`${inputClass} resize-y`} placeholder={rt.generalObsPlaceholder} value={analysis.generalObservations || ''} onChange={e => setAnalysis(prev => ({ ...prev, generalObservations: e.target.value }))} />
                       </div>

                       <div className="md:col-span-1 mt-6">
                           <label className={`${labelClass} text-sm mb-3`}>{rt.gasAnalysis}</label>
                           <RichTextEditor 
                              value={analysis.graphNotes || ''} 
                              onChange={(val) => setAnalysis(prev => ({...prev, graphNotes: val}))} 
                              placeholder={rt.gasAnalysisPlaceholder}
                           />
                       </div>

                       <div className="md:col-span-1 mt-6">
                         <div className="flex items-center gap-2 mb-2">
                           <input
                             type="text"
                             className="flex-1 text-xs font-bold tracking-wide uppercase bg-transparent border-b border-dashed border-slate-400 outline-none focus:border-blue-500 py-0.5 text-slate-600 placeholder-slate-400 transition-colors"
                             placeholder={rt.temperatureLabelPlaceholder}
                             value={analysis.temperatureLabel || ''}
                             onChange={e => setAnalysis(prev => ({...prev, temperatureLabel: e.target.value}))}
                           />
                           <span className="text-[9px] text-slate-400 italic shrink-0">(optional)</span>
                         </div>
                         {getTempImages(analysis).length > 0 && (
                           <div className="grid grid-cols-2 gap-3 mb-3">
                               {getTempImages(analysis).map((img, i) => (
                                 <div key={i} className="relative group border border-slate-200 rounded-xl p-2 bg-white flex items-center justify-center min-h-[100px]">
                                     <img src={img} className="max-w-full max-h-40 object-contain rounded-lg shadow-sm" />
                                     <button onClick={(e) => { e.preventDefault(); setAnalysis(prev => ({...prev, temperatureImages: getTempImages(prev).filter((_, idx) => idx !== i)})); }} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-red-600 hover:scale-110 z-20"><Trash2 size={16}/></button>
                                 </div>
                               ))}
                           </div>
                         )}
                         <div className="border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center text-center bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all cursor-pointer relative overflow-hidden shadow-sm group min-h-[120px]">
                           <input type="file" accept="image/*" multiple className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={(e) => {
                               const files = Array.from(e.target.files || []);
                               const target = e.target;
                               files.forEach(file => {
                                 const reader = new FileReader();
                                 reader.onloadend = () => setAnalysis(prev => ({...prev, temperatureImages: [...getTempImages(prev), reader.result]}));
                                 reader.readAsDataURL(file);
                               });
                               target.value = '';
                           }} />
                           <div className="flex flex-col items-center">
                               <div className="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                   <Upload size={28} className="text-blue-500"/>
                               </div>
                               <span className="font-extrabold text-sm text-slate-700 block">{rt.uploadTempGraph}</span>
                           </div>
                         </div>
                       </div>

                       <div className="md:col-span-1 mt-6">
                         <label className={`${labelClass} text-sm mb-1`}>{rt.sectionVisibility}</label>
                         <p className="text-xs text-slate-400 mb-3">{rt.sectionVisibilityHint}</p>
                         <div className="flex flex-col gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                           <label className="flex items-center gap-3 cursor-pointer select-none">
                             <input type="checkbox" checked={analysis.showGasSection ?? autoShowGas} onChange={e => setAnalysis(prev => ({...prev, showGasSection: e.target.checked}))} className="w-4 h-4 accent-green-600 shrink-0" />
                             <span className="text-sm font-medium text-slate-700">{rt.showGasSection}</span>
                             {(analysis.showGasSection === null) && <span className="text-[10px] text-slate-400 italic ml-auto">auto</span>}
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer select-none">
                             <input type="checkbox" checked={analysis.showHubPredictions ?? autoShowHub} onChange={e => setAnalysis(prev => ({...prev, showHubPredictions: e.target.checked}))} className="w-4 h-4 accent-green-600 shrink-0" />
                             <span className="text-sm font-medium text-slate-700">{rt.showHubPredictions}</span>
                             {(analysis.showHubPredictions === null) && <span className="text-[10px] text-slate-400 italic ml-auto">auto</span>}
                           </label>
                           <label className="flex items-center gap-3 cursor-pointer select-none">
                             <input type="checkbox" checked={analysis.showWeightLoss ?? autoShowWeight} onChange={e => setAnalysis(prev => ({...prev, showWeightLoss: e.target.checked}))} className="w-4 h-4 accent-green-600 shrink-0" />
                             <span className="text-sm font-medium text-slate-700">{rt.showWeightLoss}</span>
                             {(analysis.showWeightLoss === null) && <span className="text-[10px] text-slate-400 italic ml-auto">auto</span>}
                           </label>
                         </div>
                       </div>
                    </section>
                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
